<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M5: War Room V6.8 - FORENSIC LINKER</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #020617; color: white; font-family: 'Orbitron', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .node { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; z-index: 10; position: absolute; transform: translate(-50%, -50%); }
        .node:hover { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 20px currentColor; }
        .svg-lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .line-link { stroke: rgba(255, 255, 255, 0.2); stroke-width: 2; cursor: pointer; pointer-events: stroke; transition: all 0.3s; }
        .line-link:hover { stroke: #ef4444; stroke-width: 4; filter: drop-shadow(0 0 8px #ef4444); }
        .status-red { border-color: #ef4444; color: #ef4444; box-shadow: inset 0 0 10px rgba(239, 68, 68, 0.2); }
        .status-yellow { border-color: #eab308; color: #eab308; box-shadow: inset 0 0 10px rgba(234, 179, 8, 0.2); }
        .alert-strip { background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; color: #ef4444; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const WarRoomV68 = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [pin, setPin] = useState("");
            const [activeTab, setActiveTab] = useState('SPIDER');
            const [activeEvidence, setActiveEvidence] = useState(null);

            useEffect(() => {
                if (sessionStorage.getItem('ntg_global_auth') === 'true') setIsAuthenticated(true);
            }, []);

            const verifyPin = () => {
                if (pin === "1234") { sessionStorage.setItem('ntg_global_auth', 'true'); setIsAuthenticated(true); } 
                else { alert("LOCKDOWN V6.8: ACCESS DENIED"); setPin(""); }
            };

            // V6.8 SPIDER WEB DATA (Forensic Nodes)
            const nodes = [
                { id: 'terme', label: 'Terme Tersanesi', type: 'CENTER', status: 'red', x: 50, y: 50, icon: 'fa-ship' },
                { id: 'emir_pl', label: 'Emir Denizcilik (KRS 0000049223)', type: 'Polish Node', status: 'red', x: 20, y: 30, icon: 'fa-flag' },
                { id: 'yapi_nl', label: 'Yapi Kredi Nederland', type: 'Dutch Node', status: 'red', x: 20, y: 70, icon: 'fa-building-columns' },
                { id: 'sevim', label: 'Sevim Zorlu', type: 'ML Integration', status: 'red', x: 80, y: 40, icon: 'fa-user-secret' },
                { id: 'ipek', label: 'İpek Banu Karaca', type: 'ML Integration', status: 'red', x: 80, y: 60, icon: 'fa-user-secret' },
                { id: 'cavus', label: 'Çavuş & Coşkunsu', type: 'Audited Entity', status: 'yellow', x: 50, y: 15, icon: 'fa-gavel' }
            ];

            const links = [
                { source: 'emir_pl', target: 'yapi_nl', evidence: 'Direct Financial Conduit. Polish branch funds routed through Yapi Kredi NL.' },
                { source: 'terme', target: 'emir_pl', evidence: 'Operational Mirror. Polish entity used for asset stripping.' },
                { source: 'cavus', target: 'emir_pl', evidence: 'SABOTAGE AUDIT: Failure to report Polish branch (NIP 5262587598) in 2018.' },
                { source: 'sevim', target: 'terme', evidence: 'ASSET STRIPPING ALERT: Designated Integration Vehicle.' }
            ];

            // V6.8 BREACH VESSELS
            const breachVessels = [
                { name: 'YM SAMSUN', imo: '9584982', owner: 'Terme/Zorlu', year: 2011, status: 'Primary Breach Vessel' },
                { name: 'GHOST HULL 1', imo: '9876543', owner: 'Emir Denizcilik', year: 2011, status: 'Financial Misconduct' }
            ];

            if (!isAuthenticated) return (
                <div className="min-h-screen flex items-center justify-center p-6">
                    <div className="glass p-10 rounded-[3rem] w-full max-w-sm text-center border-red-500/30">
                        <i className="fa-solid fa-link-slash text-5xl text-red-500 mb-6"></i>
                        <h2 className="text-xs font-black uppercase mb-8 tracking-widest text-red-500">M5 Forensic Gate V6.8</h2>
                        <input type="password" value={pin} onChange={(e) => setPin(e.target.value)} className="w-full bg-black/50 border border-white/10 p-6 rounded-2xl text-center text-4xl tracking-[1rem] outline-none text-red-500 mb-6 font-black" autoFocus />
                        <button onClick={verifyPin} className="h-16 w-full bg-red-900/50 border border-red-500 text-red-500 rounded-xl font-black uppercase text-xs">Authenticate</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen relative overflow-hidden bg-slate-950 p-4 flex flex-col">
                    <header className="relative z-20 glass p-5 rounded-[2rem] mb-4 border border-red-900/50">
                        <div className="flex justify-between items-center">
                            <h1 className="text-sm font-black uppercase italic tracking-tighter">M5: Forensic Linker</h1>
                            <div className="flex gap-2">
                                <button onClick={() => setActiveTab('SPIDER')} className={`px-4 py-2 rounded-lg text-[10px] font-black uppercase ${activeTab === 'SPIDER' ? 'bg-red-600' : 'bg-white/5'}`}>Spider</button>
                                <button onClick={() => setActiveTab('MATRIX')} className={`px-4 py-2 rounded-lg text-[10px] font-black uppercase ${activeTab === 'MATRIX' ? 'bg-red-600' : 'bg-white/5'}`}>Matrix</button>
                            </div>
                        </div>
                    </header>

                    {/* ASSET STRIPPING ALERT BANNER */}
                    <div className="alert-strip p-3 rounded-xl mb-4 text-[10px] font-black uppercase text-center tracking-widest">
                        <i className="fa-solid fa-triangle-exclamation mr-2"></i> 
                        Asset Stripping Alert: Sevim Zorlu & İpek Banu (Integration Vehicles Active)
                    </div>

                    {activeTab === 'SPIDER' ? (
                        <div className="relative flex-grow glass rounded-[2.5rem] border border-slate-800 overflow-hidden min-h-[500px]">
                            <svg className="svg-lines">
                                {links.map((link, i) => {
                                    const s = nodes.find(n => n.id === link.source);
                                    const t = nodes.find(n => n.id === link.target);
                                    return <line key={i} x1={`${s.x}%`} y1={`${s.y}%`} x2={`${t.x}%`} y2={`${t.y}%`} className="line-link" onClick={() => setActiveEvidence(link.evidence)} />
                                })}
                            </svg>
                            {nodes.map(n => (
                                <div key={n.id} className={`node glass rounded-full flex flex-col items-center justify-center border-2 status-${n.status} ${n.type === 'CENTER' ? 'w-24 h-24' : 'w-16 h-16 bg-slate-900/80'}`} style={{ left: `${n.x}%`, top: `${n.y}%` }} onClick={() => setActiveEvidence(`${n.label}: ${n.type}`)}>
                                    <i className={`fa-solid ${n.icon} text-xs mb-1`}></i>
                                    <span className="text-[6px] font-black uppercase text-center leading-tight px-1">{n.label}</span>
                                </div>
                            ))}
                            {activeEvidence && (
                                <div className="absolute bottom-4 left-4 right-4 z-30 glass p-4 rounded-2xl border-l-4 border-red-500 animate-fade-in flex justify-between items-center shadow-2xl">
                                    <p className="text-[10px] italic font-bold text-red-100">{activeEvidence}</p>
                                    <button onClick={() => setActiveEvidence(null)} className="text-red-500 ml-2"><i className="fa-solid fa-circle-xmark"></i></button>
                                </div>
                            )}
                        </div>
                    ) : (
                        <div className="flex-grow space-y-4 overflow-y-auto pb-10 no-scrollbar">
                            <div className="glass p-5 rounded-[2rem] border border-red-600/30">
                                <h3 className="text-[10px] font-black uppercase text-red-500 mb-4 tracking-widest">Primary Breach Vessels (2011 Focus)</h3>
                                <div className="space-y-4">
                                    {breachVessels.map((v, i) => (
                                        <div key={i} className="bg-black/40 p-4 rounded-2xl border-l-4 border-red-600 flex justify-between items-center">
                                            <div>
                                                <h4 className="text-sm font-black uppercase">{v.name}</h4>
                                                <p className="text-[8px] opacity-60">IMO: {v.imo} | YEAR: {v.year}</p>
                                            </div>
                                            <span className="text-[8px] bg-red-600 text-white px-2 py-1 rounded font-black">{v.status}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            
                            <div className="glass p-5 rounded-[2rem] border border-yellow-600/30">
                                <h3 className="text-[10px] font-black uppercase text-yellow-500 mb-2">The Sabotage Audit (2018)</h3>
                                <p className="text-[10px] italic opacity-80 border-l-2 border-yellow-500 pl-3">
                                    Entity: Çavuş & Coşkunsu<br/>
                                    Question: Did they report the Polish branch (NIP 5262587598)?<br/>
                                    Action: Verify malpractice if concealment is confirmed.
                                </p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<WarRoomV68 />);
    </script>
</body>
</html>
