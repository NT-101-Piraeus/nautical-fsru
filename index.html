<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NTG COMMAND | V56 COMPLETE HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; -webkit-tap-highlight-color: transparent; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .house-card { transition: all 0.2s; }
        .house-card:active { scale: 0.98; background: rgba(236, 72, 153, 0.1); }
        .status-badge { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [activeManual, setActiveManual] = useState('HOME');
            
            const properties = [
                { id: 1, name: "Syros Loft A", location: "Ερμούπολη", beds: 4, occupied: 3, status: "ACTIVE", price: "€65/day" },
                { id: 2, name: "Piraeus Port Apt", location: "Πασαλιμάνι", beds: 2, occupied: 0, status: "CLEANING", price: "€50/day" },
                { id: 3, name: "Elefsina Crew House", location: "Κέντρο", beds: 6, occupied: 6, status: "FULL", price: "€80/day" }
            ];

            const manuals = [
                { id: 'M1', title: 'SAFETY', icon: 'fa-shield-halved', color: 'text-blue-400' },
                { id: 'M2', title: 'REPAIRS', icon: 'fa-ship', color: 'text-cyan-400' },
                { id: 'M3', title: 'LEGAL', icon: 'fa-scale-balanced', color: 'text-red-500' },
                { id: 'M5', title: 'WORKFORCE', icon: 'fa-user-clock', color: 'text-emerald-400' },
                { id: 'M6', title: 'CEO PULSE', icon: 'fa-chart-line', color: 'text-purple-500' },
                { id: 'M7', title: 'X-MERCHANT', icon: 'fa-cart-shopping', color: 'text-orange-500' },
                { id: 'M8', title: 'AIRBNB', icon: 'fa-house-chimney-user', color: 'text-pink-500' },
                { id: 'M4', title: 'TECH CORE', icon: 'fa-microchip', color: 'text-slate-500' }
            ];

            return (
                <div className="min-h-screen pb-24">
                    {/* --- GLOBAL HEADER --- */}
                    <header className="glass sticky top-0 z-50 p-4 flex justify-between items-center border-b border-pink-500/20">
                        <div onClick={() => setActiveManual('HOME')} className="cursor-pointer">
                            <p className="text-[9px] font-black text-pink-500 tracking-[0.3em]">NTG COMMAND HUB</p>
                            <h1 className="font-bold text-sm tracking-tighter uppercase">M. SYKINIOTIS</h1>
                        </div>
                        <i className="fa-solid fa-key text-pink-500 animate-pulse"></i>
                    </header>

                    <main className="p-4">
                        {/* --- HOME VIEW --- */}
                        {activeManual === 'HOME' && (
                            <div className="grid grid-cols-2 gap-4 animate-in fade-in duration-500">
                                {manuals.map(m => (
                                    <button key={m.id} onClick={() => setActiveManual(m.id)} className="glass p-6 rounded-[2.5rem] flex flex-col items-center gap-2 border-b-2 border-transparent active:border-white/20 transition-all">
                                        <i className={`fa-solid ${m.icon} text-3xl ${m.color}`}></i>
                                        <span className="text-[10px] font-black uppercase tracking-tighter">{m.title}</span>
                                    </button>
                                ))}
                            </div>
                        )}

                        {/* --- MANUAL 08: ACCOMMODATION HUB --- */}
                        {activeManual === 'M8' && (
                            <div className="space-y-6 animate-in slide-in-from-right duration-300">
                                <div className="flex justify-between items-center px-2">
                                    <h2 className="brand text-pink-500 text-xs italic underline underline-offset-8 uppercase tracking-widest">Crew Housing</h2>
                                    <button onClick={() => setActiveManual('HOME')} className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Back</button>
                                </div>

                                <div className="space-y-4">
                                    <p className="text-[10px] font-black text-slate-500 uppercase ml-2 tracking-widest">Managed Properties</p>
                                    {properties.map(house => (
                                        <div key={house.id} className="house-card glass p-5 rounded-[2rem] border-l-4 border-pink-600">
                                            <div className="flex justify-between items-start mb-4">
                                                <div>
                                                    <h3 className="text-sm font-black uppercase tracking-tighter">{house.name}</h3>
                                                    <p className="text-[9px] font-bold text-slate-500 uppercase tracking-widest">{house.location}</p>
                                                </div>
                                                <span className={`text-[8px] font-black px-2 py-1 rounded uppercase ${house.status === 'ACTIVE' ? 'text-emerald-500' : 'text-orange-500'}`}>
                                                    {house.status}
                                                </span>
                                            </div>
                                            
                                            <div className="flex justify-between items-center border-t border-slate-800 pt-4">
                                                <div className="flex gap-4">
                                                    <div className="text-center">
                                                        <p className="text-[8px] font-black text-slate-500 uppercase">Capacity</p>
                                                        <p className="text-xs font-black">{house.beds}</p>
                                                    </div>
                                                    <div className="text-center border-l border-slate-800 pl-4">
                                                        <p className="text-[8px] font-black text-slate-500 uppercase">Occupied</p>
                                                        <p className={`text-xs font-black ${house.occupied === house.beds ? 'text-red-500' : 'text-emerald-500'}`}>{house.occupied}</p>
                                                    </div>
                                                </div>
                                                <p className="text-[10px] font-black text-pink-500">{house.price}</p>
                                            </div>

                                            <div className="mt-4 flex gap-2">
                                                <button className="flex-1 bg-slate-800 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest">Check-in Photo</button>
                                                <button className="flex-1 bg-pink-600/20 border border-pink-500/30 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest">Guest List</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <button className="w-full glass p-4 rounded-2xl flex items-center justify-center gap-3 border-dashed border-slate-700">
                                    <i className="fa-solid fa-plus text-slate-500 text-xs"></i>
                                    <span className="text-[10px] font-black uppercase text-slate-500 tracking-widest">Register New Property</span>
                                </button>
                            </div>
                        )}

                        {/* --- PLACEHOLDERS FOR OTHERS (PRESERVED LOGIC) --- */}
                        {['M1','M2','M3','M4','M5','M6','M7'].includes(activeManual) && (
                            <div className="flex flex-col items-center justify-center py-20 animate-in fade-in">
                                <i className={`fa-solid ${manuals.find(m=>m.id===activeManual).icon} text-5xl mb-4 ${manuals.find(m=>m.id===activeManual).color} opacity-20`}></i>
                                <p className="brand text-[10px] text-slate-500 italic">Manual {activeManual} Logic Active</p>
                                <button onClick={() => setActiveManual('HOME')} className="mt-10 bg-slate-800 px-8 py-3 rounded-full text-[10px] font-black uppercase tracking-widest">Return to Bridge</button>
                            </div>
                        )}
                    </main>

                    {/* --- GLOBAL COMMAND ACTION --- */}
                    <div className="fixed bottom-6 left-0 right-0 flex justify-center pointer-events-none z-50">
                        <button className="w-20 h-20 bg-pink-600 rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(236,72,153,0.4)] border-4 border-slate-950 pointer-events-auto active:scale-90 transition-all">
                            <i className="fa-solid fa-camera text-2xl text-white"></i>
                        </button>
                    </div>

                    <footer className="fixed bottom-2 w-full text-center">
                        <p className="brand text-[7px] text-slate-700 font-black tracking-[0.5em] uppercase">
                            NTG Command Hub • Version 2.0 Complete
                        </p>
                    </footer>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
