<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M3: Load Test Pro V5.80</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #020617; color: white; font-family: 'Orbitron', sans-serif; font-style: italic; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .math-locked { filter: blur(8px); pointer-events: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const LoadTestApp = () => {
            const [view, setView] = useState('DASHBOARD'); // DASHBOARD, PROJECT_DETAILS
            const [isAcademyReady, setIsAcademyReady] = useState(false);
            const [selectedProject, setSelectedProject] = useState(null);

            useEffect(() => {
                const checkM8 = () => setIsAcademyReady(localStorage.getItem('ntg_M8_ready') === 'true');
                checkM8();
                const interval = setInterval(checkM8, 2000);
                return () => clearInterval(interval);
            }, []);

            const wonJobs = [
                { id: 'P-101', name: 'MV ADASTRA', type: 'ILO 152', status: 'ACTIVE' },
                { id: 'P-102', name: 'MT FELIX', type: 'MEG4 Mooring', status: 'ACTIVE' }
            ];

            const addNewProject = () => {
                const pin = prompt("ENTER MASTER PIN (1234)");
                if (pin === "1234") alert("Project Wizard Initialized...");
                else alert("ACCESS DENIED");
            };

            if (view === 'DASHBOARD') return (
                <div className="min-h-screen p-6">
                    <header className="flex justify-between items-center mb-10 glass p-6 rounded-[2rem] border-l-4 border-emerald-500">
                        <div>
                            <h1 className="text-sm font-black uppercase text-emerald-500">M3: Load Test Pro</h1>
                            <p className="text-[8px] opacity-50 uppercase font-black tracking-widest italic">Operational Dashboard</p>
                        </div>
                        <a href="index.html" className="p-4 glass rounded-2xl"><i className="fa-solid fa-house"></i></a>
                    </header>

                    <div className="space-y-6">
                        {/* 🟢 Won Jobs (Active) */}
                        <section>
                            <h2 className="text-[10px] font-black uppercase text-emerald-500 mb-3 px-2 tracking-widest italic">🟢 Won Jobs (Active)</h2>
                            <div className="space-y-3">
                                {wonJobs.map(job => (
                                    <div key={job.id} onClick={() => { setSelectedProject(job); setView('PROJECT_DETAILS'); }} 
                                         className="glass p-6 rounded-[2.5rem] flex justify-between items-center border-l-4 border-emerald-600 active:scale-95 cursor-pointer">
                                        <div>
                                            <p className="text-xs font-black uppercase tracking-tight">{job.name}</p>
                                            <p className="text-[8px] opacity-40 uppercase font-black tracking-widest">{job.type}</p>
                                        </div>
                                        <i className="fa-solid fa-chevron-right opacity-30"></i>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* 🔴 Lost Quotes (Archive) */}
                        <section className="opacity-60 grayscale">
                            <h2 className="text-[10px] font-black uppercase text-red-500 mb-3 px-2 tracking-widest italic">🔴 Lost Quotes (Archive)</h2>
                            <div className="glass p-6 rounded-[2.5rem] border-l-4 border-red-900 italic text-[9px] uppercase font-black">No recent lost quotes in sector</div>
                        </section>

                        {/* ➕ Add New Project */}
                        <button onClick={addNewProject} className="h-20 w-full glass rounded-[2rem] border-2 border-dashed border-white/20 flex items-center justify-center gap-3 active:scale-95">
                            <i className="fa-solid fa-plus text-emerald-500"></i>
                            <span className="text-[10px] font-black uppercase tracking-widest italic">Add New Project (PIN Required)</span>
                        </button>
                    </div>
                </div>
            );

            if (view === 'PROJECT_DETAILS') return (
                <div className="min-h-screen p-6">
                    <button onClick={() => setView('DASHBOARD')} className="text-[9px] underline text-emerald-500 mb-8 uppercase font-black italic tracking-widest">← Back to Dashboard</button>
                    
                    <div className="glass p-8 rounded-[3rem] border-l-4 border-emerald-500 mb-8">
                        <h2 className="text-2xl font-black uppercase italic tracking-tighter">{selectedProject.name}</h2>
                        <p className="text-[9px] opacity-40 uppercase font-black tracking-widest">ID: {selectedProject.id} | Engine: {selectedProject.type}</p>
                    </div>

                    {!isAcademyReady ? (
                        <div className="glass p-10 rounded-[3rem] border-l-4 border-purple-600 text-center flex flex-col items-center gap-4">
                            <i className="fa-solid fa-lock text-purple-500 text-2xl animate-pulse"></i>
                            <h3 className="text-[11px] font-black uppercase tracking-widest">Math Engine Locked</h3>
                            <p className="text-[9px] opacity-60 uppercase font-black tracking-tighter italic">Complete M8 Academy Training to unlock ILO 152 / MEG4 Calculators</p>
                            <a href="m8_academy.html" className="mt-2 text-[10px] bg-purple-600/20 text-purple-400 px-6 py-2 rounded-full font-black uppercase italic tracking-widest border border-purple-500/30">Go to M8 Academy</a>
                        </div>
                    ) : (
                        <div className="glass p-8 rounded-[3rem] border-l-4 border-blue-500 space-y-6">
                             <h3 className="text-[10px] font-black uppercase text-blue-500 italic">Math Engine Unlocked</h3>
                             <div className="space-y-4">
                                <div className="flex justify-between items-center text-[11px] font-black uppercase border-b border-white/10 pb-2">
                                    <span>Proof Load (kN)</span>
                                    <span className="text-emerald-500">250.0</span>
                                </div>
                                <button className="fat-finger-button w-full h-16 bg-blue-600 rounded-[1.5rem] font-black uppercase italic tracking-widest shadow-lg shadow-blue-900/50">Calculate Results</button>
                             </div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<LoadTestApp />);
    </script>
</body>
</html>
