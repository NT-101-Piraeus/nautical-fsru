<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTG | TECH GAUGING</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; }
        .brand { font-family: 'Orbitron', sans-serif; color: #10b981; }
        .glass-table { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function TechGauging() {
            const [ship, setShip] = useState(() => localStorage.getItem('ntg_tech_ship') || '');
            const [rows, setRows] = useState(() => {
                const saved = localStorage.getItem('ntg_tech_data');
                return saved ? JSON.parse(saved) : [{ id: 1, pt: 'A1', orig: 12.0, curr: '' }];
            });

            useEffect(() => {
                localStorage.setItem('ntg_tech_ship', ship);
                localStorage.setItem('ntg_tech_data', JSON.stringify(rows));
            }, [ship, rows]);

            const addPoint = () => {
                const newId = rows.length + 1;
                setRows([...rows, { id: newId, pt: `A${newId}`, orig: 12.0, curr: '' }]);
            };

            const update = (id, field, val) => {
                setRows(rows.map(r => r.id === id ? { ...r, [field]: val } : r));
            };

            return (
                <div className="max-w-xl mx-auto p-4 pb-32">
                    <header className="flex justify-between items-center py-6 border-b border-emerald-900/30 mb-8">
                        <div>
                            <h1 className="brand text-sm uppercase tracking-widest italic">Tech Gauging</h1>
                            <p className="text-[8px] text-slate-500 font-bold uppercase tracking-[0.3em]">UTM & Thickness Audit</p>
                        </div>
                        <a href="index.html" className="text-slate-500 text-xl"><i className="fa-solid fa-house-user"></i></a>
                    </header>

                    <div className="bg-slate-900 p-6 rounded-[35px] border border-emerald-500/10 mb-6 shadow-2xl">
                        <label className="text-[9px] font-black text-emerald-500/50 uppercase tracking-widest block mb-1">Vessel / Project</label>
                        <input className="w-full bg-transparent border-b border-slate-700 p-2 text-xl font-bold outline-none focus:border-emerald-500 uppercase transition-all" value={ship} onChange={(e)=>setShip(e.target.value)} placeholder="ENTER SHIP NAME" />
                    </div>

                    <div className="glass-table rounded-[35px] overflow-hidden shadow-2xl">
                        <table className="w-full text-left">
                            <thead className="bg-emerald-900/20 text-[9px] font-black uppercase text-slate-500">
                                <tr>
                                    <th className="p-4">Point</th>
                                    <th className="p-4 text-center">Orig.</th>
                                    <th className="p-4 text-center">Current</th>
                                    <th className="p-4 text-right">Dim%</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-800">
                                {rows.map((r) => {
                                    const dim = r.curr ? (((r.orig - r.curr) / r.orig) * 100).toFixed(1) : 0;
                                    return (
                                        <tr key={r.id}>
                                            <td className="p-4 font-bold text-emerald-400">{r.pt}</td>
                                            <td className="p-4 text-center font-mono text-slate-500">
                                                <input type="number" step="0.1" className="bg-transparent w-10 text-center outline-none" value={r.orig} onChange={(e)=>update(r.id, 'orig', e.target.value)} />
                                            </td>
                                            <td className="p-4 text-center">
                                                <input type="number" step="0.1" className="bg-slate-800 border border-slate-700 w-16 p-2 rounded-xl text-center font-black text-white outline-none focus:ring-1 ring-emerald-500" value={r.curr} onChange={(e)=>update(r.id, 'curr', e.target.value)} placeholder="0.0" />
                                            </td>
                                            <td className={`p-4 text-right font-black ${dim > 20 ? 'text-red-500' : 'text-emerald-500'}`}>
                                                {dim}%
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>

                    <button onClick={addPoint} className="w-full mt-6 bg-slate-800 border border-slate-700 p-5 rounded-2xl font-black text-[10px] uppercase tracking-widest active:scale-95 transition-all">
                        <i className="fa-solid fa-plus mr-2 text-emerald-500"></i> Add Gauging Point
                    </button>

                    <div className="mt-8 grid grid-cols-2 gap-3">
                        <button onClick={() => { if(confirm("Εκκαθάριση μετρήσεων;")) setRows([{id:1, pt:'A1', orig:12.0, curr:''}]) }} className="p-4 rounded-2xl border border-red-900/30 text-red-500 text-[10px] font-black uppercase">Clear All</button>
                        <button onClick={() => alert("Report Ready for PDF Generation")} className="bg-emerald-600 p-4 rounded-2xl text-[10px] font-black uppercase">Finalize Table</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TechGauging />);
    </script></body></html>
