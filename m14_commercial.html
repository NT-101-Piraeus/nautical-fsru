<script type="text/babel">
const { useState, useEffect } = React;

const M14Commercial = () => {
    const [quotes, setQuotes] = useState([]);

    // [Art. 2] Security Gate
    useEffect(() => {
        if (sessionStorage.getItem('ntg_global_auth') !== 'true') {
            window.location.href = 'index.html';
        }
    }, []);

    // Safe-Parser για το Commercial Data [cite: 59]
    useEffect(() => {
        try {
            const saved = localStorage.getItem('ntg_M14_quotes');
            setQuotes(saved ? JSON.parse(saved) : []);
        } catch (e) {
            setQuotes([]);
        }
    }, []);

    // Υπολογισμός Conversion Rate [cite: 60]
    const won = quotes.filter(q => q.status === 'WON').length;
    const total = quotes.length;
    const rate = total > 0 ? ((won / total) * 100).toFixed(1) : 0;

    return (
        <div className="min-h-screen bg-slate-950 text-slate-200 p-6 italic">
            <header className="flex justify-between items-center mb-8 glass p-6 rounded-[2rem]">
                <h1 className="text-2xl font-black uppercase italic tracking-tighter text-emerald-500">M14 Commercial Intel</h1>
                <a href="index.html" className="p-4 bg-white/5 rounded-2xl text-xs uppercase font-black">Bridge</a>
            </header>

            {/* Strategic Insights Cards [cite: 61] */}
            <div className="grid grid-cols-2 gap-4 mb-8 text-center">
                <div className="glass p-6 rounded-[2rem] border-emerald-500/20">
                    <p className="text-[10px] uppercase font-bold opacity-50 mb-2">Conversion Rate</p>
                    <h2 className="text-4xl font-black text-emerald-500">{rate}%</h2>
                </div>
                <div className="glass p-6 rounded-[2rem] border-blue-500/20">
                    <p className="text-[10px] uppercase font-bold opacity-50 mb-2">Active Quotes</p>
                    <h2 className="text-4xl font-black text-blue-500">{total}</h2>
                </div>
            </div>

            {/* Quote List */}
            <div className="grid gap-4">
                {quotes.map((q, i) => (
                    <div key={i} className="glass p-6 rounded-[2.5rem] flex justify-between items-center">
                        <div>
                            <p className="text-[10px] font-bold opacity-40 uppercase tracking-widest">{q.vessel}</p>
                            <h3 className="text-lg font-black uppercase">{q.projectType}</h3>
                        </div>
                        <div className="text-right">
                            <p className="font-black text-emerald-400">€{q.value}</p>
                            <p className="text-[8px] uppercase font-bold opacity-30">{q.status}</p>
                        </div>
                    </div>
                ))}
            </div>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<M14Commercial />);
</script>
