<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M2: Perfect Shield + Telemetry</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');body{background:#020617;color:white;font-family:'Orbitron',sans-serif;font-style:italic;font-weight:bold;}.glass{background:rgba(15,23,42,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);}</style>
</head>
<body><div id="root"></div><script type="text/babel">
const { useState, useEffect } = React;

// --- TELEMETRY SENSOR ---
const Telemetry = {
    log: (type, action, details) => {
        const logs = JSON.parse(localStorage.getItem('ntg_telemetry_logs') || '[]');
        logs.push({ ts: new Date().toISOString(), type, action, details });
        localStorage.setItem('ntg_telemetry_logs', JSON.stringify(logs.slice(-50)));
    }
};
window.onerror = (m, u, l) => Telemetry.log('ERROR', 'CRASH', { m, l });

const SafetyApp = () => {
    const [view, setView] = useState('WATCHLIST'); 
    const [activeVessel, setActiveVessel] = useState(null);
    const [vessels, setVessels] = useState(() => JSON.parse(localStorage.getItem('ntg_vessels')) || [
        { id: 1, name: 'FELIX', imo: '9513191', shift: '07:00-11:00', status: 'ACTIVE' }
    ]);

    // Καταγραφή όταν ο Captain μπαίνει στο App
    useEffect(() => { Telemetry.log('INFO', 'APP_OPEN', 'M2 Safety View'); }, []);

    const handleSelectVessel = (v) => {
        setActiveVessel(v);
        setView('INSPECTION');
        Telemetry.log('ACTION', 'VESSEL_SELECT', v.name);
    };

    if (view === 'WATCHLIST') return (
        <div className="min-h-screen p-6 animate-fade bg-slate-950 font-bold italic">
            <h1 className="text-blue-600 text-lg uppercase mb-10 text-center italic tracking-tighter">M2: SAFETY WATCHLIST</h1>
            <div className="space-y-4">
                {vessels.map(v => (
                    <div key={v.id} onClick={() => handleSelectVessel(v)} className="glass p-5 rounded-[2.5rem] border-l-4 border-slate-700 flex justify-between items-center shadow-xl cursor-pointer active:scale-95 transition-all">
                        <p className="text-sm text-white font-black">{v.name}</p>
                        <i className="fa-solid fa-chevron-right text-slate-800"></i>
                    </div>
                ))}
            </div>
            <div className="mt-20 p-4 border-t border-white/5 opacity-20 text-center">
                <p className="text-[6px] uppercase tracking-[0.3em]">Telemetry Sensor V3.7 Active</p>
            </div>
        </div>
    );

    return (
        <div className="min-h-screen p-6 bg-slate-950 animate-fade italic">
            <button onClick={() => setView('WATCHLIST')} className="text-[10px] text-blue-500 mb-8 font-black underline">← BACK</button>
            <h2 className="text-xl text-white mb-10 uppercase text-center">{activeVessel.name}</h2>
            <button onClick={() => { alert("Photo Captured"); Telemetry.log('ACTION', 'PHOTO_TAKEN', activeVessel.name); }} 
                    className="w-full bg-emerald-600 p-6 rounded-3xl text-[10px] uppercase font-black">
                Capture Evidence
            </button>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<SafetyApp />);
</script></body></html>
