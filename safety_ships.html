<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SafeShip Pro | V45 Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; touch-action: manipulation; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .active-ok { background: #10b981 !important; }
        .active-wait { background: #f59e0b !important; }
        .active-block { background: #ef4444 !important; }
        .specialty-active { background: #3b82f6 !important; border-color: #60a5fa !important; }
        input, textarea { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; outline: none; }
        .suggestion-chip { background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); color: #60a5fa; font-size: 10px; padding: 4px 10px; border-radius: 8px; cursor: pointer; }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const _supabase = supabase.createClient("https://omdarjncczohpffunfy.supabase.co", "sb_publishable_V-nfUDy5MxEG4SlXkisFBg_GBlD_4Y9");

        const TRADES = ["Ηλεκτρολόγοι", "Μηχανικοί", "Ελασματουργοί", "Σωληνουργοί", "ΣΚΑΛΩΣΙΕΣ", "Βαφείς"];
        
        // NEW SMART SUGGESTIONS V45
        const SMART_KNOWLEDGE = {
            "ΑΝΟΙΓΜΑΤΑ": ["Τοποθέτηση κουπαστής", "Προστατευτικό κάλυμμα", "Σήμανση κινδύνου", "Φωτισμός σημείου"],
            "ΥΨΟΣ": ["Χρήση ζώνης ασφαλείας", "Πιστοποιημένη σκαλωσιά", "Δίχτυ προστασίας", "Επιτήρηση από κάτω"]
        };

        const SHIP_LOCS = ["Deck", "Engine Room", "Garage", "Chimney", "Pump Room", "Accommodation"];
        
        const INITIAL_SHIPS = [
            { id: 1, imo: "9234567", name: "FELIX", port: "Δραπετσώνα", type: "Tanker" },
            { id: 2, imo: "9123456", name: "BADJI MOKHTAR III", port: "ΕΛΕΥΣΙΝΑ", type: "Ferry" },
            { id: 3, imo: "9012345", name: "ΑΡΙΑΔΝΗ", port: "ΕΛΕΥΣΙΝΑ", type: "Ferry" },
            { id: 4, imo: "9345678", name: "RIGEL III", port: "Πέραμα", type: "Ferry" }
        ];

        function App() {
            const [view, setView] = useState('DASHBOARD');
            const [activeId, setActiveId] = useState(null);
            const [projects, setProjects] = useState(() => JSON.parse(localStorage.getItem('ntg_v45_data')) || INITIAL_SHIPS.map(s => ({ ...s, data: {}, signedToday: false, expenses: {gas:0, tolls:0, tools:0} })));

            useEffect(() => { localStorage.setItem('ntg_v45_data', JSON.stringify({ ships: projects })); }, [projects]);

            const updateObs = (shipId, loc, obsId, field, val) => {
                setProjects(projects.map(p => p.id === shipId ? { ...p, data: { ...p.data, [loc]: { observations: p.data[loc].observations.map(o => o.id === obsId ? { ...o, [field]: val } : o) } } } : p));
            };

            const ship = projects.find(s => s.id === activeId);

            if (view === 'DASHBOARD') return (
                <div className="max-w-xl mx-auto p-5 pb-32 animate-fadeIn">
                    <header className="py-8 flex justify-between items-center border-b border-white/5 mb-8">
                        <div><h1 className="brand text-sm font-black text-red-500 uppercase italic">SafeShip Tactical</h1><p className="text-[10px] text-slate-500 font-bold uppercase">V45 Professional</p></div>
                        <a href="index.html" className="bg-slate-800 w-12 h-12 rounded-2xl flex items-center justify-center text-xl shadow-lg"><i className="fa-solid fa-house"></i></a>
                    </header>
                    <div className="space-y-6">
                        {projects.map(s => (
                            <div key={s.id} onClick={()=>{setActiveId(s.id); setView('INSPECTION')}} className={`glass p-8 rounded-[50px] flex justify-between items-center transition-all ${s.signedToday ? 'border-l-8 border-emerald-500 bg-emerald-500/5' : 'border border-white/5 shadow-xl'}`}>
                                <div>
                                    <h4 className="font-black text-xl uppercase tracking-tighter">{s.name}</h4>
                                    <p className="text-[10px] text-slate-500 uppercase font-black mt-1 tracking-widest">IMO: {s.imo} • {s.port}</p>
                                </div>
                                <i className="fa-solid fa-chevron-right text-slate-800"></i>
                            </div>
                        ))}
                    </div>
                </div>
            );

            if (view === 'INSPECTION' && ship) return (
                <div className="max-w-xl mx-auto p-5 pb-32 animate-fadeIn">
                    <div className="flex justify-between items-center mb-8">
                        <button onClick={()=>setView('DASHBOARD')} className="bg-slate-800 px-6 py-3 rounded-2xl text-[11px] font-black uppercase">← Fleet</button>
                        <button className="bg-blue-600 px-6 py-3 rounded-2xl text-[11px] font-black uppercase shadow-xl">Generate PDF</button>
                    </div>

                    <div className="glass p-10 rounded-[60px] border-l-8 border-red-600 text-center mb-10 shadow-2xl">
                        <h2 className="brand text-3xl font-black uppercase tracking-tighter">{ship.name}</h2>
                        <p className="text-[11px] font-bold text-slate-500 mt-2 uppercase tracking-widest italic">Maritime Safety Audit Suite</p>
                    </div>

                    {/* EXPENSES LOGGING (V45 NEW) */}
                    <div className="glass p-6 rounded-[40px] border border-white/5 mb-12">
                        <h3 className="brand text-[10px] text-amber-500 uppercase italic mb-6">Field Expenses Registry</h3>
                        <div className="grid grid-cols-3 gap-3">
                            <input type="number" placeholder="GAS €" className="p-3 rounded-xl text-center font-bold text-xs" />
                            <input type="number" placeholder="TOLLS €" className="p-3 rounded-xl text-center font-bold text-xs" />
                            <input type="number" placeholder="OTHER €" className="p-3 rounded-xl text-center font-bold text-xs" />
                        </div>
                    </div>

                    <div className="space-y-16">
                        {SHIP_LOCS.map(loc => {
                            const d = (ship.data && ship.data[loc]) || { observations: [] };
                            return (
                                <div key={loc} className="space-y-6">
                                    <div className="flex justify-between items-center px-4"><h4 className="text-xl font-black uppercase text-red-500 tracking-tighter">{loc}</h4><button onClick={()=>{
                                        const newObs = { id: Date.now(), text: '', status: 'ok', trades: [] };
                                        setProjects(projects.map(p=>p.id===ship.id?{...p, data:{...p.data,[loc]:{observations:[...(p.data[loc]?.observations||[]), newObs]}}}:p));
                                    }} className="bg-slate-800 px-4 py-2 rounded-xl text-[11px] font-black border border-white/10 shadow-lg">+ NEW ENTRY</button></div>
                                    {d.observations.map(o => (
                                        <div key={o.id} className="glass p-8 rounded-[45px] border border-white/5 space-y-6 shadow-2xl relative">
                                            <div className="grid grid-cols-4 gap-2">{['ok','wait','block','na'].map(st => (
                                                <button key={st} onClick={()=>{
                                                    setProjects(projects.map(p=>p.id===ship.id?{...p, data:{...p.data,[loc]:{observations:p.data[loc].observations.map(x=>x.id===o.id?{...x, status:st, isTask:(st==='block'||st==='wait')}:x)}}}:p));
                                                }} className={`p-4 rounded-3xl text-[10px] font-black uppercase transition-all ${o.status===st?`active-${st}`:'bg-slate-800 opacity-30'}`}>{st}</button>
                                            ))}</div>
                                            <textarea className="p-6 rounded-[40px] text-lg h-32" placeholder="Describe hazards..." value={o.text} onChange={(e)=>updateObs(ship.id,loc,o.id,'text',e.target.value)} />
                                            
                                            {/* SMART AI LOGIC V45 */}
                                            <div className="flex flex-wrap gap-2">
                                                {Object.entries(SMART_KNOWLEDGE).map(([key, list]) => 
                                                    o.text.toUpperCase().includes(key) && list.map(sug => (
                                                        <span key={sug} onClick={()=>updateObs(ship.id,loc,o.id,'text', o.text + '\n- ' + sug)} className="suggestion-chip">💡 {sug}</span>
                                                    ))
                                                )}
                                            </div>

                                            <div className="flex gap-4">
                                                <button className="flex-1 bg-slate-900 p-5 rounded-3xl border border-white/10 text-[12px] font-black uppercase flex items-center justify-center gap-3"><i className="fa-solid fa-camera text-red-500 text-2xl"></i> PHOTO</button>
                                                <button onClick={()=>{setProjects(projects.map(p=>p.id===ship.id?{...p, data:{...p.data,[loc]:{observations:p.data[loc].observations.filter(x=>x.id!==o.id)}}}:p))}} className="bg-slate-800 w-16 h-16 rounded-3xl text-slate-700 flex items-center justify-center"><i className="fa-solid fa-trash"></i></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script></body></html>
