<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NauticalOS Hub v3.61</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');body{background:#020617;color:white;font-family:'Orbitron',sans-serif;font-style:italic;font-weight:bold;}.glass{background:rgba(15,23,42,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);}</style>
</head>
<body><div id="root"></div><script type="text/babel">
const Hub=()=>{
    const apps=[
        // ROW 1: THE CORE TECHNICALS
        {id:'m1', row:1, name:'UTM', icon:'fa-layer-group', color:'border-slate-500', url:'m1_utm.html'},
        {id:'m2', row:1, name:'SAFETY', icon:'fa-shield-halved', color:'border-blue-600', url:'m2_safety.html'},
        {id:'m3', row:1, name:'LOAD TEST', icon:'fa-weight-hanging', color:'border-orange-600', url:'m3_loadtest.html'},
        // ROW 2: STRATEGIC INTEL
        {id:'m4', row:2, name:'RADAR', icon:'fa-radar', color:'border-cyan-600', url:'m4_radar.html'},
        {id:'m5', row:2, name:'WAR ROOM', icon:'fa-gavel', color:'border-red-600', url:'m5_terme.html'},
        // ROW 3: KNOWLEDGE & STAFF
        {id:'m8', row:3, name:'ACADEMY', icon:'fa-graduation-cap', color:'border-emerald-600', url:'m8_academy.html'},
        {id:'m12', row:3, name:'STAFF', icon:'fa-users', color:'border-blue-400', url:'m12_staff.html'},
        {id:'m9', row:3, name:'OPERATION', icon:'fa-clipboard-check', color:'border-indigo-500', url:'m9_ops.html'},
        // ROW 4: BUSINESS & STARTUP
        {id:'m13', row:4, name:'MYKONOS', icon:'fa-house-chimney', color:'border-blue-300', url:'m13_mykonos.html'},
        {id:'m7', row:4, name:'STARTUP', icon:'fa-rocket', color:'border-yellow-500', url:'m7_startup.html'},
        // ROW 5: SYSTEMS & ANALYTICS
        {id:'m11', row:5, name:'SENSORS', icon:'fa-satellite-dish', color:'border-pink-600', url:'m11_sensors.html'},
        {id:'m10', row:5, name:'ARCHITECT', icon:'fa-microchip', color:'border-indigo-400', url:'m10_arch.html'},
        {id:'m6', row:5, name:'CEO PULSE', icon:'fa-chart-line', color:'border-purple-600', url:'m6_ceo.html'}
    ];

    const renderRow = (rowNum, cols) => (
        <div className={`grid grid-cols-${cols} gap-2 mb-2`}>
            {apps.filter(a => a.row === rowNum).map(app => (
                <a key={app.id} href={app.url} className={`glass p-3 h-24 rounded-[1.8rem] border-b-4 ${app.color} flex flex-col items-center justify-center gap-1 active:scale-95 transition-all shadow-xl`}>
                    <i className={`fa-solid ${app.icon} text-lg`}></i>
                    <span className="text-[7px] font-black uppercase text-center leading-tight">{app.name}</span>
                </a>
            ))}
        </div>
    );

    return(
        <div className="min-h-screen p-4 max-w-xl mx-auto animate-fade">
            <div className="flex justify-between items-center px-4 pt-6 mb-8">
                <div className="text-left"><span className="text-[7px] text-slate-500 uppercase tracking-widest font-black">DIRECTOR MODE</span><p className="text-sm uppercase tracking-tighter text-blue-400 font-black">M. SYKINIOTIS</p></div>
                <div className="h-2 w-2 bg-blue-500 rounded-full animate-pulse shadow-[0_0_10px_cyan]"></div>
            </div>
            {renderRow(1, 3)}
            {renderRow(2, 2)}
            {renderRow(3, 3)}
            {renderRow(4, 2)}
            {renderRow(5, 3)}
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<Hub/>);
</script></body></html>
