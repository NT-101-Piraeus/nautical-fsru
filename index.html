<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAUTICAL TECHNOLOGY GROUP | Intel Division</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700&display=swap');
        .brand-font { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .glow-border { box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .legal-pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style></head><body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            // Το Legal Intelligence είναι πλέον η Αρχική Οθόνη (V10.0)
            const [page, setPage] = useState('legal'); 

            const generatePDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.setFont("helvetica", "bold");
                doc.text("NAUTICAL TECHNOLOGY GROUP - FORENSIC REPORT", 10, 20);
                doc.setFontSize(10);
                doc.text("CASE: NAFTOCEMENT IV / AUGUST DISCREPANCIES", 10, 30);
                doc.text("TARGET: TERME SHIPYARD BOARD MEMBERS", 10, 35);
                doc.text("-------------------------------------------------------------", 10, 40);
                doc.text("STATUS: DARK AIS PERIODS DETECTED WITHIN YARD RADIUS.", 10, 50);
                doc.save("NTG_Forensic_Evidence.pdf");
            };

            return (
                <div className="min-h-screen flex flex-col pb-10">
                    <header className="p-6 border-b border-slate-800 bg-slate-900/80 backdrop-blur-xl sticky top-0 z-50">
                        <div className="max-w-lg mx-auto text-center">
                            <h1 className="brand-font text-blue-500 text-xl font-black uppercase">Nautical Technology Group</h1>
                            <p className="text-[9px] font-bold text-slate-500 uppercase tracking-[0.5em] mt-1">Intel Division • Secure Hub</p>
                        </div>
                    </header>

                    <main className="flex-1 p-6 max-w-lg mx-auto w-full space-y-8">
                        {page === 'legal' ? (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center border-l-2 border-red-600 pl-4">
                                    <h2 className="brand-font text-red-500 text-lg uppercase font-black">Legal Intelligence</h2>
                                    <i className="fa-solid fa-tower-broadcast text-red-600 legal-pulse"></i>
                                </div>

                                {/* CASE 1: NAFTOCEMENT IV */}
                                <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 glow-border">
                                    <div className="flex justify-between items-start mb-4">
                                        <span className="text-[10px] bg-red-900/50 text-red-400 px-3 py-1 rounded-full font-bold uppercase tracking-widest">Active Investigation</span>
                                        <span className="text-[10px] text-slate-500 font-bold uppercase">AUG 2026</span>
                                    </div>
                                    <h3 className="brand-font text-blue-400 text-sm mb-2">NAFTOCEMENT IV Forensics</h3>
                                    <p className="text-xs text-slate-400 leading-relaxed mb-4">
                                        Εντοπίστηκαν 3 "Dark Periods" συνολικής διάρκειας 18 ωρών εντός των ορίων του ναυπηγείου Terme.
                                    </p>
                                    <button onClick={generatePDF} className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-2xl text-[10px] uppercase tracking-widest transition-all">
                                        Generate Forensic Evidence PDF
                                    </button>
                                </div>

                                {/* CASE 2: ENTITY WATCH */}
                                <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6">
                                    <h3 className="brand-font text-slate-300 text-xs mb-4 uppercase">Entity Status: Terme Board</h3>
                                    <div className="space-y-4">
                                        {['Tugrul Karaca', 'Emir Ozturk', 'Erkan Zorlu'].map(name => (
                                            <div key={name} className="flex justify-between items-center bg-slate-800/50 p-3 rounded-xl">
                                                <span className="text-xs font-bold text-slate-300">{name}</span>
                                                <span className="text-[9px] font-black text-blue-500 uppercase tracking-widest animate-pulse">Deep Monitoring...</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="text-center pt-20">
                                <button onClick={() => setPage('legal')} className="text-blue-500 font-bold uppercase text-xs">Return to Intel Station</button>
                            </div>
                        )}
                    </main>

                    {/* Bottom Utility Bar */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-slate-900/90 border-t border-slate-800 p-4 flex justify-around backdrop-blur-md">
                        <button onClick={() => setPage('legal')} className="flex flex-col items-center gap-1 text-blue-500">
                            <i className="fa-solid fa-shield-halved text-lg"></i>
                            <span className="text-[8px] font-bold uppercase">Legal</span>
                        </button>
                        <button className="flex flex-col items-center gap-1 text-slate-500 opacity-50">
                            <i className="fa-solid fa-globe text-lg"></i>
                            <span className="text-[8px] font-bold uppercase">Marine</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script></body></html>
