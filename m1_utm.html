<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M1: UTM Master</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background-color: #020617; color: white; font-family: 'Orbitron', sans-serif; font-style: italic; font-weight: bold; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        const UtmApp = () => {
            const [point, setPoint] = useState('');
            const [val, setVal] = useState('');

            return (
                <div className="min-h-screen p-6 animate-fade">
                    <div className="flex justify-between items-center mb-8">
                        <a href="index.html" className="text-[10px] uppercase underline opacity-60 font-black">← HUB</a>
                        <span className="text-[10px] text-slate-500 font-black uppercase">Hull Condition Monitoring</span>
                    </div>
                    
                    <h1 className="brand text-slate-300 text-lg uppercase mb-8 italic tracking-tighter">M1: UTM GAUGING</h1>
                    
                    <div className="glass p-6 rounded-[2.5rem] border-slate-500/20 mb-6">
                        <p className="text-[9px] uppercase text-blue-500 mb-4 tracking-widest font-black italic">Measurement Entry</p>
                        <div className="space-y-4">
                            <input type="text" placeholder="Location (e.g. Frame 45, Port)" value={point} onChange={(e)=>setPoint(e.target.value)}
                                   className="w-full bg-black/50 p-4 rounded-xl border border-slate-800 text-xs text-white outline-none" />
                            <div className="flex gap-4">
                                <input type="number" placeholder="Value (mm)" value={val} onChange={(e)=>setVal(e.target.value)}
                                       className="flex-1 bg-black/50 p-5 rounded-xl border border-slate-800 text-2xl text-blue-400 outline-none" />
                                <button className="bg-blue-600 px-6 rounded-xl active:scale-95 transition-all"><i className="fa-solid fa-plus text-white"></i></button>
                            </div>
                        </div>
                    </div>

                    <div className="mt-6">
                        <p className="text-[8px] uppercase text-slate-500 mb-3 ml-2">Recent Surveys</p>
                        <div className="space-y-2 opacity-50 italic">
                            <div className="glass p-3 rounded-2xl flex justify-between text-[10px]"><span>NAFTOCEMENT IV - Deck Plate</span> <span>14.2 mm</span></div>
                            <div className="glass p-3 rounded-2xl flex justify-between text-[10px]"><span>NAFTOCEMENT IV - Side Shell</span> <span>12.8 mm</span></div>
                        </div>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<UtmApp />);
    </script>
</body>
</html>
