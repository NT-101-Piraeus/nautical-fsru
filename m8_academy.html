<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M8: Academy Project Forge</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');body{background:#020617;color:white;font-family:'Orbitron',sans-serif;font-style:italic;font-weight:bold;}.glass{background:rgba(15,23,42,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);}</style>
</head>
<body><div id="root"></div><script type="text/babel">
const AcademyApp = () => {
    const [progress, setProgress] = React.useState(33); // Ποσοστό μελέτης
    const [notes, setNotes] = React.useState("");

    return (
        <div className="min-h-screen p-6 animate-fade bg-slate-950">
            <div className="flex justify-between items-center mb-8">
                <a href="index.html" className="text-[10px] underline opacity-50 text-emerald-400 font-black tracking-widest">← BACK TO HUB</a>
                <span className="text-[9px] text-emerald-500 font-black uppercase italic">FSRU LNG ALEXANDROUPOLIS</span>
            </div>

            <h1 className="text-emerald-500 text-lg uppercase mb-8 text-center italic tracking-tighter">M8: PROJECT ACADEMY</h1>

            {/* PROGRESS TRACKER */}
            <div className="glass p-6 rounded-[2rem] border-emerald-500/20 mb-6 text-center shadow-xl">
                <p className="text-[8px] uppercase text-slate-500 mb-2 tracking-widest">Current Study Progress</p>
                <div className="w-full bg-slate-900 h-2 rounded-full overflow-hidden mb-2">
                    <div style={{width: `${progress}%`}} className="h-full bg-emerald-500 transition-all duration-1000"></div>
                </div>
                <p className="text-2xl font-black text-white">{progress}%</p>
            </div>

            {/* STUDY DEPOT */}
            <div className="space-y-4 mb-8">
                <p className="text-[9px] text-emerald-500 uppercase tracking-widest ml-2 font-black italic">Study Depot (DNV Files)</p>
                <div className="glass p-4 rounded-2xl flex justify-between items-center border-l-4 border-emerald-600">
                    <div><p className="text-[10px] text-white uppercase font-black">LNG FSRU Technical Manual</p><p className="text-[7px] text-slate-500">Source: DNV-ST-F101</p></div>
                    <i className="fa-solid fa-file-pdf text-xl text-red-500"></i>
                </div>
                <div className="glass p-4 rounded-2xl flex justify-between items-center border-l-4 border-emerald-600 opacity-70">
                    <div><p className="text-[10px] text-white uppercase font-black">PQR/WPS Welding Procedures</p><p className="text-[7px] text-slate-500">Structural Integrity v2.1</p></div>
                    <i className="fa-solid fa-file-pdf text-xl text-red-500"></i>
                </div>
            </div>

            {/* NOTES SECTION */}
            <div className="glass p-6 rounded-[2.5rem] border-slate-700">
                <p className="text-[9px] text-slate-500 uppercase tracking-widest mb-4 italic font-black">Internal Project Notes</p>
                <textarea 
                    value={notes} 
                    onChange={(e) => setNotes(e.target.value)}
                    placeholder="Γράψε τις παρατηρήσεις σου για το project..."
                    className="w-full bg-black/40 p-4 rounded-xl text-[10px] text-white outline-none border border-slate-800 h-24 italic"
                ></textarea>
            </div>

            <p className="text-[7px] text-emerald-900/60 text-center mt-12 uppercase italic tracking-widest">Nautical Technology Academy Layer v1.0</p>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<AcademyApp />);
</script></body></html>
