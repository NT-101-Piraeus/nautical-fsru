<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAUTICAL TECHNOLOGY GROUP | Intel Division</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700;900&display=swap');
        .brand-font { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        .glow-blue { box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
        .scanning-line { height: 2px; background: rgba(59, 130, 246, 0.4); width: 100%; position: absolute; animation: scan 3s infinite linear; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [page, setPage] = useState('legal'); 
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [passcode, setPasscode] = useState('');

            const handleLogin = (e) => {
                e.preventDefault();
                if (passcode === 'NT2026') setIsLoggedIn(true);
                else alert("❌ Λάθος Κωδικός!");
            };

            const generatePDF = () => {
                try {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF();
                    doc.setFont("helvetica", "bold");
                    doc.text("NAUTICAL TECHNOLOGY GROUP - FORENSIC REPORT", 10, 20);
                    doc.setFontSize(10);
                    doc.text("CASE: NAFTOCEMENT IV / AUGUST DISCREPANCIES", 10, 30);
                    doc.text("TARGET: TERME SHIPYARD BOARD MEMBERS", 10, 35);
                    doc.text("-------------------------------------------------------------", 10, 40);
                    doc.text("STATUS: DARK AIS PERIODS DETECTED WITHIN YARD RADIUS.", 10, 50);
                    doc.save("NTG_Forensic_Evidence.pdf");
                } catch(e) { alert("PDF Error: Δοκιμάστε ξανά σε λίγο."); }
            };

            if (!isLoggedIn) {
                return (
                    <div className="h-screen flex items-center justify-center bg-slate-950 p-6">
                        <div className="bg-slate-900 p-8 rounded-3xl border border-slate-800 shadow-2xl w-full max-w-sm text-center">
                            <h1 className="brand-font text-blue-500 text-xl font-black mb-1 italic">NTG HUB</h1>
                            <p className="text-slate-500 mb-6 text-[9px] font-bold uppercase tracking-[0.3em]">Secure Intel Entry</p>
                            <form onSubmit={handleLogin}>
                                <input 
                                    type="password" 
                                    className="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl mb-4 text-center text-white outline-none focus:border-blue-500 text-xl"
                                    placeholder="••••"
                                    value={passcode}
                                    onChange={(e) => setPasscode(e.target.value)}
                                />
                                <button className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all">Login</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col pb-28">
                    {/* TOP BRANDING */}
                    <header className="p-6 border-b border-blue-900/30 bg-slate-900/90 backdrop-blur-xl sticky top-0 z-50 shadow-2xl">
                        <div className="max-w-lg mx-auto text-center">
                            <h1 className="brand-font text-blue-500 text-lg font-black uppercase">Nautical Technology Group</h1>
                            <div className="flex justify-center items-center gap-2 mt-1">
                                <span className="w-1.5 h-1.5 bg-blue-500 rounded-full animate-ping"></span>
                                <p className="text-[8px] font-bold text-slate-500 uppercase tracking-[0.4em]">Intel Division Online</p>
                            </div>
                        </div>
                    </header>

                    {/* MAIN WORKSPACES */}
                    <main className="flex-1 p-6 max-w-lg mx-auto w-full">
                        {page === 'legal' && <LegalWorkspace onPdf={generatePDF} />}
                        {page === 'marine' && <MarineWorkspace />}
                        {page === 'intel' && <IntelWorkspace />}
                    </main>

                    {/* BOTTOM NAVIGATION */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-slate-900/95 border-t border-blue-900/30 p-5 flex justify-around backdrop-blur-md z-50">
                        <NavTab active={page==='legal'} icon="fa-shield-halved" label="Legal" onClick={()=>setPage('legal')} />
                        <NavTab active={page==='marine'} icon="fa-ship" label="Marine" onClick={()=>setPage('marine')} />
                        <NavTab active={page==='intel'} icon="fa-tower-observation" label="Intel" onClick={()=>setPage('intel')} />
                    </nav>
                </div>
            );
        }

        function NavTab({ active, icon, label, onClick }) {
            return (
                <button onClick={onClick} className={`flex flex-col items-center gap-1 transition-all ${active ? 'text-blue-400 scale-110' : 'text-slate-600'}`}>
                    <i className={`fa-solid ${icon} text-xl`}></i>
                    <span className="text-[9px] font-black uppercase tracking-widest">{label}</span>
                </button>
            );
        }

        function LegalWorkspace({ onPdf }) {
            return (
                <div className="space-y-6 animate-fadeIn">
                    <h2 className="brand-font text-red-500 text-xs border-l-4 border-red-600 pl-3 uppercase">Legal Intelligence</h2>
                    <div className="bg-slate-900/50 border border-slate-800 rounded-3xl p-6 glow-blue relative overflow-hidden">
                        <div className="scanning-line"></div>
                        <h3 className="brand-font text-blue-400 text-[11px] mb-4 uppercase">Naftocement IV Forensics</h3>
                        <p className="text-xs text-slate-400 leading-relaxed mb-6">
                            Ανάλυση "Dark Periods" Αυγούστου. Το σύστημα εντόπισε ύποπτη παύση AIS σήματος εντός του ναυπηγείου Terme.
                        </p>
                        <button onClick={onPdf} className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-2xl text-[10px] uppercase tracking-widest transition-all shadow-lg shadow-red-900/30">
                            Generate Forensic Evidence PDF
                        </button>
                    </div>

                    <div className="bg-slate-900/50 border border-slate-800 rounded-3xl p-6">
                        <h4 className="brand-font text-[9px] text-slate-500 mb-4 uppercase tracking-tighter">Watchlist: Terme Board Members</h4>
                        <div className="space-y-3">
                            {['Tugrul Karaca', 'Emir Ozturk', 'Erkan Zorlu'].map(name => (
                                <div key={name} className="flex justify-between items-center bg-black/30 p-4 rounded-2xl border border-white/5">
                                    <span className="text-xs font-bold text-slate-300">{name}</span>
                                    <span className="text-[8px] font-black text-blue-500 uppercase tracking-widest animate-pulse">Monitoring</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function MarineWorkspace() {
            return (
                <div className="space-y-6 animate-fadeIn">
                    <h2 className="brand-font text-blue-500 text-xs border-l-4 border-blue-600 pl-3 uppercase">Marine Operations</h2>
                    <div className="grid grid-cols-1 gap-4">
                        <div className="bg-emerald-900/20 border border-emerald-500/30 p-5 rounded-3xl flex justify-between items-center">
                            <div>
                                <h4 className="font-bold text-sm text-emerald-400 tracking-tight">SAFETY PD 70/90</h4>
                                <p className="text-[9px] text-slate-500 uppercase font-bold mt-1">Status: Active Inspection</p>
                            </div>
                            <i className="fa-solid fa-user-shield text-2xl text-emerald-500"></i>
                        </div>
                        <div className="bg-blue-900/20 border border-blue-500/30 p-5 rounded-3xl flex justify-between items-center">
                            <div>
                                <h4 className="font-bold text-sm text-blue-400 tracking-tight">UTM HULL GAUGING</h4>
                                <p className="text-[9px] text-slate-500 uppercase font-bold mt-1">Target: Rigel III (Zone)</p>
                            </div>
                            <i className="fa-solid fa-ruler-combined text-2xl text-blue-500"></i>
                        </div>
                    </div>
                </div>
            );
        }

        function IntelWorkspace() {
            return (
                <div className="space-y-6 animate-fadeIn">
                    <h2 className="brand-font text-amber-500 text-xs border-l-4 border-amber-600 pl-3 uppercase tracking-tighter">Strategic Intel Hub</h2>
                    
                    {/* SHIP ARRIVALS ALERT */}
                    <div className="bg-slate-900 border border-blue-500/20 p-5 rounded-3xl flex items-center gap-5 shadow-xl">
                        <i className="fa-solid fa-ship text-blue-500 text-2xl"></i>
                        <div>
                            <h4 className="text-[10px] font-black text-blue-400 uppercase tracking-widest">Repair Zone Monitor</h4>
                            <p className="text-[11px] text-slate-300 leading-tight mt-1 italic">Σάρωση AIS: 12 πλοία σε αναμονή για Πέραμα / Σαλαμίνα.</p>
                        </div>
                    </div>

                    {/* TERME & NAFTOCEMENT FORENSICS */}
                    <div className="bg-slate-900 border border-red-500/20 p-5 rounded-3xl flex items-center gap-5 shadow-xl">
                        <i className="fa-solid fa-microscope text-red-500 text-2xl"></i>
                        <div>
                            <h4 className="text-[10px] font-black text-red-400 uppercase tracking-widest leading-none">Forensic Investigation</h4>
                            <p className="text-[11px] text-slate-300 mt-1 italic">Naftocement IV: Ανάλυση "Dark Period". Η Terme υπό επιτήρηση.</p>
                        </div>
                    </div>

                    {/* COMPETITION WATCH */}
                    <div className="bg-slate-900 border border-emerald-500/20 p-5 rounded-3xl flex items-center gap-5 shadow-xl">
                        <i className="fa-solid fa-users-viewfinder text-emerald-500 text-2xl"></i>
                        <div>
                            <h4 className="text-[10px] font-black text-emerald-400 uppercase tracking-widest">Price Scanner Market</h4>
                            <p className="text-[11px] text-slate-300 mt-1 italic">Navaltech: Καμία αλλαγή τιμοκαταλόγου το τελευταίο 24ωρο.</p>
                        </div>
                    </div>

                    {/* LIVE TERMINAL LOGS */}
                    <div className="bg-black p-5 rounded-3xl font-mono text-[9px] text-emerald-500 border border-emerald-900/50 shadow-inner overflow-hidden">
                        <p className="opacity-40 mb-2 font-bold tracking-widest uppercase">-- System Terminal Output --</p>
                        <p className="mb-1">> Hunter Agent: Scanning maritime intelligence...</p>
                        <p className="mb-1">> Entity Watch: Checking "Karaca, Ozturk, Zorlu"...</p>
                        <p className="animate-pulse">> Target Identified: Naftocement IV | Tracking Historical Logs...</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
