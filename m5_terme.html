        const { useState, useEffect } = React;

        // --- SUPABASE CONFIG ---

        const SUPABASE_URL = 'https://omdarjncczohpzfrqqhr.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_V-nfUDy5MxEG4SlXkisFBg_GBlD_4Y9';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const TermeApp = () => {
            const [alerts, setAlerts] = useState([]);
            const [loading, setLoading] = useState(true);

            // Fetch Alerts από τη βάση δεδομένων
            const fetchAlerts = async () => {
                const { data, error } = await supabase
                    .from('osint_alerts')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) console.error("Error fetching alerts:", error);
                else setAlerts(data || []);
                setLoading(false);
            };

            useEffect(() => {
                fetchAlerts();
                // Real-time subscription: Αν προστεθεί νέο alert, ανανέωσε την οθόνη
                const subscription = supabase
                    .channel('any')
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'osint_alerts' }, fetchAlerts)
                    .subscribe();

                return () => supabase.removeChannel(subscription);
            }, []);
