<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SafeShip Pro V32 | PDF Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; touch-action: manipulation; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .status-ok { background: #10b981 !important; opacity: 1; }
        .status-wait { background: #f59e0b !important; opacity: 1; }
        .status-block { background: #ef4444 !important; opacity: 1; }
        .specialty-active { background: #3b82f6 !important; border-color: #60a5fa !important; }
        input, textarea { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; outline: none; }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { jsPDF } = window.jspdf;

        const TRADES = ["Ηλεκτρολόγοι", "Μηχανικοί", "Ελασματουργοί", "Σωληνουργοί", "Καθαριστές", "Βαφείς", "Σκαλωσέρ"];
        const INITIAL_SHIPS = [
            { id: 1, name: "FELIX", time: "07:00", duration: "4h", port: "Δραπετσώνα", type: "Tanker" },
            { id: 2, name: "BADJI MOKHTAR III", time: "11:00", duration: "2h", port: "ΕΛΕΥΣΙΝΑ", type: "Ferry" },
            { id: 3, name: "ΑΡΙΑΔΝΗ", time: "13:00", duration: "2h", port: "ΕΛΕΥΣΙΝΑ", type: "Ferry" },
            { id: 4, name: "RIGEL III", time: "15:00", duration: "2h", port: "Πέραμα", type: "Ferry" }
        ];

        function App() {
            const [view, setView] = useState('DASHBOARD'); 
            const [activeId, setActiveId] = useState(null);
            const [projects, setProjects] = useState(() => {
                const saved = JSON.parse(localStorage.getItem('ntg_v32_data'));
                return saved ? saved.ships : INITIAL_SHIPS.map(s => ({ ...s, data: {}, signedToday: false }));
            });

            useEffect(() => { localStorage.setItem('ntg_v32_data', JSON.stringify({ ships: projects })); }, [projects]);

            const generatePDF = (ship) => {
                const doc = new jsPDF();
                doc.setFontSize(20); doc.text("DAILY SAFETY REPORT", 20, 20);
                doc.setFontSize(12); doc.text(`Vessel: ${ship.name} | Port: ${ship.port}`, 20, 30);
                doc.text(`Date: ${new Date().toLocaleDateString('el-GR')}`, 20, 37);

                const tableData = [];
                Object.entries(ship.data).forEach(([loc, d]) => {
                    (d.observations || []).forEach(obs => {
                        tableData.push([loc, obs.status.toUpperCase(), obs.trades.join(", "), obs.text]);
                    });
                });

                doc.autoTable({ head: [['Location', 'Status', 'Trades', 'Observation']], body: tableData, startY: 45 });
                doc.save(`Report_${ship.name}_${new Date().toLocaleDateString()}.pdf`);
            };

            const addObs = (shipId, loc) => {
                setProjects(projects.map(p => {
                    if (p.id === shipId) {
                        const locData = p.data[loc] || { observations: [] };
                        return { ...p, data: { ...p.data, [loc]: { observations: [...locData.observations, { id: Date.now(), text: '', isTask: false, status: 'ok', trades: [] }] } } };
                    }
                    return p;
                }));
            };

            const ship = projects.find(s => s.id === activeId);
            const allTasks = projects.flatMap(p => Object.entries(p.data).flatMap(([loc, d]) => d.observations?.filter(o => o.isTask).map(o => ({ ship: p.name, loc, ...o })) || []));

            return (
                <div className="max-w-xl mx-auto pb-32 animate-fadeIn">
                    <header className="p-6 border-b border-slate-800 flex justify-between items-center sticky top-0 bg-[#020617] z-50">
                        <div><h1 className="brand text-xs font-black text-red-500 uppercase">SafeShip Manager</h1><p className="text-[10px] text-slate-500">SYSTEM V32.0</p></div>
                        <div className="text-right"><p className="text-xl font-black">{new Date().toLocaleTimeString('el-GR',{hour:'2-digit',minute:'2-digit'})}</p></div>
                    </header>

                    {view === 'DASHBOARD' && (
                        <div className="p-5 space-y-4">
                            {projects.map(s => (
                                <div key={s.id} className={`glass p-6 rounded-[35px] flex justify-between items-center ${s.signedToday ? 'border-l-8 border-emerald-500 bg-emerald-500/5' : 'border border-white/5'}`}>
                                    <div onClick={()=>{setActiveId(s.id); setView('INSPECTION')}} className="flex-1">
                                        <h4 className="font-black text-sm uppercase">{s.name}</h4>
                                        <p className="text-[9px] text-slate-400 font-bold uppercase mt-1">{s.port} • {s.time}</p>
                                    </div>
                                    <button onClick={()=>setProjects(projects.map(p=>p.id===s.id?{...p, signedToday:!p.signedToday}:p))} className={`px-4 py-2 rounded-xl text-[9px] font-black uppercase ${s.signedToday ? 'text-emerald-500' : 'bg-slate-800'}`}>
                                        {s.signedToday ? 'DONE ✓' : 'SIGN'}
                                    </button>
                                </div>
                            ))}
                        </div>
                    )}

                    {view === 'INSPECTION' && ship && (
                        <div className="p-5 space-y-8 animate-fadeIn">
                            <div className="flex justify-between items-center"><button onClick={()=>setView('DASHBOARD')} className="text-slate-500 text-[10px] font-black uppercase">← Back</button><button onClick={()=>generatePDF(ship)} className="bg-blue-600 px-4 py-2 rounded-xl text-[9px] font-black uppercase">Export PDF</button></div>
                            <div className="glass p-8 rounded-[40px] border-l-4 border-red-600 text-center">
                                <h2 className="brand text-2xl font-black uppercase">{ship.name}</h2>
                                <p className="text-[9px] font-bold uppercase text-slate-400">{ship.port} • {ship.type}</p>
                            </div>
                            {["Deck", "Engine Room", "Garage", "Accommodation"].map(loc => {
                                const d = ship.data[loc] || { observations: [] };
                                return (
                                    <div key={loc} className="glass p-6 rounded-[40px] border border-white/5 space-y-4">
                                        <div className="flex justify-between items-center"><h4 className="text-[12px] font-black uppercase text-red-500">{loc}</h4><button onClick={()=>addObs(ship.id, loc)} className="bg-slate-800 px-3 py-1.5 rounded-lg text-[9px] font-black">+ Add Log</button></div>
                                        {d.observations.map(o => (
                                            <div key={o.id} className="bg-slate-900/50 p-4 rounded-3xl space-y-4">
                                                <div className="flex flex-wrap gap-1.5">{TRADES.map(t => (
                                                    <button key={t} onClick={()=>{
                                                        const newTrades = o.trades.includes(t) ? o.trades.filter(x=>x!==t) : [...o.trades, t];
                                                        setProjects(projects.map(p=>p.id===ship.id?{...p, data:{...p.data,[loc]:{observations:p.data[loc].observations.map(x=>x.id===o.id?{...x, trades:newTrades}:x)}}}:p));
                                                    }} className={`px-2 py-1 rounded-md text-[7px] font-bold border border-white/10 ${o.trades.includes(t) ? 'specialty-active' : 'bg-slate-950'}`}>{t}</button>
                                                ))}</div>
                                                <textarea className="p-4 rounded-2xl text-xs h-20" placeholder="Notes..." value={o.text} onChange={(e)=>{
                                                    setProjects(projects.map(p=>p.id===ship.id?{...p, data:{...p.data,[loc]:{observations:p.data[loc].observations.map(x=>x.id===o.id?{...x, text:e.target.value}:x)}}}:p));
                                                }} />
                                                <button onClick={()=>{
                                                    setProjects(projects.map(p=>p.id===ship.id?{...p, data:{...p.data,[loc]:{observations:p.data[loc].observations.map(x=>x.id===o.id?{...x, isTask:!x.isTask}:x)}}}:p));
                                                }} className={`w-full p-2.5 rounded-xl text-[8px] font-black uppercase ${o.isTask ? 'bg-red-600' : 'bg-slate-800 opacity-40'}`}>{o.isTask ? '✓ Task Registry Active' : 'Send to Tasks'}</button>
                                            </div>
                                        ))}
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {view === 'TASKS' && (
                        <div className="p-6 space-y-6">
                            <h2 className="brand text-xl uppercase italic">Fleet Risk Registry</h2>
                            {allTasks.length === 0 ? <div className="glass p-20 rounded-[50px] text-center opacity-30 italic">No Tasks Found.</div> : 
                                allTasks.map((t, i) => (
                                    <div key={i} className="glass p-6 rounded-[35px] border-l-4 border-amber-500"><p className="text-[8px] font-black text-amber-500 uppercase">{t.ship} • {t.loc}</p><p className="text-[13px] text-slate-200 mt-2">{t.text}</p></div>
                                ))
                            }
                        </div>
                    )}

                    <footer className="fixed bottom-0 left-0 right-0 p-6 glass border-t border-slate-800 flex justify-around bg-[#020617] z-50">
                        <button onClick={()=>setView('DASHBOARD')} className={`flex flex-col items-center gap-1 ${view==='DASHBOARD'?'text-red-500':'text-slate-600'}`}><i className="fa-solid fa-anchor"></i><span className="text-[8px] font-bold uppercase">Ships</span></button>
                        <button onClick={()=>setView('TASKS')} className={`flex flex-col items-center gap-1 ${view==='TASKS'?'text-red-500':'text-slate-600'}`}><i className="fa-solid fa-list-check"></i><span className="text-[8px] font-bold uppercase">Tasks ({allTasks.length})</span></button>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script></body></html>
