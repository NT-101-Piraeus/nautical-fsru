<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SafeShip Pro | NTG Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; touch-action: manipulation; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .status-btn { transition: all 0.2s; opacity: 0.3; border: 1px solid rgba(255,255,255,0.1); }
        .status-btn.active-ok { background: #10b981 !important; opacity: 1; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .status-btn.active-wait { background: #f59e0b !important; opacity: 1; box-shadow: 0 0 15px rgba(245, 158, 11, 0.4); }
        .status-btn.active-block { background: #ef4444 !important; opacity: 1; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
        .status-btn.active-na { background: #64748b !important; opacity: 1; }
        input, textarea { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; outline: none; width: 100%; }
        .safe-tap:active { transform: scale(0.97); opacity: 0.8; }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // ΣΤΑΝΤΑΡ ΧΩΡΟΙ ΑΝΑ ΤΥΠΟ ΠΛΟΙΟΥ
        const SHIP_LOCATIONS = {
            "Tanker": ["Deck", "Engine Room", "Pump Room", "Cargo Tanks", "Accommodation"],
            "Ferry": ["Deck", "Engine Room", "Garage", "Accommodation", "Pax Areas"],
            "Cargo": ["Deck", "Engine Room", "Holds", "Accommodation"]
        };

        // ΔΕΔΟΜΕΝΑ ΠΡΟΓΡΑΜΜΑΤΟΣ ΣΕΠΕ (ΜΑΡΤΙΟΣ 2026)
        const INITIAL_SCHEDULE = [
            { id: 1, name: "FELIX", time: "07:00", duration: "4h", port: "Πέραμα", type: "Tanker" },
            { id: 2, name: "BADJI MOKHTAR III", time: "11:00", duration: "2h", port: "Πέραμα", type: "Ferry" },
            { id: 3, name: "ΑΡΙΑΔΝΗ", time: "13:00", duration: "2h", port: "Πειραιάς", type: "Ferry" },
            { id: 4, name: "RIGEL III", time: "15:00", duration: "2h", port: "Δραπετσώνα", type: "Ferry" }
        ];

        function SafeShipApp() {
            const [view, setView] = useState('DASHBOARD');
            const [activeShipId, setActiveShipId] = useState(null);
            const [projects, setProjects] = useState(() => JSON.parse(localStorage.getItem('ntg_ss_v24')) || INITIAL_SCHEDULE.map(s => ({ ...s, data: {}, gasFree: '', active: true })));
            const [att, setAtt] = useState(() => JSON.parse(localStorage.getItem('ntg_ss_att')) || { in: '--:--', out: '--:--' });
            const [time, setTime] = useState(new Date());

            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                localStorage.setItem('ntg_ss_v24', JSON.stringify(projects));
                return () => clearInterval(timer);
            }, [projects]);

            const logAttendance = (type) => {
                const now = new Date().toLocaleTimeString('el-GR', { hour: '2-digit', minute: '2-digit' });
                const newAtt = { ...att, [type]: now };
                setAtt(newAtt);
                localStorage.setItem('ntg_ss_att', JSON.stringify(newAtt));
            };

            const updateShipData = (shipId, loc, field, val) => {
                setProjects(projects.map(p => {
                    if (p.id === shipId) {
                        const shipData = p.data || {};
                        const locData = shipData[loc] || {};
                        return { ...p, data: { ...shipData, [loc]: { ...locData, [field]: val } } };
                    }
                    return p;
                }));
            };

            const ship = projects.find(s => s.id === activeShipId);
            const openTasks = projects.flatMap(p => 
                Object.entries(p.data || {}).filter(([loc, d]) => d.status === 'block' || d.status === 'wait').map(([loc, d]) => ({ shipName: p.name, loc, ...d }))
            );

            // --- HEADER COMPONENT ---
            const Header = ({ showBack }) => (
                <header className="p-6 border-b border-slate-800 flex justify-between items-start">
                    <div className="flex items-center gap-3">
                        {showBack && <button onClick={() => setView('DASHBOARD')} className="bg-slate-800 w-10 h-10 rounded-full flex items-center justify-center safe-tap"><i className="fa-solid fa-arrow-left"></i></button>}
                        <div>
                            <h1 className="brand text-xs font-black text-red-500 uppercase tracking-tighter">SafeShip Manager</h1>
                            <p className="text-[10px] text-slate-500 font-bold">{time.toLocaleDateString('el-GR')}</p>
                        </div>
                    </div>
                    <div className="text-right">
                        <p className="text-xl font-black text-white leading-none">{time.toLocaleTimeString('el-GR', {hour:'2-digit', minute:'2-digit'})}</p>
                        <p className="text-[8px] text-red-500 font-black uppercase mt-1">Tactical Unit Active</p>
                    </div>
                </header>
            );

            // --- VIEW: DASHBOARD ---
            if (view === 'DASHBOARD') return (
                <div className="max-w-xl mx-auto pb-32 animate-fadeIn">
                    <Header />
                    <div className="p-5 space-y-6">
                        {/* Attendance */}
                        <div className="glass p-6 rounded-[35px] border-l-4 border-emerald-500 flex justify-between items-center">
                            <div className="flex gap-6">
                                <div><p className="text-[8px] text-slate-500 uppercase font-black">In</p><p className="text-xl font-black">{att.in}</p></div>
                                <div><p className="text-[8px] text-slate-500 uppercase font-black">Out</p><p className="text-xl font-black">{att.out}</p></div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => logAttendance('in')} className="bg-emerald-600 p-3 rounded-xl text-[9px] font-black uppercase safe-tap">Check In</button>
                                <button onClick={() => logAttendance('out')} className="bg-red-700 p-3 rounded-xl text-[9px] font-black uppercase safe-tap">Check Out</button>
                            </div>
                        </div>

                        {/* Global Tasks Button */}
                        <button onClick={() => setView('TASKS')} className="w-full bg-red-600 p-6 rounded-[35px] flex justify-between items-center shadow-xl shadow-red-900/20 safe-tap">
                            <div className="flex items-center gap-4">
                                <div className="bg-white/20 w-10 h-10 rounded-full flex items-center justify-center"><i className="fa-solid fa-triangle-exclamation"></i></div>
                                <div className="text-left"><h3 className="font-black text-sm uppercase italic leading-none">Global Tasks</h3><p className="text-[9px] opacity-70 uppercase font-bold mt-1">Pending Fleet Hazards</p></div>
                            </div>
                            <div className="text-xl font-black">{openTasks.length}</div>
                        </button>

                        {/* Ship Schedule */}
                        <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] ml-2 italic">Πρόγραμμα Μαρτίου (ΣΕΠΕ)</h3>
                        <div className="grid grid-cols-1 gap-4">
                            {projects.map(s => (
                                <div key={s.id} onClick={() => { setActiveShipId(s.id); setView('INSPECTION'); }} className="glass p-6 rounded-[35px] flex justify-between items-center border border-white/5 safe-tap">
                                    <div>
                                        <h4 className="font-black text-sm uppercase text-white">{s.name}</h4>
                                        <p className="text-[9px] text-slate-400 font-bold uppercase mt-1">
                                            <i className="fa-solid fa-location-dot text-red-500 mr-1"></i> {s.port} • {s.time} ({s.duration})
                                        </p>
                                    </div>
                                    <div className="bg-slate-800 w-10 h-10 rounded-full flex items-center justify-center text-slate-500"><i className="fa-solid fa-chevron-right text-xs"></i></div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            // --- VIEW: INSPECTION ---
            if (view === 'INSPECTION' && ship) return (
                <div className="max-w-xl mx-auto pb-32 animate-fadeIn">
                    <Header showBack />
                    <div className="p-5 space-y-8">
                        <div className="glass p-8 rounded-[40px] border-l-4 border-red-600 text-center">
                            <h2 className="brand text-2xl font-black uppercase text-white tracking-tighter">{ship.name}</h2>
                            <p className="text-[10px] text-slate-400 font-bold uppercase mt-1">{ship.type} • {ship.port} • {ship.time}</p>
                        </div>

                        {/* Gas Free Check */}
                        <div className="glass p-6 rounded-[30px] border border-blue-500/20">
                            <h4 className="text-[10px] font-black text-blue-400 uppercase mb-3 tracking-widest"><i className="fa-solid fa-wind mr-2"></i> Compliance: Gas-Free Status</h4>
                            <input 
                                className="p-4 rounded-2xl text-xs font-bold" 
                                placeholder="Expiry Date or Certificate No." 
                                value={ship.gasFree || ''} 
                                onChange={(e) => setProjects(projects.map(p => p.id === ship.id ? {...p, gasFree: e.target.value} : p))}
                            />
                        </div>

                        {/* Checklist */}
                        <div className="space-y-10">
                            {(SHIP_LOCATIONS[ship.type] || []).map(loc => {
                                const data = ship.data[loc] || { status: '', note: '' };
                                return (
                                    <div key={loc} className="glass p-6 rounded-[40px] border border-white/5">
                                        <h4 className="text-[11px] font-black uppercase text-slate-300 mb-6 flex justify-between">
                                            <span>{loc}</span>
                                            <span className="text-[8px] text-slate-600 italic">Location Verified</span>
                                        </h4>
                                        <div className="grid grid-cols-4 gap-2 mb-6">
                                            <button onClick={() => updateShipData(ship.id, loc, 'status', 'ok')} className={`p-4 rounded-2xl text-[9px] font-black status-btn ${data.status==='ok' ? 'active-ok' : 'bg-slate-800'}`}>OK</button>
                                            <button onClick={() => updateShipData(ship.id, loc, 'status', 'wait')} className={`p
