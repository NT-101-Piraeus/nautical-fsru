<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NauticalOS v3: THE HAMMER</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background-color: #020617; color: white; font-family: 'Orbitron', sans-serif; font-style: italic; font-weight: bold; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .red-alert { border-left: 4px solid #dc2626; background: rgba(220, 38, 38, 0.05); }
        .cyan-alert { border-left: 4px solid #0891b2; background: rgba(8, 145, 178, 0.05); }
    </style>
</head>
<body><div id="root"></div><script type="text/babel">
const Hub = () => {
    // ΣΤΑΤΙΚΑ ΔΕΔΟΜΕΝΑ ΓΙΑ ΤΟ UI - ΘΑ ΕΡΧΟΝΤΑΙ ΑΠΟ ΤΟ SUPABASE
    const blacklist = [
        { name: 'Emir Öztürk', role: 'NIP 5262587598', juris: 'Poland', sync: '12h ago', intel: 'Active' },
        { name: 'Erkan Zorlu', role: 'Key Target', juris: 'Turkey/IT', sync: '2h ago', intel: 'Watching' }
    ];
    const radar = [
        { vessel: 'S.V. NIKOLAY', status: 'SDN ALERT', imo: '9123456', ping: 'Terme Geofence' },
        { vessel: 'DEMIRHAN', status: 'CLEAR', imo: '9876543', ping: 'En Route' }
    ];

    return (
        <div className="min-h-screen p-4 max-w-xl mx-auto animate-fade font-bold italic">
            <div className="flex justify-between items-center mb-10 pt-4 px-2">
                <div>
                    <span className="text-[7px] text-red-600 uppercase tracking-[0.3em]">Directive: THE HAMMER</span>
                    <p className="text-sm text-blue-400 font-black italic">M. SYKINIOTIS / LEGAL GEM</p>
                </div>
                <div className="h-2 w-2 bg-red-600 rounded-full animate-pulse shadow-[0_0_10px_red]"></div>
            </div>

            {/* TOP 3 COMMANDS */}
            <div className="grid grid-cols-3 gap-2 mb-10">
                <a href="m1_utm.html" className="glass p-4 rounded-3xl border-b-2 border-slate-500 text-center active:scale-95 transition-all">
                    <i className="fa-solid fa-layer-group text-slate-400 mb-1"></i>
                    <p className="text-[7px] uppercase">UTM</p>
                </a>
                <a href="m2_safety.html" className="glass p-4 rounded-3xl border-b-2 border-blue-600 text-center active:scale-95 transition-all">
                    <i className="fa-solid fa-shield-halved text-blue-500 mb-1"></i>
                    <p className="text-[7px] uppercase">SAFETY</p>
                </a>
                <a href="m3_loadtest.html" className="glass p-4 rounded-3xl border-b-2 border-orange-600 text-center active:scale-95 transition-all">
                    <i className="fa-solid fa-weight-hanging text-orange-500 mb-1"></i>
                    <p className="text-[7px] uppercase">LOAD TEST</p>
                </a>
            </div>

            {/* MODULE A: THE BLACKLIST */}
            <div className="mb-10">
                <p className="text-[9px] text-red-600 uppercase tracking-widest mb-4 italic ml-2"><i className="fa-solid fa-gavel mr-2"></i>Module A: The Blacklist</p>
                <div className="space-y-2">
                    {blacklist.map(t => (
                        <div key={t.name} className="glass p-4 rounded-2xl red-alert flex justify-between items-center">
                            <div>
                                <p className="text-[10px] text-white uppercase font-black">{t.name}</p>
                                <p className="text-[7px] text-slate-500 italic uppercase">{t.role} | {t.juris}</p>
                            </div>
                            <div className="text-right">
                                <p className="text-[7px] text-red-500 font-black uppercase">{t.intel}</p>
                                <p className="text-[6px] text-slate-600 uppercase italic">Sync: {t.sync}</p>
                            </div>
                        </div>
                    ))}
                </div>
            </div>

            {/* MODULE B: VESSEL RADAR */}
            <div>
                <p className="text-[9px] text-cyan-500 uppercase tracking-widest mb-4 italic ml-2"><i className="fa-solid fa-radar mr-2"></i>Module B: Vessel Radar</p>
                <div className="space-y-2">
                    {radar.map(v => (
                        <div key={v.vessel} className="glass p-4 rounded-2xl cyan-alert flex justify-between items-center">
                            <div>
                                <p className="text-[10px] text-white uppercase font-black">{v.vessel}</p>
                                <p className="text-[7px] text-slate-500 italic uppercase">IMO: {v.imo}</p>
                            </div>
                            <div className="text-right">
                                <p className={`text-[7px] font-black uppercase ${v.status.includes('ALERT') ? 'text-red-500' : 'text-cyan-500'}`}>{v.status}</p>
                                <p className="text-[6px] text-slate-600 uppercase italic">{v.ping}</p>
                            </div>
                        </div>
                    ))}
                </div>
            </div>

            <div className="mt-12 text-center opacity-30">
                <a href="m5_terme.html" className="text-[8px] uppercase underline tracking-widest">Open Intelligence Deep-Dive (M5)</a>
            </div>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<Hub />);
</script></body></html>
