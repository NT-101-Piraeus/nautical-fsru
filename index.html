<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTG | COMMAND CENTER V12.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .brand-font { font-family: 'Orbitron', sans-serif; letter-spacing: 1px; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .glow-red { box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); }
        .glow-blue { box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); border: 1px solid rgba(59, 130, 246, 0.4); }
        .scan-line { width: 100%; height: 1px; background: rgba(59, 130, 246, 0.5); position: absolute; animation: moveScan 3s infinite linear; }
        @keyframes moveScan { 0% { top: 0; } 100% { top: 100%; } }
    </style></head><body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('intel'); // Landing on Intel V12.1
            const [isAddingProject, setIsAddingProject] = useState(false);
            const [projects, setProjects] = useState([
                { id: 1, name: "RIGEL III - Annual Survey", services: ["UTM", "ε1", "Safety PD 70/90"] }
            ]);

            return (
                <div className="min-h-screen flex flex-col pb-24">
                    {/* --- HEADER --- */}
                    <header className="p-5 border-b border-slate-800 glass sticky top-0 z-[100]">
                        <div className="max-w-xl mx-auto flex justify-between items-center">
                            <div>
                                <h1 className="brand-font text-blue-500 text-lg font-black leading-none">NTG GROUP</h1>
                                <p className="text-[8px] font-bold text-slate-500 tracking-[0.4em] uppercase">Intel Division • Command Center</p>
                            </div>
                            <div className="flex items-center gap-2">
                                <span className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_8px_#10b981]"></span>
                                <span className="text-[9px] font-black uppercase text-slate-400">Secure Node</span>
                            </div>
                        </div>
                    </header>

                    {/* --- MAIN CONTENT --- */}
                    <main className="flex-1 p-5 max-w-xl mx-auto w-full">
                        {activeTab === 'intel' && <IntelTab />}
                        {activeTab === 'projects' && (
                            <ProjectsTab 
                                projects={projects} 
                                isAdding={isAddingProject} 
                                setIsAdding={setIsAddingProject} 
                            />
                        )}
                        {activeTab === 'tools' && <ToolsTab />}
                        {activeTab === 'business' && <BusinessTab />}
                    </main>

                    {/* --- BOTTOM NAV --- */}
                    <nav className="fixed bottom-0 left-0 right-0 glass border-t border-slate-800 flex justify-around p-4 z-[100]">
                        <NavButton active={activeTab==='intel'} icon="fa-tower-broadcast" label="Intel" onClick={()=>setActiveTab('intel')} />
                        <NavButton active={activeTab==='projects'} icon="fa-folder-tree" label="Projects" onClick={()=>setActiveTab('projects')} />
                        <NavButton active={activeTab==='tools'} icon="fa-toolbox" label="Tools" onClick={()=>setActiveTab('tools')} />
                        <NavButton active={activeTab==='business'} icon="fa-crown" label="Mykonos" onClick={()=>setActiveTab('business')} />
                    </nav>
                </div>
            );
        }

        // --- 1. INTEL TAB (SEPARATION OF CASES) ---
        function IntelTab() {
            return (
                <div className="space-y-6 animate-fadeIn">
                    <h2 className="brand-font text-blue-500 text-xs border-l-4 border-blue-600 pl-3">ACTIVE LEGAL CASES</h2>
                    
                    {/* CASE A: NAFTOCEMENT IV */}
                    <div className="bg-slate-900 rounded-3xl p-6 glow-blue relative overflow-hidden">
                        <div className="scan-line"></div>
                        <div className="flex justify-between items-start mb-4">
                            <span className="text-[10px] bg-blue-900/50 text-blue-400 px-3 py-1 rounded-full font-bold uppercase tracking-widest">Case A: Asset Trailing</span>
                            <i className="fa-solid fa-anchor text-blue-500"></i>
                        </div>
                        <h3 className="brand-font text-sm font-black mb-2 uppercase italic text-blue-100">Naftocement IV</h3>
                        <p className="text-[11px] text-slate-400 leading-relaxed mb-4">
                            Ο Agent σκανάρει: Vietnam Registries & IMO History. Εντοπισμός μεταβίβασης ιδιοκτησίας και ίχνη AIS στην περιοχή του Βιετνάμ.
                        </p>
                        <div className="flex gap-2">
                            <button className="flex-1 bg-slate-800 text-[9px] font-bold py-2 rounded-xl border border-blue-900/50 uppercase tracking-tighter hover:bg-blue-900/20 transition-all">Download Evidence</button>
                            <button className="flex-1 bg-blue-600 text-[9px] font-bold py-2 rounded-xl uppercase tracking-tighter">Live AIS Track</button>
                        </div>
                    </div>

                    {/* CASE B: TERME SHIPYARD */}
                    <div className="bg-slate-900 rounded-3xl p-6 glow-red relative overflow-hidden">
                        <div className="flex justify-between items-start mb-4">
                            <span className="text-[10px] bg-red-900/50 text-red-400 px-3 py-1 rounded-full font-bold uppercase tracking-widest">Case B: 40M Dispute</span>
                            <i className="fa-solid fa-gavel text-red-500"></i>
                        </div>
                        <h3 className="brand-font text-sm font-black mb-2 uppercase italic text-red-100">Terme Shipyard Board</h3>
                        <div className="space-y-3 mt-4">
                            {['Tugrul Karaca', 'Emir Ozturk', 'Erkan Zorlu'].map(name => (
                                <div key={name} className="flex justify-between items-center bg-black/40 p-3 rounded-xl border border-red-900/20">
                                    <span className="text-xs font-bold text-slate-300">{name}</span>
                                    <span className="text-[8px] font-black text-red-500 uppercase tracking-widest animate-pulse">Monitoring Registries</span>
                                </div>
                            ))}
                        </div>
                        <p className="text-[10px] text-slate-500 mt-4 border-t border-slate-800 pt-3">
                            Deep Scan: Turkish Registry & Relative Assets. Στόχος: Εντοπισμός περιουσιακών στοιχείων για την κάλυψη της διαφοράς.
                        </p>
                    </div>
                </div>
            );
        }

        // --- 2. PROJECTS TAB (ACTIVATION & FORM) ---
        function ProjectsTab({ projects, isAdding, setIsAdding }) {
            const services = [
                { id: 'safety', label: 'Safety Division: Π.Δ. 70/90' },
                { id: 'utm', label: 'UTM: Hull Gauging' },
                { id: 'e1', label: 'Load Test ε1: Cargo Gear' },
                { id: 'e2', label: 'Load Test ε2: Means of Access' },
                { id: 'e3', label: 'Load Test ε3: Winches BHC' },
                { id: 'e4', label: 'Load Test ε4: Ramps/Stoppers' },
                { id: 'e5', label: 'Load Test ε5: Bollard Pull' }
            ];

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="brand-font text-blue-500 text-xs border-l-4 border-blue-600 pl-3 uppercase">Maritime Operations</h2>
                        <button 
                            onClick={() => setIsAdding(true)} 
                            className="w-10 h-10 bg-emerald-600 rounded-full flex items-center justify-center text-white shadow-lg active:scale-90 transition-all"
                        >
                            <i className="fa-solid fa-plus"></i>
                        </button>
                    </div>

                    {isAdding ? (
                        <div className="bg-slate-900 p-6 rounded-3xl border border-slate-800 space-y-6 animate-slideIn">
                            <div className="flex justify-between items-center border-b border-slate-800 pb-3">
                                <h3 className="brand-font text-[10px] text-emerald-500 uppercase">Δημιουργία Νέου Έργου</h3>
                                <button onClick={()=>setIsAdding(false)} className="text-slate-500 text-xs"><i className="fa-solid fa-xmark"></i></button>
                            </div>
                            
                            <div className="space-y-4">
                                <input className="w-full bg-slate-800 p-4 rounded-2xl text-sm border border-slate-700 focus:border-emerald-500 outline-none" placeholder="Όνομα Πλοίου / Project ID" />
                                <div className="space-y-2">
                                    <p className="text-[9px] font-black text-slate-500 uppercase tracking-widest ml-1">Επιλογή Υπηρεσιών</p>
                                    <div className="grid grid-cols-1 gap-2">
                                        {services.map(s => (
                                            <label key={s.id} className="flex items-center gap-3 bg-slate-800/50 p-4 rounded-2xl cursor-pointer hover:bg-slate-800 transition-colors">
                                                <input type="checkbox" className="w-4 h-4 rounded border-slate-700 bg-slate-900 text-emerald-500" />
                                                <span className="text-xs font-bold text-slate-300">{s.label}</span>
                                            </label>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <button className="w-full bg-emerald-600 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-xl shadow-emerald-900/20">
                                Launch Project Hub
                            </button>
                        </div>
                    ) : (
                        <div className="space-y-3">
                            {projects.map(p => (
                                <div key={p.id} className="bg-slate-900 p-5 rounded-3xl border border-slate-800 flex justify-between items-center active:scale-95 transition-all">
                                    <div>
                                        <h4 className="font-bold text-sm text-slate-200">{p.name}</h4>
                                        <div className="flex flex-wrap gap-1 mt-2">
                                            {p.services.map(s => <span key={s} className="text-[8px] bg-blue-900/30 text-blue-400 px-2 py-0.5 rounded font-black uppercase tracking-tighter">{s}</span>)}
                                        </div>
                                    </div>
                                    <i className="fa-solid fa-chevron-right text-slate-700 text-xs"></i>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        function ToolsTab() {
            return (
                <div className="space-y-6">
                    <h2 className="brand-font text-blue-500 text-xs border-l-4 border-blue-600 pl-3 uppercase">Smart Toolbox</h2>
                    <div className="p-10 text-center text-slate-600 text-[10px] border-2 border-dashed border-slate-800 rounded-3xl">
                        Calibration & Converter Modules Ready for Sync
                    </div>
                </div>
            );
        }

        function BusinessTab() {
            return (
                <div className="space-y-6">
                    <h2 className="brand-font text-yellow-600 text-xs border-l-4 border-yellow-600 pl-3 uppercase tracking-[0.2em]">Luxury Business Unit</h2>
                    <div className="bg-black/40 border border-yellow-600/30 p-6 rounded-3xl">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="brand-font text-[10px] text-yellow-600 uppercase">Live in Mykonos</h3>
                            <i className="fa-solid fa-crown text-yellow-600"></i>
                        </div>
                        <p className="text-xs text-slate-500 italic">"Premium Management Hub active. Monitoring seasonal occupancy."</p>
                    </div>
                </div>
            );
        }

        // --- UI HELPERS ---
        function NavButton({ active, icon, label, onClick }) {
            return (
                <button onClick={onClick} className={`flex flex-col items-center gap-1 transition-all ${active ? 'text-blue-500 scale-110' : 'text-slate-600 opacity-50'}`}>
                    <i className={`fa-solid ${icon} text-lg`}></i>
                    <span className="text-[8px] font-black uppercase tracking-widest">{label}</span>
                    {active && <div className="w-1 h-1 bg-blue-500 rounded-full mt-1"></div>}
                </button>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script></body></html>
