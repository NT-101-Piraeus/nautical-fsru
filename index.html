<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTG HUB | V53 STRATEGIC AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; overflow-x: hidden; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        #cy { width: 100%; height: 500px; background: rgba(0,0,0,0.5); border-radius: 40px; margin-bottom: 20px; }
        .sidebar-intel { transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-intel.open { transform: translateX(0); }
        .chat-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); border: 1px solid rgba(59, 130, 246, 0.3); }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const _supabase = supabase.createClient("https://omdarjncczohpffunfy.supabase.co", "sb_publishable_V-nfUDy5MxEG4SlXkisFBg_GBlD_4Y9");

        function App() {
            const [view, setView] = useState('HUB'); 
            const [selectedNode, setSelectedNode] = useState(null);
            const [showActionPaths, setShowActionPaths] = useState(false);
            const [chatInput, setChatInput] = useState("");
            const [chatLog, setChatLog] = useState([{role: 'ai', text: 'Legal Agent Active. Ανέβασε PDF ή ρώτησε για την υπόθεση Terme.'}]);

            // Intelligence Brief Content
            const INTEL_DOSSIER = {
                'ez': { name: 'Erkan Zorlu', bio: 'Κληρονόμος Terme Tersanesi. Ιστορικό μεταφοράς κεφαλαίων μέσω Yapi Kredi NL.', weakness: 'Συνιδιοκτήτης σε 3 οντότητες στη Λιβερία (Capital Shipping).' },
                'bnk': { name: 'NL Banks', bio: 'Kocbank/Yapi Kredi Nederland. Κόμβος για το flow από Καραϊβική.', weakness: 'Εκκρεμείς ερωτήσεις από την Ολλανδική Αρχή Χρηματοπιστωτικών Αγορών (AFM).' }
            };

            useEffect(() => {
                if (view === 'LEGAL_CORP') {
                    const cy = cytoscape({
                        container: document.getElementById('cy'),
                        elements: [
                            { data: { id: 'ez', label: 'Erkan Zorlu', type: 'PE' } },
                            { data: { id: 'tk', label: 'Tuğrul Karaca', type: 'PE' } },
                            { data: { id: 'bnk', label: 'NL Banks', type: 'BK' } },
                            { data: { id: 'cap', label: 'Capital Shipping', type: 'CO' } },
                            { data: { source: 'ez', target: 'bnk' } }, { data: { source: 'bnk', target: 'cap' } }
                        ],
                        style: [
                            { selector: 'node', style: { 'label': 'data(label)', 'color': '#fff', 'background-color': '#3b82f6', 'font-size': '10px', 'text-valign': 'center' } },
                            { selector: 'node[type="PE"]', style: { 'background-color': '#ef4444', 'width': 60, 'height': 60 } },
                            { selector: 'edge', style: { 'width': 3, 'line-color': '#1e293b', 'target-arrow-shape': 'triangle', 'curve-style': 'bezier' } }
                        ], layout: { name: 'cose' }
                    });
                    cy.on('tap', 'node', (evt) => {
                        const data = evt.target.data();
                        setSelectedNode(INTEL_DOSSIER[data.id] || { name: data.label, bio: 'Πληροφορίες υπό επεξεργασία...', weakness: 'Απαιτείται Deep Search.' });
                    });
                }
            }, [view]);

            const logEvent = async (msg) => {
                await _supabase.from('ntg_logbook').insert([{ ship_name: 'SYSTEM', description: msg }]);
            };

            const triggerInfiltration = () => {
                setShowActionPaths(true);
                logEvent("Infiltration Trigger Activated for NAFTOCEMENT IV");
            };

            if (view === 'LEGAL_ASSET') return (
                <div className="max-w-xl mx-auto p-5 py-12 animate-fadeIn">
                    <button onClick={()=>setView('HUB')} className="bg-slate-800 px-6 py-3 rounded-2xl text-[10px] font-black mb-10">← Hub</button>
                    <div className="glass p-10 rounded-[50px] space-y-8">
                        <h2 className="brand text-xl text-red-500 uppercase italic">Asset: NAFTOCEMENT IV</h2>
                        <div className="bg-red-600/10 p-6 rounded-3xl border border-red-500/20">
                            <p className="text-[10px] font-black text-red-500 uppercase">Status: AIS Signal ACTIVE</p>
                            <p className="text-sm text-slate-300 mt-2">Το πλοίο βρίσκεται στο Hai Phong. Ο Hunter Agent έχει κλειδώσει τον Port Agent.</p>
                        </div>
                        <button onClick={triggerInfiltration} className="w-full bg-red-600 py-6 rounded-3xl font-black text-sm uppercase tracking-widest shadow-2xl">Manual Infiltration Trigger</button>
                    </div>

                    {showActionPaths && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-6 backdrop-blur-md">
                            <div className="glass p-10 rounded-[50px] w-full max-w-sm border border-red-500/30">
                                <h3 className="brand text-sm text-red-500 uppercase italic mb-8">AI Action Paths</h3>
                                <div className="space-y-4">
                                    <button onClick={()=>{alert("Προσχέδιο Ασφαλιστικών Μέτρων Ετοιμάζεται..."); setShowActionPaths(false);}} className="w-full bg-slate-800 p-5 rounded-2xl text-xs font-bold text-left border border-white/5">📄 Προσχέδιο Ασφαλιστικών Μέτρων (Freeze Asset)</button>
                                    <button onClick={()=>{alert("Ειδοποίηση Class Απεστάλη..."); setShowActionPaths(false);}} className="w-full bg-slate-800 p-5 rounded-2xl text-xs font-bold text-left border border-white/5">⚓ Ειδοποίηση στον Νηογνώμονα (Class Notification)</button>
                                    <button onClick={()=>setShowActionPaths(false)} className="w-full py-4 text-[10px] uppercase font-black opacity-30">Cancel</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );

            if (view === 'LEGAL_CORP') return (
                <div className="h-screen flex flex-col p-5 py-10 animate-fadeIn relative">
                    <header className="flex justify-between items-center mb-6">
                        <button onClick={()=>setView('HUB')} className="bg-slate-800 px-6 py-3 rounded-2xl text-[10px] font-black">← Hub</button>
                        <h2 className="brand text-blue-500 text-xl italic uppercase">Legal Brain: Terme Case</h2>
                    </header>
                    
                    <div className="flex-1 overflow-hidden relative">
                        <div id="cy" className="glass h-full shadow-2xl border border-blue-500/10"></div>
                        
                        {/* Dossier Sidebar */}
                        <div className={`fixed top-0 right-0 w-80 h-full glass border-l border-blue-500/20 p-8 sidebar-intel ${selectedNode ? 'open' : ''} z-50`}>
                            <button onClick={()=>setSelectedNode(null)} className="mb-8 text-slate-500 text-[10px] font-black uppercase tracking-widest">Close Dossier ✕</button>
                            {selectedNode && (
                                <div className="space-y-6">
                                    <h3 className="brand text-lg text-white uppercase italic">{selectedNode.name}</h3>
                                    <div className="space-y-4 pt-4 border-t border-white/5">
                                        <p className="text-[10px] font-black text-blue-400 uppercase tracking-widest">Intelligence Brief</p>
                                        <p className="text-xs text-slate-400 leading-relaxed">{selectedNode.bio}</p>
                                        <p className="text-[10px] font-black text-red-500 uppercase tracking-widest mt-6">Weak Points (AI Detect)</p>
                                        <p className="text-xs text-red-500/80 italic">"{selectedNode.weakness}"</p>
                                    </div>
                                    <button className="w-full bg-blue-600 py-4 rounded-2xl text-[10px] font-black uppercase mt-8">Generate Full Legal Report</button>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Case Intelligence Chat */}
                    <div className="glass p-6 rounded-[35px] mt-6 chat-glow h-60 flex flex-col">
                        <div className="flex-1 overflow-y-auto space-y-3 mb-4 text-[11px]">
                            {chatLog.map((c, i) => (
                                <div key={i} className={c.role === 'ai' ? 'text-blue-400 font-medium' : 'text-white'}>
                                    <span className="uppercase opacity-40 mr-2">{c.role}:</span> {c.text}
                                </div>
                            ))}
                        </div>
                        <div className="flex gap-3">
                            <input className="flex-1 bg-slate-900 border border-white/5 p-4 rounded-2xl text-xs outline-none focus:border-blue-500" placeholder="Ρώτα το Legal Brain..." value={chatInput} onChange={(e)=>setChatInput(e.target.value)} onKeyDown={(e)=>{
                                if(e.key==='Enter') {
                                    setChatLog([...chatLog, {role: 'me', text: chatInput}, {role: 'ai', text: 'Βάσει των εγγράφων, η παραγραφή επέρχεται σε 14 μήνες. Η επόμενη κίνηση πρέπει να είναι η κατάθεση ασφαλιστικών μέτρων.'}]);
                                    setChatInput("");
                                }
                            }} />
                            <button className="bg-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg"><i className="fa-solid fa-paper-plane text-xs"></i></button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="max-w-xl mx-auto p-5 py-12 animate-fadeIn">
                    <header className="text-center mb-16"><h1 className="brand text-blue-500 text-3xl font-black italic uppercase">NTG HUB</h1></header>
                    <div className="grid grid-cols-1 gap-6">
                        <a href="safety_ships.html" className="glass p-10 rounded-[50px] flex items-center gap-8 border border-white/5 active:scale-95 transition-all shadow-2xl">
                            <div className="w-16 h-16 rounded-2xl bg-red-600/20 flex items-center justify-center text-red-500 text-3xl"><i className="fa-solid fa-user-shield"></i></div>
                            <div><h2 className="brand text-sm text-white uppercase italic leading-none">Safety Officer</h2><p className="text-[10px] text-slate-500 font-bold uppercase mt-1">Inspection Engine</p></div>
                        </a>
                        <div onClick={()=>{if(prompt("LEGAL PIN")==="2026") setView('LEGAL_ASSET')}} className="glass p-10 rounded-[50px] flex items-center gap-8 border border-red-500/20 cursor-pointer active:scale-95 transition-all shadow-2xl">
                            <div className="w-16 h-16 rounded-2xl bg-red-600/10 flex items-center justify-center text-red-500 text-3xl"><i className="fa-solid fa-satellite-dish"></i></div>
                            <div><h2 className="brand text-sm text-red-500 uppercase italic leading-none">Asset Tracker</h2><p className="text-[10px] text-slate-500 font-bold uppercase mt-1">NAFTOCEMENT IV Tracking</p></div>
                        </div>
                        <div onClick={()=>{if(prompt("LEGAL PIN")==="2026") setView('LEGAL_CORP')}} className="glass p-10 rounded-[50px] flex items-center gap-8 border border-blue-500/20 cursor-pointer active:scale-95 transition-all shadow-2xl">
                            <div className="w-16 h-16 rounded-2xl bg-blue-600/10 flex items-center justify-center text-blue-400 text-3xl"><i className="fa-solid fa-network-wired"></i></div>
                            <div><h2 className="brand text-sm text-blue-400 uppercase italic leading-none">Entity Intel</h2><p className="text-[10px] text-slate-500 font-bold uppercase mt-1">Terme Case Analysis</p></div>
                        </div>
                        <div onClick={()=>{if(prompt("MANAGER PIN")==="1234") alert("Log Active");}} className="glass p-10 rounded-[50px] flex items-center gap-8 border border-white/5 cursor-pointer">
                            <div className="w-16 h-16 rounded-2xl bg-slate-800 flex items-center justify-center text-slate-400 text-3xl"><i className="fa-solid fa-tower-observation"></i></div>
                            <div><h2 className="brand text-sm text-white uppercase italic leading-none">Manager Log</h2><p className="text-[10px] text-slate-500 font-bold uppercase mt-1">Strategic Activity Feed</p></div>
                        </div>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script></body></html>
