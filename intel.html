<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTG | INTEL DIVISION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; overflow-x: hidden; }
        .brand-font { font-family: 'Orbitron', sans-serif; letter-spacing: 1px; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(59, 130, 246, 0.1); }
        .glow-blue { box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
        .scan-line { width: 100%; height: 2px; background: rgba(59, 130, 246, 0.5); position: absolute; animation: scan 4s linear infinite; z-index: 10; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .pulse-red { animation: pulseR 2s infinite; }
        @keyframes pulseR { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style></head><body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function IntelHunter() {
            const [briefing, setBriefing] = useState(false);

            return (
                <div className="min-h-screen pb-32">
                    {/* Header */}
                    <header className="p-6 border-b border-blue-900/30 glass sticky top-0 z-[100] flex justify-between items-center">
                        <div>
                            <h1 className="brand-font text-blue-500 text-lg font-black leading-none uppercase italic">Intel Division</h1>
                            <p className="text-[8px] font-bold text-slate-500 tracking-[0.4em] uppercase mt-1">Deep Hunter Protocol</p>
                        </div>
                        <div className="flex items-center gap-3">
                            <span className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_10px_#10b981]"></span>
                            <a href="index.html" className="text-slate-500"><i className="fa-solid fa-house-user"></i></a>
                        </div>
                    </header>

                    <main className="p-5 max-w-xl mx-auto space-y-6">
                        
                        {/* 07:00 DAILY BRIEFING FROM AIDA */}
                        <div className="relative overflow-hidden rounded-[35px] border border-blue-500/30 p-6 glass glow-blue">
                            <div className="scan-line"></div>
                            <div className="flex justify-between items-start mb-4">
                                <span className="bg-blue-600 text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Aida Briefing</span>
                                <span className="text-[10px] font-bold text-slate-400">07:00 AM • SYNCED</span>
                            </div>
                            <h2 className="brand-font text-sm mb-3">Σημερινή Σύνοψη Στόχων</h2>
                            <p className="text-[11px] text-slate-400 leading-relaxed italic">
                                "Captain, εντοπίστηκαν 2 νέες κινήσεις στο Βιετνάμ για το Naftocement IV και 1 αλλαγή στο Board της Terme. Οι αφίξεις στο Πέραμα παρουσιάζουν αύξηση 12%."
                            </p>
                            <button onClick={() => setBriefing(!briefing)} className="mt-4 w-full bg-blue-900/40 border border-blue-500/30 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-blue-600 transition-all">
                                {briefing ? "Κλείσιμο Αναφοράς" : "Άνοιγμα Πλήρους Intel"}
                            </button>
                        </div>

                        {briefing && (
                            <div className="animate-fadeIn space-y-3">
                                <IntelCard title="Naftocement IV" status="Trailing" color="border-emerald-500" text="Το σήμα AIS εντοπίστηκε σε ιδιωτική ντάνα στο Vung Tau. Πιθανή προετοιμασία για αλλαγή ονόματος." />
                                <IntelCard title="Terme Shipyard" status="Board Watch" color="border-red-500" text="Ο Emir Ozturk υπέγραψε μεταβίβαση μετοχών σε offshore της Μάλτας. Σύνδεση με την απαίτηση των 40M." />
                            </div>
                        )}

                        {/* SHIP ARRIVALS MONITOR */}
                        <section className="space-y-4">
                            <h3 className="brand-font text-[10px] text-blue-400 uppercase tracking-[0.3em] ml-2">Ship Arrivals & Repair Watch</h3>
                            <div className="bg-slate-900 rounded-3xl border border-slate-800 overflow-hidden">
                                <ArrivalRow ship="MT GLADIATOR" port="Πέραμα" time="14:30" type="Repair" status="Arrived" />
                                <ArrivalRow ship="SEA VOYAGER" port="Σαλαμίνα" time="18:00" type="Inspection" status="Expected" />
                                <ArrivalRow ship="NAFTOTRADE I" port="Ελευσίνα" time="06:00" type="Load Test" status="Moored" />
                            </div>
                        </section>

                        {/* COMPETITORS & REGISTRY */}
                        <section className="space-y-4">
                            <h3 className="brand-font text-[10px] text-blue-400 uppercase tracking-[0.3em] ml-2">Market & Competitors</h3>
                            <div className="grid grid-cols-2 gap-3">
                                <div className="glass p-4 rounded-2xl text-center border-l-2 border-amber-500">
                                    <p className="text-[8px] font-black text-slate-500 uppercase">Νομοθεσία</p>
                                    <p className="text-[10px] font-bold mt-1">ΕΛΙΝΥΑΕ Update</p>
                                </div>
                                <div className="glass p-4 rounded-2xl text-center border-l-2 border-emerald-500">
                                    <p className="text-[8px] font-black text-slate-500 uppercase">Νέα Έργα</p>
                                    <p className="text-[10px] font-bold mt-1">Nautical Tech</p>
                                </div>
                            </div>
                        </section>

                    </main>

                    {/* TARGET RADAR FOOTER */}
                    <footer className="fixed bottom-0 left-0 right-0 p-6 glass border-t border-blue-900/30 flex justify-around">
                        <div className="flex flex-col items-center">
                            <i className="fa-solid fa-crosshairs text-red-500 pulse-red"></i>
                            <span className="text-[7px] font-black uppercase mt-1">Naftocement</span>
                        </div>
                        <div className="flex flex-col items-center opacity-40">
                            <i className="fa-solid fa-building-shield"></i>
                            <span className="text-[7px] font-black uppercase mt-1">Terme</span>
                        </div>
                        <div className="flex flex-col items-center">
                            <i className="fa-solid fa-anchor text-emerald-500"></i>
                            <span className="text-[7px] font-black uppercase mt-1">Arrivals</span>
                        </div>
                    </footer>
                </div>
            );
        }

        function IntelCard({ title, status, color, text }) {
            return (
                <div className={`p-4 rounded-2xl glass border-r-4 ${color} animate-slideIn`}>
                    <div className="flex justify-between items-center mb-2">
                        <h4 className="font-black text-xs uppercase">{title}</h4>
                        <span className="text-[8px] font-bold uppercase opacity-60">{status}</span>
                    </div>
                    <p className="text-[10px] text-slate-400 leading-relaxed">{text}</p>
                </div>
            );
        }

        function ArrivalRow({ ship, port, time, type, status }) {
            return (
                <div className="p-4 border-b border-slate-800 flex justify-between items-center last:border-0 active:bg-blue-900/10 transition-all">
                    <div>
                        <p className="font-black text-[11px] text-blue-100">{ship}</p>
                        <p className="text-[9px] text-slate-500 uppercase font-bold">{port} • {type}</p>
                    </div>
                    <div className="text-right">
                        <p className="text-[10px] font-black text-blue-500">{time}</p>
                        <p className={`text-[8px] font-black uppercase ${status === 'Arrived' ? 'text-emerald-500' : 'text-amber-500'}`}>{status}</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<IntelHunter />);
    </script></body></html>
