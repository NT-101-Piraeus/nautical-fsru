<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTG COMMAND | LEGAL INTEL V48</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; overflow: hidden; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        #cy { width: 100%; height: 500px; background: rgba(0,0,0,0.2); border-radius: 30px; }
        .sidebar { transform: translateX(100%); transition: 0.3s ease; }
        .sidebar.open { transform: translateX(0); }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [view, setView] = useState('HUB'); // HUB, LEGAL
            const [selectedNode, setSelectedNode] = useState(null);
            const cyRef = useRef(null);

            useEffect(() => {
                if (view === 'LEGAL') {
                    const cy = cytoscape({
                        container: document.getElementById('cy'),
                        elements: [
                            { data: { id: 'term', label: 'TERME TERŞANESI', type: 'COMPANY' } },
                            { data: { id: 'erkan', label: 'Erkan Zorlu', type: 'PERSON' } },
                            { data: { id: 'nafto', label: 'NAFTOCEMENT IV', type: 'VESSEL' } },
                            { data: { id: 'yapi', label: 'Yapi Kredi NL', type: 'BANK' } },
                            { data: { source: 'erkan', target: 'term', label: 'OWNER' } },
                            { data: { source: 'term', target: 'nafto', label: 'ASSET' } },
                            { data: { source: 'erkan', target: 'yapi', label: 'FUNDS' } }
                        ],
                        style: [
                            { selector: 'node', style: { 'label': 'data(label)', 'color': '#fff', 'background-color': '#3b82f6', 'font-size': '10px', 'text-valign': 'center', 'width': 40, 'height': 40 } },
                            { selector: 'edge', style: { 'width': 2, 'line-color': '#1e293b', 'target-arrow-color': '#1e293b', 'target-arrow-shape': 'triangle', 'curve-style': 'bezier', 'label': 'data(label)', 'font-size': '8px', 'color': '#64748b' } },
                            { selector: 'node[type="VESSEL"]', style: { 'background-color': '#ef4444' } },
                            { selector: 'node[type="BANK"]', style: { 'background-color': '#10b981' } }
                        ],
                        layout: { name: 'cose' }
                    });
                    cy.on('tap', 'node', (evt) => setSelectedNode(evt.target.data()));
                }
            }, [view]);

            if (view === 'LEGAL') return (
                <div className="h-screen flex flex-col p-6 animate-fadeIn">
                    <header className="flex justify-between items-center mb-6">
                        <button onClick={()=>setView('HUB')} className="bg-slate-800 px-6 py-3 rounded-2xl text-[10px] font-black uppercase">← Back</button>
                        <h1 className="brand text-red-500 text-xl italic uppercase">Legal Department</h1>
                    </header>

                    <div id="cy" className="flex-1 glass shadow-2xl"></div>

                    <div className={`fixed top-0 right-0 w-80 h-full glass border-l border-white/10 p-8 sidebar ${selectedNode ? 'open' : ''} z-50`}>
                        <button onClick={()=>setSelectedNode(null)} className="mb-8 text-slate-500 text-xs uppercase font-black">Close ✕</button>
                        {selectedNode && (
                            <div className="space-y-6">
                                <h2 className="brand text-lg text-white uppercase">{selectedNode.label}</h2>
                                <span className="px-3 py-1 bg-blue-600/20 text-blue-400 text-[10px] font-bold rounded-full">{selectedNode.type}</span>
                                <div className="space-y-4 pt-6">
                                    <p className="text-xs text-slate-400"><i className="fa-solid fa-file-invoice-dollar mr-2"></i> IBAN: NL12 YAPI 0000 XXXX</p>
                                    <p className="text-xs text-slate-400"><i className="fa-solid fa-gavel mr-2"></i> Case: Naftotrade vs Terme</p>
                                    <button className="w-full bg-slate-800 py-4 rounded-2xl text-[10px] font-black uppercase">View Documents</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );

            return (
                <div className="h-screen flex flex-col items-center justify-center p-6 text-center">
                    <h1 className="brand text-blue-500 text-3xl mb-12 italic">NTG HUB</h1>
                    <div className="grid grid-cols-1 gap-6 w-full max-w-sm">
                        <a href="safety_ships.html" className="glass p-8 rounded-[40px] flex items-center gap-6"><i className="fa-solid fa-user-shield text-red-500 text-2xl"></i><span className="brand text-xs uppercase tracking-widest">Safety Officer</span></a>
                        <button onClick={() => { if(prompt("LEGAL ACCESS PIN")==="2026") setView('LEGAL'); }} className="glass p-8 rounded-[40px] flex items-center gap-6 border border-red-500/20"><i className="fa-solid fa-scale-balanced text-blue-500 text-2xl"></i><span className="brand text-xs uppercase tracking-widest text-blue-400">Legal Department</span></button>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script></body></html>
