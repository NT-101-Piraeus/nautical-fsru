<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SafeShip Pro V41 | Master Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; touch-action: manipulation; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .active-ok { background: #10b981 !important; opacity: 1; }
        .active-wait { background: #f59e0b !important; opacity: 1; }
        .active-block { background: #ef4444 !important; opacity: 1; }
        .specialty-active { background: #3b82f6 !important; border-color: #60a5fa !important; }
        input, textarea { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; outline: none; }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const SHIP_LOCS = ["Deck", "Engine Room", "Pump Room", "Chimney", "Cargo Tanks", "Accommodation"];
        const TRADES = ["Ηλεκτρολόγοι", "Μηχανικοί", "Ελασματουργοί", "Σωληνουργοί", "Καθαριστές"];
        const SHIPS = [
            { id: 1, name: "FELIX", port: "Δραπετσώνα", time: "07:00", type: "Tanker" },
            { id: 2, name: "BADJI MOKHTAR III", port: "ΕΛΕΥΣΙΝΑ", time: "11:00", type: "Ferry" },
            { id: 3, name: "ΑΡΙΑΔΝΗ", port: "ΕΛΕΥΣΙΝΑ", time: "13:00", type: "Ferry" },
            { id: 4, name: "RIGEL III", port: "Πέραμα", time: "15:00", type: "Ferry" }
        ];

        function App() {
            const [isAuth, setIsAuth] = useState(() => sessionStorage.getItem('ntg_auth') === 'true');
            const [view, setView] = useState(() => new URLSearchParams(window.location.search).get('view') || 'DASHBOARD');
            const [activeId, setActiveId] = useState(null);
            const [projects, setProjects] = useState(() => {
                try {
                    const saved = JSON.parse(localStorage.getItem('ntg_v41_data'));
                    return (saved && saved.ships) ? saved.ships : SHIPS.map(s => ({ ...s, data: {}, signedToday: false }));
                } catch(e) { return SHIPS.map(s => ({ ...s, data: {}, signedToday: false })); }
            });

            useEffect(() => { localStorage.setItem('ntg_v41_data', JSON.stringify({ ships: projects })); }, [projects]);

            if (!isAuth) return <div className="h-screen bg-slate-950 flex flex-col items-center justify-center p-10"><h2 className="brand text-red-500 mb-6 uppercase">Access Required</h2><a href="index.html" className="bg-blue-600 px-10 py-5 rounded-3xl font-black uppercase text-xs">Return to Hub</a></div>;

            const ship = projects.find(s => s.id === activeId);
            const allTasks = projects.flatMap(p => Object.entries(p.data || {}).flatMap(([loc, d]) => (d.observations || []).filter(o => o.isTask).map(o => ({ ship: p.name, loc, ...o }))));

            if (view === 'DASHBOARD') return (
                <div className="max-w-xl mx-auto p-5 pb-32 animate-fadeIn">
                    <header className="py-8 flex justify-between items-center border-b border-white/5 mb-8">
                        <h1 className="brand text-sm font-black text-red-500 uppercase tracking-tighter italic">SafeShip Pro</h1>
                        <a href="index.html" className="bg-slate-800 w-14 h-14 rounded-3xl flex items-center justify-center text-xl shadow-2xl"><i className="fa-solid fa-house"></i></a>
                    </header>
                    <div className="space-y-6">
                        {projects.map(s => (
                            <div key={s.id} className={`glass p-8 rounded-[50px] flex justify-between items-center transition-all ${s.signedToday ? 'border-l-8 border-emerald-500 bg-emerald-500/5' : 'border border-white/5 shadow-xl'}`}>
                                <div onClick={()=>{setActiveId(s.id); setView('INSPECTION')}} className="flex-1 cursor-pointer">
                                    <h4 className="font-black text-xl uppercase tracking-tighter">{s.name}</h4>
                                    <p className="text-sm font-bold text-slate-400 mt-2 uppercase italic tracking-widest">{s.port} • {s.time}</p>
                                </div>
                                <button onClick={()=>setProjects(projects.map(p=>p.id===s.id?{...p, signedToday:!p.signedToday}:p))} className={`px-6 py-4 rounded-3xl text-[11px] font-black uppercase transition-all shadow-lg ${s.signedToday ? 'bg-emerald-600 text-white' : 'bg-slate-800 text-slate-500 border border-white/10'}`}>
                                    {s.signedToday ? 'DONE ✓' : 'SIGN'}
                                </button>
                            </div>
                        ))}
                    </div>
                </div>
            );

            if (view === 'INSPECTION' && ship) return (
                <div className="max-w-xl mx-auto p-5 pb-32 animate-fadeIn">
                    <button onClick={()=>setView('DASHBOARD')} className="bg-slate-800 px-6 py-3 rounded-2xl text-[11px] font-black uppercase mb-8 shadow-xl">← Fleet</button>
                    <div className="glass p-10 rounded-[60px] border-l-8 border-red-600 text-center mb-12 shadow-2xl">
                        <h2 className="brand text-3xl font-black uppercase tracking-tighter">{ship.name}</h2>
                        <p className="text-sm font-bold text-slate-400 mt-2 uppercase tracking-[0.3em] italic">{ship.port}</p>
                    </div>
                    <div className="space-y-16">
                        {SHIP_LOCS.map(loc => {
                            const d = (ship.data && ship.data[loc]) || { observations: [] };
                            return (
                                <div key={loc} className="space-y-8">
                                    <div className="flex justify-between items-center px-4"><h4 className="text-2xl font-black uppercase text-red-500 tracking-tighter">{loc}</h4><button onClick={()=>{
                                        const newObs = { id: Date.now(), text: '', isTask: false, status: 'ok', trades: [] };
                                        setProjects(projects.map(p=>p.id===ship.id?{...p, data:{...p.data,[loc]:{observations:[...(p.data[loc]?.observations||[]), newObs]}}}:p));
                                    }} className="bg-slate-800 px-5 py-2.5 rounded-2xl text-[11px] font-black border border-white/10 shadow-2xl">+ NEW LOG</button></div>
                                    {d.observations.map(o => (
                                        <div key={o.id} className="glass p-8 rounded-[50px] border border-white/5 space-y-8 shadow-2xl relative">
                                            <div className="flex flex-wrap gap-2">{TRADES.map(t => (
                                                <button key={t} onClick={()=>{
                                                    const newT = o.trades.includes(t) ? o.trades.filter(x=>x!==t) : [...o.trades, t];
                                                    setProjects(projects.map(p=>p.id===ship.id?{...p, data:{...p.data,[loc]:{observations:p.data[loc].observations.map(x=>x.id===o.id?{...x, trades:newT}:x)}}}:p));
                                                }} className={`px-3 py-2 rounded-xl text-[10px] font-black border border-white/5 ${o.trades.includes(t) ? 'specialty-active shadow-lg' : 'bg-slate-950 text-slate-600'}`}>{t}</button>
                                            ))}</div>
                                            <div className="grid grid-cols-4 gap-2">{['ok','wait','block','na'].map(st => (
                                                <button key={st} onClick={()=>{
                                                    setProjects(projects.map(p=>p.id===ship.id?{...p, data:{...p.data,[loc]:{observations:p.data[loc].observations.map(x=>x.id===o.id?{...x, status:st}:x)}}}:p));
                                                }} className={`p-4 rounded-3xl text-[11px] font-black uppercase transition-all shadow-inner ${o.status===st?`active-${st} shadow-xl`:'bg-slate-800 opacity-30'}`}>{st}</button>
                                            ))}</div>
                                            <textarea className="p-6 rounded-[40px] text-base h-32 leading-relaxed" placeholder="Write observation details..." value={o.text} onChange={(e)=>{
                                                setProjects(projects.map(p=>p.id===ship.id?{...p, data:{...p.data,[loc]:{observations:p.data[loc].observations.map(x=>x.id===o.id?{...x, text:e.target.value}:x)}}}:p));
                                            }} />
                                            <div className="flex gap-4">
                                                <button className="flex-1 bg-slate-900 p-5 rounded-3xl border border-white/10 text-[12px] font-black uppercase flex items-center justify-center gap-3"><i className="fa-solid fa-camera text-red-500 text-2xl"></i> PHOTO</button>
                                                <button onClick={()=>{
                                                    setProjects(projects.map(p=>p.id===ship.id?{...p, data:{...p.data,[loc]:{observations:p.data[loc].observations.map(x=>x.id===o.id?{...x, isTask:!x.isTask}:x)}}}:p));
                                                }} className={`flex-1 p-5 rounded-3xl text-[12px] font-black uppercase transition-all shadow-xl ${o.isTask ? 'bg-red-600 text-white shadow-red-900/40' : 'bg-slate-800 opacity-40'}`}>IN TASKS</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );

            if (view === 'TASKS') return (
                <div className="max-w-xl mx-auto p-5 pb-32 animate-fadeIn">
                    <button onClick={()=>setView('DASHBOARD')} className="bg-slate-800 px-6 py-3 rounded-2xl text-[11px] font-black uppercase mb-10 shadow-xl">← Dashboard</button>
                    <h2 className="brand text-3xl uppercase italic mb-12 text-red-500 tracking-tighter">Hazard Registry</h2>
                    {allTasks.length === 0 ? <div className="glass p-20 rounded-[60px] text-center opacity-30 italic uppercase font-black text-base border-2 border-dashed border-white/10">Fleet Secure</div> : 
                        allTasks.map((t, i) => (
                            <div key={i} className="glass p-10 rounded-[50px] border-l-8 border-amber-500 mb-8 shadow-2xl">
                                <p className="text-[11px] font-black text-amber-500 uppercase tracking-[0.4em] mb-4">{t.ship} • {t.loc}</p>
                                <p className="text-xl text-slate-200 font-medium leading-relaxed italic">{t.text}</p>
                            </div>
                        ))
                    }
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script></body></html>
