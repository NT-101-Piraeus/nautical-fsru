<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M2: Compliance Shield v5.50 (UTID Sync)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #020617; color: white; font-family: 'Orbitron', sans-serif; font-style: italic; font-weight: bold; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .sun-mode { background: #ffffff !important; color: #000000 !important; }
        .sun-mode .glass { background: #f1f5f9 !important; border: 1px solid #cbd5e1 !important; color: #000000 !important; }
        .fat-finger-button { height: 80px; font-weight: 900; text-transform: uppercase; border-radius: 1.5rem; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s; }
        .fat-finger-button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const SafetyShield = () => {
            const [view, setView] = useState('WATCHLIST');
            const [sunMode, setSunMode] = useState(false);
            const [vessels, setVessels] = useState([]);
            const [activeVessel, setActiveVessel] = useState(null);
            
            // Inspection States [cite: 103, 111]
            const [tasks, setTasks] = useState([]);
            const [photos, setPhotos] = useState([]);
            const [measurements, setMeasurements] = useState({ o2: '', lel: '' });

            // [Art. 1] Safe-Parser & UTID Fetch [cite: 7, 94]
            useEffect(() => {
                try {
                    const radarData = localStorage.getItem('ntg_M4_radar');
                    const parsed = radarData ? JSON.parse(radarData) : [];
                    setVessels(parsed);
                } catch (e) {
                    console.error("Radar Sync Failure");
                }
            }, []);

            // [Art. 4] Hard Evidence Lock (No M5 dependency) 
            const isEvidenceReady = () => {
                return tasks.length > 0 && photos.length > 0;
            };

            const addPhoto = () => {
                setPhotos([...photos, { id: Date.now(), ts: new Date().toISOString() }]);
                // Silent Logging [cite: 70, 118]
                const log = JSON.parse(localStorage.getItem('ntg_M2_logs') || '[]');
                log.push({ action: 'PHOTO_CAPTURE', utid: activeVessel?.id, ts: new Date().toISOString() });
                localStorage.setItem('ntg_M2_logs', JSON.stringify(log));
            };

            if (view === 'WATCHLIST') return (
                <div className={`min-h-screen p-6 ${sunMode ? 'sun-mode' : ''}`}>
                    <header className="flex justify-between items-center mb-8 glass p-6 rounded-[2rem]">
                        <h1 className="text-sm uppercase font-black tracking-widest text-blue-500 italic">M2: Compliance Shield</h1>
                        <button onClick={() => setSunMode(!sunMode)} className="p-4 glass rounded-2xl">
                            <i className={`fa-solid ${sunMode ? 'fa-moon' : 'fa-sun text-orange-500'}`}></i>
                        </button>
                    </header>

                    <div className="space-y-4">
                        <p className="text-[10px] uppercase opacity-50 ml-4">Active Radar Targets [M4 Sync]</p>
                        {vessels.map(v => (
                            <div key={v.id} onClick={() => { setActiveVessel(v); setView('INSPECTION'); }} className="glass p-6 rounded-[2.5rem] border-l-4 border-blue-600 active:scale-95 transition-all">
                                <h3 className="text-lg font-black uppercase tracking-tighter">{v.name}</h3>
                                <p className="text-[9px] opacity-70">ID: {v.id || 'NO_UTID'}</p>
                                <p className="text-[8px] text-blue-400 uppercase mt-1">{v.sector} | {v.status}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className={`min-h-screen p-6 ${sunMode ? 'sun-mode' : ''}`}>
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={() => setView('WATCHLIST')} className="text-[10px] uppercase underline opacity-50 italic">← Back to Radar</button>
                        <span className="text-[8px] glass px-3 py-1 rounded-full">{activeVessel.id}</span>
                    </div>

                    <h2 className="text-2xl font-black uppercase italic text-center mb-8">{activeVessel.name}</h2>

                    {/* [cite: 106, 124] FSRU / LNG Controls */}
                    <div className="glass p-6 rounded-[2.5rem] mb-6 space-y-4 border-blue-500/20">
                        <p className="text-[10px] uppercase text-blue-500 mb-2">Gas Measurements [LNG Edition]</p>
                        <div className="grid grid-cols-2 gap-4">
                            <input type="number" placeholder="O2 %" value={measurements.o2} onChange={(e) => setMeasurements({...measurements, o2: e.target.value})} className="bg-black/20 p-5 rounded-2xl text-center text-xl outline-none border border-white/5" />
                            <input type="number" placeholder="LEL %" value={measurements.lel} onChange={(e) => setMeasurements({...measurements, lel: e.target.value})} className="bg-black/20 p-5 rounded-2xl text-center text-xl outline-none border border-white/5" />
                        </div>
                        <button onClick={() => setTasks([...tasks, {id: Date.now(), type: 'Hot Works'}])} className="fat-finger-button w-full bg-blue-600/10 border border-blue-600/30 text-xs">Add Hot Works Task +</button>
                    </div>

                    {/* Tasks List [cite: 106] */}
                    <div className="space-y-4 mb-40">
                        {tasks.map(t => (
                            <div key={t.id} className="glass p-5 rounded-3xl border-l-4 border-emerald-500">
                                <p className="text-[10px] uppercase font-black">{t.type}</p>
                                <div className="mt-2 text-[9px] opacity-60 uppercase">Π.Δ. 70/1990 Compliant Checkbox Active</div>
                            </div>
                        ))}
                    </div>

                    {/* Fixed Evidence Bar  */}
                    <div className="fixed bottom-0 left-0 right-0 p-6 glass backdrop-blur-xl border-t border-white/5 space-y-4">
                        <button onClick={addPhoto} className="fat-finger-button w-full bg-slate-800 border border-slate-700">
                            <i className="fa-solid fa-camera text-xl"></i>
                            Capture Evidence ({photos.length})
                        </button>
                        <button 
                            disabled={!isEvidenceReady()} 
                            className={`fat-finger-button w-full ${!isEvidenceReady() ? 'bg-slate-900 opacity-20' : 'bg-emerald-600 shadow-lg shadow-emerald-900/30'}`}
                        >
                            <i className="fa-solid fa-signature"></i>
                            {isEvidenceReady() ? "Confirm Sign Log" : "Locked: Need Photo & Tasks"}
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SafetyShield />);
    </script>
</body>
</html>
