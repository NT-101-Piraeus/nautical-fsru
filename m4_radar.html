<script type="text/babel">
const { useState, useEffect } = React;

const RadarApp = () => {
    const [vessels, setVessels] = useState(() => {
        const saved = localStorage.getItem('ntg_M4_radar');
        return saved ? JSON.parse(saved) : [];
    });

    const [alert, setAlert] = useState(null);

    // --- ALERT LOGIC (The Pulse) ---
    const updateStatus = (id, newStatus) => {
        const updated = vessels.map(v => {
            if (v.id === id) {
                if (v.status === 'EXPECTED' && newStatus === 'IN PORT') {
                    setAlert(`🚨 TARGET LOCKED: ${v.name} IS NOW IN PORT! Notify M14 Commercial.`);
                }
                return { ...v, status: newStatus };
            }
            return v;
        });
        setVessels(updated);
        localStorage.setItem('ntg_M4_radar', JSON.stringify(updated));
    };

    return (
        <div className="min-h-screen p-6 bg-slate-950 text-white italic font-bold">
            {/* ALERT OVERLAY */}
            {alert && (
                <div className="fixed top-0 left-0 right-0 z-50 p-6 bg-red-600 animate-bounce text-center shadow-2xl">
                    <p className="text-xs uppercase font-black">{alert}</p>
                    <button onClick={() => setAlert(null)} className="mt-2 text-[10px] underline">DISMISS</button>
                </div>
            )}

            {/* HEADER */}
            <div className="flex justify-between items-center mb-10 border-b border-red-500/30 pb-4">
                <div>
                    <span className="text-[10px] text-red-500 uppercase tracking-widest">M4 Radar Hunter</span>
                    <h1 className="text-xl font-black uppercase tracking-tighter italic">Piraeus Fleet Watch</h1>
                </div>
                <div className="flex gap-2">
                    <button className="p-3 glass rounded-xl border-white/10"><i className="fa-solid fa-sun text-yellow-500"></i></button>
                    <button onClick={() => window.location.href='index.html'} className="p-3 glass rounded-xl border-white/10"><i className="fa-solid fa-house text-xs"></i></button>
                </div>
            </div>

            {/* LIVE FEED GRID */}
            <div className="space-y-4">
                {vessels.map(v => (
                    <div key={v.id} className="glass p-6 rounded-[2.5rem] border-white/5 flex justify-between items-center relative overflow-hidden group">
                        <div className={`absolute left-0 top-0 w-1.5 h-full ${v.status === 'IN PORT' ? 'bg-emerald-500' : 'bg-blue-500'}`}></div>
                        <div>
                            <p className="text-lg font-black tracking-tighter uppercase">{v.name}</p>
                            <p className="text-[8px] opacity-40 uppercase tracking-[0.2em]">{v.area}</p>
                        </div>
                        
                        <div className="flex flex-col items-end gap-2">
                            <select 
                                value={v.status} 
                                onChange={(e) => updateStatus(v.id, e.target.value)}
                                className="bg-slate-900 border border-white/10 rounded-xl p-2 text-[8px] uppercase font-black outline-none"
                            >
                                <option value="EXPECTED">Expected</option>
                                <option value="IN PORT">In Port</option>
                                <option value="OPPORTUNITY">Opportunity</option>
                            </select>
                            <button onClick={() => window.location.href='m14_commercial.html'} className="text-[7px] text-emerald-500 uppercase border border-emerald-500/20 px-2 py-1 rounded-lg">Send to M14</button>
                        </div>
                    </div>
                ))}
            </div>

            {/* ADD TARGET BUTTON (Fat-Finger Design) */}
            <div className="fixed bottom-6 left-6 right-6">
                <button className="w-full bg-red-600 p-6 rounded-[2.5rem] text-[10px] uppercase font-black italic shadow-xl shadow-red-950/40">
                    <i className="fa-solid fa-plus mr-2"></i> Lock New Target (Piraeus Sector)
                </button>
            </div>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<RadarApp />);
</script>
