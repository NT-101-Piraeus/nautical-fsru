<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTG COMMAND | V56 FULL SUITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; margin-bottom: 80px; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #64748b; }
        .nav-item.active { color: #3b82f6; }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const SB_URL = "https://omdarjncczohpfzrqqhr.supabase.co";
        const SB_KEY = "sb_publishable_V-nfUDy5MxEG4SlXkisFBg_GBlD_4Y9";
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        function App() {
            const [view, setView] = useState('capture'); // 'capture', 'logbook', 'gallery'
            const [logs, setLogs] = useState([]);

            // Φόρτωση δεδομένων για το Logbook
            useEffect(() => {
                const fetchData = async () => {
                    const { data } = await supabase.from('ntg_logbook').select('*').order('created_at', { ascending: false });
                    setLogs(data || []);
                };
                if (view !== 'capture') fetchData();
            }, [view]);

            return (
                <div className="min-h-screen flex flex-col p-5">
                    <header className="flex justify-between items-center py-4">
                        <h1 className="brand text-blue-500 text-lg italic uppercase tracking-tighter">NTG V56</h1>
                        <span className="text-[10px] bg-blue-900/50 px-3 py-1 rounded-full border border-blue-500/30 font-bold uppercase">{view}</span>
                    </header>

                    {/* --- ΟΘΟΝΗ 1: CAPTURE --- */}
                    {view === 'capture' && (
                        <div className="animate-fadeIn space-y-6">
                            <div className="glass p-8 rounded-[40px] text-center border-t border-blue-500/30 shadow-2xl">
                                <i className="fa-solid fa-camera-retro text-4xl text-blue-500 mb-6"></i>
                                <h2 className="brand text-[10px] tracking-widest text-slate-400 mb-8 uppercase italic">Ready for Inspection</h2>
                                <label className="w-full h-32 bg-blue-600 rounded-3xl flex items-center justify-center cursor-pointer active:scale-95 transition-all shadow-xl">
                                    <span className="font-black uppercase tracking-widest">Take Photo</span>
                                    <input type="file" accept="image/*" capture="environment" className="hidden" />
                                </label>
                            </div>
                        </div>
                    )}

                    {/* --- ΟΘΟΝΗ 2: LOGBOOK --- */}
                    {view === 'logbook' && (
                        <div className="space-y-4">
                            <h2 className="brand text-xs uppercase text-slate-500 mb-4">Inspection History</h2>
                            {logs.map(log => (
                                <div key={log.id} className="glass p-4 rounded-2xl flex justify-between items-center border-l-4 border-blue-500">
                                    <div>
                                        <div className="text-[10px] font-black uppercase text-blue-400">{log.ship}</div>
                                        <div className="text-xs font-bold">{log.issue}</div>
                                        <div className="text-[9px] text-slate-500">{new Date(log.created_at).toLocaleString()}</div>
                                    </div>
                                    <div className={`text-[10px] font-black p-1 rounded ${log.status === 'High' ? 'bg-red-900 text-red-200' : 'bg-green-900 text-green-200'}`}>
                                        {log.status}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* --- ΟΘΟΝΗ 3: GALLERY --- */}
                    {view === 'gallery' && (
                        <div className="grid grid-cols-2 gap-3">
                            {logs.map(log => (
                                <div key={log.id} className="glass rounded-xl overflow-hidden aspect-square border border-slate-800">
                                    <img src={`${SB_URL}/storage/v1/object/public/ship-photos/${log.photo_url}`} className="w-full h-full object-cover opacity-80" />
                                </div>
                            ))}
                        </div>
                    )}

                    {/* --- NAVIGATION MENU (ΣΤΑΘΕΡΟ ΣΤΟ ΚΑΤΩ ΜΕΡΟΣ) --- */}
                    <nav className="fixed bottom-0 left-0 right-0 glass h-20 flex justify-around items-center border-t border-slate-800 px-6">
                        <button onClick={() => setView('capture')} className={`nav-item ${view === 'capture' ? 'active' : ''}`}>
                            <i className="fa-solid fa-camera text-xl mb-1"></i>
                            <span>Capture</span>
                        </button>
                        <button onClick={() => setView('logbook')} className={`nav-item ${view === 'logbook' ? 'active' : ''}`}>
                            <i className="fa-solid fa-list-check text-xl mb-1"></i>
                            <span>Logbook</span>
                        </button>
                        <button onClick={() => setView('gallery')} className={`nav-item ${view === 'gallery' ? 'active' : ''}`}>
                            <i className="fa-solid fa-images text-xl mb-1"></i>
                            <span>Gallery</span>
                        </button>
                    </nav>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script></body></html>
