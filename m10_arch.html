<script type="text/babel">
    const AuditorConsole = () => {
        const [systemLogs, setSystemLogs] = useState([]);
        const [clearanceStatus, setClearanceStatus] = useState(false);

        useEffect(() => {
            // Ο Auditor διαβάζει τα ίχνη που αφήνουν τα άλλα Divisions
            const logs = JSON.parse(localStorage.getItem('ntg_M10_logs') || '[]');
            const academy = localStorage.getItem('ntg_M8_ready') === 'true';
            setSystemLogs(logs);
            setClearanceStatus(academy);
        }, []);

        const emergencyLockdown = () => {
            localStorage.setItem('ntg_M8_ready', 'false');
            alert("EMERGENCY LOCKDOWN: ALL MATH ENGINES DISABLED");
            window.location.reload();
        };

        return (
            <div className="p-6">
                <div className="glass p-6 rounded-[3rem] border-l-4 border-red-600 mb-8">
                    <h2 className="text-xl font-black text-red-500 uppercase italic">Forensic Integrity Hub</h2>
                    <div className="flex gap-4 mt-4 text-[10px] font-black uppercase">
                        <span className={clearanceStatus ? "text-emerald-500" : "text-red-500"}>
                            Academy Status: {clearanceStatus ? "AUTHORIZED" : "LOCKED"}
                        </span>
                    </div>
                </div>

                <div className="glass p-6 rounded-[2rem] h-64 overflow-y-auto mb-8 font-mono text-[9px] text-blue-400">
                    <p className="opacity-40 uppercase mb-2">// System Telemetry Feed</p>
                    {systemLogs.map((log, i) => (
                        <div key={i} className="mb-1 border-b border-white/5">
                            [{log.ts}] {log.event} | Source: {log.division}
                        </div>
                    ))}
                </div>

                <button onClick={emergencyLockdown} className="w-full h-16 bg-red-600/20 border border-red-600 text-red-500 font-black uppercase rounded-2xl">
                    Kill-Switch: Lockdown All Divisions
                </button>
            </div>
        );
    };
</script>
