<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NauticalOS | Command Hub V5.6</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #020617; color: white; font-family: 'Orbitron', sans-serif; overflow-x: hidden; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-card:active { transform: scale(0.95); background: rgba(30, 41, 59, 0.8); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; box-shadow: 0 0 10px currentColor; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const CommandHub = () => {
            const [showPinGate, setShowPinGate] = useState(false);
            const [pin, setPin] = useState("");
            const [targetFile, setTargetFile] = useState("");

            // [Art. 2] Security Gate Protocol
            const navigateTo = (file, secure) => {
                if (secure) {
                    setTargetFile(file);
                    setShowPinGate(true);
                } else {
                    window.location.href = file;
                }
            };

            const verifyPin = () => {
                if (pin === "1234") {
                    sessionStorage.setItem('ntg_global_auth', 'true');
                    window.location.href = targetFile;
                } else {
                    alert("ACCESS DENIED | MASTER PIN REQUIRED");
                    setPin("");
                }
            };

            const divisions = [
                { id: 'M1', title: 'UTM ANALYSIS', file: 'm1_utm.html', icon: 'fa-arrows-left-right', status: 'active', color: 'emerald', secure: true },
                { id: 'M2', title: 'SAFETY WATCH', file: 'm2_safety.html', icon: 'fa-shield-halved', status: 'active', color: 'emerald', secure: true },
                { id: 'M3', title: 'LOAD TEST PRO', file: 'm3_loadtest.html', icon: 'fa-weight-hanging', status: 'active', color: 'emerald', secure: true },
                { id: 'M4', title: 'RADAR HUNTER', file: 'm4_radar.html', icon: 'fa-tower-observation', status: 'active', color: 'orange', secure: true },
                { id: 'M5', title: 'WAR ROOM', file: 'm5_terme.html', icon: 'fa-hammer', status: 'active', color: 'red', secure: true },
                { id: 'M8', title: 'ACADEMY', file: 'm8_academy.html', icon: 'fa-book-open', status: 'active', color: 'blue', secure: false },
                { id: 'M10', title: 'SUPREME AUDITOR', file: 'm10_arch.html', icon: 'fa-eye', status: 'active', color: 'orange', secure: true },
                { id: 'M14', title: 'COMMERCIAL', file: 'm14_commercial.html', icon: 'fa-chart-line', status: 'active', color: 'emerald', secure: true }
            ];

            return (
                <div className="min-h-screen p-6 max-w-5xl mx-auto">
                    {/* Header */}
                    <div className="flex items-center gap-6 mb-12 mt-4 glass-card p-8 rounded-[2.5rem]">
                        <div className="bg-orange-600/20 p-5 rounded-3xl">
                            <i className="fa-solid fa-users-gear text-3xl text-orange-500"></i>
                        </div>
                        <div>
                            <h1 className="text-2xl font-black italic tracking-tighter uppercase">Command Hub V5.6</h1>
                            <p className="text-[9px] font-bold opacity-50 uppercase tracking-[0.4em] text-orange-500">Global Fleet Control | Nautical Technology</p>
                        </div>
                    </div>

                    {/* Divisions Grid */}
                    <div className="grid grid-cols-2 gap-4 mb-10">
                        {divisions.map(div => (
                            <div key={div.id} onClick={() => navigateTo(div.file, div.secure)} className="glass-card p-6 rounded-[2.5rem] relative cursor-pointer group">
                                <div className="flex justify-between items-start mb-6">
                                    <span className="text-[10px] font-black opacity-30 italic">{div.id}</span>
                                    <div className={`status-dot text-${div.color}-500 bg-current`}></div>
                                </div>
                                <i className={`fa-solid ${div.icon} text-2xl mb-4 opacity-80`}></i>
                                <h3 className="text-[11px] font-black uppercase italic tracking-wider">{div.title}</h3>
                                <p className="text-[8px] opacity-40 uppercase mt-1 font-bold">{div.status}</p>
                            </div>
                        ))}
                    </div>

                    {/* PIN Modal */}
                    {showPinGate && (
                        <div className="fixed inset-0 bg-black/95 backdrop-blur-2xl z-50 flex items-center justify-center p-6">
                            <div className="glass-card w-full max-w-sm p-10 rounded-[3rem] text-center">
                                <i className="fa-solid fa-lock text-3xl text-orange-500 mb-6"></i>
                                <h2 className="text-sm font-black uppercase mb-8 italic">Master PIN Required</h2>
                                <input 
                                    type="password" 
                                    value={pin}
                                    onChange={(e) => setPin(e.target.value)}
                                    className="w-full bg-black/40 border border-white/10 p-6 rounded-2xl text-center text-3xl tracking-[1rem] outline-none focus:border-orange-500"
                                    autoFocus
                                />
                                <div className="grid grid-cols-2 gap-4 mt-8">
                                    <button onClick={() => setShowPinGate(false)} className="text-[10px] font-black uppercase opacity-40">Cancel</button>
                                    <button onClick={verifyPin} className="bg-orange-600 h-16 rounded-2xl font-black uppercase text-xs">Authorize</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CommandHub />);
    </script>
</body>
</html>
