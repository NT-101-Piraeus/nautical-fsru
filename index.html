<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAUTICAL TECHNOLOGY GROUP | Intel Division</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700&display=swap');
        .brand-font { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .glow-border { box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        .legal-pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [page, setPage] = useState('legal'); 
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [passcode, setPasscode] = useState('');

            const handleLogin = (e) => {
                e.preventDefault();
                if (passcode === 'NT2026') setIsLoggedIn(true);
                else alert("Λάθος Κωδικός!");
            };

            const generatePDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.setFont("helvetica", "bold");
                doc.text("NAUTICAL TECHNOLOGY GROUP - FORENSIC REPORT", 10, 20);
                doc.text("-------------------------------------------------------------", 10, 30);
                doc.text("CASE: NAFTOCEMENT IV / AUGUST DISCREPANCIES", 10, 40);
                doc.text("STATUS: DARK AIS PERIODS DETECTED WITHIN YARD RADIUS.", 10, 50);
                doc.save("NTG_Forensic_Evidence.pdf");
            };

            if (!isLoggedIn) {
                return (
                    <div className="h-screen flex items-center justify-center bg-slate-950 p-6">
                        <div className="bg-slate-900 p-8 rounded-3xl border border-slate-800 shadow-2xl w-full max-w-sm text-center">
                            <h1 className="brand-font text-blue-500 text-xl font-black mb-1">NTG HUB</h1>
                            <p className="text-slate-500 mb-6 text-[9px] font-bold uppercase tracking-[0.3em]">Secure Intel Entry</p>
                            <form onSubmit={handleLogin}>
                                <input 
                                    type="password" 
                                    className="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl mb-4 text-center text-white outline-none focus:border-blue-500"
                                    placeholder="••••"
                                    value={passcode}
                                    onChange={(e) => setPasscode(e.target.value)}
                                />
                                <button className="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold uppercase tracking-widest shadow-lg">Login</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col pb-20">
                    <header className="p-6 border-b border-slate-800 bg-slate-900/80 backdrop-blur-xl sticky top-0 z-50 text-center">
                        <h1 className="brand-font text-blue-500 text-lg font-black uppercase">Nautical Technology Group</h1>
                        <p className="text-[8px] font-bold text-slate-500 uppercase tracking-[0.4em] mt-1">Intel Division</p>
                    </header>

                    <main className="flex-1 p-6 max-w-lg mx-auto w-full">
                        {page === 'legal' && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center border-l-2 border-red-600 pl-4 mb-4">
                                    <h2 className="brand-font text-red-500 text-md uppercase font-black">Legal Intelligence</h2>
                                    <i className="fa-solid fa-tower-broadcast text-red-600 legal-pulse"></i>
                                </div>

                                <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 glow-border">
                                    <h3 className="brand-font text-blue-400 text-xs mb-3 uppercase">Naftocement IV Forensics</h3>
                                    <p className="text-[11px] text-slate-400 leading-relaxed mb-5">
                                        Ανάλυση "Dark Periods" Αυγούστου. Ύποπτη σιγή AIS εντός ναυπηγείου Terme.
                                    </p>
                                    <button onClick={generatePDF} className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-2xl text-[10px] uppercase tracking-widest transition-all">
                                        Generate Forensic Evidence PDF
                                    </button>
                                </div>

                                <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6">
                                    <h3 className="brand-font text-slate-400 text-[10px] mb-4 uppercase">Watchlist: Terme Board</h3>
                                    <div className="space-y-3">
                                        {['Tugrul Karaca', 'Emir Ozturk', 'Erkan Zorlu'].map(name => (
                                            <div key={name} className="flex justify-between items-center bg-slate-800/40 p-3 rounded-xl">
                                                <span className="text-[11px] font-bold text-slate-300">{name}</span>
                                                <span className="text-[8px] font-black text-blue-500 uppercase tracking-widest animate-pulse">Monitoring</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-slate-900/90 border-t border-slate-800 p-4 flex justify-around backdrop-blur-md">
                        <button className="flex flex-col items-center gap-1 text-blue-500">
                            <i className="fa-solid fa-shield-halved text-xl"></i>
                            <span className="text-[8px] font-bold uppercase">Legal</span>
                        </button>
                        <button className="flex flex-col items-center gap-1 text-slate-600">
                            <i className="fa-solid fa-globe text-xl"></i>
                            <span className="text-[8px] font-bold uppercase">Marine</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
