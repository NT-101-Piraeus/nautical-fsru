<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTG COMMAND | V55 AUDIT & SAFETY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .critical-pulse { animation: pulse 1s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); } 100% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); } }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [view, setView] = useState('DASHBOARD');
            const [user, setUser] = useState({ id: 'TECH_01', name: 'M. Sykiniotis' }); // Audit Context
            const [logs, setLogs] = useState([
                { id: 1, ship: 'NAFTOCEMENT IV', type: 'TANKER', status: 'BLOCK', issue: 'GAS LEAK' },
                { id: 2, ship: 'RIGEL III', type: 'FERRY', status: 'WAIT', issue: 'RAILING' }
            ]);

            // Safety Score Calculation Logic
            const blocks = logs.filter(l => l.status === 'BLOCK').length;
            const waits = logs.filter(l => l.status === 'WAIT').length;
            const safetyScore = Math.max(0, 100 - (blocks * 25) - (waits * 10));

            const Dashboard = () => (
                <div className="p-6 max-w-xl mx-auto space-y-6 animate-fadeIn">
                    <div className="flex justify-between items-center mb-8">
                        <div><h1 className="brand text-blue-500 text-xl italic">NTG COMMAND V55</h1>
                        <p className="text-[10px] text-slate-500 font-bold uppercase">User: {user.name} (Audit Active)</p></div>
                        <div className="text-right"><div className="text-3xl font-black text-blue-400">{safetyScore}%</div>
                        <div className="text-[10px] uppercase font-bold text-slate-500">Fleet Safety Score</div></div>
                    </div>

                    <h3 className="brand text-xs uppercase text-slate-400 mb-4">Hazard Radar (High Priority)</h3>
                    {logs.map(log => (
                        <div key={log.id} className={`glass p-5 rounded-3xl mb-3 flex items-center justify-between border-l-4 ${log.status === 'BLOCK' ? 'border-red-600 critical-pulse' : 'border-yellow-500'}`}>
                            <div>
                                <div className="flex items-center gap-2">
                                    <span className="text-[10px] bg-slate-800 px-2 py-0.5 rounded font-bold uppercase">{log.type}</span>
                                    <h4 className="font-black text-sm uppercase italic">{log.ship}</h4>
                                </div>
                                <p className="text-xs text-slate-400 mt-1 uppercase font-bold">{log.issue}</p>
                            </div>
                            <div className="text-[10px] font-black uppercase text-red-500">{log.status}</div>
                        </div>
                    ))}

                    <button onClick={() => setView('REPORT')} className="w-full bg-blue-600 py-5 rounded-3xl brand text-xs uppercase shadow-2xl mt-10 hover:bg-blue-500 transition-all">Generate Executive Report</button>
                </div>
            );

            const ExecutiveReport = () => (
                <div className="p-8 max-w-2xl mx-auto bg-white text-slate-900 min-h-screen animate-slideUp">
                    <button onClick={() => setView('DASHBOARD')} className="text-[10px] font-bold uppercase text-slate-400 mb-10">← Exit Preview</button>
                    <div className="border-b-4 border-slate-900 pb-6 mb-8 flex justify-between items-end">
                        <div><h1 className="brand text-2xl uppercase italic leading-none">Safety Audit</h1><p className="text-xs font-bold uppercase mt-2">Nautical Technology Group | {new Date().toLocaleDateString()}</p></div>
                        <div className="text-5xl font-black">{safetyScore}%</div>
                    </div>

                    <section className="mb-10">
                        <h2 className="text-xs font-black uppercase bg-slate-100 p-2 mb-4 italic">Critical BLOCK Findings (Action Required)</h2>
                        <div className="space-y-4">
                            {logs.filter(l => l.status === 'BLOCK').map(l => (
                                <div key={l.id} className="border-l-4 border-red-600 pl-4 py-2">
                                    <h3 className="text-sm font-black uppercase">{l.ship}</h3>
                                    <p className="text-xs text-slate-600 uppercase font-bold">{l.issue}</p>
                                    <p className="text-[9px] text-slate-400 mt-1">Inspected by: {user.name} | Verified via Supabase Audit</p>
                                </div>
                            ))}
                        </div>
                    </section>

                    <div className="mt-20 border-t border-slate-200 pt-6 flex justify-between items-center text-[10px] font-bold uppercase text-slate-400 italic">
                        <span>Digital Signature: NTG-AUTH-{user.id}-2026</span>
                        <span>Generated via Nautical-FSRU V55</span>
                    </div>
                </div>
            );

            return view === 'DASHBOARD' ? <Dashboard /> : <ExecutiveReport />;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script></body></html>
