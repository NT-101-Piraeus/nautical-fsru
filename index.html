<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTG HUB | V40</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        function Hub() {
            const [isAuth, setIsAuth] = useState(() => sessionStorage.getItem('ntg_auth') === 'true');
            const [taskCount, setTaskCount] = useState(0);

            useEffect(() => {
                try {
                    const data = JSON.parse(localStorage.getItem('ntg_v40_data'));
                    if (data && data.ships) {
                        const count = data.ships.flatMap(s => Object.values(s.data || {}))
                                          .flatMap(d => d.observations || [])
                                          .filter(o => o.isTask).length;
                        setTaskCount(count);
                    }
                } catch(e) { console.error("Sync error"); }
            }, [isAuth]);

            if (!isAuth) return (
                <div className="h-screen flex items-center justify-center p-6 bg-[#020617]">
                    <form onSubmit={(e)=>{e.preventDefault(); if(e.target.p.value==='NT2026'){sessionStorage.setItem('ntg_auth','true');setIsAuth(true)}}} className="glass p-10 rounded-[40px] w-full max-w-sm text-center border border-blue-500/20">
                        <h1 className="brand text-blue-500 text-2xl mb-8 uppercase italic">NTG COMMAND</h1>
                        <input name="p" type="password" autoFocus className="w-full bg-slate-900 border border-slate-800 p-5 rounded-3xl mb-4 text-center text-white outline-none text-2xl" placeholder="••••" />
                        <button className="w-full bg-blue-600 py-5 rounded-3xl font-black text-xs uppercase shadow-xl">Identify</button>
                    </form>
                </div>
            );

            return (
                <div className="max-w-xl mx-auto p-5 py-10 animate-fadeIn">
                    <header className="flex justify-between items-center mb-12">
                        <h1 className="brand text-blue-500 text-2xl font-black italic uppercase">NTG HUB</h1>
                        <button onClick={()=>{localStorage.clear(); window.location.reload();}} className="text-[8px] opacity-20 border p-1 rounded">RESET V40</button>
                    </header>

                    <a href="safety_ships.html?view=TASKS" className="block mb-10 active:scale-95 transition-all">
                        <div className="glass p-6 rounded-[35px] border-l-4 border-red-600 flex justify-between items-center bg-red-600/5">
                            <div><h3 className="brand text-[10px] text-red-500 uppercase italic">Hazardous Findings</h3><p className="text-3xl font-black mt-1">{taskCount} <span className="text-xs text-slate-500">TASKS</span></p></div>
                            <i className="fa-solid fa-triangle-exclamation text-red-500 text-2xl animate-pulse"></i>
                        </div>
                    </a>

                    <a href="safety_ships.html" className="glass p-10 rounded-[50px] flex items-center gap-8 active:scale-95 transition-all border border-white/5 shadow-2xl">
                        <div className="w-20 h-20 rounded-3xl bg-red-600/20 flex items-center justify-center text-red-500 text-4xl shadow-inner"><i className="fa-solid fa-user-shield"></i></div>
                        <div><h2 className="brand text-lg text-white uppercase italic leading-none">Safety Officer</h2><p className="text-[11px] text-slate-400 font-bold uppercase mt-2 tracking-widest">Compliance Engine Active</p></div>
                    </a>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<Hub />);
    </script></body></html>
