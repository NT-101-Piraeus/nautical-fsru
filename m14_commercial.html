<script type="text/babel">
const { useState, useEffect } = React;

const CommercialGEM = () => {
    const [offers, setOffers] = useState(() => {
        const saved = localStorage.getItem('ntg_M14_offers');
        return saved ? JSON.parse(saved) : [
            { id: 1, vessel: 'MT FELIX', company: 'SeaPort', value: 2500, status: 'WON', reason: '' },
            { id: 2, vessel: 'MV ARGO', company: 'Oceanic', value: 4800, status: 'LOST', reason: 'Price too High' },
            { id: 3, vessel: 'MT ARIADNI', company: 'Global Oil', value: 3200, status: 'PENDING', reason: '' }
        ];
    });

    // --- GEM STRATEGIC LOGIC ---
    const stats = {
        total: offers.length,
        won: offers.filter(o => o.status === 'WON').length,
        lost: offers.filter(o => o.status === 'LOST').length,
        pending: offers.filter(o => o.status === 'PENDING').length,
        wonValue: offers.filter(o => o.status === 'WON').reduce((acc, curr) => acc + curr.value, 0),
        conversion: Math.round((offers.filter(o => o.status === 'WON').length / offers.length) * 100)
    };

    return (
        <div className="min-h-screen p-6 bg-slate-950 text-white italic font-bold">
            {/* GEM ADVISORY HEADER */}
            <div className="glass p-6 rounded-[2.5rem] border-emerald-500/30 mb-8 relative overflow-hidden">
                <div className="flex items-center gap-4 mb-4">
                    <div className="w-12 h-12 bg-emerald-600 rounded-full flex items-center justify-center animate-pulse">
                        <i className="fa-solid fa-brain"></i>
                    </div>
                    <div>
                        <p className="text-[10px] text-emerald-500 uppercase">Commercial Manager GEM</p>
                        <h2 className="text-sm uppercase tracking-tighter">Strategic Insights Active</h2>
                    </div>
                </div>
                <div className="bg-emerald-500/10 p-4 rounded-2xl border border-emerald-500/20">
                    <p className="text-[9px] leading-relaxed">
                        <i className="fa-solid fa-quote-left mr-2 opacity-50"></i>
                        Captain, your current conversion rate is <span className="text-emerald-400">{stats.conversion}%</span>. 
                        I recommend prioritizing the {stats.pending} pending quotes to secure next month's cash flow.
                    </p>
                </div>
            </div>

            {/* PIPELINE STATS */}
            <div className="grid grid-cols-3 gap-3 mb-8 text-center">
                <div className="glass p-4 rounded-3xl border-emerald-500/20">
                    <p className="text-[7px] uppercase opacity-50">Won</p>
                    <p className="text-lg">{stats.won}</p>
                </div>
                <div className="glass p-4 rounded-3xl border-orange-500/20">
                    <p className="text-[7px] uppercase opacity-50">Pending</p>
                    <p className="text-lg">{stats.pending}</p>
                </div>
                <div className="glass p-4 rounded-3xl border-red-500/20">
                    <p className="text-[7px] uppercase opacity-50">Lost</p>
                    <p className="text-lg">{stats.lost}</p>
                </div>
            </div>

            {/* REVENUE PULSE */}
            <div className="glass p-8 rounded-[3rem] border-white/5 mb-8 text-center">
                <p className="text-[8px] uppercase opacity-50 tracking-widest mb-2">Total Secured Revenue</p>
                <p className="text-4xl font-black text-emerald-500 tracking-tighter">€{stats.wonValue.toLocaleString()}</p>
            </div>

            {/* OFFERS LIST */}
            <div className="space-y-4 pb-24">
                {offers.map(offer => (
                    <div key={offer.id} className="glass p-6 rounded-3xl border-white/5 flex justify-between items-center group active:scale-95 transition-all">
                        <div className="flex items-center gap-4">
                            <div className={`w-2 h-2 rounded-full ${offer.status==='WON'?'bg-emerald-500':offer.status==='LOST'?'bg-red-500':'bg-orange-500 animate-pulse'}`}></div>
                            <div>
                                <p className="text-xs uppercase">{offer.vessel}</p>
                                <p className="text-[8px] opacity-40 uppercase">{offer.company}</p>
                            </div>
                        </div>
                        <div className="text-right">
                            <p className="text-xs">€{offer.value}</p>
                            {offer.status === 'LOST' && <p className="text-[7px] text-red-500 uppercase">{offer.reason}</p>}
                        </div>
                    </div>
                ))}
            </div>

            <div className="fixed bottom-6 left-6 right-6 flex gap-3">
                <button onClick={() => window.location.href='index.html'} className="glass w-16 h-16 rounded-full flex items-center justify-center border-white/10">
                    <i className="fa-solid fa-house text-xs"></i>
                </button>
                <button onClick={() => alert("Admin PIN 1234 Required")} className="flex-1 bg-emerald-600 p-6 rounded-[2.5rem] text-[10px] uppercase font-black italic shadow-xl">
                    Generate New Offer
                </button>
            </div>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<CommercialGEM />);
</script>
