<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M2: Safety Watch</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');body{background:#020617;color:white;font-family:'Orbitron',sans-serif;font-style:italic;font-weight:bold;}.glass{background:rgba(15,23,42,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);}</style>
</head>
<body><div id="root"></div><script type="text/babel">
const Safety=()=>{
    const [sun,setSun]=React.useState(false);
    return(
        <div className={`min-h-screen p-6 ${sun?'bg-white text-black':'bg-slate-950 text-white'}`}>
            <div className="flex justify-between mb-8"><a href="index.html" className="text-[10px] underline opacity-50">← HUB</a><button onClick={()=>setSun(!sun)} className="p-2 glass rounded-full"><i className={`fa-solid ${sun?'fa-moon':'fa-sun text-yellow-500'}`}></i></button></div>
            <h1 className="text-blue-500 text-lg mb-10 text-center uppercase">M2: SAFETY WATCH</h1>
            <div className="glass p-8 rounded-[2.5rem] text-center border-blue-500/20 shadow-2xl">
                <i className="fa-solid fa-clipboard-list text-4xl mb-6 text-blue-500 animate-pulse"></i>
                <p className="text-[10px] uppercase tracking-widest">Joblist Engine Initialized</p>
                <button className="mt-8 w-full bg-blue-600 p-4 rounded-2xl text-[10px] uppercase">New Inspection +</button>
            </div>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<Safety/>);
</script></body></html>
