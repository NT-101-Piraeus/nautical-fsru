<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SafeShip Pro | March 2026 Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; touch-action: manipulation; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .safe-btn { transition: all 0.2s; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .safe-btn:active { transform: scale(0.95); opacity: 0.8; }
        .status-signed { border-left: 8px solid #10b981 !important; background: rgba(16, 185, 129, 0.1) !important; }
        input, textarea { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; outline: none; }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const MARCH_SCHEDULE = [
            { id: 'f22', name: 'FELIX', date: '2026-03-22', time: '07:00', duration: '4h', signed: false },
            { id: 'f23', name: 'FELIX', date: '2026-03-23', time: '07:00', duration: '4h', signed: false },
            { id: 'f24', name: 'FELIX', date: '2026-03-24', time: '07:00', duration: '4h', signed: false },
            { id: 'f25', name: 'FELIX', date: '2026-03-25', time: '07:00', duration: '4h', signed: false },
            { id: 'f26', name: 'FELIX', date: '2026-03-26', time: '07:00', duration: '4h', signed: false },
            { id: 'f27', name: 'FELIX', date: '2026-03-27', time: '07:00', duration: '4h', signed: false },
            { id: 'f28', name: 'FELIX', date: '2026-03-28', time: '07:00', duration: '4h', signed: false },
            { id: 'f29', name: 'FELIX', date: '2026-03-29', time: '07:00', duration: '4h', signed: false },
            { id: 'f30', name: 'FELIX', date: '2026-03-30', time: '07:00', duration: '4h', signed: false },
            { id: 'f31', name: 'FELIX', date: '2026-03-31', time: '07:00', duration: '4h', signed: false }
        ];

        function SafeShipApp() {
            const [pass, setPass] = useState('');
            const [isAuth, setIsAuth] = useState(() => sessionStorage.getItem('ntg_auth') === 'true');
            const [view, setView] = useState('dashboard');
            const [projects, setProjects] = useState(() => {
                const saved = localStorage.getItem('safeship_v20_projects');
                return saved ? JSON.parse(saved) : MARCH_SCHEDULE;
            });
            const [activeId, setActiveId] = useState(null);
            const [checkIn, setCheckIn] = useState(() => localStorage.getItem('ntg_checkin') || '--:--');

            useEffect(() => { localStorage.setItem('safeship_v20_projects', JSON.stringify(projects)); }, [projects]);

            const login = (e) => { e.preventDefault(); if(pass === 'NT2026') { sessionStorage.setItem('ntg_auth', 'true'); setIsAuth(true); } else { alert('Wrong Code'); } };

            if (!isAuth) return (
                <div className="h-screen flex items-center justify-center p-6 bg-slate-950">
                    <div className="glass p-10 rounded-[40px] w-full max-w-sm text-center shadow-2xl border border-red-500/20">
                        <h1 className="brand text-red-500 text-2xl font-black mb-8 italic uppercase leading-none">SafeShip Access</h1>
                        <form onSubmit={login}><input type="password" onChange={(e)=>setPass(e.target.value)} className="w-full bg-slate-900 border border-slate-800 p-5 rounded-3xl mb-4 text-center text-2xl text-white outline-none" placeholder="••••" />
                        <button className="w-full bg-red-600 text-white py-5 rounded-3xl font-black brand text-xs uppercase tracking-widest shadow-xl">Establish Link</button></form>
                    </div>
                </div>
            );

            const activeP = projects.find(p => p.id === activeId);

            return (
                <div className="max-w-xl mx-auto p-5 pb-32 animate-fadeIn">
                    <header className="flex justify-between items-center py-6 mb-4 border-b border-slate-800">
                        <div><h1 className="brand text-sm font-black italic text-red-500 uppercase">SafeShip Manager</h1><p className="text-[8px] text-slate-500 font-bold uppercase tracking-widest">Digital Tactical Log</p></div>
                        <div className="text-right">
                            <p className="text-[10px] font-black uppercase text-slate-400">22 / 03 / 2026</p>
                            <p className="text-xl font-bold text-red-500 leading-none mt-1">04:15 μ.μ.</p>
                        </div>
                    </header>

                    {view === 'dashboard' && (
                        <div className="space-y-6">
                            <div className="glass p-6 rounded-[35px] border-l-4 border-emerald-500 flex justify-between items-center mb-8">
                                <div><p className="text-[8px] text-slate-500 font-black uppercase mb-1 tracking-widest">Attendance (In)</p><p className="text-3xl font-black">{checkIn}</p></div>
                                <button onClick={() => {const t=new Date().toLocaleTimeString('el-GR',{hour:'2-digit',minute:'2-digit'}); setCheckIn(t); localStorage.setItem('ntg_checkin', t)}} className="bg-emerald-600 px-6 py-4 rounded-2xl text-xs font-black uppercase safe-btn shadow-lg">Check-in</button>
                            </div>

                            <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2 italic">March 2026 Ship Schedule</h3>
                            <div className="space-y-3">
                                {projects.map(p => (
                                    <div key={p.id} onClick={() => { setActiveId(p.id); setView('daily'); }} className={`glass p-6 rounded-[35px] flex justify-between items-center safe-btn ${p.signed ? 'status-signed' : 'border border-white/5'}`}>
                                        <div><h4 className="font-bold text-sm uppercase">{p.name}</h4><p className="text-[9px] text-slate-500 font-bold uppercase mt-1">{p.date} • {p.time} ({p.duration})</p></div>
                                        {p.signed ? <i className="fa-solid fa-circle-check text-emerald-500 text-xl"></i> : <i className="fa-solid fa-chevron-right text-slate-800"></i>}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {view === 'daily' && activeP && (
                        <div className="animate-fadeIn space-y-8">
                            <button onClick={() => setView('dashboard')} className="text-slate-500 text-[10px] font-black uppercase tracking-widest">← Back to Schedule</button>
                            <div className="glass p-8 rounded-[40px] border-l-4 border-red-600 text-center">
                                <h2 className="brand text-2xl font-black uppercase text-white">{activeP.name}</h2>
                                <p className="text-[10px] text-red-500 font-bold uppercase mt-1 italic tracking-widest">Inspection & Audit Hub</p>
                            </div>

                            <div className="space-y-6">
                                <section className="glass p-6 rounded-[35px]">
                                    <h4 className="text-[11px] font-black uppercase text-slate-400 mb-4">Daily Checklist</h4>
                                    <div className="grid grid-cols-2 gap-2 mb-4">
                                        <button className="bg-slate-800 p-4 rounded-xl text-[10px] font-black uppercase safe-btn border border-emerald-500/20 active:bg-emerald-600">Deck OK</button>
                                        <button className="bg-slate-800 p-4 rounded-xl text-[10px] font-black uppercase safe-btn border border-red-500/20 active:bg-red-600">Engine OK</button>
                                    </div>
                                    <textarea className="w-full p-5 rounded-3xl text-[12px] h-32 mb-4" placeholder="Enter findings or pending tasks..."></textarea>
                                    <button onClick={() => {
                                        setProjects(projects.map(p => p.id === activeId ? {...p, signed: true} : p));
                                        alert("Inspection Signed & Verified");
                                        setView('dashboard');
                                    }} className="w-full bg-emerald-600 p-6 rounded-[35px] font-black uppercase text-xs tracking-widest shadow-2xl safe-btn">Sign-Off Today</button>
                                </section>
                            </div>
                            
                            <button className="w-full bg-slate-800 p-6 rounded-[35px] font-black uppercase text-[10px] tracking-widest opacity-40">Generate & Export PDF Report</button>
                        </div>
                    )}

                    <footer className="fixed bottom-0 left-0 right-0 p-6 glass border-t border-slate-800 flex justify-around">
                        <button onClick={() => setView('dashboard')} className="text-red-500"><i className="fa-solid fa-calendar-day text-lg"></i></button>
                        <button onClick={() => window.location.reload()} className="text-slate-600"><i className="fa-solid fa-sync text-lg"></i></button>
                        <a href="index.html" className="text-slate-600"><i className="fa-solid fa-house-user text-lg"></i></a>
                    </footer>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SafeShipApp />);
    </script></body></html>
