<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SafeShip Pro | V36.1 Tactical</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; touch-action: manipulation; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .active-ok { background: #10b981 !important; opacity: 1; }
        .active-wait { background: #f59e0b !important; opacity: 1; }
        .active-block { background: #ef4444 !important; opacity: 1; }
        .specialty-active { background: #3b82f6 !important; border-color: #60a5fa !important; }
        input, textarea { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; outline: none; }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const _supabase = supabase.createClient("https://omdarjncczohpffunfy.supabase.co", "sb_publishable_V-nfUDy5MxEG4SlXkisFBg_GBlD_4Y9");

        const TRADES = ["Ηλεκτρολόγοι", "Μηχανικοί", "Ελασματουργοί", "Σωληνουργοί", "Καθαριστές", "Σκαλωσέρ"];
        const INITIAL_SHIPS = [
            { id: 1, name: "FELIX", port: "Δραπετσώνα", type: "Tanker" },
            { id: 2, name: "BADJI MOKHTAR III", port: "ΕΛΕΥΣΙΝΑ", type: "Ferry" },
            { id: 3, name: "ΑΡΙΑΔΝΗ", port: "ΕΛΕΥΣΙΝΑ", type: "Ferry" },
            { id: 4, name: "RIGEL III", port: "Πέραμα", type: "Ferry" }
        ];

        function App() {
            const [view, setView] = useState('DASHBOARD');
            const [activeId, setActiveId] = useState(null);
            const [projects, setProjects] = useState(() => JSON.parse(localStorage.getItem('ntg_v36_1')) || INITIAL_SHIPS.map(s => ({ ...s, data: {}, signedToday: false })));

            useEffect(() => { localStorage.setItem('ntg_v36_1', JSON.stringify({ ships: projects })); }, [projects]);

            const ship = projects.find(s => s.id === activeId);
            const allTasks = projects.flatMap(p => Object.entries(p.data || {}).flatMap(([loc, d]) => (d.observations || []).filter(o => o.status === 'block' || o.status === 'wait').map(o => ({ ship: p.name, loc, ...o }))));

            const saveToCloud = async (ship) => {
                const { error } = await _supabase.from('ntg_logbook').insert([{ ship_name: ship.name, port: ship.port, inspection_data: ship.data, status: 'Completed' }]);
                if (!error) alert("LOGBOOK: ΣΥΓΧΡΟΝΙΣΜΟΣ ΟΛΟΚΛΗΡΩΘΗΚΕ");
            };

            if (view === 'DASHBOARD') return (
                <div className="max-w-xl mx-auto p-5 pb-32">
                    <header className="py-8 flex justify-between items-center mb-8 border-b border-white/5">
                        <h1 className="brand text-xs font-black text-red-500 uppercase">SafeShip Pro</h1>
                        <a href="index.html" className="text-slate-600"><i className="fa-solid fa-house"></i></a>
                    </header>
                    <div className="space-y-4">
                        {projects.map(s => (
                            <div key={s.id} onClick={()=>{setActiveId(s.id); setView('INSPECTION')}} className={`glass p-6 rounded-[35px] flex justify-between items-center ${s.signedToday ? 'border-l-8 border-emerald-500' : 'border border-white/5'}`}>
                                <div><h4 className="font-black text-sm uppercase">{s.name}</h4><p className="text-[9px] text-slate-500 uppercase mt-1">{s.port}</p></div>
                                <i className="fa-solid fa-chevron-right text-slate-800"></i>
                            </div>
                        ))}
                    </div>
                </div>
            );

            if (view === 'INSPECTION' && ship) return (
                <div className="max-w-xl mx-auto p-5 pb-32 animate-fadeIn">
                    <div className="flex justify-between items-center mb-8">
                        <button onClick={()=>setView('DASHBOARD')} className="text-slate-500 text-[10px] font-black uppercase tracking-widest">← Back</button>
                        <button onClick={()=>saveToCloud(ship)} className="bg-emerald-600 px-6 py-3 rounded-2xl text-[10px] font-black uppercase shadow-xl">Finalize & Sync</button>
                    </div>
                    <div className="glass p-10 rounded-[50px] border-l-8 border-red-600 text-center mb-10"><h2 className="brand text-2xl font-black uppercase tracking-tighter">{ship.name}</h2></div>
                    <div className="space-y-12">
                        {(ship.type === "Tanker" ? ["Deck", "Engine Room", "Pump Room", "Chimney", "Accommodation"] : ["Deck", "Engine Room", "Garage", "Chimney", "Accommodation"]).map(loc => {
                            const d = (ship.data && ship.data[loc]) || { observations: [] };
                            return (
                                <div key={loc} className="glass p-6 rounded-[40px] border border-white/5 space-y-4">
                                    <div className="flex justify-between items-center"><h4 className="text-[12px] font-black uppercase text-red-500">{loc}</h4><button onClick={()=>{
                                        const newObs = { id: Date.now(), text: '', status: 'ok', trades: [], custom: '' };
                                        setProjects(projects.map(p=>p.id===ship.id?{...p, data:{...p.data,[loc]:{observations:[...(p.data[loc]?.observations||[]), newObs]}}}:p));
                                    }} className="bg-slate-800 px-3 py-1.5 rounded-lg text-[9px] font-black border border-white/10">+ New Log</button></div>
                                    {d.observations.map(o => (
                                        <div key={o.id} className="bg-slate-900/50 p-6 rounded-3xl space-y-4 border border-white/5">
                                            <div className="flex flex-wrap gap-2">{TRADES.map(t => (
                                                <button key={t} onClick={()=>{
                                                    const newT = o.trades.includes(t) ? o.trades.filter(x=>x!==t) : [...o.trades, t];
                                                    setProjects(projects.map(p=>p.id===ship.id?{...p, data:{...p.data,[loc]:{observations:p.data[loc].observations.map(x=>x.id===o.id?{...x, trades:newT}:x)}}}:p));
                                                }} className={`px-2 py-1 rounded-md text-[10px] font-black ${o.trades.includes(t) ? 'specialty-active' : 'bg-slate-950 text-slate-600'}`}>{t}</button>
                                            ))}</div>
                                            <input className="w-full p-3 rounded-xl text-[10px] font-bold" placeholder="Άλλη Εργασία / Συνεργείο..." value={o.custom} onChange={(e)=>setProjects(projects.map(p=>p.id===ship.id?{...p, data:{...p.data,[loc]:{observations:p.data[loc].observations.map(x=>x.id===o.id?{...x, custom:e.target.value}:x)}}}:p))} />
                                            <div className="grid grid-cols-4 gap-1.5">{['ok','wait','block','na'].map(st => (
                                                <button key={st} onClick={()=>{
                                                    setProjects(projects.map(p=>p.id===ship.id?{...p, data:{...p.data,[loc]:{observations:p.data[loc].observations.map(x=>x.id===o.id?{...x, status:st}:x)}}}:p));
                                                }} className={`p-2.5 rounded-xl text-[8px] font-black uppercase transition-all ${o.status===st?`active-${st}`:'bg-slate-800 opacity-40'}`}>{st}</button>
                                            ))}</div>
                                            <textarea className="p-4 rounded-2xl text-xs h-24" placeholder="Findings..." value={o.text} onChange={(e)=>{
                                                setProjects(projects.map(p=>p.id===ship.id?{...p, data:{...p.data,[loc]:{observations:p.data[loc].observations.map(x=>x.id===o.id?{...x, text:e.target.value}:x)}}}:p));
                                            }} />
                                            <button onClick={()=>document.getElementById(`c-${o.id}`).click()} className="w-full bg-slate-900 p-3 rounded-xl border border-white/10 text-[10px] font-black uppercase"><i className="fa-solid fa-camera text-red-500 mr-2"></i> Evidence Photo</button>
                                            <input type="file" id={`c-${o.id}`} capture="camera" className="hidden" />
                                        </div>
                                    ))}
                                </div>
                            );
                        })}
                    </div>
                    <button onClick={()=>{setProjects(projects.map(p=>p.id===ship.id?{...p, signedToday:!p.signedToday}:p)); setView('DASHBOARD');}} className={`w-full p-6 rounded-[35px] font-black uppercase text-xs shadow-xl mt-10 ${ship.signedToday ? 'bg-emerald-600' : 'bg-red-600'}`}>{ship.signedToday ? 'VERIFIED ✓' : 'SIGN-OFF'}</button>
                </div>
            );

            if (view === 'TASKS') return (
                <div className="max-w-xl mx-auto p-5 pb-32 animate-fadeIn">
                    <button onClick={()=>setView('DASHBOARD')} className="text-slate-500 text-[10px] font-black uppercase mb-8">← Back</button>
                    <h2 className="brand text-xl uppercase italic mb-8 text-red-500">Hazard Registry</h2>
                    {allTasks.length === 0 ? <div className="glass p-20 rounded-[50px] text-center opacity-30 italic">Fleet Clear.</div> : 
                        allTasks.map((t, i) => (
                            <div key={i} className="glass p-6 rounded-[35px] border-l-4 border-amber-500 mb-4"><p className="text-[8px] font-black text-amber-500 uppercase">{t.ship} • {t.loc}</p><p className="text-[13px] text-slate-200 mt-2 italic">"{t.text}"</p></div>
                        ))
                    }
                </div>
            );

            return (
                <footer className="fixed bottom-0 left-0 right-0 p-6 glass border-t border-slate-800 flex justify-around bg-[#020617] z-50">
                    <button onClick={()=>setView('DASHBOARD')} className={`flex flex-col items-center gap-1 ${view==='DASHBOARD'?'text-red-500':'text-slate-600'}`}><i className="fa-solid fa-anchor text-xl"></i><span className="text-[8px] font-bold">FLEET</span></button>
                    <button onClick={()=>setView('TASKS')} className={`flex flex-col items-center gap-1 ${view==='TASKS'?'text-red-500':'text-slate-600'}`}><i className="fa-solid fa-list-check text-xl"></i><span className="text-[8px] font-bold uppercase">Tasks ({allTasks.length})</span></button>
                    <a href="index.html" className="flex flex-col items-center gap-1 text-slate-600"><i className="fa-solid fa-house-user text-xl"></i><span className="text-[8px] font-bold">EXIT</span></a>
                </footer>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script></body></html>
