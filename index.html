<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTG COMMAND | V54 REALIST</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        #cy { width: 100%; height: 400px; background: rgba(0,0,0,0.4); border-radius: 40px; }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        function App() {
            const [view, setView] = useState('HUB'); // HUB, LEGAL, COSTS
            
            useEffect(() => {
                if (view === 'LEGAL') {
                    const cy = cytoscape({
                        container: document.getElementById('cy'),
                        elements: [
                            { data: { id: 'bally', label: 'Ballycor Carriers SA (Owner)', type: 'CO' } },
                            { data: { id: 'nafto', label: 'Naftotrade (Beneficial Owner)', type: 'CO' } },
                            { data: { id: 'ciramar', label: 'Ciramar (Custodian)', type: 'SY' } },
                            { data: { id: 'damen', label: 'Damen/Song Cam (Vietnam)', type: 'LOC' } },
                            { data: { source: 'bally', target: 'nafto', label: 'Relationship' } },
                            { data: { source: 'ciramar', target: 'bally', label: 'Asset Loss' } },
                            { data: { source: 'damen', target: 'bally', label: 'Current Pos' } }
                        ],
                        style: [
                            { selector: 'node', style: { 'label': 'data(label)', 'color': '#fff', 'background-color': '#1e293b', 'font-size': '10px', 'text-valign': 'center' } },
                            { selector: 'node[type="LOC"]', style: { 'background-color': '#ef4444', 'width': 60, 'height': 60 } },
                            { selector: 'edge', style: { 'width': 2, 'line-color': '#334155', 'target-arrow-shape': 'triangle', 'curve-style': 'bezier' } }
                        ], layout: { name: 'cose' }
                    });
                }
            }, [view]);

            if (view === 'LEGAL') return (
                <div className="max-w-xl mx-auto p-5 py-12 animate-fadeIn">
                    <button onClick={()=>setView('HUB')} className="bg-slate-800 px-6 py-3 rounded-2xl text-[10px] font-black uppercase mb-10">← Back</button>
                    <h2 className="brand text-red-500 text-xl uppercase italic mb-8">PSC Action: Hai Phong</h2>
                    <div id="cy" className="glass mb-8 border border-red-500/10 shadow-2xl"></div>
                    
                    <div className="glass p-8 rounded-[40px] border-l-8 border-red-600 space-y-4">
                        <h4 className="brand text-sm uppercase">Draft Report: Port Authority</h4>
                        <p className="text-[10px] text-slate-400 leading-relaxed italic">
                            "Subject: Urgent Port State Control Risk - IMO 7355349.<br/>
                            Vessel is currently STATELESS, lacks Class and P&I Insurance. Under UNCLOS/SOLAS, this vessel constitutes an immediate environmental and safety risk to Hai Phong Port..."
                        </p>
                        <button className="w-full bg-red-600 py-4 rounded-2xl text-[10px] font-black uppercase shadow-xl mt-4">Copy UNCLOS/SOLAS Draft</button>
                    </div>
                </div>
            );

            if (view === 'COSTS') return (
                <div className="max-w-xl mx-auto p-5 py-12 animate-fadeIn">
                    <button onClick={()=>setView('HUB')} className="bg-slate-800 px-6 py-3 rounded-2xl text-[10px] font-black uppercase mb-10">← Back</button>
                    <h2 className="brand text-blue-400 text-xl uppercase italic mb-8">Project Costing Log</h2>
                    <div className="space-y-4">
                        {['Legal Fees', 'Surveillance', 'Inspection Costs'].map(c => (
                            <div key={c} className="glass p-6 rounded-3xl flex justify-between items-center border border-white/5">
                                <span className="text-xs font-bold uppercase">{c}</span>
                                <span className="text-blue-400 font-black">€0.00</span>
                            </div>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className="max-w-xl mx-auto p-5 py-12 animate-fadeIn text-center">
                    <h1 className="brand text-blue-500 text-3xl font-black italic uppercase mb-16 tracking-widest">NTG HUB V54</h1>
                    <div className="grid grid-cols-1 gap-6">
                        <div onClick={()=>setView('LEGAL')} className="glass p-10 rounded-[50px] border border-red-500/20 cursor-pointer active:scale-95 transition-all shadow-2xl flex items-center gap-8">
                            <div className="w-16 h-16 rounded-2xl bg-red-600/10 flex items-center justify-center text-red-500 text-3xl"><i className="fa-solid fa-gavel"></i></div>
                            <div className="text-left"><h2 className="brand text-sm text-red-500 uppercase italic">PSC Strategy</h2><p className="text-[10px] text-slate-500 font-bold uppercase mt-1">UNCLOS/SOLAS Action</p></div>
                        </div>
                        <div onClick={()=>setView('COSTS')} className="glass p-10 rounded-[50px] border border-blue-500/20 cursor-pointer active:scale-95 transition-all shadow-2xl flex items-center gap-8">
                            <div className="w-16 h-16 rounded-2xl bg-blue-600/10 flex items-center justify-center text-blue-400 text-3xl"><i className="fa-solid fa-euro-sign"></i></div>
                            <div className="text-left"><h2 className="brand text-sm text-blue-400 uppercase italic">Project Costs</h2><p className="text-[10px] text-slate-500 font-bold uppercase mt-1">Legal & Inspections</p></div>
                        </div>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script></body></html>
