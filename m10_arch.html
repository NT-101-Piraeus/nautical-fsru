<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M10: Supreme Auditor v3.86</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #020617; color: white; font-family: 'Orbitron', sans-serif; font-style: italic; font-weight: bold; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .matrix-blink { animation: matrix-alert 1.5s infinite; }
        @keyframes matrix-alert { 0% { border-color: #ef4444; box-shadow: 0 0 5px #ef4444; } 50% { border-color: #450a0a; box-shadow: 0 0 20px #ef4444; } 100% { border-color: #ef4444; box-shadow: 0 0 5px #ef4444; } }
        .log-entry { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body><div id="root"></div><script type="text/babel">
const { useState, useEffect } = React;

const SupremeAuditor = () => {
    const [isLocked, setIsLocked] = useState(true);
    const [pin, setPin] = useState('');
    const [selectedDiv, setSelectedDiv] = useState('M2');
    const [logs, setLogs] = useState([]);

    const divisions = ['M1', 'M2', 'M3', 'M4', 'M5', 'M6', 'M7', 'M8', 'M9', 'M10', 'M11', 'M12', 'M13'];

    const fetchLogs = () => {
        const vaultKey = `ntg_${selectedDiv}_logs`;
        const data = JSON.parse(localStorage.getItem(vaultKey) || '[]');
        setLogs(data.reverse()); // Latest logs on top
    };

    useEffect(() => { if (!isLocked) fetchLogs(); }, [isLocked, selectedDiv]);

    const handleLogin = () => {
        if (pin === '1234') { setIsLocked(false); } 
        else { alert("ACCESS DENIED // INCORRECT BIOMETRICS"); setPin(''); }
    };

    if (isLocked) return (
        <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950 font-black italic">
            <div className="glass w-full max-w-sm p-10 rounded-[3rem] border-indigo-500/30 text-center shadow-2xl">
                <i className="fa-solid fa-user-secret text-5xl text-indigo-500 mb-8 animate-pulse"></i>
                <h2 className="text-[10px] uppercase tracking-[0.3em] mb-8 text-slate-500 font-black italic">M10 Auditor Gate</h2>
                <input type="password" placeholder="ADMIN PIN" value={pin} onChange={(e)=>setPin(e.target.value)} 
                       className="w-full bg-black/50 p-6 rounded-2xl text-center text-3xl tracking-[1.2rem] outline-none border border-white/10 mb-8 text-indigo-500" />
                <button onClick={handleLogin} className="w-full bg-indigo-600 hover:bg-indigo-500 p-6 rounded-3xl text-[10px] uppercase font-black italic shadow-indigo-900/50 shadow-xl active:scale-95 transition-all">Establish Forensic Uplink</button>
            </div>
        </div>
    );

    return (
        <div className="min-h-screen p-6 animate-fade bg-slate-950 italic font-bold">
            {/* TOP BAR */}
            <div className="flex justify-between items-center mb-8 border-b border-white/5 pb-4">
                <a href="index.html" className="text-[10px] underline text-indigo-400 font-black italic tracking-widest uppercase">← EXIT CONTROL</a>
                <div className="text-right">
                    <span className="text-[10px] text-white uppercase font-black">DIRECTOR MODE</span>
                    <span className="text-[8px] text-indigo-500 uppercase block tracking-widest matrix-blink">Live Data Feed</span>
                </div>
            </div>

            {/* VAULT SELECTOR */}
            <div className="grid grid-cols-5 gap-2 mb-10 overflow-x-auto pb-2">
                {divisions.map(d => (
                    <button key={d} onClick={() => setSelectedDiv(d)} 
                            className={`p-3 rounded-xl text-[8px] border transition-all ${selectedDiv === d ? 'bg-indigo-600 border-indigo-400 text-white shadow-lg' : 'glass border-white/5 text-slate-600'}`}>
                        {d}
                    </button>
                ))}
            </div>

            <div className="flex justify-between items-end mb-6 px-2">
                <div>
                    <h2 className="text-xl text-white font-black italic tracking-tighter uppercase">{selectedDiv} AUDIT TRAIL</h2>
                    <p className="text-[8px] text-slate-500 uppercase italic">Parsing Encrypted Vault: ntg_{selectedDiv}_logs</p>
                </div>
                <button onClick={() => { if(confirm("PURGE VAULT?")) {localStorage.setItem(`ntg_${selectedDiv}_logs`, '[]'); fetchLogs();} }} 
                        className="text-[8px] text-red-600 font-black uppercase underline decoration-red-900">Purge Vault</button>
            </div>

            {/* MATRIX LOG DISPLAY */}
            <div className="space-y-4 mb-24 min-h-[50vh]">
                {logs.length === 0 ? (
                    <div className="text-center py-20 opacity-20 border-2 border-dashed border-white/5 rounded-[3rem]">
                        <i className="fa-solid fa-database text-4xl mb-4"></i>
                        <p className="text-[10px] uppercase font-black tracking-widest">No Telemetry Recorded in this Division.</p>
                    </div>
                ) : (
                    logs.map((log, i) => (
                        <div key={i} className={`glass p-5 rounded-3xl border-l-4 log-entry transition-all hover:bg-white/5 ${log.type === 'ERROR' ? 'border-red-600 matrix-blink' : log.type === 'ACTION' ? 'border-emerald-500' : 'border-indigo-600'}`}>
                            <div className="flex justify-between text-[7px] mb-2 font-mono opacity-50 uppercase tracking-[0.2em]">
                                <span>TYPE: {log.type}</span>
                                <span>{new Date(log.ts).toLocaleString('en-GB')}</span>
                            </div>
                            <p className={`text-[11px] font-black uppercase italic tracking-tight ${log.type === 'ERROR' ? 'text-red-500' : log.type === 'ACTION' ? 'text-emerald-400' : 'text-indigo-400'}`}>
                                >> {log.action}
                            </p>
                            <div className="text-[9px] text-slate-400 mt-2 font-mono border-t border-white/5 pt-2 leading-relaxed opacity-80">
                                DATA: {typeof log.details === 'object' ? JSON.stringify(log.details) : log.details}
                            </div>
                        </div>
                    ))
                )}
            </div>

            <div className="fixed bottom-0 left-0 right-0 p-4 bg-slate-950/90 backdrop-blur-lg border-t border-white/5 text-center">
                <p className="text-[7px] text-slate-600 uppercase tracking-[0.6em] italic font-black">Nautical OS v3.86 // Chain of Custody Verified</p>
            </div>
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<SupremeAuditor />);
</script></body></html>
