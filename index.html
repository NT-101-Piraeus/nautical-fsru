<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTG | COMMAND CENTER V12.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .brand-font { font-family: 'Orbitron', sans-serif; letter-spacing: 1px; }
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .glow-red { box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); }
        .glow-blue { box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); border: 1px solid rgba(59, 130, 246, 0.4); }
        .scan-line { width: 100%; height: 1px; background: rgba(59, 130, 246, 0.4); position: absolute; animation: moveScan 3s infinite linear; }
        @keyframes moveScan { 0% { top: 0; } 100% { top: 100%; } }
    </style></head><body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('intel'); 
            const [isAddingProject, setIsAddingProject] = useState(false);
            const [activeProject, setActiveProject] = useState(null);
            const [projects, setProjects] = useState([
                { id: 101, name: "MT FELIX", services: ["Safety Division", "UTM: Hull Gauging"], date: "22/03/2026" }
            ]);

            const handleLaunch = (name, selectedServices) => {
                if(!name) { alert("Παρακαλώ δώστε όνομα πλοίου"); return; }
                const newProject = { id: Date.now(), name, services: selectedServices, date: new Date().toLocaleDateString() };
                setProjects([newProject, ...projects]);
                setActiveProject(newProject);
                setIsAddingProject(false);
            };

            return (
                <div className="min-h-screen flex flex-col pb-24">
                    <header className="p-5 border-b border-slate-800 glass sticky top-0 z-[100]">
                        <div className="max-w-xl mx-auto flex justify-between items-center">
                            <div>
                                <h1 className="brand-font text-blue-500 text-lg font-black leading-none uppercase">NTG GROUP</h1>
                                <p className="text-[8px] font-bold text-slate-500 tracking-[0.4em] uppercase mt-1 italic">Intel Division System</p>
                            </div>
                            <div className="flex items-center gap-2">
                                <span className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_8px_#10b981]"></span>
                                <span className="text-[9px] font-black uppercase text-slate-400 tracking-tighter">Node Secure</span>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 p-5 max-w-xl mx-auto w-full">
                        {activeProject ? (
                            <ProjectDashboard project={activeProject} onExit={() => setActiveProject(null)} />
                        ) : (
                            <>
                                {activeTab === 'intel' && <IntelTab />}
                                {activeTab === 'projects' && <ProjectsTab projects={projects} isAdding={isAddingProject} setIsAdding={setIsAddingProject} onLaunch={handleLaunch} onSelect={setActiveProject} />}
                                {activeTab === 'tools' && <ToolsTab />}
                                {activeTab === 'business' && <BusinessTab />}
                            </>
                        )}
                    </main>

                    {!activeProject && (
                        <nav className="fixed bottom-0 left-0 right-0 glass border-t border-slate-800 flex justify-around p-4 z-[100]">
                            <NavButton active={activeTab==='intel'} icon="fa-tower-broadcast" label="Intel" onClick={()=>setActiveTab('intel')} />
                            <NavButton active={activeTab==='projects'} icon="fa-folder-tree" label="Projects" onClick={()=>setActiveTab('projects')} />
                            <NavButton active={activeTab==='tools'} icon="fa-toolbox" label="Tools" onClick={()=>setActiveTab('tools')} />
                            <NavButton active={activeTab==='business'} icon="fa-crown" label="Mykonos" onClick={()=>setActiveTab('business')} />
                        </nav>
                    )}
                </div>
            );
        }

        // --- 1. INTEL TAB (Legal Cases) ---
        function IntelTab() {
            return (
                <div className="space-y-6 animate-fadeIn">
                    <h2 className="brand-font text-blue-500 text-xs border-l-4 border-blue-600 pl-3">ACTIVE LEGAL CASES</h2>
                    
                    <div className="bg-slate-900/80 rounded-3xl p-6 glow-blue relative overflow-hidden">
                        <div className="scan-line"></div>
                        <h3 className="brand-font text-xs font-black text-blue-400 uppercase mb-3 italic">Case A: Naftocement IV</h3>
                        <p className="text-[11px] text-slate-400 leading-relaxed mb-4">
                            Asset Trailing: Monitoring Vietnam Registries. Εντοπισμός ύποπτων ιχνηλατήσεων AIS στην περιοχή του Βιετνάμ.
                        </p>
                        <button className="w-full bg-blue-900/30 py-2 rounded-xl text-[9px] font-black uppercase border border-blue-500/30">Download AIS Evidence</button>
                    </div>

                    <div className="bg-slate-900/80 rounded-3xl p-6 glow-red">
                        <h3 className="brand-font text-xs font-black text-red-500 uppercase mb-3 italic">Case B: Terme Shipyard (40M)</h3>
                        <div className="space-y-3">
                            {['Tugrul Karaca', 'Emir Ozturk', 'Erkan Zorlu'].map(name => (
                                <div key={name} className="flex justify-between items-center bg-black/40 p-3 rounded-xl border border-red-900/20">
                                    <span className="text-xs font-bold text-slate-300">{name}</span>
                                    <span className="text-[8px] font-black text-red-500 uppercase tracking-widest animate-pulse">Monitoring Assets</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // --- 2. PROJECTS TAB (Full Launch Activation) ---
        function ProjectsTab({ projects, isAdding, setIsAdding, onLaunch, onSelect }) {
            const [name, setName] = useState('');
            const [sel, setSel] = useState([]);
            const services = ["Safety Division: Π.Δ. 70/90", "UTM: Hull Gauging", "Load Test ε1: Cargo Gear", "Load Test ε2: Means of Access", "Load Test ε3: Winches BHC", "Load Test ε4: Ramps/Stoppers", "Load Test ε5: Bollard Pull"];

            const toggle = (s) => setSel(p => p.includes(s) ? p.filter(i => i !== s) : [...p, s]);

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="brand-font text-blue-500 text-xs border-l-4 border-blue-600 pl-3 uppercase italic tracking-widest">Active Projects</h2>
                        {!isAdding && <button onClick={() => setIsAdding(true)} className="w-10 h-10 bg-emerald-600 rounded-full flex items-center justify-center text-white shadow-lg active:scale-90 transition-all"><i className="fa-solid fa-plus"></i></button>}
                    </div>
                    {isAdding ? (
                        <div className="bg-slate-900 p-6 rounded-3xl border border-slate-800 space-y-4 animate-slideIn">
                            <input className="w-full bg-slate-800 p-4 rounded-2xl text-sm border border-slate-700 outline-none focus:border-emerald-500" placeholder="Ship Name (e.g. MT FELIX)" value={name} onChange={(e)=>setName(e.target.value)} />
                            <div className="space-y-2 max-h-64 overflow-y-auto pr-2">
                                {services.map(s => (
                                    <label key={s} className="flex items-center gap-3 bg-slate-800/50 p-4 rounded-2xl cursor-pointer hover:bg-slate-800 transition-colors">
                                        <input type="checkbox" checked={sel.includes(s)} onChange={()=>toggle(s)} className="w-4 h-4 accent-emerald-500" />
                                        <span className="text-xs font-bold text-slate-300">{s}</span>
                                    </label>
                                ))}
                            </div>
                            <button onClick={()=>onLaunch(name, sel)} className="w-full bg-emerald-600 py-4 rounded-2xl font-black uppercase text-[10px] tracking-[0.2em] shadow-xl active:scale-95 transition-all">Launch Project Hub</button>
                        </div>
                    ) : (
                        <div className="space-y-3">
                            {projects.map(p => (
                                <div key={p.id} onClick={() => onSelect(p)} className="bg-slate-900 p-5 rounded-3xl border border-slate-800 flex justify-between items-center cursor-pointer hover:border-blue-500/50 transition-all active:scale-95">
                                    <div><h4 className="font-bold text-sm text-slate-200">{p.name}</h4><p className="text-[9px] text-slate-500 uppercase font-black mt-1">{p.services.length} Services • {p.date}</p></div>
                                    <i className="fa-solid fa-chevron-right text-slate-700"></i>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        // --- 3. PROJECT DASHBOARD (The Next Step) ---
        function ProjectDashboard({ project, onExit }) {
            return (
                <div className="space-y-6 animate-fadeIn">
                    <button onClick={onExit} className="text-slate-500 text-xs flex items-center gap-2 brand-font uppercase tracking-widest"><i className="fa-solid fa-chevron-left text-[10px]"></i> Close Hub</button>
                    <div className="bg-slate-900 p-6 rounded-3xl border-2 border-emerald-500/20 glow-blue">
                        <h2 className="brand-font text-blue-400 text-lg mb-1">{project.name}</h2>
                        <p className="text-[10px] text-slate-500 uppercase font-black mb-4">Command Center / Active Project</p>
                        <div className="flex flex-wrap gap-2">
                            {project.services.map(s => <span key={s} className="text-[8px] bg-emerald-900/30 text-emerald-400 px-2 py-1 rounded-lg border border-emerald-500/20 font-black uppercase">{s}</span>)}
                        </div>
                    </div>
                    <div className="grid grid-cols-1 gap-3">
                        <ActionButton icon="fa-file-signature" label="Daily Progress Report" color="bg-blue-600" />
                        <ActionButton icon="fa-shield-halved" label="Safety Risk Assessment" color="bg-red-700" />
                        <ActionButton icon="fa-camera" label="Capture Site Photo" color="bg-slate-800" />
                        <ActionButton icon="fa-file-export" label="Generate Final Report" color="bg-emerald-600" />
                    </div>
                </div>
            );
        }

        // --- 4. SMART TOOLS (Restored) ---
        function ToolsTab() {
            const tools = [
                { icon: 'fa-thermometer-half', label: 'F ↔ C', sub: 'Temperature' },
                { icon: 'fa-ruler-horizontal', label: 'IN ↔ MM', sub: 'Thickness' },
                { icon: 'fa-weight-hanging', label: 'IRON CALC', sub: 'Steel Weight' },
                { icon: 'fa-map-location-dot', label: 'SEA DIST.', sub: 'Port Distance' },
                { icon: 'fa-coins', label: 'FX RATES', sub: 'Live Currency' },
                { icon: 'fa-box-open', label: 'INVENTORY', sub: 'Calibration' }
            ];
            return (
                <div className="space-y-6 animate-fadeIn">
                    <h2 className="brand-font text-blue-500 text-xs border-l-4 border-blue-600 pl-3 uppercase">Smart Toolbox</h2>
                    <div className="grid grid-cols-2 gap-4">
                        {tools.map(t => (
                            <div key={t.label} className="bg-slate-900/50 border border-slate-800 p-6 rounded-3xl flex flex-col items-center text-center shadow-lg active:scale-95 transition-all">
                                <i className={`fa-solid ${t.icon} text-blue-500 text-xl mb-3`}></i>
                                <span className="text-[10px] font-black uppercase tracking-widest">{t.label}</span>
                                <span className="text-[8px] text-slate-600 uppercase mt-1 font-bold">{t.sub}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function BusinessTab() {
            return (
                <div className="space-y-6 animate-fadeIn">
                    <h2 className="brand-font text-yellow-600 text-xs border-l-4 border-yellow-600 pl-3 uppercase italic tracking-widest">Luxury Estate Management</h2>
                    <div className="bg-black/40 border border-yellow-600/30 p-8 rounded-[40px] text-center">
                        <i className="fa-solid fa-crown text-yellow-600 text-3xl mb-4"></i>
                        <h3 className="brand-font text-white text-xs mb-2">LIVE IN MYKONOS</h3>
                        <p className="text-[10px] text-slate-500 italic uppercase">Premium Concierge & Yield Hub Active</p>
                    </div>
                </div>
            );
        }

        // --- HELPERS ---
        function NavButton({ active, icon, label, onClick }) {
            return (
                <button onClick={onClick} className={`flex flex-col items-center gap-1 transition-all ${active ? 'text-blue-500 scale-110' : 'text-slate-600 opacity-50'}`}>
                    <i className={`fa-solid ${icon} text-lg`}></i>
                    <span className="text-[8px] font-black uppercase tracking-widest">{label}</span>
                </button>
            );
        }

        function ActionButton({ icon, label, color }) {
            return (
                <button className={`${color} p-5 rounded-2xl flex justify-between items-center border border-white/5 active:scale-95 transition-all shadow-xl`}>
                    <span className="text-xs font-black uppercase tracking-widest">{label}</span>
                    <i className={`fa-solid ${icon} text-sm opacity-80`}></i>
                </button>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script></body></html>
