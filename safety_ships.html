<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NTG | SAFESHIP MANAGER V16.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; touch-action: manipulation; }
        .brand { font-family: 'Orbitron', sans-serif; color: #ef4444; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .safe-card { border-radius: 40px; border: 1px solid rgba(255,255,255,0.03); transition: all 0.2s; }
        .safe-card:active { transform: scale(0.96); background: rgba(239, 68, 68, 0.05); }
        .btn-red { background: #dc2626; box-shadow: 0 10px 20px rgba(220, 38, 38, 0.2); }
        input, textarea { background: rgba(15, 23, 42, 0.6) !important; border: 1px solid rgba(255,255,255,0.1) !important; }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // CONFIGURATION: SUPABASE LINKED
        const SUPABASE_URL = "https://omdarjncczohpffwunfy.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_V-nfUDy5MxEG4SlXkisFBg_GBlD_4Y9"; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const PD_CATEGORIES = [
            "1. Καθαρισμοί & Gas-Free",
            "2. Θερμές Εργασίες (Hot Works)",
            "3. Ελασματουργικές / Σωληνουργικές",
            "4. Μηχανολογικές Εργασίες",
            "5. Επιφανειακή Επεξεργασία",
            "6. Ηλεκτρολογικές Εργασίες",
            "7. Βοηθητικές / Σκαλωσιά"
        ];

        function SafeShipApp() {
            const [view, setView] = useState('list'); // list, new, scope, daily
            const [projects, setProjects] = useState([]);
            const [activeId, setActiveId] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => { syncData(); }, []);

            async function syncData() {
                const { data } = await _supabase.from('ntg_projects').select('*').order('created_at', { ascending: false });
                if (data) setProjects(data);
                setLoading(false);
            }

            const activeP = projects.find(p => p.id === activeId);

            const handleCreate = async (e) => {
                e.preventDefault();
                const newShip = { name: e.target.ship.value.toUpperCase(), scope: [], created_at: new Date() };
                const { data, error } = await _supabase.from('ntg_projects').insert([newShip]).select();
                if (data) { setProjects([data[0], ...projects]); setActiveId(data[0].id); setView('scope'); }
            };

            const toggleScope = async (cat) => {
                const newScope = activeP.scope.includes(cat) 
                    ? activeP.scope.filter(c => c !== cat) 
                    : [...activeP.scope, cat];
                
                const { error } = await _supabase.from('ntg_projects').update({ scope: newScope }).eq('id', activeId);
                if (!error) syncData();
            };

            if (loading) return <div className="h-screen flex items-center justify-center brand animate-pulse">Initializing System...</div>;

            return (
                <div className="max-w-xl mx-auto p-5 pb-32">
                    <header className="flex justify-between items-center py-6 mb-8">
                        <div>
                            <h1 className="brand text-sm font-black italic tracking-tighter">SafeShip Manager</h1>
                            <p className="text-[8px] text-slate-500 font-bold uppercase tracking-[0.4em]">PD 70/90 UNIT</p>
                        </div>
                        <a href="index.html" className="text-slate-600 text-xl hover:text-white"><i className="fa-solid fa-house-user"></i></a>
                    </header>

                    {view === 'list' && (
                        <div className="space-y-4 animate-fadeIn">
                            <button onClick={() => setView('new')} className="w-full btn-red p-6 rounded-[35px] font-black text-xs uppercase tracking-widest shadow-2xl active:scale-95 transition-all">+ Launch New Supervision</button>
                            {projects.map(p => (
                                <div key={p.id} onClick={() => { setActiveId(p.id); setView('daily'); }} className="glass p-6 safe-card flex justify-between items-center">
                                    <div>
                                        <h3 className="font-bold text-white uppercase text-sm">{p.name}</h3>
                                        <p className="text-[9px] text-slate-500 font-bold uppercase mt-1">{p.scope?.length || 0} Categories Active</p>
                                    </div>
                                    <i className="fa-solid fa-chevron-right text-slate-800"></i>
                                </div>
                            ))}
                        </div>
                    )}

                    {view === 'new' && (
                        <form onSubmit={handleCreate} className="space-y-6 animate-fadeIn">
                            <button onClick={() => setView('list')} className="text-slate-500 text-[10px] font-black uppercase">← Back</button>
                            <h2 className="brand text-lg uppercase italic">Project Identity</h2>
                            <input name="ship" required className="w-full p-6 rounded-3xl outline-none font-bold text-xl uppercase tracking-tighter" placeholder="Ship Name / IMO" />
                            <button className="w-full btn-red p-6 rounded-3xl font-black uppercase">Create & Define Scope</button>
                        </form>
                    )}

                    {view === 'scope' && activeP && (
                        <div className="space-y-6 animate-fadeIn">
                            <h2 className="brand text-sm text-red-500 uppercase italic">Select Work Scope: {activeP.name}</h2>
                            <div className="space-y-3">
                                {PD_CATEGORIES.map(cat => (
                                    <div key={cat} onClick={() => toggleScope(cat)} className={`glass p-5 rounded-[30px] flex justify-between items-center safe-card border-2 ${activeP.scope.includes(cat) ? 'border-red-600 bg-red-600/10' : 'border-transparent'}`}>
                                        <span className={`text-[11px] font-bold ${activeP.scope.includes(cat) ? 'text-white' : 'text-slate-500'}`}>{cat}</span>
                                        <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center ${activeP.scope.includes(cat) ? 'bg-red-600 border-red-600' : 'border-slate-800'}`}>
                                            {activeP.scope.includes(cat) && <i className="fa-solid fa-check text-[10px]"></i>}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <button onClick={() => setView('daily')} className="w-full bg-emerald-600 p-6 rounded-[35px] font-black uppercase text-xs tracking-widest mt-4">Confirm Scope & Open Log</button>
                        </div>
                    )}

                    {view === 'daily' && activeP && (
                        <div className="space-y-6 animate-fadeIn">
                            <div className="flex justify-between items-center">
                                <button onClick={() => setView('list')} className="text-slate-500 text-[10px] font-black uppercase">← Ship Fleet</button>
                                <button onClick={() => setView('scope')} className="text-blue-500 text-[10px] font-black uppercase">Edit Scope</button>
                            </div>
                            <div className="glass p-8 rounded-[40px] border-l-4 border-l-red-600">
                                <h2 className="brand text-2xl font-black uppercase tracking-tighter">{activeP.name}</h2>
                                <p className="text-[10px] text-red-500 font-bold uppercase mt-1">Daily Supervision Hub</p>
                            </div>

                            <div className="space-y-4">
                                <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">Active Inspection Categories</h3>
                                {activeP.scope.map(cat => (
                                    <div key={cat} className="glass p-6 rounded-[35px] border border-white/5">
                                        <h4 className="text-[11px] font-black text-white uppercase mb-4">{cat}</h4>
                                        <textarea className="w-full p-4 rounded-2xl text-[11px] h-24 outline-none focus:ring-1 ring-red-500 text-slate-300" placeholder="Notes for today..."></textarea>
                                        <div className="flex gap-2 mt-4">
                                            <button className="flex-1 bg-slate-800 p-4 rounded-2xl text-[10px] font-black uppercase"><i className="fa-solid fa-camera mr-2 text-red-500"></i> Evidence</button>
                                            <button className="flex-1 bg-slate-800 p-4 rounded-2xl text-[10px] font-black uppercase"><i className="fa-solid fa-microphone mr-2 text-blue-500"></i> Voice</button>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <button className="w-full btn-red p-6 rounded-[35px] font-black uppercase text-xs tracking-widest shadow-2xl mt-8">Generate Daily PDF</button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SafeShipApp />);
    </script></body></html>
