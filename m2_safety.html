<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M2: Safety Watch v3.53</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');body{background:#020617;color:white;font-family:'Orbitron',sans-serif;font-style:italic;font-weight:bold;}.glass{background:rgba(15,23,42,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);}</style>
</head>
<body><div id="root"></div><script type="text/babel">
const SafetyApp = () => {
    const [sun, setSun] = React.useState(false);
    const [isLogging, setIsLogging] = React.useState(false);
    const [tasks, setTasks] = React.useState([
        { id: 1, text: "Έλεγχος αερισμού κλειστών χώρων (Π.Δ. 70/90)", done: false },
        { id: 2, text: "Επιθεώρηση σκαλωσιάς & μέσων ατομικής προστασίας", done: false },
        { id: 3, text: "Hot Works Permit - Fire Watch Check", done: false }
    ]);

    const toggleTask = (id) => {
        setTasks(tasks.map(t => t.id === id ? {...t, done: !t.done} : t));
    };

    const theme = sun ? "bg-white text-black" : "bg-slate-950 text-white";
    const card = sun ? "bg-slate-100 border-slate-300 shadow-xl" : "glass border-blue-500/20";

    return (
        <div className={`min-h-screen p-6 transition-all duration-300 ${theme}`}>
            <div className="flex justify-between items-center mb-8">
                <a href="index.html" className={`text-[10px] underline opacity-50 font-black ${sun?'text-black':'text-blue-400'}`}>← BACK TO HUB</a>
                <button onClick={() => setSun(!sun)} className={`p-3 rounded-full border ${sun?'border-slate-300 bg-slate-200 shadow-md':'border-slate-800 bg-slate-900 shadow-inner'}`}>
                    <i className={`fa-solid ${sun?'fa-moon':'fa-sun text-yellow-500'}`}></i>
                </button>
            </div>

            <h1 className="text-blue-600 text-lg uppercase mb-8 text-center italic tracking-tighter">M2: SAFETY WATCH</h1>

            {!isLogging ? (
                <div className={`${card} p-10 rounded-[3rem] text-center shadow-2xl border-b-8 border-blue-600`}>
                    <i className="fa-solid fa-clipboard-check text-5xl mb-6 text-blue-600"></i>
                    <p className="text-[10px] uppercase font-black tracking-widest mb-8">Ready for Compliance Check</p>
                    <button onClick={() => setIsLogging(true)} className="w-full bg-blue-600 text-white p-6 rounded-3xl text-[11px] uppercase font-black shadow-lg active:scale-95 transition-all italic">
                        Start New Daily Log +
                    </button>
                </div>
            ) : (
                <div className="space-y-4 animate-fade">
                    <div className={`${card} p-6 rounded-3xl mb-4 border-l-4 border-blue-600`}>
                        <p className="text-[8px] uppercase tracking-widest text-blue-500 mb-2 font-black italic">Daily Joblist Builder (V3.19)</p>
                        <div className="space-y-3">
                            {tasks.map(t => (
                                <div key={t.id} onClick={() => toggleTask(t.id)} className={`flex items-center gap-4 p-4 rounded-2xl cursor-pointer transition-all ${t.done ? 'bg-emerald-500/20 opacity-100' : 'bg-black/20 opacity-70'}`}>
                                    <i className={`fa-solid ${t.done ? 'fa-square-check text-emerald-500' : 'fa-square text-slate-500'}`}></i>
                                    <span className="text-[10px] uppercase leading-tight font-black">{t.text}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                    <button onClick={() => setIsLogging(false)} className="w-full bg-blue-700 p-5 rounded-2xl text-[10px] uppercase font-black">Submit & Save Log (P.D. 70/90)</button>
                </div>
            )}

            <div className="mt-12 p-4 border-l-2 border-blue-900 opacity-40 italic">
                <p className="text-[7px] uppercase tracking-widest">Legal Integrity: SHA-256 Armed</p>
                <p className="text-[7px] uppercase mt-1 italic font-normal text-blue-400">Compliance: Presidential Decree 70/90</p>
            </div>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<SafetyApp />);
</script></body></html>
