<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTG | COMMAND CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s ease; }
        .card:active { transform: scale(0.95); background: rgba(59, 130, 246, 0.2); }
    </style></head><body>

    <div class="max-w-xl mx-auto p-6 py-12">
        <header className="text-center mb-12">
            <h1 class="brand text-3xl text-blue-500 font-black tracking-tighter uppercase italic text-center">NTG GROUP</h1>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.5em] mt-2 text-center">Digital Ecosystem 2026</p>
        </header>

        <div class="grid grid-cols-1 gap-4 mt-12">
            <a href="intel.html" class="card p-6 rounded-[30px] flex items-center gap-5">
                <i class="fa-solid fa-tower-broadcast text-2xl text-blue-400"></i>
                <div>
                    <h2 class="brand text-sm uppercase">Intel Division</h2>
                    <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Hunter Agent & AIS</p>
                </div>
            </a>

            <a href="safety.html" class="card p-6 rounded-[30px] flex items-center gap-5 border-l-4 border-l-red-600">
                <i class="fa-solid fa-user-shield text-2xl text-red-500"></i>
                <div>
                    <h2 class="brand text-sm uppercase">Safety Officer</h2>
                    <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Π.Δ. 70/90 Compliance</p>
                </div>
            </a>

            <a href="tech.html" class="card p-6 rounded-[30px] flex items-center gap-5 border-l-4 border-l-emerald-600">
                <i class="fa-solid fa-ruler-combined text-2xl text-emerald-500"></i>
                <div>
                    <h2 class="brand text-sm uppercase">Tech Gauging</h2>
                    <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">UTM & Load Test</p>
                </div>
            </a>

            <a href="tools.html" class="card p-6 rounded-[30px] flex items-center gap-5">
                <i class="fa-solid fa-toolbox text-2xl text-amber-500"></i>
                <div>
                    <h2 class="brand text-sm uppercase">Field Tools</h2>
                    <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Calculators & Converters</p>
                </div>
            </a>

            <a href="luxury.html" class="card p-6 rounded-[30px] flex items-center gap-5 border-l-4 border-l-yellow-500">
                <i class="fa-solid fa-crown text-2xl text-yellow-500"></i>
                <div>
                    <h2 class="brand text-sm uppercase">Luxury Hub</h2>
                    <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Mykonos Management</p>
                </div>
            </a>
        </div>
    </div>
</body></html>
