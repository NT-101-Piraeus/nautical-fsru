<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M11: Sensors & Fleet Commander V6.1</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #020617; color: white; font-family: 'Orbitron', sans-serif; font-style: italic; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .sensor-pulse { animation: pulse-blue 2s infinite; }
        @keyframes pulse-blue { 0%, 100% { box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); } 50% { box-shadow: 0 0 5px rgba(59, 130, 246, 0.1); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const SensorHub = () => {
            const [hardwareData, setHardwareData] = useState({ temp: 42, pressure: 1.2, flow: 85 });
            const [osintLeads, setOsintLeads] = useState([
                { id: 1, vessel: 'MT FELIX', status: 'INCOMING', eta: '07:00' },
                { id: 2, vessel: 'BADJI MOKHTAR III', status: 'INCOMING', eta: '11:00' }
            ]);

            return (
                <div className="min-h-screen p-6 bg-slate-950">
                    <header className="glass p-6 rounded-[2.5rem] mb-8 border-blue-500/20 flex justify-between items-center">
                        <div>
                            <h1 className="text-blue-500 font-black uppercase text-lg tracking-tighter italic">M11: Sensor Hub</h1>
                            <p className="text-[8px] font-bold uppercase tracking-[0.3em] opacity-50">Hybrid Intelligence V6.1</p>
                        </div>
                        <a href="index.html" className="p-4 glass rounded-2xl"><i className="fa-solid fa-house"></i></a>
                    </header>

                    {/* SECTION 1: PHYSICAL SENSORS (FSRU DATA) */}
                    <div className="grid grid-cols-2 gap-4 mb-8">
                        <div className="glass p-6 rounded-[2.5rem] border-l-4 border-blue-500 sensor-pulse">
                            <p className="text-[8px] opacity-40 uppercase font-black mb-2">Piping Pressure</p>
                            <h3 className="text-2xl font-black">{hardwareData.pressure} <span className="text-[10px] opacity-50">BAR</span></h3>
                        </div>
                        <div className="glass p-6 rounded-[2.5rem] border-l-4 border-blue-500 sensor-pulse">
                            <p className="text-[8px] opacity-40 uppercase font-black mb-2">System Temp</p>
                            <h3 className="text-2xl font-black">{hardwareData.temp} <span className="text-[10px] opacity-50">°C</span></h3>
                        </div>
                    </div>

                    {/* SECTION 2: OSINT FLEET COMMANDER FEED */}
                    <div className="glass p-6 rounded-[3rem] border-l-4 border-orange-500">
                        <h4 className="text-[10px] font-black uppercase mb-6 tracking-widest text-orange-500 italic">
                            <i className="fa-solid fa-satellite-dish mr-2"></i> Fleet Commander (OSINT Feed)
                        </h4>
                        <div className="space-y-4">
                            {osintLeads.map(lead => (
                                <div key={lead.id} className="bg-white/5 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                                    <div>
                                        <p className="text-xs font-black uppercase">{lead.vessel}</p>
                                        <p className="text-[8px] opacity-50 uppercase tracking-widest">ETA: {lead.eta} | Piraeus Sector</p>
                                    </div>
                                    <span className="text-[8px] bg-orange-600/20 text-orange-500 px-3 py-1 rounded-full font-black animate-pulse">LOCKED</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="fixed bottom-6 left-6 right-6 text-center opacity-30">
                        <p className="text-[8px] font-black uppercase tracking-[0.4em]">M10 Supreme Auditor Protocol Active</p>
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<SensorHub />);
    </script>
</body>
</html>
