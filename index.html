<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NTG COMMAND | V56 X-MERCHANT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; -webkit-tap-highlight-color: transparent; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .merchant-card { border-bottom: 2px solid transparent; transition: all 0.2s; }
        .merchant-card:active { background: rgba(249, 115, 22, 0.1); scale: 0.98; }
        .badge-low { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [view, setView] = useState('HOME');
            const [tab, setTab] = useState('CATALOG'); // CATALOG, ORDERS

            const inventory = [
                { id: 1, name: "Gas Detector GX-2009", cat: "PPE", stock: 2, price: "€420", low: true },
                { id: 2, name: "Oil Filter Marine-X", cat: "MECH", stock: 15, price: "€85", low: false },
                { id: 3, name: "Safety Harness Pro", cat: "PPE", stock: 24, price: "€110", low: false },
                { id: 4, name: "Control Board v4", cat: "ELEC", stock: 1, price: "€1,200", low: true }
            ];

            const orders = [
                { id: "ORD-992", ship: "NAFTOCEMENT IV", status: "IN TRANSIT", date: "23/03" },
                { id: "ORD-990", ship: "BLUE STAR I", status: "DELIVERED", date: "21/03" }
            ];

            return (
                <div className="min-h-screen pb-20">
                    {/* --- HEADER --- */}
                    <header className="glass sticky top-0 z-50 p-4 flex justify-between items-center border-b border-orange-500/20">
                        <div onClick={() => setView('HOME')} className="cursor-pointer">
                            <p className="text-[9px] font-black text-orange-500 tracking-[0.3em]">NTG X-MERCHANT</p>
                            <h1 className="font-bold text-sm uppercase">M. SYKINIOTIS</h1>
                        </div>
                        <i className="fa-solid fa-cart-flatbed text-orange-500"></i>
                    </header>

                    <main className="p-4">
                        {/* --- HOME HUB --- */}
                        {view === 'HOME' && (
                            <div className="grid grid-cols-2 gap-4 animate-in fade-in duration-300">
                                <button onClick={() => setView('M1')} className="glass p-6 rounded-[2rem] opacity-40 flex flex-col items-center gap-2">
                                    <i className="fa-solid fa-shield-halved text-2xl"></i>
                                    <span className="text-[10px] font-black uppercase">Safety</span>
                                </button>
                                <button onClick={() => setView('M6')} className="glass p-6 rounded-[2rem] opacity-40 flex flex-col items-center gap-2">
                                    <i className="fa-solid fa-chart-line text-2xl"></i>
                                    <span className="text-[10px] font-black uppercase">CEO</span>
                                </button>
                                <button onClick={() => setView('M7')} className="glass p-8 rounded-[2.5rem] flex flex-col items-center gap-3 col-span-2 border-b-4 border-orange-500 shadow-[0_10px_30px_rgba(249,115,22,0.1)]">
                                    <i className="fa-solid fa-cart-shopping text-4xl text-orange-500"></i>
                                    <span className="text-xs font-black uppercase tracking-widest">E-shop & Supply Chain</span>
                                </button>
                            </div>
                        )}

                        {/* --- MANUAL 07: MERCHANT HUB --- */}
                        {view === 'M7' && (
                            <div className="space-y-6 animate-in slide-in-from-bottom duration-300">
                                <div className="flex justify-between items-center px-2">
                                    <div className="flex gap-4">
                                        <button onClick={() => setTab('CATALOG')} className={`brand text-xs uppercase italic tracking-widest ${tab === 'CATALOG' ? 'text-orange-500 underline underline-offset-8' : 'text-slate-500'}`}>Catalog</button>
                                        <button onClick={() => setTab('ORDERS')} className={`brand text-xs uppercase italic tracking-widest ${tab === 'ORDERS' ? 'text-orange-500 underline underline-offset-8' : 'text-slate-500'}`}>Orders</button>
                                    </div>
                                    <button onClick={() => setView('HOME')} className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Back</button>
                                </div>

                                {tab === 'CATALOG' ? (
                                    <div className="space-y-4">
                                        <div className="relative">
                                            <input type="text" placeholder="SEARCH PARTS..." className="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl text-xs font-bold focus:border-orange-500 outline-none" />
                                            <i className="fa-solid fa-magnifying-glass absolute right-4 top-4 text-slate-600"></i>
                                        </div>
                                        <div className="grid grid-cols-1 gap-3">
                                            {inventory.map(item => (
                                                <div key={item.id} className="merchant-card glass p-4 rounded-3xl flex justify-between items-center border-slate-800">
                                                    <div className="flex items-center gap-4">
                                                        <div className="w-10 h-10 bg-slate-800 rounded-xl flex items-center justify-center">
                                                            <i className={`fa-solid ${item.cat === 'PPE' ? 'fa-mask-ventilator text-blue-400' : 'fa-gears text-slate-500'} text-lg`}></i>
                                                        </div>
                                                        <div>
                                                            <h4 className="text-xs font-black tracking-tighter uppercase">{item.name}</h4>
                                                            <p className="text-[8px] font-black text-slate-500 uppercase">{item.cat} // STOCK: {item.stock}</p>
                                                        </div>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className="text-xs font-black text-orange-500">{item.price}</p>
                                                        {item.low && <span className="badge-low text-[7px] font-black px-1.5 py-0.5 rounded uppercase mt-1 inline-block">Low Stock</span>}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        {orders.map(order => (
                                            <div key={order.id} className="glass p-5 rounded-3xl border-l-4 border-orange-500">
                                                <div className="flex justify-between items-start mb-3">
                                                    <div>
                                                        <p className="text-[10px] font-black text-orange-500 uppercase tracking-tighter">{order.id}</p>
                                                        <h3 className="text-sm font-black uppercase tracking-tighter">{order.ship}</h3>
                                                    </div>
                                                    <span className="text-[8px] font-black text-slate-500">{order.date}</span>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <div className={`text-[8px] font-black px-2 py-1 rounded-md uppercase ${order.status === 'IN TRANSIT' ? 'bg-blue-500/20 text-blue-400' : 'bg-emerald-500/20 text-emerald-400'}`}>
                                                        {order.status}
                                                    </div>
                                                    <div className="flex-1 h-[1px] bg-slate-800"></div>
                                                    <i className="fa-solid fa-truck-fast text-slate-700 text-[10px]"></i>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Navigation Mini-Status */}
                    <div className="fixed bottom-4 w-full text-center">
                        <p className="text-[7px] text-slate-700 font-black tracking-[0.4em] uppercase">
                            X-Merchant Commercial Engine • v1.9
                        </p>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
