<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NTG COMMAND | V56 FULL HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; -webkit-tap-highlight-color: transparent; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .service-tile { transition: all 0.2s; border: 1px solid rgba(255,255,255,0.05); }
        .service-tile:active { scale: 0.95; background: rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ΣΥΝΔΕΣΗ SUPABASE (ΚΡΑΤΑ ΤΑ ΔΙΚΑ ΣΟΥ ΚΛΕΙΔΙΑ ΕΔΩ)
        const SUPABASE_URL = 'https://ovofreerowjofpvyqqre.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; 
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function App() {
            const [activeManual, setActiveManual] = useState('HOME'); // HOME, M1, M2, M3, etc.
            const [mode, setMode] = useState('MARITIME');

            // --- NAVIGATION LIST ---
            const manuals = [
                { id: 'M1', title: 'SAFETY', icon: 'fa-shield-halved', color: 'text-blue-400' },
                { id: 'M2', title: 'REPAIRS', icon: 'fa-ship', color: 'text-cyan-400' },
                { id: 'M3', title: 'LEGAL', icon: 'fa-gavel', color: 'text-red-400' },
                { id: 'M5', title: 'WORKFORCE', icon: 'fa-users-gear', color: 'text-emerald-400' },
                { id: 'M6', title: 'CEO PULSE', icon: 'fa-chart-line', color: 'text-purple-400' },
                { id: 'M7', title: 'E-MERCHANT', icon: 'fa-cart-shopping', color: 'text-orange-400' },
                { id: 'M8', title: 'AIRBNB', icon: 'fa-house-chimney-user', color: 'text-pink-400' },
                { id: 'M4', title: 'TECH CORE', icon: 'fa-microchip', color: 'text-slate-400' }
            ];

            return (
                <div className="min-h-screen pb-12">
                    {/* --- GLOBAL SYNC BAR --- */}
                    <header className="glass sticky top-0 z-50 p-4 flex justify-between items-center border-b border-blue-500/20">
                        <div onClick={() => setActiveManual('HOME')} className="cursor-pointer">
                            <p className="text-[9px] font-black text-blue-500 tracking-[0.3em]">NTG COMMAND</p>
                            <h1 className="font-bold text-sm">M. SYKINIOTIS</h1>
                        </div>
                        <div className="flex flex-col items-end">
                            <span className="text-[8px] font-bold text-green-500 animate-pulse">● CLOUD ACTIVE</span>
                            <button onClick={() => setMode(mode === 'MARITIME' ? 'INDUSTRIAL' : 'MARITIME')} className="text-[9px] font-black bg-slate-800 px-2 py-0.5 rounded border border-slate-700 mt-1 uppercase tracking-tighter">
                                {mode}
                            </button>
                        </div>
                    </header>

                    <main className="p-4">
                        {/* --- HOME VIEW: 8 TILES --- */}
                        {activeManual === 'HOME' && (
                            <div className="grid grid-cols-2 gap-4 animate-in fade-in zoom-in duration-300">
                                {manuals.map(m => (
                                    <button key={m.id} onClick={() => setActiveManual(m.id)} className="service-tile glass p-6 rounded-[2rem] flex flex-col items-center gap-2">
                                        <i className={`fa-solid ${m.icon} text-3xl ${m.color}`}></i>
                                        <span className="text-[10px] font-black uppercase tracking-tighter">{m.title}</span>
                                        <span className="text-[7px] text-slate-500 font-bold tracking-widest leading-none">{m.id}</span>
                                    </button>
                                ))}
                            </div>
                        )}

                        {/* --- MANUAL 01: SAFETY (Tactical Menu) --- */}
                        {activeManual === 'M1' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center">
                                    <h2 className="brand text-blue-400 text-xs italic">M1 // SAFETY TACTICAL</h2>
                                    <button onClick={() => setActiveManual('HOME')} className="text-[10px] font-bold text-slate-500 uppercase">Back</button>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="glass p-4 rounded-2xl border-b-2 border-blue-500 flex flex-col items-center gap-2">
                                        <i className="fa-solid fa-rocket text-blue-400"></i>
                                        <span className="text-[9px] font-black">INSPECTION</span>
                                    </div>
                                    <div className="glass p-4 rounded-2xl flex flex-col items-center gap-2">
                                        <i className="fa-solid fa-radiation text-orange-500"></i>
                                        <span className="text-[9px] font-black">HAZARD</span>
                                    </div>
                                    <div className="glass p-4 rounded-2xl flex flex-col items-center gap-2 col-span-2">
                                        <i className="fa-solid fa-bolt text-yellow-500"></i>
                                        <span className="text-[9px] font-black tracking-widest">IOT SENSOR NETWORK</span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- MANUAL 02: REPAIRS (Search Engine) --- */}
                        {activeManual === 'M2' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center">
                                    <h2 className="brand text-cyan-400 text-xs italic uppercase underline underline-offset-4">M2 // Repair Controller</h2>
                                    <button onClick={() => setActiveManual('HOME')} className="text-[10px] font-bold text-slate-500 uppercase">Back</button>
                                </div>
                                <div className="relative">
                                    <input type="text" placeholder="ΑΝΑΖΗΤΗΣΗ ΠΛΟΙΟΥ..." className="w-full bg-slate-900 border border-slate-700 p-4 rounded-2xl text-xs font-bold focus:border-cyan-500 outline-none" />
                                    <i className="fa-solid fa-magnifying-glass absolute right-4 top-4 text-slate-500"></i>
                                </div>
                                <div className="glass p-4 rounded-2xl border-l-4 border-cyan-500 opacity-50">
                                    <p className="text-[9px] font-black text-cyan-500">ACTIVE TIMELINE</p>
                                    <p className="text-xs font-bold text-slate-400 mt-1 italic">No ships in yard currently...</p>
                                </div>
                            </div>
                        )}

                        {/* --- MANUAL 03: LEGAL (Conflicts) --- */}
                        {activeManual === 'M3' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center">
                                    <h2 className="brand text-red-400 text-xs italic uppercase underline underline-offset-4 tracking-tighter">M3 // Legal Vault</h2>
                                    <button onClick={() => setActiveManual('HOME')} className="text-[10px] font-bold text-slate-500 uppercase">Back</button>
                                </div>
                                <button className="w-full glass p-5 rounded-2xl border-l-4 border-red-600 flex justify-between items-center">
                                    <div className="text-left">
                                        <p className="text-[10px] font-black text-red-500 uppercase">Conflict A</p>
                                        <p className="font-bold text-sm">Naftocement IV (Vietnam)</p>
                                    </div>
                                    <i className="fa-solid fa-folder-open text-red-500"></i>
                                </button>
                                <button className="w-full glass p-5 rounded-2xl border-l-4 border-red-600 flex justify-between items-center">
                                    <div className="text-left">
                                        <p className="text-[10px] font-black text-red-500 uppercase">Conflict B</p>
                                        <p className="font-bold text-sm">Terme Yard (Investor/DS)</p>
                                    </div>
                                    <i className="fa-solid fa-shield text-red-500"></i>
                                </button>
                            </div>
                        )}

                        {/* --- PLACEHOLDERS FOR M5-M8 --- */}
                        {['M5','M6','M7','M8','M4'].includes(activeManual) && (
                            <div className="flex flex-col items-center justify-center py-20 opacity-50">
                                <i className="fa-solid fa-screwdriver-wrench text-5xl mb-4 text-slate-600"></i>
                                <p className="brand text-xs">Blueprint Phase</p>
                                <p className="text-[10px] mt-2 font-bold uppercase tracking-widest">Manual {activeManual.replace('M','')} Logic Pending</p>
                                <button onClick={() => setActiveManual('HOME')} className="mt-8 bg-slate-800 px-6 py-2 rounded-full text-[10px] font-black">BACK TO HUB</button>
                            </div>
                        )}
                    </main>

                    {/* --- GLOBAL SMART CAPTURE BUTTON --- */}
                    <div className="fixed bottom-6 left-0 right-0 flex justify-center pointer-events-none">
                        <button className="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(37,99,235,0.4)] border-4 border-slate-950 pointer-events-auto active:scale-90 transition-all">
                            <i className="fa-solid fa-camera text-xl text-white"></i>
                        </button>
                    </div>

                    <footer className="fixed bottom-2 w-full text-center">
                        <span className="brand text-[7px] text-slate-700 tracking-[0.4em] font-black uppercase">NTG Command • Version 1.2 Full Hub</span>
                    </footer>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
