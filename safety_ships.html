<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTG | SAFETY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
        body { background: #020617; color: white; font-family: sans-serif; }
        .brand { font-family: 'Orbitron', sans-serif; }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        function Safety() {
            const [ship, setShip] = React.useState('');
            return (
                <div className="p-6 max-w-xl mx-auto">
                    <header className="flex justify-between items-center mb-8 border-b border-red-900/30 py-4">
                        <h1 className="brand text-red-500 text-sm uppercase italic">Safety Ships</h1>
                        <a href="index.html" className="text-slate-500 text-xl"><i className="fa-solid fa-house-chimney"></i></a>
                    </header>
                    <input className="w-full bg-slate-900 border border-slate-800 p-5 rounded-3xl mb-6 text-white font-bold uppercase" placeholder="Ship Name / Project ID" value={ship} onChange={(e)=>setShip(e.target.value)} />
                    <div className="bg-slate-900/50 p-6 rounded-[35px] border border-red-500/10">
                        <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Daily Safety Log</h3>
                        <textarea className="w-full bg-transparent border-none outline-none text-sm h-48 text-slate-300" placeholder="Καταγράψτε παρατηρήσεις..."></textarea>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Safety />);
    </script></body></html>
