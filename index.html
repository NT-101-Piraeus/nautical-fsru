<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NauticalOS V5.0 | Command Hub</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #020617; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .sun-mode { background: #ffffff !important; color: #000000 !important; }
        .sun-mode .glass { background: #f1f5f9 !important; border: 1px solid #cbd5e1 !important; color: #000000 !important; }
        .division-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .division-card:active { scale: 0.95; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const MainHub = () => {
            const [isLocked, setIsLocked] = useState(true);
            const [pin, setPin] = useState('');
            const [sunMode, setSunMode] = useState(false);

            useEffect(() => {
                if (sessionStorage.getItem('ntg_global_auth') === 'true') setIsLocked(false);
            }, []);

            const unlock = () => {
                if (pin === "1234") {
                    sessionStorage.setItem('ntg_global_auth', 'true');
                    setIsLocked(false);
                } else {
                    alert("ACCESS DENIED [Art. 2]");
                    setPin('');
                }
            };

            if (isLocked) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950">
                        <div className="glass p-10 rounded-[3rem] text-center max-w-sm w-full border-orange-500/20">
                            <i className="fa-solid fa-anchor text-4xl text-orange-500 mb-6"></i>
                            <h1 className="text-xl font-black uppercase tracking-widest mb-8 italic">NauticalOS V5</h1>
                            <input 
                                type="password" 
                                value={pin} 
                                onChange={(e) => setPin(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && unlock()}
                                className="w-full bg-black/40 border border-white/10 p-5 rounded-2xl text-center text-2xl font-black mb-4 outline-none focus:border-orange-500"
                                placeholder="PIN"
                            />
                            <button onClick={unlock} className="w-full bg-orange-600 p-5 rounded-2xl font-black uppercase text-xs tracking-widest">Authorize</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className={`min-h-screen p-6 transition-colors ${sunMode ? 'sun-mode' : ''}`}>
                    <header className="flex justify-between items-center mb-10 glass p-6 rounded-[2.5rem]">
                        <div>
                            <h1 className="text-2xl font-black uppercase italic tracking-tighter">Command Hub</h1>
                            <p className="text-[10px] font-bold text-orange-500 uppercase tracking-widest">Piraeus Sector Active</p>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={() => setSunMode(!sunMode)} className="p-4 glass rounded-2xl"><i className="fa-solid fa-sun"></i></button>
                            <button onClick={() => {sessionStorage.clear(); window.location.reload();}} className="p-4 glass rounded-2xl text-red-500"><i className="fa-solid fa-power-off"></i></button>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-6xl mx-auto">
                        <DivisionLink href="m1_utm.html" title="M1 UTM" sub="Thickness Measurements" icon="fa-arrows-left-right" color="blue" />
                        <DivisionLink href="m2_safety.html" title="M2 Safety" sub="Compliance Shield" icon="fa-shield-heart" color="red" />
                        <DivisionLink href="m3_loadtest.html" title="M3 Load Test" sub="LoadMaster Pro" icon="fa-weight-hanging" color="orange" />
                        <DivisionLink href="m4_radar.html" title="M4 Radar" sub="Vessel Hunter" icon="fa-tower-observation" color="orange" />
                        <DivisionLink href="m5_terme.html" title="M5 War Room" sub="Silent Siege" icon="fa-gavel" color="red" />
                        <DivisionLink href="m8_academy.html" title="M8 Academy" sub="Knowledge Fortress" icon="fa-book-open" color="purple" />
                        <DivisionLink href="m10_auditor.html" title="M10 Auditor" sub="Supreme Oversight" icon="fa-eye" color="slate" />
                        <DivisionLink href="m14_commercial.html" title="M14 Intel" sub="Commercial Manager" icon="fa-chart-line" color="emerald" />
                    </div>
                </div>
            );
        };

        const DivisionLink = ({ href, title, sub, icon, color }) => (
            <a href={href} className={`division-card glass p-8 rounded-[2.5rem] border-${color}-500/20 hover:border-${color}-500/50 block relative overflow-hidden group`}>
                <div className={`text-${color}-500 mb-4 text-2xl`}><i className={`fa-solid ${icon}`}></i></div>
                <h2 className="text-xl font-black uppercase italic">{title}</h2>
                <p className="text-[10px] font-bold opacity-50 uppercase tracking-wider">{sub}</p>
            </a>
        );

        ReactDOM.createRoot(document.getElementById('root')).render(<MainHub />);
    </script>
</body>
</html>
