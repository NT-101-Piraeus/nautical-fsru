<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M3: Load Test Pro v5.65 (MATH ENGINE LOCK)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #020617; color: white; font-family: 'Orbitron', sans-serif; font-style: italic; font-weight: bold; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .math-engine-lock { filter: blur(8px); pointer-events: none; opacity: 0.3; }
        .fat-finger-button { height: 80px; font-weight: 900; text-transform: uppercase; border-radius: 1.5rem; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s; }
        .status-alert { animation: pulse-orange 2s infinite; }
        @keyframes pulse-orange { 0%, 100% { color: #f97316; } 50% { color: #431407; } }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const LoadTestAppV565 = () => {
            const [isMathReady, setIsMathReady] = useState(false);
            const [swl, setSwl] = useState("");
            const [targetLoad, setTargetLoad] = useState(0);

            // [V5.65] KNOWLEDGE LOCK CHECK (M8 Academy Sync)
            useEffect(() => {
                const checkClearance = () => {
                    const ready = localStorage.getItem('ntg_M8_ready') === 'true';
                    setIsMathReady(ready);
                };
                checkClearance();
                const interval = setInterval(checkClearance, 2000);
                return () => clearInterval(interval);
            }, []);

            const calculateLoad = () => {
                const val = parseFloat(swl);
                if (!val) return;
                // [Art. 5] ILO 152 Math Engine
                let result = val < 20 ? val * 1.25 : val + 5;
                setTargetLoad(result.toFixed(2));
                
                // M10 Silent Logging
                const logs = JSON.parse(localStorage.getItem('ntg_M3_logs') || '[]');
                logs.push({ ts: new Date().toISOString(), action: 'MATH_CALCULATION', swl: val, target: result, status: 'VERIFIED' });
                localStorage.setItem('ntg_M3_logs', JSON.stringify(logs));
            };

            return (
                <div className="min-h-screen p-6 bg-slate-950">
                    <header className="flex justify-between items-center mb-10 glass p-6 rounded-[2rem]">
                        <div>
                            <h1 className="text-orange-500 text-lg uppercase font-black tracking-tighter">M3: Load Test Pro</h1>
                            <p className="text-[8px] opacity-50 uppercase tracking-widest">ILO 152 & MEG4 Compliant</p>
                        </div>
                        <a href="m8_academy.html" className="p-4 glass rounded-2xl"><i className="fa-solid fa-book-open text-orange-400"></i></a>
                    </header>

                    {!isMathReady && (
                        <div className="glass p-8 rounded-[2.5rem] mb-10 border-orange-500/30 text-center">
                            <i className="fa-solid fa-lock text-3xl text-orange-600 mb-4 animate-bounce"></i>
                            <h2 className="status-alert text-xs font-black uppercase tracking-widest italic">Math Engine Locked</h2>
                            <p className="text-[9px] opacity-40 mt-2 uppercase">Complete M8 Academy Training to unlock ILO 152 calculations</p>
                        </div>
                    )}

                    <div className={`space-y-6 ${!isMathReady ? 'math-engine-lock' : ''}`}>
                        <div className="glass p-8 rounded-[3rem] border-l-4 border-orange-500">
                            <p className="text-[10px] uppercase opacity-40 mb-4 font-black">Enter SWL (Safe Working Load)</p>
                            <input type="number" value={swl} onChange={(e) => setSwl(e.target.value)} placeholder="0.00 t" className="w-full bg-black/40 p-6 rounded-2xl text-center text-5xl font-black outline-none border border-white/5 focus:border-orange-500 transition-all" />
                        </div>

                        <button onClick={calculateLoad} className="fat-finger-button w-full bg-orange-600 shadow-xl shadow-orange-900/30">
                            <i className="fa-solid fa-calculator text-xl"></i> Calculate Target Load
                        </button>

                        {targetLoad > 0 && (
                            <div className="glass p-8 rounded-[3rem] border-l-4 border-emerald-500 text-center animate-pulse">
                                <p className="text-[10px] uppercase text-emerald-500 font-black tracking-widest mb-2">Target Proof Load (ILO 152)</p>
                                <h3 className="text-5xl font-black tracking-tighter text-white">{targetLoad} <span className="text-sm opacity-50">tons</span></h3>
                            </div>
                        )}
                    </div>

                    <div className="fixed bottom-6 left-6 right-6 text-center">
                        <p className="text-[8px] opacity-30 uppercase tracking-[0.4em]">M10 Supreme Auditor Verified Engine</p>
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<LoadTestAppV565 />);
    </script></body></html>
