<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NauticalOS: Global Command Hub v4.70</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');body{background:#020617;color:white;font-family:'Orbitron',sans-serif;font-style:italic;font-weight:bold;}.glass{background:rgba(15,23,42,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);}.active-box{border:1px solid rgba(249,115,22,0.5);box-shadow:0 0 20px rgba(249,115,22,0.15);}</style>
</head>
<body><div id="root"></div><script type="text/babel">
const { useState, useEffect } = React;

const Hub = () => {
    const divisions = [
        { id: 'M1', name: 'Command Hub', icon: 'fa-gauge-high', color: 'text-white', active: true, link: 'index.html' },
        { id: 'M2', name: 'Safety Watch', icon: 'fa-shield-halved', color: 'text-blue-500', active: true, link: 'm2_safety.html' },
        { id: 'M3', name: 'Load Test Pro', icon: 'fa-anchor', color: 'text-orange-500', active: true, link: 'm3_loadtest.html' },
        { id: 'M4', name: 'Radar Hunter', icon: 'fa-crosshairs', color: 'text-red-500', active: true, link: 'm4_radar.html' },
        { id: 'M8', name: 'Academy', icon: 'fa-graduation-cap', color: 'text-blue-400', active: true, link: 'm8_academy.html' },
        { id: 'M12', name: 'The Scout', icon: 'fa-user-secret', color: 'text-purple-400', active: true, link: 'm12_scout.html' },
        { id: 'M14', name: 'Commercial Intel', icon: 'fa-vault', color: 'text-emerald-500', active: true, link: 'm14_commercial.html' },
        { id: 'M10', name: 'Supreme Auditor', icon: 'fa-eye', color: 'text-purple-600', active: true, link: '#' },
        { id: 'M5', name: 'UTM Analysis', icon: 'fa-layer-group', color: 'text-slate-500', active: false },
        { id: 'M6', name: 'NDT Report', icon: 'fa-magnifying-glass', color: 'text-slate-500', active: false },
        { id: 'M9', name: 'Operation GEM', icon: 'fa-robot', color: 'text-slate-500', active: false },
        { id: 'M11', name: 'Client Vault', icon: 'fa-address-book', color: 'text-slate-500', active: false },
        { id: 'M13', name: 'Mykonos Sync', icon: 'fa-rotate', color: 'text-slate-500', active: false },
        { id: 'M7', name: 'Legal Shield', icon: 'fa-scale-balanced', color: 'text-slate-500', active: false }
    ];

    return (
        <div className="min-h-screen p-6 animate-fade bg-slate-950">
            <div className="mb-8 border-b border-white/10 pb-6 flex justify-between items-end">
                <div>
                    <h1 className="text-xl font-black uppercase tracking-tighter">NauticalOS Hub</h1>
                    <p className="text-[8px] text-blue-400 uppercase font-black italic tracking-[0.2em]">Global Operations | v4.70</p>
                </div>
                <div className="text-right">
                    <p className="text-[10px] text-orange-500 font-black">ADMIN MODE</p>
                </div>
            </div>

            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 pb-20">
                {divisions.map((div) => (
                    <div key={div.id} 
                         onClick={() => div.active && (window.location.href = div.link)}
                         className={`glass p-6 rounded-[2.5rem] text-center transition-all cursor-pointer ${div.active ? 'active:scale-95 active-box' : 'opacity-20 grayscale'}`}>
                        <i className={`fa-solid ${div.icon} text-2xl mb-3 ${div.color}`}></i>
                        <div className="flex flex-col">
                            <span className="text-[9px] font-black uppercase tracking-widest">{div.id}</span>
                            <span className="text-[7px] opacity-60 uppercase font-bold">{div.name}</span>
                        </div>
                    </div>
                ))}
            </div>
            
            <div className="fixed bottom-6 left-6 right-6">
                 <div className="glass p-4 rounded-2xl border-orange-500/20 text-center">
                    <p className="text-[8px] uppercase tracking-widest opacity-50">System Status</p>
                    <p className="text-[9px] text-emerald-500 font-black">ALL FORTRESSES SECURED</p>
                 </div>
            </div>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<Hub />);
</script></body></html>
