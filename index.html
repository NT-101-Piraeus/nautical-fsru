<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTG | COMMAND CENTER V12.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .brand-font { font-family: 'Orbitron', sans-serif; letter-spacing: 1px; }
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .form-slide { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style></head><body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [passcode, setPasscode] = useState('');
            const [activeTab, setActiveTab] = useState('intel');
            const [activeProject, setActiveProject] = useState(null);
            const [isAdding, setIsAdding] = useState(false);
            const [projects, setProjects] = useState(() => {
                const saved = localStorage.getItem('ntg_projects');
                return saved ? JSON.parse(saved) : [{ id: 1, name: "MV RIGEL III", services: ["UTM: Hull Gauging"], date: "22/03/2026" }];
            });

            useEffect(() => { localStorage.setItem('ntg_projects', JSON.stringify(projects)); }, [projects]);

            const handleLogin = (e) => {
                e.preventDefault();
                if(passcode === 'NT2026') setIsLoggedIn(true);
                else alert("Access Denied");
            };

            if (!isLoggedIn) {
                return (
                    <div className="h-screen flex items-center justify-center bg-slate-900 p-6">
                        <div className="bg-white p-8 rounded-[40px] shadow-2xl w-full max-w-sm text-center">
                            <h1 className="brand-font text-slate-900 text-2xl mb-2 leading-none uppercase">NTG GROUP</h1>
                            <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-8 leading-none">Authentication Required</p>
                            <form onSubmit={handleLogin}>
                                <input type="password" border className="w-full bg-slate-100 p-5 rounded-3xl mb-4 text-center text-2xl outline-none focus:ring-2 ring-blue-500 text-slate-900" placeholder="••••" onChange={(e)=>setPasscode(e.target.value)} />
                                <button className="w-full bg-blue-600 text-white py-5 rounded-3xl font-black brand-font text-xs shadow-xl active:scale-95 transition-all">ENTER HUB</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col pb-24">
                    <header className="p-5 border-b border-slate-800 glass sticky top-0 z-[100]">
                        <div className="max-w-xl mx-auto flex justify-between items-center text-center">
                            <h1 className="brand-font text-blue-500 text-lg font-black uppercase tracking-widest leading-none">NTG GROUP</h1>
                        </div>
                    </header>

                    <main className="flex-1 p-5 max-w-xl mx-auto w-full">
                        {activeProject ? (
                            <ProjectDashboard project={activeProject} onExit={() => setActiveProject(null)} />
                        ) : (
                            <>
                                {activeTab === 'intel' && <IntelTab />}
                                {activeTab === 'projects' && <ProjectsTab projects={projects} isAdding={isAdding} setIsAdding={setIsAdding} onLaunch={(n, s) => {
                                    const newP = { id: Date.now(), name: n, services: s, date: new Date().toLocaleDateString() };
                                    setProjects([newP, ...projects]); setActiveProject(newP); setIsAdding(false);
                                }} onSelect={setActiveProject} />}
                                {activeTab === 'tools' && <ToolsTab />}
                            </>
                        )}
                    </main>

                    {!activeProject && (
                        <nav className="fixed bottom-0 left-0 right-0 glass border-t border-slate-800 flex justify-around p-4 z-[100]">
                            <NavButton active={activeTab==='intel'} icon="fa-tower-broadcast" label="Intel" onClick={()=>setActiveTab('intel')} />
                            <NavButton active={activeTab==='projects'} icon="fa-folder-tree" label="Projects" onClick={()=>setActiveTab('projects')} />
                            <NavButton active={activeTab==='tools'} icon="fa-toolbox" label="Tools" onClick={()=>setActiveTab('tools')} />
                        </nav>
                    )}
                </div>
            );
        }

        // --- PROJECT DASHBOARD WITH REAL FORMS ---
        function ProjectDashboard({ project, onExit }) {
            const [view, setView] = useState('menu'); // menu, daily, safety, utm
            const hasSafety = project.services.some(s => s.toLowerCase().includes('safety'));
            const hasUTM = project.services.some(s => s.toLowerCase().includes('utm'));

            if (view === 'daily') return <div className="form-slide space-y-4"><button onClick={()=>setView('menu')} className="text-blue-400 font-bold mb-4">← Πίσω</button><h2 className="brand-font uppercase">Daily Report: {project.name}</h2><textarea className="w-full bg-slate-900 border border-slate-700 p-4 rounded-2xl h-64 outline-none" placeholder="Γράψτε τις παρατηρήσεις..."></textarea><button className="w-full bg-blue-600 py-4 rounded-2xl font-bold">Αποθήκευση</button></div>;
            
            if (view === 'safety') return <div className="form-slide space-y-4"><button onClick={()=>setView('menu')} className="text-red-400 font-bold mb-4">← Πίσω</button><h2 className="brand-font uppercase italic">Safety Risk Assessment</h2><div className="bg-slate-900 p-4 border border-red-900/30 rounded-2xl"><p className="text-xs">Εκτελείται σάρωση πρωτοκόλλων Π.Δ. 70/90...</p></div><button className="w-full bg-red-700 py-4 rounded-2xl font-bold">Ολοκλήρωση Ελέγχου</button></div>;

            return (
                <div className="space-y-6 animate-fadeIn">
                    <button onClick={onExit} className="text-slate-500 text-[10px] brand-font uppercase tracking-widest flex items-center gap-2"><i className="fa-solid fa-chevron-left"></i> Close Project</button>
                    <div className="bg-slate-900 p-6 rounded-3xl border border-blue-500/30">
                        <h2 className="brand-font text-blue-400 text-lg mb-1">{project.name}</h2>
                        <div className="flex flex-wrap gap-2 mt-3">
                            {project.services.map(s => <span key={s} className="text-[8px] bg-blue-900/30 text-blue-300 px-2 py-1 rounded font-black uppercase leading-none">{s}</span>)}
                        </div>
                    </div>
                    <div className="grid grid-cols-1 gap-3">
                        <ActionButton icon="fa-file-signature" label="Daily Progress Report" color="bg-blue-600" active={true} onClick={()=>setView('daily')} />
                        <ActionButton icon="fa-shield-halved" label="Safety Risk Management" color={hasSafety ? "bg-red-700" : "bg-slate-800 opacity-40"} active={hasSafety} onClick={()=>setView('safety')} />
                        <ActionButton icon="fa-ruler-combined" label="UTM Readings Entry" color={hasUTM ? "bg-emerald-600" : "bg-slate-800 opacity-40"} active={hasUTM} onClick={()=>alert("UTM Table Initialized")} />
                        <ActionButton icon="fa-camera" label="Evidence Capture (Cam)" color="bg-slate-800" active={true} onClick={() => document.getElementById('camInput').click()} />
                        <input type="file" id="camInput" accept="image/*" capture="camera" className="hidden" />
                    </div>
                </div>
            );
        }

        function IntelTab() { 
            return (
                <div className="space-y-6 animate-fadeIn">
                    <h2 className="brand-font text-blue-500 text-xs border-l-4 border-blue-600 pl-3 uppercase">Deep Intelligence Hub</h2>
                    <div className="bg-slate-900/50 border border-blue-500/20 p-8 rounded-[40px] text-center italic relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1 bg-blue-500/20 animate-pulse"></div>
                        <i className="fa-solid fa-satellite-dish text-blue-500 text-4xl mb-4 animate-pulse"></i>
                        <h3 className="brand-font text-white text-[11px] mb-2 uppercase italic tracking-widest">Agent Status: Deep Search Active</h3>
                        <div className="p-4 bg-black/40 rounded-2xl text-left border-l-2 border-emerald-500">
                            <span className="text-[9px] font-bold text-emerald-500 block uppercase">22/03/2026 - 07:00 BRIEFING</span>
                            <p className="text-[10px] text-slate-300 leading-relaxed mt-1">Naftocement IV: Εντοπίστηκε αλλαγή στο "Beneficial Owner" σε εταιρεία του Βιετνάμ (Nuance ID: VN-09).</p>
                        </div>
                    </div>
                </div>
            );
        }

        function ToolsTab() {
            return (
                <div className="space-y-6 animate-fadeIn">
                    <h2 className="brand-font text-blue-500 text-xs border-l-4 border-blue-600 pl-3 uppercase italic">Smart Toolbox</h2>
                    <div className="grid grid-cols-2 gap-4">
                        <ToolItem icon="fa-weight-hanging" label="Iron Calc" onClick={() => { const l = prompt("L:"); const w = prompt("W:"); const t = prompt("T:"); if(l) alert(l*w*t*7.85 + " kg"); }} />
                        <ToolItem icon="fa-thermometer-half" label="F ↔ C" onClick={() => { const f = prompt("F:"); if(f) alert((f-32)*5/9 + " C"); }} />
                        <ToolItem icon="fa-ruler-horizontal" label="In ↔ mm" onClick={() => { const i = prompt("In:"); if(i) alert(i*25.4 + " mm"); }} />
                        <ToolItem icon="fa-map-location-dot" label="Port Dist." onClick={() => alert("Port Database Loading...")} />
                    </div>
                </div>
            );
        }

        function ProjectsTab({ projects, isAdding, setIsAdding, onLaunch, onSelect }) {
            const [name, setName] = useState('');
            const [sel, setSel] = useState([]);
            const services = ["Safety Division: Π.Δ. 70/90", "UTM: Hull Gauging", "Load Test ε1-ε5"];

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="brand-font text-blue-500 text-xs border-l-4 border-blue-600 pl-3 uppercase italic tracking-widest">Fleet Projects</h2>
                        {!isAdding && <button onClick={() => setIsAdding(true)} className="w-10 h-10 bg-emerald-600 rounded-full flex items-center justify-center shadow-lg"><i className="fa-solid fa-plus"></i></button>}
                    </div>
                    {isAdding ? (
                        <div className="bg-slate-900 p-6 rounded-3xl border border-slate-800 space-y-4">
                            <input className="w-full bg-slate-800 p-4 rounded-2xl text-sm border border-slate-700 outline-none" placeholder="Ship Name" value={name} onChange={(e)=>setName(e.target.value)} />
                            {services.map(s => (
                                <label key={s} className="flex items-center gap-3 bg-slate-800/40 p-4 rounded-2xl">
                                    <input type="checkbox" onChange={(e) => e.target.checked ? setSel([...sel, s]) : setSel(sel.filter(i => i !== s))} className="w-4 h-4 accent-emerald-500" />
                                    <span className="text-xs font-bold text-slate-300 uppercase">{s}</span>
                                </label>
                            ))}
                            <button onClick={()=>onLaunch(name, sel)} className="w-full bg-emerald-600 py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest">Launch Hub</button>
                        </div>
                    ) : (
                        <div className="space-y-3">
                            {projects.map(p => (
                                <div key={p.id} onClick={() => onSelect(p)} className="bg-slate-900 p-5 rounded-3xl border border-slate-800 flex justify-between items-center active:scale-95 transition-all">
                                    <div><h4 className="font-bold text-sm text-slate-200">{p.name}</h4><p className="text-[9px] text-slate-500 uppercase font-bold mt-1 tracking-tighter">{p.services.length} Services Active</p></div>
                                    <i className="fa-solid fa-chevron-right text-slate-700"></i>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        function ActionButton({ icon, label, color, active, onClick }) {
            return (
                <button disabled={!active} onClick={onClick} className={`${color} p-5 rounded-2xl flex justify-between items-center active:scale-95 transition-all shadow-xl ${!active && 'opacity-20'}`}>
                    <span className="text-[10px] font-black uppercase tracking-widest">{label}</span>
                    <i className={`fa-solid ${icon} text-sm`}></i>
                </button>
            );
        }

        function ToolItem({ icon, label, onClick }) {
            return (
                <div onClick={onClick} className="bg-slate-900 border border-slate-800 p-6 rounded-3xl flex flex-col items-center text-center shadow-lg active:scale-95 transition-all">
                    <i className={`fa-solid ${icon} text-blue-500 text-xl mb-3`}></i>
                    <span className="text-[10px] font-black uppercase tracking-widest">{label}</span>
                </div>
            );
        }

        function NavButton({ active, icon, label, onClick }) {
            return (
                <button onClick={onClick} className={`flex flex-col items-center gap-1 transition-all ${active ? 'text-blue-500 scale-110' : 'text-slate-600 opacity-50'}`}>
                    <i className={`fa-solid ${icon} text-lg`}></i>
                    <span className="text-[8px] font-black uppercase tracking-widest">{label}</span>
                </button>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script></body></html>
