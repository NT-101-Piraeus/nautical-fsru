<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NTG | SAFESHIP MANAGER V18</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; touch-action: manipulation; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .safe-btn { transition: all 0.2s; cursor: pointer; }
        .safe-btn:active { transform: scale(0.95); opacity: 0.8; }
        .status-ok { background: #10b981 !important; color: white; }
        .status-wait { background: #334155 !important; color: white; }
        .status-block { background: #ef4444 !important; color: white; }
        input, textarea { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const SUPABASE_URL = "https://omdarjncczohpffwunfy.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_V-nfUDy5MxEG4SlXkisFBg_GBlD_4Y9"; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const PD_CATS = ["1. Καθαρισμοί & Gas-Free", "2. Θερμές Εργασίες", "3. Ελασματουργικές", "4. Μηχανολογικές", "5. Επιφανειακή Επεξεργασία", "6. Ηλεκτρολογικές", "7. Βοηθητικές/Σκαλωσιά"];
        const LOCATIONS = ["Deck", "Engine Room", "Tanks", "Pump Room", "Accommodation", "Hull/Dry Dock"];

        function SafeShipApp() {
            const [view, setView] = useState('dashboard'); // dashboard, new, scope, daily, tasks
            const [projects, setProjects] = useState([]);
            const [activeProject, setActiveProject] = useState(null);
            const [attendance, setAttendance] = useState(() => JSON.parse(localStorage.getItem('ntg_att')) || { in: '--:--', out: '--:--' });
            const [loading, setLoading] = useState(true);

            useEffect(() => { 
                fetchData(); 
            }, []);

            async function fetchData() {
                const { data } = await _supabase.from('ntg_projects').select('*').order('created_at', { ascending: false });
                if (data) setProjects(data);
                setLoading(false);
            }

            const handleNewProject = async (e) => {
                e.preventDefault();
                const name = e.target.ship.value.toUpperCase();
                const { data, error } = await _supabase.from('ntg_projects').insert([{ name, scope: [] }]).select();
                if (data) { 
                    setProjects([data[0], ...projects]); 
                    setActiveProject(data[0]); 
                    setView('scope'); 
                }
            };

            const updateScope = async (cat) => {
                const newScope = activeProject.scope.includes(cat) ? activeProject.scope.filter(c => c !== cat) : [...activeProject.scope, cat];
                const { error } = await _supabase.from('ntg_projects').update({ scope: newScope }).eq('id', activeProject.id);
                if (!error) {
                    const updated = { ...activeProject, scope: newScope };
                    setActiveProject(updated);
                    setProjects(projects.map(p => p.id === updated.id ? updated : p));
                }
            };

            const logAttendance = (type) => {
                const time = new Date().toLocaleTimeString('el-GR', { hour: '2-digit', minute: '2-digit' });
                const newAtt = { ...attendance, [type]: time };
                setAttendance(newAtt);
                localStorage.setItem('ntg_att', JSON.stringify(newAtt));
            };

            if (loading) return <div className="h-screen flex items-center justify-center brand animate-pulse">NTG SECURE BOOT...</div>;

            // --- UI RENDER LOGIC ---

            if (view === 'dashboard') return (
                <div className="max-w-xl mx-auto p-5 pb-32">
                    <header className="flex justify-between items-center py-6 mb-4 border-b border-slate-800">
                        <div><h1 className="brand text-sm font-black italic tracking-tighter text-red-500 uppercase">SafeShip Manager</h1><p className="text-[8px] text-slate-500 font-bold uppercase tracking-widest">Digital Tactical Hub</p></div>
                        <a href="index.html" className="text-slate-600"><i className="fa-solid fa-house-user"></i></a>
                    </header>

                    {/* Attendance */}
                    <div className="glass p-6 rounded-[35px] border-l-4 border-red-600 flex justify-between items-center mb-8">
                        <div><h3 className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2">Shift Log</h3>
                            <div className="flex gap-4">
                                <div><p className="text-[7px] text-slate-500 uppercase">In</p><p className="font-bold text-lg">{attendance.in}</p></div>
                                <div><p className="text-[7px] text-slate-500 uppercase">Out</p><p className="font-bold text-lg">{attendance.out}</p></div>
                            </div>
                        </div>
                        <div className="flex flex-col gap-2">
                            <button onClick={()=>logAttendance('in')} className="bg-emerald-600 px-4 py-2 rounded-xl text-[9px] font-black uppercase safe-btn">Check In</button>
                            <button onClick={()=>logAttendance('out')} className="bg-red-700 px-4 py-2 rounded-xl text-[9px] font-black uppercase safe-btn">Check Out</button>
                        </div>
                    </div>

                    <button onClick={()=>setView('new')} className="w-full bg-red-600 p-6 rounded-[35px] font-black text-xs uppercase tracking-widest shadow-2xl mb-8 safe-btn">+ Start New Inspection</button>

                    <div className="space-y-4">
                        <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2 italic text-center">Active Vessels</h3>
                        {projects.map(p => (
                            <div key={p.id} onClick={()=>{setActiveProject(p); setView('daily')}} className="glass p-6 rounded-[30px] flex justify-between items-center safe-btn">
                                <div><h4 className="font-bold text-sm uppercase">{p.name}</h4><p className="text-[8px] text-slate-500 uppercase mt-1">Scope: {p.scope?.length || 0} active areas</p></div>
                                <i className="fa-solid fa-chevron-right text-slate-800"></i>
                            </div>
                        ))}
                    </div>

                    {/* Task Button */}
                    <button onClick={()=>setView('tasks')} className="w-full bg-slate-800 p-6 rounded-[35px] mt-10 flex justify-between items-center safe-btn border border-white/5">
                        <span className="brand text-xs uppercase text-red-500 font-bold italic">Open Risk Tasks</span>
                        <div className="bg-red-600 w-8 h-8 rounded-full flex items-center justify-center font-bold text-xs">0</div>
                    </button>
                </div>
            );

            if (view === 'new') return (
                <div className="max-w-xl mx-auto p-5 animate-fadeIn">
                    <button onClick={()=>setView('dashboard')} className="text-slate-500 text-[10px] font-black mb-10 uppercase">← Back to Fleet</button>
                    <h2 className="brand text-xl uppercase italic mb-8">Project Identity</h2>
                    <form onSubmit={handleNewProject} className="space-y-6">
                        <input name="ship" required className="w-full p-6 rounded-3xl outline-none font-bold text-xl uppercase tracking-tighter" placeholder="SHIP NAME / IMO" />
                        <button className="w-full bg-red-600 p-6 rounded-3xl font-black uppercase shadow-xl safe-btn">Create & Define Scope</button>
                    </form>
                </div>
            );

            if (view === 'scope') return (
                <div className="max-w-xl mx-auto p-5 animate-fadeIn pb-32">
                    <h2 className="brand text-sm text-red-500 uppercase italic mb-8">Project Scope: {activeProject.name}</h2>
                    <div className="space-y-3">
                        {PD_CATS.map(cat => (
                            <div key={cat} onClick={()=>updateScope(cat)} className={`glass p-5 rounded-[30px] flex justify-between items-center border-2 transition-all safe-btn ${activeProject.scope.includes(cat) ? 'border-red-600 bg-red-600/10' : 'border-transparent opacity-40'}`}>
                                <span className="text-[11px] font-bold uppercase">{cat}</span>
                                {activeProject.scope.includes(cat) && <i className="fa-solid fa-check text-red-500"></i>}
                            </div>
                        ))}
                    </div>
                    <button onClick={()=>setView('daily')} className="fixed bottom-10 left-5 right-5 bg-emerald-600 p-6 rounded-[35px] font-black uppercase text-xs safe-btn">Confirm Scope & Start Tour</button>
                </div>
            );

            if (view === 'daily') return (
                <div className="max-w-xl mx-auto p-5 pb-32 animate-fadeIn">
                    <div className="flex justify-between mb-6">
                        <button onClick={()=>setView('dashboard')} className="text-slate-500 text-[10px] font-black uppercase">← Dashboard</button>
                        <button onClick={()=>setView('scope')} className="text-blue-500 text-[10px] font-black uppercase">Edit Scope</button>
                    </div>
                    <div className="glass p-8 rounded-[40px] border-l-4 border-l-red-600 mb-8 text-center">
                        <h2 className="brand text-2xl font-black uppercase">{activeProject.name}</h2>
                        <p className="text-[10px] text-red-500 font-bold uppercase mt-1 tracking-widest italic">Daily Walkthrough</p>
                    </div>

                    <div className="space-y-8">
                        {LOCATIONS.map(loc => (
                            <div key={loc} className="glass p-6 rounded-[35px] border border-white/5">
                                <h4 className="text-[11px] font-black uppercase text-slate-300 mb-4">{loc}</h4>
                                <div className="grid grid-cols-3 gap-2 mb-4">
                                    <button className="bg-slate-800 p-3 rounded-xl text-[9px] font-black uppercase safe-btn border border-emerald-500/20 active:status-ok">OK</button>
                                    <button className="bg-slate-800 p-3 rounded-xl text-[9px] font-black uppercase safe-btn border border-slate-500/20 active:status-wait">Wait</button>
                                    <button className="bg-slate-800 p-3 rounded-xl text-[9px] font-black uppercase safe-btn border border-red-500/20 active:status-block">Block</button>
                                </div>
                                <textarea className="w-full p-4 rounded-2xl text-[11px] h-24 outline-none focus:ring-1 ring-red-500" placeholder="Location observations..."></textarea>
                                <div className="flex gap-2 mt-4">
                                    <button className="flex-1 bg-slate-900 p-4 rounded-2xl text-[9px] font-black uppercase flex items-center justify-center gap-2 safe-btn" onClick={() => document.getElementById('cIn').click()}>
                                        <i className="fa-solid fa-camera text-red-500"></i> Photo
                                    </button>
                                    <button className="flex-1 bg-slate-900 p-4 rounded-2xl text-[9px] font-black uppercase flex items-center justify-center gap-2 safe-btn">
                                        <i className="fa-solid fa-microphone text-blue-500"></i> Voice
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>
                    <button className="fixed bottom-10 left-5 right-5 bg-red-600 p-6 rounded-[35px] font-black uppercase text-xs safe-btn shadow-2xl">Finalize Daily PDF</button>
                </div>
            );

            if (view === 'tasks') return (
                <div className="max-w-xl mx-auto p-5 animate-fadeIn">
                    <button onClick={()=>setView('dashboard')} className="text-slate-500 text-[10px] font-black mb-10 uppercase">← Dashboard</button>
                    <h2 className="brand text-xl uppercase italic mb-8">Fleet Task Registry</h2>
                    <div className="glass p-20 rounded-[40px] text-center opacity-30 border-2 border-dashed border-slate-800">
                        <i className="fa-solid fa-clipboard-check text-4xl mb-4 text-emerald-500"></i>
                        <p className="text-[10px] font-black uppercase tracking-widest">No critical hazards found.</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SafeShipApp />);
    </script>
</body></html>
