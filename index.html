<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NauticalOS | Global Hub V5.77</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #020617; color: white; font-family: 'Orbitron', sans-serif; font-style: italic; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const Hub = () => {
            const modules = [
                { id: 'M2', name: 'Safety Shield', icon: 'fa-shield-halved', color: 'border-blue-500', link: 'm2_safety.html' },
                { id: 'M3', name: 'Load Test Pro', icon: 'fa-weight-hanging', color: 'border-emerald-500', link: 'm3_load_test.html' },
                { id: 'M4', name: 'Radar Intel', icon: 'fa-radar', color: 'border-orange-500', link: 'm4_radar.html' },
                { id: 'M8', name: 'Academy', icon: 'fa-graduation-cap', color: 'border-purple-500', link: 'm8_academy.html' },
                { id: 'M11', name: 'Sensor Hub', icon: 'fa-microchip', color: 'border-cyan-500', link: 'm11_sensors.html' },
                { id: 'M14', name: 'Commercial', icon: 'fa-comments-dollar', color: 'border-pink-500', link: 'm14_commercial.html' },
                { id: 'M16', name: 'Safety Officer', icon: 'fa-hard-hat', color: 'border-yellow-500', link: 'm16_safety_officer.html' }
            ];

            return (
                <div className="min-h-screen p-6 flex flex-col items-center">
                    <header className="w-full max-w-md mb-12 mt-6 text-center">
                        <h1 className="text-2xl font-black tracking-tighter uppercase">Nautical<span className="text-blue-500">OS</span></h1>
                        <p className="text-[8px] tracking-[0.5em] opacity-40 font-bold uppercase">Supreme Command V5.77</p>
                    </header>

                    <div className="grid grid-cols-2 gap-4 w-full max-w-md">
                        {modules.map(m => (
                            <a key={m.id} href={m.link} className={`glass p-6 rounded-[2.5rem] flex flex-col items-center gap-3 border-b-4 ${m.color} transition-all active:scale-90`}>
                                <i className={`fa-solid ${m.icon} text-2xl`}></i>
                                <div className="text-center">
                                    <p className="text-[10px] font-black uppercase tracking-tighter">{m.name}</p>
                                    <p className="text-[7px] opacity-40 font-bold uppercase">{m.id} Division</p>
                                </div>
                            </a>
                        ))}
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<Hub />);
    </script>
</body>
</html>
