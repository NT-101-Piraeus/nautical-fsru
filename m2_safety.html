<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M2: Safety Watch CLOUD</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background-color: #020617; color: white; margin: 0; font-family: 'Orbitron', sans-serif; font-style: italic; font-weight: bold; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .brand { letter-spacing: 0.1em; }
        input[type="checkbox"] { accent-color: #3b82f6; width: 1.2rem; height: 1.2rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- SUPABASE CONFIG ---
        const SUPABASE_URL = 'https://omdarjncczohpzfrqqhr.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_V-nfUDy5MxEG4SlXkisFBg_GBlD_4Y9';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const SafetyApp = () => {
            const [vessel, setVessel] = useState('FELIX');
            const [sunMode, setSunMode] = useState(false);
            const [tasks, setTasks] = useState([]);
            const [history, setHistory] = useState([]);
            const role = localStorage.getItem('ntg_role') || 'WORKER';

            // REQUIREMENTS PER WORK TYPE
            const requirements = {
                "Hot Works": ["Fire Safety Standby", "Gas-Free Cert", "Fire Blanket"],
                "Confined Space": ["Gas-Free Check", "Standby Person", "Entrance Log"],
                "Lifting": ["Gear Cert", "Area Cordoned", "SWL Verified"]
            };

            useEffect(() => { fetchHistory(); }, []);

            const fetchHistory = async () => {
                const { data } = await supabaseClient.from('safety_logs').select('*').order('created_at', { ascending: false }).limit(5);
                setHistory(data || []);
            };

            const addTask = (type) => {
                setTasks([...tasks, { id: Date.now(), type, area: 'Main Deck', checks: {}, note: '' }]);
            };

            const saveToCloud = async () => {
                const { error } = await supabaseClient.from('safety_logs').insert(
                    tasks.map(t => ({
                        vessel_name: vessel,
                        work_type: t.type,
                        area: t.area,
                        notes: t.note,
                        inspector: role
                    }))
                );
                if (!error) {
                    alert("CLOUD SYNC COMPLETE 🛰️");
                    setTasks([]);
                    fetchHistory();
                }
            };

            const theme = sunMode ? "bg-white text-black" : "bg-slate-950 text-white";
            const card = sunMode ? "bg-slate-100 border-slate-300 text-black" : "bg-black/40 border-slate-800 text-white";

            return (
                <div className={`min-h-screen p-4 transition-all duration-500 ${theme}`}>
                    <div className="flex justify-between items-center mb-6">
                        <a href="index.html" className="text-[10px] uppercase underline opacity-60">← HUB</a>
                        <button onClick={() => setSunMode(!sunMode)} className="p-3 rounded-full border border-slate-700 bg-slate-800">
                            <i className={`fa-solid ${sunMode ? 'fa-moon' : 'fa-sun text-yellow-500'}`}></i>
                        </button>
                    </div>

                    <h1 className="brand text-blue-500 text-lg uppercase mb-6 text-center italic tracking-tighter">M2: SAFETY WATCH</h1>

                    {/* VESSEL SELECTOR */}
                    <div className={`p-4 rounded-3xl mb-6 flex justify-between items-center ${card}`}>
                        <span className="text-[10px] uppercase opacity-60 font-black tracking-widest italic">Vessel:</span>
                        <select value={vessel} onChange={(e)=>setVessel(e.target.value)} className="bg-transparent text-sm font-black outline-none border-b border-blue-500 italic">
                            <option value="FELIX">FELIX</option>
                            <option value="BADJI MOKHTAR III">BADJI MOKHTAR III</option>
                            <option value="NAFTOCEMENT IV">NAFTOCEMENT IV</option>
                        </select>
                    </div>

                    {/* TASK ADDER */}
                    <div className="grid grid-cols-3 gap-2 mb-6">
                        {Object.keys(requirements).map(type => (
                            <button key={type} onClick={()=>addTask(type)} className="bg-blue-600/10 border border-blue-500/20 p-2 rounded-xl text-[7px] uppercase font-black italic
