<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M2: Safety & Watchlist</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');body{background:#020617;color:white;font-family:'Orbitron',sans-serif;font-style:italic;font-weight:bold;}.glass{background:rgba(15,23,42,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);}</style>
</head>
<body><div id="root"></div><script type="text/babel">
const SafetyApp = () => {
    const vessels = [
        { id: 1, name: 'FELIX', time: '07:00 - 11:00', status: 'ACTIVE', ref: 'Ref: 8823/2026' },
        { id: 2, name: 'ARIADNI', time: '12:00 - 15:00', status: 'PENDING', ref: 'Ref: 8824/2026' },
        { id: 3, name: 'NAFTOCEMENT IV', time: '16:00 - 18:00', status: 'PENDING', ref: 'Ref: 8825/2026' },
        { id: 4, name: 'RIGEL III', time: 'N/A', status: 'DOCKING', ref: 'Ref: 8826/2026' }
    ];

    return (
        <div className="min-h-screen p-6 animate-fade bg-slate-950 font-bold italic">
            <div className="flex justify-between items-center mb-8"><a href="index.html" className="text-[10px] underline opacity-50 text-blue-400">← HUB</a><span className="text-[9px] text-blue-500 font-black uppercase tracking-widest">SAFETY WATCHLIST</span></div>
            
            {/* VESSEL SCHEDULE TABLE (ΣΕΠΕ) */}
            <div className="space-y-3 mb-10">
                <p className="text-[8px] text-slate-500 uppercase tracking-widest ml-2 italic">Tomorrow's Schedule (SEPE)</p>
                {vessels.map(v => (
                    <div key={v.id} className="glass p-4 rounded-3xl border-l-4 border-blue-600 flex justify-between items-center shadow-lg">
                        <div><p className="text-xs text-white uppercase">{v.name}</p><p className="text-[8px] text-blue-500 uppercase mt-0.5">{v.time}</p></div>
                        <div className="text-right">{v.status === 'ACTIVE' ? <span className="bg-emerald-900/30 text-emerald-500 text-[8px] px-3 py-1 rounded-full border border-emerald-500/20 italic animate-pulse">ACTIVE</span> : <span className="bg-slate-800 text-slate-500 text-[8px] px-3 py-1 rounded-full border border-slate-700">{v.status}</span>}</div>
                    </div>
                ))}
            </div>

            {/* COMPLIANCE CONTROLS */}
            <div className="glass p-6 rounded-[2.5rem] border-blue-500/20 shadow-2xl space-y-4">
                <p className="text-[10px] text-blue-600 uppercase text-center font-black italic">Daily Field Log</p>
                <div className="grid grid-cols-2 gap-2">
                    <button className="bg-blue-600/20 border border-blue-600/30 p-4 rounded-2xl text-[10px] uppercase font-black italic">Capture Evidence</button>
                    <button className="bg-slate-800 p-4 rounded-2xl text-[10px] uppercase font-black italic opacity-30">Sign Log</button>
                </div>
            </div>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<SafetyApp />);
</script></body></html>
