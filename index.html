<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTG COMMAND | V43 MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        function Hub() {
            const [isAuth, setIsAuth] = useState(() => sessionStorage.getItem('ntg_auth') === 'true');
            const [view, setView] = useState('MAIN'); // MAIN, MANAGER_LOG
            const [taskCount, setTaskCount] = useState(0);

            useEffect(() => {
                try {
                    const data = JSON.parse(localStorage.getItem('ntg_v43_data'));
                    if (data && data.ships) {
                        const count = data.ships.flatMap(s => Object.values(s.data || {}))
                                          .flatMap(d => d.observations || [])
                                          .filter(o => o.isTask).length;
                        setTaskCount(count);
                    }
                } catch(e) { console.error("Sync error"); }
            }, [isAuth]);

            if (!isAuth) return (
                <div className="h-screen flex items-center justify-center p-6 bg-[#020617]">
                    <form onSubmit={(e)=>{e.preventDefault(); if(e.target.p.value==='NT2026'){sessionStorage.setItem('ntg_auth','true');setIsAuth(true)}}} className="glass p-10 rounded-[40px] w-full max-w-sm text-center border border-blue-500/20 shadow-2xl">
                        <h1 className="brand text-blue-500 text-2xl mb-8 uppercase italic">NTG COMMAND</h1>
                        <input name="p" type="password" autoFocus className="w-full bg-slate-900 border border-slate-800 p-5 rounded-3xl mb-4 text-center text-white outline-none text-2xl" placeholder="••••" />
                        <button className="w-full bg-blue-600 py-5 rounded-3xl font-black text-xs uppercase shadow-xl">Identify</button>
                    </form>
                </div>
            );

            return (
                <div className="max-w-xl mx-auto p-5 py-10 animate-fadeIn">
                    <header className="flex justify-between items-center mb-10">
                        <h1 className="brand text-blue-500 text-2xl font-black italic uppercase">NTG HUB</h1>
                        <div className="flex gap-2">
                             <button onClick={()=>setView('MAIN')} className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase ${view==='MAIN'?'bg-blue-600':'bg-slate-800'}`}>Ops</button>
                             <button onClick={()=>setView('MANAGER_LOG')} className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase ${view==='MANAGER_LOG'?'bg-blue-600':'bg-slate-800'}`}>Log</button>
                        </div>
                    </header>

                    {view === 'MAIN' ? (
                        <div className="space-y-6">
                            <a href="safety_ships.html?view=TASKS" className="block active:scale-95 transition-all">
                                <div className="glass p-6 rounded-[35px] border-l-4 border-red-600 flex justify-between items-center bg-red-600/5 shadow-lg">
                                    <div><h3 className="brand text-[10px] text-red-500 uppercase italic">Hazardous Findings</h3><p className="text-3xl font-black mt-1">{taskCount} <span className="text-xs text-slate-500 uppercase font-black">Tasks</span></p></div>
                                    <i className="fa-solid fa-triangle-exclamation text-red-500 text-2xl animate-pulse"></i>
                                </div>
                            </a>
                            <div className="glass p-6 rounded-[35px] border border-white/5 shadow-xl">
                                <h3 className="brand text-[10px] text-blue-400 uppercase italic mb-4">Vessel Deployment</h3>
                                <div className="space-y-4">{[
                                    {n:"FELIX", p:"Δραπετσώνα", t:"07:00"},
                                    {n:"BADJI MOKHTAR III", p:"ΕΛΕΥΣΙΝΑ", t:"11:00"},
                                    {n:"ΑΡΙΑΔΝΗ", p:"ΕΛΕΥΣΙΝΑ", t:"13:00"},
                                    {n:"RIGEL III", p:"Πέραμα", t:"15:00"}
                                ].map((s,i)=>(
                                    <div key={i} className="flex justify-between py-2 border-b border-white/5 last:border-0">
                                        <p className="font-bold text-sm uppercase">{s.n}</p>
                                        <p className="text-[11px] text-slate-400 font-bold uppercase">{s.p} • {s.t}</p>
                                    </div>
                                ))}</div>
                            </div>
                            <a href="safety_ships.html" className="glass p-10 rounded-[50px] flex items-center gap-8 active:scale-95 transition-all border border-white/5 shadow-2xl">
                                <div className="w-16 h-16 rounded-2xl bg-red-600/20 flex items-center justify-center text-red-500 text-3xl shadow-inner"><i className="fa-solid fa-user-shield"></i></div>
                                <div><h2 className="brand text-lg text-white uppercase italic">Safety Officer</h2><p className="text-[11px] text-slate-400 font-bold uppercase mt-2 tracking-widest">Inspection Engine</p></div>
                            </a>
                        </div>
                    ) : (
                        <div className="space-y-6">
                            <div className="glass p-8 rounded-[40px] border-l-4 border-blue-500 shadow-2xl">
                                <h2 className="brand text-xl text-white uppercase italic mb-4">Manager Log</h2>
                                <p className="text-slate-500 text-sm italic">Captain, η ενότητα του Logbook είναι υπό κατασκευή. Εδώ θα καταγράφεις ραντεβού και τηλέφωνα.</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<Hub />);
    </script></body></html>
