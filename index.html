<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NTG COMMAND | V3.1 REPAIRS HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .repair-card { border-left: 4px solid #06b6d4; transition: all 0.2s; }
        .repair-card:active { transform: scale(0.98); background: rgba(6, 182, 212, 0.1); }
        .progress-bar { height: 6px; background: #1e293b; border-radius: 3px; overflow: hidden; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [view, setView] = useState('HOME');
            const [search, setSearch] = useState('');
            const [selectedShip, setSelectedShip] = useState(null);

            // ΔΕΔΟΜΕΝΑ ΑΠΟ ΣΕΠΕ & USER PROGRAM
            const repairsData = [
                { name: 'FELIX', imo: '9464182', location: 'DRAPETSONA', status: 'UNDER REPAIR', progress: 45, end_date: '2026-04-05' },
                { name: 'BADJI MOKHTAR III', imo: '9827889', location: 'ELEFSINA', status: 'MOORED', progress: 10, end_date: '2026-04-30' },
                { name: 'RIGEL III', imo: '7807744', location: 'PERAMA', status: 'INBOUND', progress: 5, end_date: '2026-04-15' },
                { name: 'ARIADNI', imo: '9135262', location: 'PIRAEUS', status: 'REPAIRING', progress: 85, end_date: '2026-03-28' }
            ];

            const calculateDays = (dateStr) => {
                const diff = new Date(dateStr) - new Date();
                const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
                return days > 0 ? days : 0;
            };

            const filteredRepairs = repairsData.filter(ship => 
                ship.name.toLowerCase().includes(search.toLowerCase()) || 
                ship.location.toLowerCase().includes(search.toLowerCase())
            );

            return (
                <div className="min-h-screen flex flex-col max-w-md mx-auto relative shadow-2xl shadow-blue-500/10">
                    
                    {/* --- HEADER --- */}
                    <header className="glass sticky top-0 z-50 p-4 flex justify-between items-center border-b border-cyan-500/20">
                        <div onClick={() => setView('HOME')} className="cursor-pointer">
                            <p className="text-[9px] font-black text-cyan-500 tracking-[0.3em] uppercase leading-none mb-1">NTG COMMAND Hub</p>
                            <h1 className="font-black text-sm tracking-tighter italic uppercase">M. SYKINIOTIS</h1>
                        </div>
                        <i className="fa-solid fa-tower-observation text-cyan-500"></i>
                    </header>

                    <main className="flex-1 p-5 overflow-y-auto">
                        
                        {/* --- HOME HUB --- */}
                        {view === 'HOME' && (
                            <div className="grid grid-cols-2 gap-4 animate-in fade-in duration-300">
                                <button onClick={() => setView('M1')} className="glass p-6 rounded-[2.5rem] flex flex-col items-center gap-2 border-b-2 border-blue-600">
                                    <i className="fa-solid fa-shield-halved text-3xl text-blue-400"></i>
                                    <span className="text-[10px] font-black uppercase">Safety (M1)</span>
                                </button>
                                <button onClick={() => setView('M2')} className="glass p-6 rounded-[2.5rem] flex flex-col items-center gap-2 border-b-4 border-cyan-500">
                                    <i className="fa-solid fa-ship text-3xl text-cyan-400"></i>
                                    <span className="text-[10px] font-black uppercase tracking-tighter">Repairs (M2)</span>
                                </button>
                                {/* ... ΥΠΟΛΟΙΠΑ TILES ΟΠΩΣ ΠΡΙΝ ... */}
                                <button onClick={() => setView('M8')} className="glass p-6 rounded-[2.5rem] flex flex-col items-center gap-2 border-b-2 border-pink-600 opacity-60">
                                    <i className="fa-solid fa-house-chimney-user text-3xl text-pink-500"></i>
                                    <span className="text-[10px] font-black uppercase tracking-tighter">Airbnb (M8)</span>
                                </button>
                            </div>
                        )}

                        {/* --- M2: REPAIRS HUB (Manual 02 Activated) --- */}
                        {view === 'M2' && !selectedShip && (
                            <div className="space-y-4 animate-in slide-in-from-right">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="brand text-cyan-400 text-xs italic uppercase underline decoration-cyan-500/50 underline-offset-8">Repairs Controller</h2>
                                    <button onClick={() => setView('HOME')} className="text-[10px] font-black text-slate-500 uppercase">Back</button>
                                </div>
                                
                                {/* 1. Search Engine */}
                                <div className="relative mb-6">
                                    <input 
                                        type="text" 
                                        placeholder="Αναζήτηση Πλοίου ή Λιμανιού..." 
                                        className="w-full bg-slate-900 border border-slate-700 p-4 rounded-2xl text-xs font-bold focus:border-cyan-500 outline-none transition-all"
                                        onChange={(e) => setSearch(e.target.value)}
                                    />
                                    <i className="fa-solid fa-magnifying-glass absolute right-4 top-4 text-slate-600"></i>
                                </div>

                                {/* 2. Repair Watchlist */}
                                <div className="space-y-3">
                                    {filteredRepairs.map(ship => {
                                        const daysLeft = calculateDays(ship.end_date);
                                        const isDelayRisk = daysLeft < 2 && ship.progress < 80;
                                        
                                        return (
                                            <div key={ship.name} onClick={() => setSelectedShip(ship)} className={`repair-card glass p-5 rounded-3xl space-y-3 ${isDelayRisk ? 'border-red-600' : 'border-cyan-600'}`}>
                                                <div className="flex justify-between items-start">
                                                    <div>
                                                        <h3 className="font-black text-sm tracking-tighter uppercase">{ship.name}</h3>
                                                        <p className="text-[8px] text-slate-500 font-bold uppercase">{ship.location} // IMO: {ship.imo}</p>
                                                    </div>
                                                    <div className="text-right">
                                                        <span className={`text-[8px] font-black px-2 py-1 rounded ${daysLeft < 3 ? 'bg-red-600' : 'bg-slate-800'}`}>{daysLeft} DAYS LEFT</span>
                                                        {isDelayRisk && <p className="text-[7px] text-red-500 font-black mt-1 animate-pulse">!! DELAY RISK !!</p>}
                                                    </div>
                                                </div>
                                                <div className="progress-bar"><div className="progress-fill bg-cyan-500" style={{width: `${ship.progress}%`}}></div></div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* --- M2: SHIP READINESS CHECKLIST --- */}
                        {view === 'M2' && selectedShip && (
                            <div className="space-y-6 animate-in zoom-in">
                                <div className="flex justify-between items-center">
                                    <button onClick={() => setSelectedShip(null)} className="text-slate-500"><i className="fa-solid fa-arrow-left"></i></button>
                                    <h2 className="brand text-cyan-400 text-xs tracking-widest italic">{selectedShip.name}</h2>
                                    <div className="w-4"></div>
                                </div>

                                <div className="glass p-6 rounded-[2.5rem] space-y-5">
                                    <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest text-center">Logistics Readiness Checklist</p>
                                    <div className="space-y-3">
                                        {["Gas Free Certificate", "Access Safety (Gangway)", "Port Permits", "PPE Availability"].map(item => (
                                            <div key={item} className="flex items-center justify-between p-4 bg-slate-900/50 rounded-2xl border border-slate-800">
                                                <span className="text-xs font-bold text-slate-300 tracking-tight">{item}</span>
                                                <input type="checkbox" className="w-5 h-5 accent-cyan-500" />
                                            </div>
                                        ))}
                                    </div>
                                    <button className="w-full bg-cyan-600 p-4 rounded-xl font-black text-xs uppercase shadow-lg shadow-cyan-900/30">Confirm & Board Vessel</button>
                                </div>
                            </div>
                        )}

                    </main>

                    {/* --- GLOBAL SMART CAPTURE [🔵] --- */}
                    <div className="fixed bottom-6 left-0 right-0 flex justify-center pointer-events-none z-50">
                        <label className="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(37,99,235,0.4)] border-4 border-slate-950 pointer-events-auto active:scale-90 transition-all cursor-pointer">
                            <i className="fa-solid fa-camera text-2xl text-white"></i>
                            <input type="file" accept="image/*" capture="environment" className="hidden" />
                        </label>
                    </div>

                    <footer className="fixed bottom-2 w-full text-center">
                        <p className="brand text-[7px] text-slate-700 font-black tracking-[0.5em] uppercase">NTG Command Hub • V3.1 Repairs Activated</p>
                    </footer>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
