<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SafeShip Pro | V45 Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; touch-action: manipulation; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .active-ok { background: #10b981 !important; }
        .active-wait { background: #f59e0b !important; }
        .active-block { background: #ef4444 !important; }
        input, textarea { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; outline: none; }
        .suggestion-chip { background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); color: #60a5fa; font-size: 10px; padding: 6px 12px; border-radius: 10px; cursor: pointer; }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const SMART_SUGGESTIONS = {
            "ΑΝΟΙΓΜΑΤΑ": ["Τοποθέτηση κουπαστής (Άρθρο 77 ΠΔ 70/90)", "Προστατευτικό κάλυμμα", "Σήμανση κινδύνου"],
            "ΥΨΟΣ": ["Χρήση ζώνης ασφαλείας (Άρθρο 82 ΠΔ 70/90)", "Πιστοποιημένη σκαλωσιά", "Δίχτυ προστασίας"]
        };

        const SHIP_LOCS = ["Deck", "Engine Room", "Garage", "Chimney", "Ανοίγματα στο δάπεδο", "Εργασία σε ύψος"];
        const INITIAL_SHIPS = [
            { imo: "9234567", name: "FELIX", port: "Δραπετσώνα", type: "Tanker" },
            { imo: "9123456", name: "BADJI MOKHTAR III", port: "ΕΛΕΥΣΙΝΑ", type: "Ferry" }
        ];

        function App() {
            const [view, setView] = useState('DASHBOARD');
            const [activeImo, setActiveImo] = useState(null);
            const [projects, setProjects] = useState(() => JSON.parse(localStorage.getItem('ntg_v45_data')) || INITIAL_SHIPS.map(s => ({ ...s, data: {}, expenses: { gas:0, tolls:0 } })));

            useEffect(() => { localStorage.setItem('ntg_v45_data', JSON.stringify({ ships: projects })); }, [projects]);

            const ship = projects.find(s => s.imo === activeImo);

            if (view === 'DASHBOARD') return (
                <div className="max-w-xl mx-auto p-5 pb-32 animate-fadeIn">
                    <header className="py-8 flex justify-between items-center mb-8"><h1 className="brand text-sm font-black text-red-500 uppercase">SafeShip Pro</h1><a href="index.html" className="text-slate-600 text-2xl"><i className="fa-solid fa-house"></i></a></header>
                    <div className="space-y-6">
                        {projects.map(s => (
                            <div key={s.imo} onClick={()=>{setActiveImo(s.imo); setView('INSPECTION')}} className="glass p-8 rounded-[50px] flex justify-between items-center border border-white/5 shadow-xl">
                                <div><h4 className="font-black text-xl uppercase tracking-tighter">{s.name}</h4><p className="text-sm font-bold text-slate-400 mt-2 uppercase">IMO: {s.imo} • {s.port}</p></div>
                                <i className="fa-solid fa-chevron-right text-slate-800"></i>
                            </div>
                        ))}
                    </div>
                </div>
            );

            if (view === 'INSPECTION' && ship) return (
                <div className="max-w-xl mx-auto p-5 pb-32 animate-fadeIn">
                    <button onClick={()=>setView('DASHBOARD')} className="bg-slate-800 px-6 py-3 rounded-2xl text-[11px] font-black uppercase mb-8 shadow-xl">← Fleet</button>
                    
                    <div className="glass p-10 rounded-[60px] border-l-8 border-red-600 text-center mb-12 shadow-2xl">
                        <h2 className="brand text-3xl font-black uppercase tracking-tighter">{ship.name}</h2>
                        <p className="text-sm font-bold text-slate-400 mt-2 uppercase tracking-[0.2em]">Safety Audit • V45</p>
                    </div>

                    {/* EXPENSES FOR SURVEYOR */}
                    <div className="glass p-8 rounded-[45px] border border-white/5 mb-12">
                        <h3 className="brand text-[10px] text-amber-500 uppercase italic mb-6">Field Expenses</h3>
                        <div className="grid grid-cols-2 gap-4">
                            <input type="number" placeholder="GAS €" className="p-4 rounded-2xl font-bold text-center" onChange={(e)=>{
                                setProjects(projects.map(p=>p.imo===ship.imo?{...p, expenses:{...p.expenses, gas:e.target.value}}:p));
                            }} />
                            <input type="number" placeholder="TOLLS €" className="p-4 rounded-2xl font-bold text-center" />
                        </div>
                    </div>

                    <div className="space-y-16">
                        {SHIP_LOCS.map(loc => {
                            const d = (ship.data && ship.data[loc]) || { observations: [] };
                            return (
                                <div key={loc} className="space-y-6">
                                    <div className="flex justify-between items-center px-4"><h4 className="text-xl font-black uppercase text-red-500">{loc}</h4><button onClick={()=>{
                                        const newObs = { id: Date.now(), text: '', status: 'ok' };
                                        setProjects(projects.map(p=>p.imo===ship.imo?{...p, data:{...p.data,[loc]:{observations:[...(p.data[loc]?.observations||[]), newObs]}}}:p));
                                    }} className="bg-slate-800 px-4 py-2 rounded-xl text-[11px] font-black border border-white/10">+ NEW LOG</button></div>
                                    {d.observations.map(o => (
                                        <div key={o.id} className="glass p-8 rounded-[50px] border border-white/5 space-y-6 shadow-2xl relative">
                                            <div className="grid grid-cols-4 gap-2">{['ok','wait','block','na'].map(st => (
                                                <button key={st} onClick={()=>{
                                                    setProjects(projects.map(p=>p.imo===ship.imo?{...p, data:{...p.data,[loc]:{observations:p.data[loc].observations.map(x=>x.id===o.id?{...x, status:st}:x)}}}:p));
                                                }} className={`p-4 rounded-3xl text-[10px] font-black uppercase transition-all ${o.status===st?`active-${st} shadow-xl`:'bg-slate-800 opacity-30'}`}>{st}</button>
                                            ))}</div>
                                            <textarea className="p-6 rounded-[40px] text-lg h-32 leading-relaxed" placeholder="Write observation details..." value={o.text} onChange={(e)=>{
                                                setProjects(projects.map(p=>p.imo===ship.imo?{...p, data:{...p.data,[loc]:{observations:p.data[loc].observations.map(x=>x.id===o.id?{...x, text:e.target.value}:x)}}}:p));
                                            }} />
                                            
                                            {/* SMART SUGGESTIONS LOGIC */}
                                            <div className="flex flex-wrap gap-2">
                                                {Object.entries(SMART_SUGGESTIONS).map(([key, sugList]) => 
                                                    (o.text.toUpperCase().includes(key) || loc.toUpperCase().includes(key)) && sugList.map(s => (
                                                        <span key={s} onClick={()=>{
                                                            setProjects(projects.map(p=>p.imo===ship.imo?{...p, data:{...p.data,[loc]:{observations:p.data[loc].observations.map(x=>x.id===o.id?{...x, text:x.text + '\n- ' + s}:x)}}}:p));
                                                        }} className="suggestion-chip">💡 {s}</span>
                                                    ))
                                                )}
                                            </div>

                                            <div className="flex gap-4">
                                                <button className="flex-1 bg-slate-900 p-5 rounded-3xl border border-white/10 text-[12px] font-black uppercase flex items-center justify-center gap-3"><i className="fa-solid fa-camera text-red-500 text-2xl"></i> PHOTO</button>
                                                <button onClick={()=>{setProjects(projects.map(p=>p.imo===ship.imo?{...p, data:{...p.data,[loc]:{observations:p.data[loc].observations.filter(x=>x.id!==o.id)}}}:p))}} className="bg-slate-800 w-16 h-16 rounded-3xl text-slate-700 flex items-center justify-center"><i className="fa-solid fa-trash"></i></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script></body></html>
