<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTG COMMAND CENTER V12.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700;900&display=swap');
        .brand-font { font-family: 'Orbitron', sans-serif; }
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .neon-border-blue { border: 1px solid rgba(59, 130, 246, 0.5); box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
        .neon-border-red { border: 1px solid rgba(239, 68, 68, 0.5); box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [view, setView] = useState('intel'); 
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [passcode, setPasscode] = useState('');
            const [systemHealth, setSystemHealth] = useState('online');

            if (!isLoggedIn) {
                return (
                    <div className="h-screen flex items-center justify-center bg-slate-950 p-6">
                        <div className="glass p-8 rounded-[2rem] neon-border-blue w-full max-w-sm text-center">
                            <h1 className="brand-font text-blue-500 text-2xl font-black mb-1 tracking-tighter italic">NTG HUB V12</h1>
                            <p className="text-slate-500 mb-8 text-[9px] font-bold uppercase tracking-[0.4em]">Nautical Technology Group</p>
                            <form onSubmit={(e) => { e.preventDefault(); if(passcode==='NT2026') setIsLoggedIn(true); else alert('Error'); }}>
                                <input type="password" value={passcode} onChange={(e)=>setPasscode(e.target.value)} className="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl mb-4 text-center text-white text-xl outline-none focus:border-blue-500" placeholder="••••" />
                                <button className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase tracking-widest active:scale-95 transition-all">Command Entry</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col pb-24">
                    {/* Header με System Health */}
                    <header className="p-5 glass sticky top-0 z-50 flex justify-between items-center">
                        <div>
                            <h1 className="brand-font text-blue-500 text-sm font-black uppercase">NTG Intel Div.</h1>
                            <div className="flex items-center gap-1.5 mt-0.5">
                                <div className={`w-2 h-2 rounded-full ${systemHealth === 'online' ? 'bg-emerald-500' : 'bg-red-500'} animate-pulse`}></div>
                                <span className="text-[8px] font-bold text-slate-500 uppercase">System {systemHealth}</span>
                            </div>
                        </div>
                        <div className="flex gap-3">
                             <i className="fa-solid fa-wifi text-[10px] text-blue-500/50"></i>
                             <i className="fa-solid fa-database text-[10px] text-blue-500/50"></i>
                        </div>
                    </header>

                    <main className="p-5 max-w-lg mx-auto w-full flex-1">
                        {view === 'intel' && <IntelModule />}
                        {view === 'projects' && <ProjectsModule />}
                        {view === 'tools' && <ToolsModule />}
                        {view === 'business' && <BusinessModule />}
                    </main>

                    {/* Navigation Bar */}
                    <nav className="fixed bottom-0 left-0 right-0 glass border-t border-slate-800 p-4 flex justify-around z-50">
                        <NavBtn active={view==='intel'} icon="fa-tower-observation" label="Intel" onClick={()=>setView('intel')} />
                        <NavBtn active={view==='projects'} icon="fa-diagram-project" label="Projects" onClick={()=>setView('projects')} />
                        <NavBtn active={view==='tools'} icon="fa-screwdriver-wrench" label="Tools" onClick={()=>setView('tools')} />
                        <NavBtn active={view==='business'} icon="fa-briefcase" label="Business" onClick={()=>setView('business')} />
                    </nav>
                </div>
            );
        }

        function NavBtn({ active, icon, label, onClick }) {
            return (
                <button onClick={onClick} className={`flex flex-col items-center gap-1 transition-all ${active ? 'text-blue-400 scale-110' : 'text-slate-600'}`}>
                    <i className={`fa-solid ${icon} text-lg`}></i>
                    <span className="text-[9px] font-black uppercase tracking-tighter">{label}</span>
                </button>
            );
        }

        // --- MODULES ---

        function IntelModule() {
            return (
                <div className="space-y-6 animate-fadeIn">
                    <h2 className="brand-font text-blue-500 text-xs border-l-4 border-blue-600 pl-3 uppercase">Strategic Alerts</h2>
                    
                    <div className="p-5 glass neon-border-red rounded-3xl">
                         <div className="flex justify-between items-center mb-3">
                            <span className="text-[10px] font-black text-red-500 uppercase tracking-widest">Forensic Alert</span>
                            <span className="text-[8px] text-slate-500 uppercase font-bold">Aug Forensic Case</span>
                         </div>
                         <h4 className="font-bold text-sm mb-1 uppercase">Naftocement IV</h4>
                         <p className="text-[11px] text-slate-400 italic mb-4 leading-relaxed italic">"Dark AIS Period" εντοπίστηκε εντός ναυπηγείου Terme. Ανάλυση σε εξέλιξη.</p>
                         <button className="w-full bg-red-900/40 text-red-400 text-[10px] font-black py-2 rounded-xl border border-red-500/30 uppercase tracking-widest">Generate PDF Evidence</button>
                    </div>

                    <div className="p-5 glass rounded-3xl border border-slate-800">
                        <h4 className="text-[10px] font-black text-slate-500 mb-3 uppercase tracking-widest">Live Newsfeed Sources</h4>
                        <div className="space-y-3">
                            {['Tugrul Karaca', 'Erkan Zorlu'].map(name => (
                                <div key={name} className="flex justify-between items-center bg-black/40 p-3 rounded-xl border border-white/5">
                                    <span className="text-xs font-bold">{name}</span>
                                    <button className="text-[8px] bg-blue-900/50 text-blue-400 px-2 py-1 rounded font-black uppercase">Save as Source</button>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function ProjectsModule() {
            const [showNew, setShowNew] = useState(false);
            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="brand-font text-emerald-500 text-xs border-l-4 border-emerald-600 pl-3 uppercase tracking-tighter">Active Projects</h2>
                        <button onClick={()=>setShowNew(true)} className="bg-emerald-600 text-white p-2 rounded-full text-xs"><i className="fa-solid fa-plus px-1"></i></button>
                    </div>

                    {showNew && (
                        <div className="glass p-6 rounded-[2rem] neon-border-blue mb-6">
                            <h3 className="brand-font text-[10px] text-blue-400 mb-4 uppercase">New Combined Project</h3>
                            <input type="text" placeholder="Project Name (e.g. Rigel III)" className="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl mb-4 text-xs" />
                            <div className="space-y-3 mb-6">
                                <p className="text-[9px] font-bold text-slate-500 uppercase">Services Selection:</p>
                                {['Safety (PD 70/90)', 'UTM Gauging', 'Load Test (Cargo Gear)', 'Load Test (Means of Access)'].map(s => (
                                    <label key={s} className="flex items-center gap-3 text-xs bg-slate-900/50 p-3 rounded-xl">
                                        <input type="checkbox" className="accent-blue-500 h-4 w-4" />
                                        <span>{s}</span>
                                    </label>
                                ))}
                            </div>
                            <button className="w-full bg-blue-600 p-3 rounded-xl text-[10px] font-black uppercase tracking-widest" onClick={()=>setShowNew(false)}>Initialize Project Hub</button>
                        </div>
                    )}

                    <div className="bg-slate-900/50 p-5 rounded-3xl border border-slate-800 flex justify-between items-center opacity-50 italic">
                        <span className="text-xs">No active combined projects yet...</span>
                    </div>
                </div>
            );
        }

        function ToolsModule() {
            return (
                <div className="space-y-6 animate-fadeIn">
                    <h2 className="brand-font text-amber-500 text-xs border-l-4 border-amber-600 pl-3 uppercase">Smart Toolbox</h2>
                    <div className="grid grid-cols-2 gap-4">
                        <ToolItem icon="fa-thermometer" label="F ↔ C" sub="Temp" />
                        <ToolItem icon="fa-ruler-horizontal" label="In ↔ mm" sub="Thickness" />
                        <ToolItem icon="fa-weight-hanging" label="Iron Calc" sub="Plate Weight" />
                        <ToolItem icon="fa-map-location-dot" label="Sea Dist." sub="Port to Port" />
                        <ToolItem icon="fa-coins" label="FX Rates" sub="Live USD/EUR" />
                        <ToolItem icon="fa-camera" label="AR Meas." sub="Camera" />
                    </div>
                </div>
            );
        }

        function ToolItem({ icon, label, sub }) {
            return (
                <div className="bg-slate-900 border border-slate-800 p-5 rounded-3xl flex flex-col items-center justify-center text-center active:scale-95 transition-all cursor-pointer">
                    <i className={`fa-solid ${icon} text-amber-500 text-xl mb-2`}></i>
                    <span className="text-[10px] font-black uppercase leading-tight">{label}</span>
                    <span className="text-[8px] text-slate-500 uppercase mt-1 tracking-tighter">{sub}</span>
                </div>
            );
        }

        function BusinessModule() {
            return (
                <div className="space-y-6">
                    <div className="p-6 bg-gradient-to-br from-rose-900/40 to-slate-900 rounded-[2rem] border border-rose-500/30">
                        <h2 className="brand-font text-rose-400 text-sm mb-2 uppercase italic tracking-tighter font-black">Live in Mykonos</h2>
                        <p className="text-[9px] text-rose-200/50 uppercase tracking-[0.3em] font-bold mb-6 italic">Luxury Estate Management</p>
                        <div className="grid grid-cols-2 gap-3">
                            <div className="bg-black/30 p-4 rounded-2xl text-center">
                                <p className="text-[8px] text-slate-500 uppercase mb-1">Bookings</p>
                                <p className="font-bold text-lg leading-none">04</p>
                            </div>
                            <div className="bg-black/30 p-4 rounded-2xl text-center">
                                <p className="text-[8px] text-slate-500 uppercase mb-1">Check-ins</p>
                                <p className="font-bold text-lg leading-none">02</p>
                            </div>
                        </div>
                    </div>

                    <div className="p-6 glass rounded-[2rem] border border-blue-500/20">
                         <h3 className="brand-font text-blue-400 text-[10px] mb-4 uppercase">Warehouse & Assets</h3>
                         <div className="space-y-3">
                            <div className="flex justify-between items-center text-xs bg-slate-900/50 p-3 rounded-xl">
                                <span>UTM Gauge #1</span>
                                <span className="text-[8px] text-emerald-500 font-bold uppercase tracking-widest animate-pulse-slow">Calibrated</span>
                            </div>
                            <div className="flex justify-between items-center text-xs bg-slate-900/50 p-3 rounded-xl">
                                <span>Load Cells 50T</span>
                                <span className="text-[8px] text-amber-500 font-bold uppercase">Due Apr 2026</span>
                            </div>
                         </div>
                    </div>

                    <div className="p-4 bg-slate-900/50 rounded-2xl text-center border border-dashed border-slate-700">
                         <p className="text-[9px] text-slate-500 font-bold uppercase tracking-widest italic">External Link: E-Shop Independent Module</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
