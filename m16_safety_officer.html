<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M16: Safety Officer (Ν. 3850/2010)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #0f172a; color: white; font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .status-pill { padding: 4px 12px; border-radius: 99px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const SafetyOfficerApp = () => {
            const [logs] = useState([
                { id: 1, date: '30/03/2026', subject: 'Έλεγχος Πυροσβεστήρων', status: 'COMPLETED' },
                { id: 2, date: '01/04/2026', subject: 'Εκπαίδευση Χρήσης ΜΑΠ', status: 'PENDING' }
            ]);

            return (
                <div className="min-h-screen p-6 flex flex-col">
                    <header className="flex justify-between items-center mb-8 glass p-6 rounded-[2rem] border-l-4 border-yellow-500">
                        <div>
                            <h1 className="text-lg font-black uppercase tracking-tighter text-yellow-500">M16: Safety Officer</h1>
                            <p className="text-[8px] opacity-60 font-bold uppercase tracking-widest">Compliance Law 3850/2010</p>
                        </div>
                        <a href="index.html" className="p-4 glass rounded-2xl"><i className="fa-solid fa-house"></i></a>
                    </header>

                    <div className="grid grid-cols-1 gap-4 mb-8">
                        <div className="glass p-6 rounded-[2.5rem]">
                            <h2 className="text-[10px] font-black uppercase opacity-50 mb-4 tracking-widest text-yellow-500">Βιβλίο Υποδείξεων</h2>
                            <div className="space-y-4">
                                {logs.map(log => (
                                    <div key={log.id} className="flex justify-between items-center border-b border-white/5 pb-3">
                                        <div>
                                            <p className="text-xs font-bold">{log.subject}</p>
                                            <p className="text-[9px] opacity-40">{log.date}</p>
                                        </div>
                                        <span className={`status-pill ${log.status === 'COMPLETED' ? 'bg-emerald-500/20 text-emerald-500' : 'bg-yellow-500/20 text-yellow-500'}`}>
                                            {log.status}
                                        </span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    <button className="h-16 w-full bg-yellow-600 rounded-[1.5rem] font-black uppercase italic shadow-lg shadow-yellow-900/40 active:scale-95 transition-all">
                        <i className="fa-solid fa-file-signature mr-2"></i> Νέα Καταχώρηση
                    </button>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<SafetyOfficerApp />);
    </script>
</body>
</html>
