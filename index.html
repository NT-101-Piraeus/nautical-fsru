<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTG COMMAND | V46 TACTICAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const _supabase = supabase.createClient("https://omdarjncczohpffunfy.supabase.co", "sb_publishable_V-nfUDy5MxEG4SlXkisFBg_GBlD_4Y9");

        function App() {
            const [view, setView] = useState('HUB'); 
            const [isAuth, setIsAuth] = useState(() => sessionStorage.getItem('ntg_auth') === 'true');
            const [masterData, setMasterData] = useState(() => JSON.parse(localStorage.getItem('ntg_master_data')) || { ships: [] });
            const [legalEntry, setLegalEntry] = useState({ imo: '7355349', status: 'In Transit / Dispute', update: '' });

            // Check if any ship is marked as DONE (signedToday)
            const anyShipDone = masterData.ships.some(s => s.signedToday);

            if (!isAuth) return (
                <div className="h-screen flex items-center justify-center p-6 bg-[#020617]">
                    <form onSubmit={(e)=>{e.preventDefault(); if(e.target.p.value==='NT2026'){sessionStorage.setItem('ntg_auth','true');setIsAuth(true)}}} className="glass p-12 rounded-[50px] text-center w-full max-w-sm border border-blue-500/20 shadow-2xl">
                        <h1 className="brand text-blue-500 text-2xl mb-10 italic uppercase tracking-widest">Identify</h1>
                        <input name="p" type="password" autoFocus className="w-full bg-slate-900 border border-slate-800 p-6 rounded-3xl mb-6 text-center text-white text-3xl font-bold outline-none focus:border-blue-500" placeholder="••••" />
                        <button className="w-full bg-blue-600 py-6 rounded-3xl font-black text-xs uppercase tracking-[0.3em] shadow-xl">Access Command</button>
                    </form>
                </div>
            );

            if (view === 'LEGAL_ASSET') return (
                <div className="max-w-xl mx-auto p-5 py-12 animate-fadeIn">
                    <button onClick={()=>setView('HUB')} className="bg-slate-800 px-6 py-3 rounded-2xl text-[10px] font-black uppercase mb-10">← Back</button>
                    <h2 className="brand text-red-500 text-xl uppercase italic mb-8">Asset Tracking Form</h2>
                    <div className="glass p-8 rounded-[40px] space-y-6">
                        <div><label className="text-[10px] font-black text-slate-500 uppercase ml-2">IMO Number</label><input className="w-full bg-slate-900 p-5 rounded-3xl mt-2 font-bold" value={legalEntry.imo} readOnly /></div>
                        <div><label className="text-[10px] font-black text-slate-500 uppercase ml-2">Legal Status</label><input className="w-full bg-slate-900 p-5 rounded-3xl mt-2 font-bold" value={legalEntry.status} onChange={(e)=>setLegalEntry({...legalEntry, status: e.target.value})} /></div>
                        <div><label className="text-[10px] font-black text-slate-500 uppercase ml-2">Last Update Notes</label><textarea className="w-full bg-slate-900 p-5 rounded-3xl mt-2 h-32" placeholder="Enter findings..." value={legalEntry.update} onChange={(e)=>setLegalEntry({...legalEntry, update: e.target.value})} /></div>
                        <button onClick={async() => { 
                            const { error } = await _supabase.from('ntg_legal_logs').insert([{ imo: legalEntry.imo, description: legalEntry.update, details: { status: legalEntry.status } }]);
                            if(!error) { alert("LEGAL RECORD SYNCED"); setView('HUB'); }
                        }} className="w-full bg-red-600 py-5 rounded-3xl font-black text-xs uppercase tracking-widest">Sync Legal Intel</button>
                    </div>
                </div>
            );

            return (
                <div className="max-w-xl mx-auto p-5 py-12 animate-fadeIn">
                    <header className="flex justify-between items-center mb-16">
                        <h1 className="brand text-blue-500 text-2xl font-black italic uppercase">NTG HUB</h1>
                        <button onClick={()=>{sessionStorage.clear(); window.location.reload();}} className="text-red-500 text-2xl"><i className="fa-solid fa-power-off"></i></button>
                    </header>

                    <div className="space-y-6">
                        {/* UNLOCKABLE EXECUTIVE REPORT BUTTON */}
                        {anyShipDone && (
                            <button onClick={()=>alert("Generating PDF Report...")} className="w-full bg-gradient-to-r from-emerald-600 to-teal-600 p-6 rounded-[35px] flex items-center justify-between border-2 border-white shadow-2xl animate-bounce">
                                <div className="text-left"><h3 className="brand text-[10px] text-white uppercase italic">Inspection Ready</h3><p className="text-sm font-black text-white">GENERATE EXECUTIVE REPORT</p></div>
                                <i className="fa-solid fa-file-pdf text-2xl text-white"></i>
                            </button>
                        )}

                        <a href="safety_ships.html" className="glass p-10 rounded-[50px] flex items-center gap-8 border border-white/5 active:scale-95 transition-all shadow-2xl">
                            <div className="w-16 h-16 rounded-2xl bg-red-600/20 flex items-center justify-center text-red-500 text-3xl shadow-inner"><i className="fa-solid fa-user-shield"></i></div>
                            <div><h2 className="brand text-sm text-white uppercase italic leading-none">Safety Officer</h2><p className="text-[10px] text-slate-500 font-bold uppercase mt-2 tracking-widest tracking-tighter">Vessel Audits</p></div>
                        </a>

                        <button onClick={()=>setView('LEGAL_ASSET')} className="w-full glass p-10 rounded-[50px] flex items-center gap-8 border border-red-500/20 active:scale-95 transition-all text-left">
                            <div className="w-16 h-16 rounded-2xl bg-red-600/10 flex items-center justify-center text-red-500 text-3xl shadow-inner"><i className="fa-solid fa-scale-balanced"></i></div>
                            <div><h2 className="brand text-sm text-red-500 uppercase italic leading-none">Legal Dept</h2><p className="text-[10px] text-slate-500 font-bold uppercase mt-2 tracking-widest">Asset Tracking (NAFTOCEMENT IV)</p></div>
                        </button>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script></body></html>
