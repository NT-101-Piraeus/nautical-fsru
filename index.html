<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NTG COMMAND | V56 TECH CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; -webkit-tap-highlight-color: transparent; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .tech-glow { box-shadow: 0 0 15px rgba(100, 116, 139, 0.2); }
        .progress-bg { background: rgba(255,255,255,0.05); height: 8px; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa); width: 12%; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [view, setView] = useState('HOME');

            return (
                <div className="min-h-screen pb-20">
                    {/* --- HEADER --- */}
                    <header className="glass sticky top-0 z-50 p-4 flex justify-between items-center border-b border-slate-700/50">
                        <div onClick={() => setView('HOME')} className="cursor-pointer">
                            <p className="text-[9px] font-black text-slate-500 tracking-[0.3em]">NTG TECH CORE</p>
                            <h1 className="font-bold text-sm uppercase">M. SYKINIOTIS</h1>
                        </div>
                        <div className="flex items-center gap-2">
                            <span className="text-[8px] font-bold text-blue-500">ENGINE v1.6</span>
                            <i className="fa-solid fa-microchip text-blue-500"></i>
                        </div>
                    </header>

                    <main className="p-4">
                        {/* --- HOME HUB --- */}
                        {view === 'HOME' && (
                            <div className="grid grid-cols-2 gap-4 animate-in fade-in duration-300">
                                <button onClick={() => setView('M1')} className="glass p-6 rounded-[2rem] flex flex-col items-center gap-2 opacity-40">
                                    <i className="fa-solid fa-shield-halved text-2xl"></i>
                                    <span className="text-[10px] font-black uppercase">Safety</span>
                                </button>
                                <button onClick={() => setView('M2')} className="glass p-6 rounded-[2rem] flex flex-col items-center gap-2 opacity-40">
                                    <i className="fa-solid fa-ship text-2xl"></i>
                                    <span className="text-[10px] font-black uppercase">Repairs</span>
                                </button>
                                <button onClick={() => setView('M3')} className="glass p-6 rounded-[2rem] flex flex-col items-center gap-2 opacity-40">
                                    <i className="fa-solid fa-scale-balanced text-2xl"></i>
                                    <span className="text-[10px] font-black uppercase">Legal</span>
                                </button>
                                <button onClick={() => setView('M4')} className="glass p-6 rounded-[2rem] flex flex-col items-center gap-2 border-b-4 border-slate-400 tech-glow">
                                    <i className="fa-solid fa-microchip text-2xl text-slate-400"></i>
                                    <span className="text-[10px] font-black uppercase">Technical</span>
                                </button>
                            </div>
                        )}

                        {/* --- MANUAL 04: TECH HUB --- */}
                        {view === 'M4' && (
                            <div className="space-y-4 animate-in slide-in-from-top duration-300">
                                <div className="flex justify-between items-center px-2">
                                    <h2 className="brand text-slate-400 text-sm italic underline underline-offset-8">SYSTEM ENGINE</h2>
                                    <button onClick={() => setView('HOME')} className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Back</button>
                                </div>

                                {/* Drive Capacity Tracker */}
                                <div className="glass p-5 rounded-3xl space-y-3">
                                    <div className="flex justify-between items-center">
                                        <p className="text-[10px] font-black text-blue-400 uppercase">Google Drive Storage (2TB)</p>
                                        <span className="text-[10px] font-bold text-slate-500">240 GB / 2 TB</span>
                                    </div>
                                    <div className="progress-bg"><div className="progress-fill"></div></div>
                                    <p className="text-[8px] text-slate-500 font-bold italic italic tracking-wider uppercase">Triple Redundancy Active: Supabase -> Drive -> Local</p>
                                </div>

                                {/* Intel Agent Monitor */}
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="glass p-4 rounded-2xl flex flex-col items-center gap-2 border-l-2 border-green-500">
                                        <i className="fa-solid fa-robot text-green-500 text-xl"></i>
                                        <p className="text-[9px] font-black uppercase">Intel Agent</p>
                                        <p className="text-[8px] text-green-500 font-bold">STABLE</p>
                                    </div>
                                    <div className="glass p-4 rounded-2xl flex flex-col items-center gap-2 border-l-2 border-blue-500">
                                        <i className="fa-solid fa-cloud-arrow-up text-blue-500 text-xl"></i>
                                        <p className="text-[9px] font-black uppercase">Backup Sync</p>
                                        <p className="text-[8px] text-blue-500 font-bold">12m AGO</p>
                                    </div>
                                </div>

                                {/* API Status Table */}
                                <div className="glass p-4 rounded-3xl overflow-hidden">
                                    <table className="w-full text-left">
                                        <thead>
                                            <tr className="border-b border-slate-800">
                                                <th className="pb-2 text-[9px] font-black text-slate-500 uppercase">Service</th>
                                                <th className="pb-2 text-[9px] font-black text-slate-500 uppercase text-right">Latency</th>
                                            </tr>
                                        </thead>
                                        <tbody className="text-[10px] font-bold">
                                            <tr>
                                                <td className="py-2 text-slate-300">Supabase API</td>
                                                <td className="py-2 text-right text-green-500">42ms</td>
                                            </tr>
                                            <tr>
                                                <td className="py-2 text-slate-300">GitHub Deployment</td>
                                                <td className="py-2 text-right text-blue-500">v1.6-LIVE</td>
                                            </tr>
                                            <tr>
                                                <td className="py-2 text-slate-300">Auth & PIN Hash</td>
                                                <td className="py-2 text-right text-green-500">OK</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>

                                <button className="w-full bg-slate-800 p-4 rounded-2xl flex items-center justify-center gap-3 active:bg-slate-700 transition-all">
                                    <i className="fa-solid fa-terminal text-slate-500 text-xs"></i>
                                    <span className="text-[10px] font-black uppercase tracking-widest">Run Full Diagnostics</span>
                                </button>
                            </div>
                        )}
                    </main>

                    {/* Navigation Mini-Status */}
                    <div className="fixed bottom-4 w-full text-center">
                        <p className="text-[7px] text-slate-700 font-black tracking-[0.5em] uppercase animate-pulse">
                            Secure Core Connection Established
                        </p>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
