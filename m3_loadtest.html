<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M3: Load Test</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');body{background:#020617;color:white;font-family:'Orbitron',sans-serif;font-style:italic;font-weight:bold;}.glass{background:rgba(15,23,42,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);}</style>
</head>
<body><div id="root"></div><script type="text/babel">
const LoadTest=()=>{
    const [swl,setSwl]=React.useState('');
    const proof = swl ? (parseFloat(swl)<=20?swl*1.25:parseFloat(swl)+5):0;
    return(
        <div className="min-h-screen p-6 animate-fade bg-slate-950">
            <div className="flex justify-between mb-8"><a href="index.html" className="text-[10px] underline opacity-50 text-orange-500">← HUB</a></div>
            <h1 className="text-orange-500 text-lg mb-10 text-center uppercase">M3: LOAD TESTING</h1>
            <div className="glass p-8 rounded-[3rem] border-orange-500/20 shadow-2xl">
                <input type="number" value={swl} onChange={(e)=>setSwl(e.target.value)} className="w-full bg-black/40 p-6 rounded-2xl text-center text-4xl font-black text-white outline-none mb-6" placeholder="0.0" />
                <div className="text-center">
                    <p className="text-[9px] uppercase text-slate-400 italic">Target Test Load</p>
                    <p className="text-4xl text-orange-500 font-black">{proof.toFixed(2)} T</p>
                </div>
            </div>
        </div>
    );
};
try { ReactDOM.createRoot(document.getElementById('root')).render(<LoadTest/>); } 
catch(e) { document.body.innerHTML = '<div style="color:red;padding:20px">React Error: '+e.message+'</div>'; }
</script></body></html>
