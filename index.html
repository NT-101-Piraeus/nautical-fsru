<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NauticalOS: Command Hub v4.55</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');body{background:#020617;color:white;font-family:'Orbitron',sans-serif;font-style:italic;font-weight:bold;}.glass{background:rgba(15,23,42,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);}</style>
</head>
<body><div id="root"></div><script type="text/babel">
const { useState, useEffect } = React;

const HubCommand = () => {
    const [stats, setStats] = useState({ won: 0, revenue: 0, alerts: 0 });

    useEffect(() => {
        try {
            const m3Jobs = JSON.parse(localStorage.getItem('ntg_M3_jobs') || '[]');
            const m14Offers = JSON.parse(localStorage.getItem('ntg_M14_offers') || '[]');
            setStats({
                won: m3Jobs.filter(j => j.status === 'WON').length,
                revenue: m14Offers.filter(o => o.status === 'WON').reduce((acc, curr) => acc + curr.value, 0),
                alerts: m3Jobs.length > 0 ? 1 : 0
            });
        } catch (e) { console.error("Safe Boot Active: Data Reset"); }
    }, []);

    return (
        <div className="min-h-screen p-6 bg-slate-950 text-white italic">
            <div className="mb-10 flex justify-between items-end border-b border-white/10 pb-6">
                <div><h1 className="text-2xl font-black uppercase tracking-tighter">NauticalOS Hub</h1><p className="text-[9px] text-blue-400 font-black uppercase">Fleet Command</p></div>
                <div className="text-right"><p className="text-[10px] font-black text-orange-500 italic">ADMIN: 1234</p></div>
            </div>

            {/* COMMERCIAL PULSE CARD */}
            <div className="mb-8 glass p-8 rounded-[3rem] border-emerald-500/30 active:scale-95 transition-all" onClick={() => window.location.href='m14_commercial.html'}>
                <div className="flex justify-between items-center mb-4 text-emerald-500"><span className="text-[10px] font-black uppercase">Commercial Pulse</span><i className="fa-solid fa-chart-line"></i></div>
                <p className="text-[8px] opacity-50 uppercase">Secured Revenue</p>
                <p className="text-3xl font-black">€{stats.revenue.toLocaleString()}</p>
            </div>

            {/* PERFECT GRID - 2x2 NO GAPS */}
            <div className="grid grid-cols-2 gap-4">
                <button onClick={() => window.location.href='m2_safety.html'} className="glass p-10 rounded-[3rem] border-blue-500/30 active:scale-95 transition-all">
                    <i className="fa-solid fa-shield-halved text-3xl mb-4 text-blue-500"></i>
                    <p className="text-[10px] font-black uppercase">M2 Safety</p>
                </button>
                <button onClick={() => window.location.href='m3_loadtest.html'} className="glass p-10 rounded-[3rem] border-orange-500/30 active:scale-95 transition-all">
                    <i className="fa-solid fa-anchor text-3xl mb-4 text-orange-500"></i>
                    <p className="text-[10px] font-black uppercase">M3 Load Test</p>
                </button>
                <button onClick={() => window.location.href='m14_commercial.html'} className="glass p-10 rounded-[3rem] border-emerald-500/30 active:scale-95 transition-all">
                    <i className="fa-solid fa-vault text-3xl mb-4 text-emerald-500"></i>
                    <p className="text-[10px] font-black uppercase">M14 Intel</p>
                </button>
                <button className="glass p-10 rounded-[3rem] border-white/10 opacity-30 grayscale">
                    <i className="fa-solid fa-satellite-dish text-3xl mb-4"></i>
                    <p className="text-[10px] font-black uppercase">M4 Radar</p>
                </button>
            </div>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<HubCommand />);
</script></body></html>
