<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NauticalOS | Full Command Hub V5.70</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #020617; color: white; font-family: 'Orbitron', sans-serif; overflow-x: hidden; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-card:active { transform: scale(0.95); background: rgba(30, 41, 59, 0.8); }
        .sun-mode { background: #f8fafc !important; color: #0f172a !important; }
        .sun-mode .glass-card { background: white !important; border: 1px solid #cbd5e1 !important; color: #0f172a !important; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; box-shadow: 0 0 10px currentColor; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const CommandHub = () => {
            const [sunMode, setSunMode] = useState(false);
            const [showPinGate, setShowPinGate] = useState(false);
            const [pin, setPin] = useState("");
            const [targetFile, setTargetFile] = useState("");
            
            // [Art. 2] Security Gate Protocol
            const navigateTo = (file, secure) => {
                if (!file) return; // For Standby Divisions
                if (secure && sessionStorage.getItem('ntg_global_auth') !== 'true') {
                    setTargetFile(file);
                    setShowPinGate(true);
                } else {
                    window.location.href = file;
                }
            };

            const verifyPin = () => {
                if (pin === "1234") {
                    sessionStorage.setItem('ntg_global_auth', 'true');
                    window.location.href = targetFile;
                } else {
                    alert("ACCESS DENIED | MASTER PIN REQUIRED");
                    setPin("");
                }
            };

            // FULL DIVISION LIST (M1 to M15)
            const divisions = [
                { id: 'M1', title: 'UTM ANALYSIS', file: 'm1_utm.html', icon: 'fa-arrows-left-right', status: 'ACTIVE', color: 'emerald', secure: true },
                { id: 'M2', title: 'SAFETY WATCH', file: 'm2_safety.html', icon: 'fa-shield-halved', status: 'ACTIVE', color: 'emerald', secure: true },
                { id: 'M3', title: 'LOAD TEST PRO', file: 'm3_loadtest.html', icon: 'fa-weight-hanging', status: 'ACTIVE', color: 'emerald', secure: true },
                { id: 'M4', title: 'RADAR HUNTER', file: 'm4_radar.html', icon: 'fa-tower-observation', status: 'ACTIVE', color: 'orange', secure: true },
                { id: 'M5', title: 'WAR ROOM', file: 'm5_terme.html', icon: 'fa-hammer', status: 'ACTIVE', color: 'red', secure: true },
                { id: 'M6', title: 'CEO OFFICE', file: 'm6_ceo.html', icon: 'fa-briefcase', status: 'STANDBY', color: 'blue', secure: true },
                { id: 'M7', title: 'STARTUP', file: 'm7_startup.html', icon: 'fa-rocket', status: 'STANDBY', color: 'blue', secure: false },
                { id: 'M8', title: 'ACADEMY', file: 'm8_academy.html', icon: 'fa-book-open', status: 'ACTIVE', color: 'blue', secure: false },
                { id: 'M9', title: 'OPERATION GEM', file: 'm9_ops.html', icon: 'fa-file-pdf', status: 'CRITICAL', color: 'slate', secure: true },
                { id: 'M10', title: 'SUPREME AUDITOR', file: 'm10_arch.html', icon: 'fa-eye', status: 'ACTIVE', color: 'orange', secure: true },
                { id: 'M11', title: 'SENSORS', file: 'm11_sensors.html', icon: 'fa-microchip', status: 'STANDBY', color: 'slate', secure: true },
                { id: 'M12', title: 'STAFF SCOUT', file: 'm12_staff.html', icon: 'fa-user-secret', status: 'WORKING', color: 'orange', secure: true },
                { id: 'M13', title: 'MYKONOS', file: 'm13_mykonos.html', icon: 'fa-ship', status: 'STANDBY', color: 'slate', secure: true },
                { id: 'M14', title: 'COMMERCIAL', file: 'm14_commercial.html', icon: 'fa-chart-line', status: 'ACTIVE', color: 'emerald', secure: true },
                { id: 'M15', title: 'HUB CONFIG', file: 'm15_hub.html', icon: 'fa-gear', status: 'LOCKED', color: 'orange', secure: true }
            ];

            return (
                <div className={`min-h-screen p-6 transition-all ${sunMode ? 'sun-mode' : ''}`}>
                    <div className="flex justify-between items-center mb-12 glass-card p-8 rounded-[3rem]">
                        <div className="flex items-center gap-6">
                            <i className="fa-solid fa-users-gear text-4xl text-orange-500"></i>
                            <div>
                                <h1 className="text-2xl font-black italic tracking-tighter uppercase">Command Hub V5.70</h1>
                                <p className="text-[9px] font-bold opacity-50 uppercase tracking-[0.4em] text-orange-500">Global Fleet Control</p>
                            </div>
                        </div>
                        <button onClick={() => setSunMode(!sunMode)} className="p-5 glass-card rounded-2xl">
                            <i className={`fa-solid ${sunMode ? 'fa-moon' : 'fa-sun text-orange-400'}`}></i>
                        </button>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
                        {divisions.map(div => (
                            <div key={div.id} onClick={() => navigateTo(div.file, div.secure)} className={`glass-card p-6 rounded-[2.5rem] relative ${div.file ? 'cursor-pointer hover:border-orange-500/30' : 'opacity-50 cursor-not-allowed'}`}>
                                <div className="flex justify-between items-start mb-6">
                                    <span className="text-[10px] font-black opacity-30 italic">{div.id}</span>
                                    <div className={`status-dot text-${div.color}-500 bg-current`}></div>
                                </div>
                                <i className={`fa-solid ${div.icon} text-2xl mb-4 opacity-80`}></i>
                                <h3 className="text-[11px] font-black uppercase italic tracking-wider leading-none mb-1">{div.title}</h3>
                                <p className="text-[8px] font-bold opacity-50 uppercase">{div.status}</p>
                            </div>
                        ))}
                    </div>

                    {showPinGate && (
                        <div className="fixed inset-0 bg-black/95 backdrop-blur-2xl z-50 flex items-center justify-center p-6">
                            <div className="glass-card w-full max-w-sm p-10 rounded-[3rem] text-center border-orange-500/20">
                                <i className="fa-solid fa-lock text-4xl text-orange-500 mb-6"></i>
                                <h2 className="text-sm font-black uppercase mb-8 italic">Master PIN Required</h2>
                                <input type="password" value={pin} onChange={(e) => setPin(e.target.value)} className="w-full bg-black/40 border border-white/10 p-6 rounded-3xl text-center text-4xl tracking-[1.2rem] outline-none font-black mb-8" autoFocus />
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => setShowPinGate(false)} className="text-[10px] font-black uppercase opacity-40">Cancel</button>
                                    <button onClick={verifyPin} className="bg-orange-600 h-16 rounded-2xl font-black uppercase text-xs">Verify</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<CommandHub />);
    </script>
</body>
</html>
