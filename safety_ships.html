<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SafeShip Pro | V37.2 Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; touch-action: manipulation; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        input, textarea { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; outline: none; }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const _supabase = supabase.createClient("https://omdarjncczohpffwunfy.supabase.co", "sb_publishable_V-nfUDy5MxEG4SlXkisFBg_GBlD_4Y9");

        const SHIP_LOCS = ["Deck", "Engine Room", "Pump Room", "Chimney", "Accommodation"];
        const SHIPS = [
            { id: 1, name: "FELIX", port: "Δραπετσώνα" },
            { id: 2, name: "BADJI MOKHTAR III", port: "ΕΛΕΥΣΙΝΑ" },
            { id: 3, name: "ΑΡΙΑΔΝΗ", port: "ΕΛΕΥΣΙΝΑ" },
            { id: 4, name: "RIGEL III", port: "Πέραμα" }
        ];

        function App() {
            const [view, setView] = useState('LIST');
            const [activeId, setActiveId] = useState(null);
            const [projects, setProjects] = useState(() => JSON.parse(localStorage.getItem('ntg_v37_2')) || SHIPS.map(s => ({ ...s, checks: {} })));

            useEffect(() => { localStorage.setItem('ntg_v37_2', JSON.stringify(projects)); }, [projects]);

            const saveToCloud = async (ship) => {
                const { error } = await _supabase.from('ntg_logbook').insert([{
                    ship_name: ship.name, port: ship.port, inspection_data: ship.checks, status: 'Completed'
                }]);
                if (!error) alert("ΕΠΙΤΥΧΙΑ: ΤΟ LOGBOOK ΕΝΗΜΕΡΩΘΗΚΕ");
                else alert("ΣΦΑΛΜΑ: ΕΛΕΓΞΕ ΤΟΝ ΠΙΝΑΚΑ ΣΤΗ SUPABASE");
            };

            const activeP = projects.find(s => s.id === activeId);

            if (view === 'LIST') return (
                <div className="max-w-xl mx-auto p-5">
                    <header className="py-6 flex justify-between items-center"><h1 className="brand text-[10px] font-black text-red-500 uppercase">SafeShip Manager</h1><a href="index.html" className="text-slate-600"><i className="fa-solid fa-house"></i></a></header>
                    <div className="space-y-4">
                        {projects.map(s => (
                            <div key={s.id} onClick={()=>{setActiveId(s.id); setView('FORM')}} className="glass p-6 rounded-[35px] flex justify-between items-center border border-white/5 active:scale-95 transition-all">
                                <div><h4 className="font-black text-sm uppercase">{s.name}</h4><p className="text-[9px] text-slate-500 uppercase mt-1">{s.port}</p></div>
                                <i className="fa-solid fa-chevron-right text-slate-800"></i>
                            </div>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className="max-w-xl mx-auto p-5 pb-32">
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={()=>setView('LIST')} className="text-slate-500 text-[10px] font-black uppercase">← Πίσω</button>
                        <button onClick={()=>saveToCloud(activeP)} className="bg-emerald-600 px-6 py-3 rounded-2xl text-[10px] font-black uppercase shadow-xl">Save to Cloud</button>
                    </div>
                    <div className="glass p-8 rounded-[40px] border-l-4 border-red-600 text-center mb-10"><h2 className="brand text-2xl font-black uppercase">{activeP.name}</h2></div>
                    {SHIP_LOCS.map(loc => {
                        const c = activeP.checks[loc] || { ok: false, note: '' };
                        return (
                            <div key={loc} className="glass p-6 rounded-[40px] border border-white/5 space-y-4 mb-4">
                                <div className="flex justify-between items-center">
                                    <h4 className="text-[12px] font-black uppercase text-slate-300">{loc}</h4>
                                    <button onClick={()=>{
                                        const newChecks = { ...activeP.checks, [loc]: { ...c, ok: !c.ok } };
                                        setProjects(projects.map(p => p.id === activeP.id ? { ...p, checks: newChecks } : p));
                                    }} className={`w-12 h-12 rounded-xl flex items-center justify-center ${c.ok ? 'bg-emerald-600' : 'bg-slate-800'}`}><i className="fa-solid fa-check"></i></button>
                                </div>
                                <input className="w-full p-4 rounded-2xl text-xs font-bold" placeholder="ΣΧΟΛΙΟ" value={c.note} onChange={(e)=>{
                                    const newChecks = { ...activeP.checks, [loc]: { ...c, note: e.target.value } };
                                    setProjects(projects.map(p => p.id === activeP.id ? { ...p, checks: newChecks } : p));
                                }} />
                            </div>
                        );
                    })}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script></body></html>
