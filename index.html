<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAUTICAL TECHNOLOGY GROUP | Intel Division</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700&display=swap');
        .brand-font { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        .glow-blue { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
        .scanning-line { height: 2px; background: rgba(59, 130, 246, 0.5); width: 100%; position: absolute; animation: scan 3s infinite linear; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style></head><body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [page, setPage] = useState('legal'); // legal, marine, intel
            const [isScanning, setIsScanning] = useState(true);

            const generatePDF = () => {
                try {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF();
                    doc.text("NAUTICAL TECHNOLOGY GROUP - EVIDENCE", 10, 20);
                    doc.text("Project: NAFTOCEMENT IV Forensics", 10, 30);
                    doc.save("NTG_Forensics.pdf");
                } catch(e) { alert("PDF Error: Re-loading dependencies..."); }
            };

            return (
                <div className="min-h-screen flex flex-col pb-24">
                    {/* TOP BRANDING */}
                    <header className="p-6 border-b border-blue-900/30 bg-slate-900/90 backdrop-blur-xl sticky top-0 z-50 shadow-2xl">
                        <div className="max-w-lg mx-auto text-center">
                            <h1 className="brand-font text-blue-500 text-lg font-black uppercase">Nautical Technology Group</h1>
                            <div className="flex justify-center items-center gap-2 mt-1">
                                <span className="w-2 h-2 bg-blue-500 rounded-full animate-ping"></span>
                                <p className="text-[8px] font-bold text-slate-500 uppercase tracking-[0.5em]">Intel Division System Online</p>
                            </div>
                        </div>
                    </header>

                    {/* MAIN WORKSPACES */}
                    <main className="flex-1 p-6 max-w-lg mx-auto w-full">
                        {page === 'legal' && <LegalWorkspace onPdf={generatePDF} />}
                        {page === 'marine' && <MarineWorkspace />}
                        {page === 'intel' && <IntelWorkspace />}
                    </main>

                    {/* BOTTOM NAVIGATION (Ξεκλείδωτο πλέον!) */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-slate-900/95 border-t border-blue-900/30 p-4 flex justify-around backdrop-blur-md z-50">
                        <NavTab active={page==='legal'} icon="fa-shield-halved" label="Legal" onClick={()=>setPage('legal')} />
                        <NavTab active={page==='marine'} icon="fa-ship" label="Marine" onClick={()=>setPage('marine')} />
                        <NavTab active={page==='intel'} icon="fa-tower-observation" label="Intel" onClick={()=>setPage('intel')} />
                    </nav>
                </div>
            );
        }

        // --- COMPONENTS ---

        function NavTab({ active, icon, label, onClick }) {
            return (
                <button onClick={onClick} className={`flex flex-col items-center gap-1 transition-all ${active ? 'text-blue-400 scale-110' : 'text-slate-600'}`}>
                    <i className={`fa-solid ${icon} text-xl`}></i>
                    <span className="text-[9px] font-black uppercase tracking-widest">{label}</span>
                </button>
            );
        }

        function LegalWorkspace({ onPdf }) {
            return (
                <div className="space-y-6 animate-fadeIn">
                    <h2 className="brand-font text-red-500 text-sm border-l-4 border-red-600 pl-3">LEGAL INTELLIGENCE</h2>
                    <div className="bg-slate-900/50 border border-slate-800 rounded-3xl p-6 glow-blue relative overflow-hidden">
                        <div className="scanning-line"></div>
                        <h3 className="brand-font text-blue-400 text-xs mb-4">NAFTOCEMENT IV FORENSICS</h3>
                        <p className="text-xs text-slate-400 leading-relaxed mb-6">
                            Ανάλυση "Dark Periods" Αυγούστου. Το σύστημα εντόπισε ύποπτη παύση AIS σήματος εντός του ναυπηγείου Terme. 
                        </p>
                        <button onClick={onPdf} className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-2xl text-[10px] uppercase tracking-widest transition-all shadow-lg shadow-red-900/20">
                            Generate Forensic Evidence PDF
                        </button>
                    </div>

                    <div className="bg-slate-900/50 border border-slate-800 rounded-3xl p-6">
                        <h4 className="brand-font text-[10px] text-slate-500 mb-4 uppercase">Watchlist: Terme Board</h4>
                        <div className="space-y-3">
                            {['Tugrul Karaca', 'Emir Ozturk', 'Erkan Zorlu'].map(name => (
                                <div key={name} className="flex justify-between items-center bg-black/30 p-4 rounded-2xl border border-white/5">
                                    <span className="text-xs font-bold text-slate-300">{name}</span>
                                    <span className="text-[8px] font-black text-blue-500 uppercase tracking-widest animate-pulse">Monitoring</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function MarineWorkspace() {
            return (
                <div className="space-y-6 animate-fadeIn">
                    <h2 className="brand-font text-blue-500 text-sm border-l-4 border-blue-600 pl-3">MARINE OPERATIONS</h2>
                    <div className="grid grid-cols-1 gap-4">
                        <div className="bg-emerald-900/20 border border-emerald-500/30 p-5 rounded-3xl flex justify-between items-center">
                            <div>
                                <h4 className="font-bold text-sm text-emerald-400">SAFETY PD 70/90</h4>
                                <p className="text-[10px] text-slate-500 uppercase">Status: 2 Active Jobs</p>
                            </div>
                            <i className="fa-solid fa-user-shield text-2xl text-emerald-500"></i>
                        </div>
                        <div className="bg-blue-900/20 border border-blue-500/30 p-5 rounded-3xl flex justify-between items-center">
                            <div>
                                <h4 className="font-bold text-sm text-blue-400">UTM HULL GAUGING</h4>
                                <p className="text-[10px] text-slate-500 uppercase">Rigel III: In Progress</p>
                            </div>
                            <i className="fa-solid fa-ruler-combined text-2xl text-blue-500"></i>
                        </div>
                    </div>
                </div>
            );
        }

        function IntelWorkspace() {
            return (
                <div className="space-y-6 animate-fadeIn">
                    <h2 className="brand-font text-amber-500 text-sm border-l-4 border-amber-600 pl-3">GLOBAL SURVEILLANCE</h2>
                    <div className="bg-black p-4 rounded-2xl font-mono text-[10px] text-emerald-500 border border-emerald-900/50">
                        <p className="">> Initializing Deep Search...</p>
                        <p className="">> Scanning Yard Terme Berths...</p>
                        <p className="animate-pulse">> Target Naftocement IV: Tracking August Logs...</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script></body></html>
