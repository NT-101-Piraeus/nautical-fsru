<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SafeShip Manager V27 | NTG PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; touch-action: manipulation; }
        .brand { font-family: 'Orbitron', sans-serif; color: #ef4444; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .active-btn { background: #ef4444 !important; opacity: 1 !important; }
        .signed-card { border-left: 8px solid #10b981 !important; background: rgba(16, 185, 129, 0.05) !important; }
        input, textarea { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; outline: none; }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const INITIAL_SHIPS = [
            { id: 1, name: "FELIX", time: "07:00", duration: "4h", port: "Δραπετσώνα", type: "Tanker" },
            { id: 2, name: "BADJI MOKHTAR III", time: "11:00", duration: "2h", port: "ΕΛΕΥΣΙΝΑ", type: "Ferry" },
            { id: 3, name: "ΑΡΙΑΔΝΗ", time: "13:00", duration: "2h", port: "ΕΛΕΥΣΙΝΑ", type: "Ferry" },
            { id: 4, name: "RIGEL III", time: "15:00", duration: "2h", port: "Πέραμα", type: "Ferry" }
        ];

        const LOCS = {
            "Tanker": ["Deck", "Engine Room", "Pump Room", "Cargo Tanks", "Accommodation"],
            "Ferry": ["Deck", "Engine Room", "Garage", "Accommodation", "Pax Areas"],
            "Cargo": ["Deck", "Engine Room", "Holds", "Accommodation"]
        };

        function App() {
            const [isAuth, setIsAuth] = useState(() => sessionStorage.getItem('ntg_auth') === 'true');
            const [view, setView] = useState('DASHBOARD');
            const [activeId, setActiveId] = useState(null);
            const [projects, setProjects] = useState(() => {
                const saved = JSON.parse(localStorage.getItem('ntg_v27_data'));
                const today = new Date().toLocaleDateString();
                if (saved && saved.lastDate === today) return saved.ships;
                return INITIAL_SHIPS.map(s => ({ ...s, data: {}, gasFree: '', gasFreePhoto: false, signedToday: false }));
            });

            useEffect(() => {
                localStorage.setItem('ntg_v27_data', JSON.stringify({ ships: projects, lastDate: new Date().toLocaleDateString() }));
            }, [projects]);

            const updateProject = (id, field, val) => {
                setProjects(projects.map(p => p.id === id ? { ...p, [field]: val } : p));
            };

            const addObs = (shipId, loc, text) => {
                if (!text.trim()) return;
                setProjects(projects.map(p => {
                    if (p.id === shipId) {
                        const locData = p.data[loc] || { observations: [] };
                        return { ...p, data: { ...p.data, [loc]: { ...locData, observations: [...locData.observations, { id: Date.now(), text, isTask: false }] } } };
                    }
                    return p;
                }));
            };

            const toggleTask = (shipId, loc, obsId) => {
                setProjects(projects.map(p => {
                    if (p.id === shipId) {
                        const locData = p.data[loc];
                        const updatedObs = locData.observations.map(o => o.id === obsId ? { ...o, isTask: !o.isTask } : o);
                        return { ...p, data: { ...p.data, [loc]: { ...locData, observations: updatedObs } } };
                    }
                    return p;
                }));
            };

            if (!isAuth) return (
                <div className="h-screen flex items-center justify-center p-6 bg-slate-950">
                    <form onSubmit={(e)=>{e.preventDefault(); if(e.target.p.value==='NT2026'){sessionStorage.setItem('ntg_auth','true');setIsAuth(true)}}} className="glass p-10 rounded-[40px] w-full max-w-sm text-center">
                        <h1 className="brand text-red-500 text-xl mb-8 uppercase">SafeShip V27</h1>
                        <input name="p" type="password" className="w-full p-5 rounded-3xl mb-4 text-center" placeholder="ΚΩΔΙΚΟΣ" />
                        <button className="w-full bg-red-600 p-5 rounded-3xl font-black uppercase text-xs">Login</button>
                    </form>
                </div>
            );

            const ship = projects.find(s => s.id === activeId);
            const allTasks = projects.flatMap(p => Object.entries(p.data).flatMap(([loc, d]) => d.observations?.filter(o => o.isTask).map(o => ({ ship: p.name, loc, ...o })) || []));

            return (
                <div className="max-w-xl mx-auto pb-32 animate-fadeIn">
                    <header className="p-6 border-b border-slate-800 flex justify-between items-center sticky top-0 bg-[#020617] z-50">
                        <div><h1 className="brand text-xs font-black text-red-500 uppercase">SafeShip Manager</h1><p className="text-[10px] text-slate-500">{new Date().toLocaleDateString('el-GR')}</p></div>
                        <div className="text-right"><p className="text-xl font-black">{new Date().toLocaleTimeString('el-GR',{hour:'2-digit',minute:'2-digit'})}</p></div>
                    </header>

                    {view === 'DASHBOARD' && (
                        <div className="p-5 space-y-6">
                            <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2 italic">Πρόγραμμα Μαρτίου (ΣΕΠΕ)</h3>
                            <div className="space-y-4">
                                {projects.map(s => (
                                    <div key={s.id} className={`glass p-6 rounded-[35px] flex justify-between items-center ${s.signedToday ? 'signed-card' : 'border border-white/5'}`}>
                                        <div onClick={()=>{setActiveId(s.id); setView('INSPECTION')}} className="flex-1 cursor-pointer">
                                            <h4 className="font-black text-sm uppercase">{s.name}</h4>
                                            <p className="text-[9px] text-slate-400 font-bold uppercase mt-1"><i className="fa-solid fa-location-dot text-red-500 mr-1"></i> {s.port} • {s.time}</p>
                                        </div>
                                        <button onClick={()=>updateProject(s.id, 'signedToday', !s.signedToday)} className={`px-4 py-2.5 rounded-2xl text-[9px] font-black uppercase border border-white/10 ${s.signedToday ? 'bg-emerald-600 border-emerald-400' : 'bg-slate-800'}`}>
                                            {s.signedToday ? 'ΥΠΕΓΡΑΨΑ ✓' : 'ΥΠΟΓΡΑΦΗ'}
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {view === 'INSPECTION' && ship && (
                        <div className="p-5 space-y-8 animate-fadeIn">
                            <button onClick={()=>setView('DASHBOARD')} className="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-4">← Πίσω στο Μενού</button>
                            <div className="glass p-8 rounded-[40px] border-l-4 border-red-600 text-center">
                                <h2 className="brand text-2xl font-black uppercase">{ship.name}</h2>
                                <p className="text-[10px] text-slate-400 font-bold uppercase mt-1">{ship.port} • {ship.type}</p>
                            </div>

                            <div className="glass p-6 rounded-[30px] flex justify-between items-center border border-blue-500/20">
                                <div><h4 className="text-[10px] font-black text-blue-400 uppercase"><i className="fa-solid fa-certificate mr-2"></i> Gas-Free Photo</h4></div>
                                <button onClick={()=>document.getElementById('c').click()} className="bg-blue-600 w-12 h-12 rounded-xl flex items-center justify-center"><i className="fa-solid fa-camera"></i></button>
                                <input type="file" id="c" capture="camera" className="hidden" />
                            </div>

                            <div className="space-y-10">
                                {LOCS[ship.type].map(loc => {
                                    const d = ship.data[loc] || { observations: [] };
                                    return (
                                        <div key={loc} className="glass p-6 rounded-[40px] border border-white/5">
                                            <h4 className="text-[12px] font-black uppercase text-red-500 mb-6">{loc}</h4>
                                            
                                            <div className="space-y-3 mb-6">
                                                {d.observations.map(o => (
                                                    <div key={o.id} className="bg-slate-900/80 p-4 rounded-2xl border border-white/5 flex justify-between items-start">
                                                        <p className="text-[12px] text-slate-200 leading-relaxed flex-1 pr-4">{o.text}</p>
                                                        <button onClick={()=>toggleTask(ship.id, loc, o.id)} className={`px-3 py-1.5 rounded-lg text-[8px] font-black uppercase ${o.isTask ? 'bg-red-600' : 'bg-slate-700'}`}>TASK</button>
                                                    </div>
                                                ))}
                                            </div>

                                            <div className="flex gap-2">
                                                <input id={`in-${loc}`} className="flex-1 p-4 rounded-2xl text-xs" placeholder="Προσθήκη παρατήρησης..." />
                                                <button onClick={()=>{const i=document.getElementById(`in-${loc}`); addObs(ship.id, loc, i.value); i.value=''}} className="bg-slate-700 w-12 h-12 rounded-2xl flex items-center justify-center text-xl">+</button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {view === 'TASKS' && (
                        <div className="p-6 space-y-6 animate-fadeIn">
                            <h2 className="brand text-xl uppercase italic mb-8">Εκκρεμότητες Στόλου (Tasks)</h2>
                            {allTasks.length === 0 ? <div className="glass p-20 rounded-[50px] text-center opacity-30 italic">No pending tasks.</div> : 
                                allTasks.map((t, i) => (
                                    <div key={i} className="glass p-6 rounded-[35px] border-l-4 border-amber-500">
                                        <p className="text-[8px] font-black text-amber-500 uppercase">{t.ship} • {t.loc}</p>
                                        <p className="text-[13px] text-slate-200 mt-2 leading-relaxed">{t.text}</p>
                                    </div>
                                ))
                            }
                        </div>
                    )}

                    <footer className="fixed bottom-0 left-0 right-0 p-6 glass border-t border-slate-800 flex justify-around bg-[#020617] z-50">
                        <button onClick={()=>setView('DASHBOARD')} className={`flex flex-col items-center gap-1 ${view==='DASHBOARD'?'text-red-500':'text-slate-600'}`}><i className="fa-solid fa-anchor"></i><span className="text-[8px] font-bold">HUB</span></button>
                        <button onClick={()=>setView('TASKS')} className={`flex flex-col items-center gap-1 ${view==='TASKS'?'text-red-500':'text-slate-600'}`}><i className="fa-solid fa-list-check"></i><span className="text-[8px] font-bold">TASKS ({allTasks.length})</span></button>
                        <a href="index.html" className="flex flex-col items-center gap-1 text-slate-600"><i className="fa-solid fa-house-user"></i><span className="text-[8px] font-bold">EXIT</span></a>
                    </footer>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script></body></html>
