<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NTG COMMAND | FULL SYSTEM V2.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .tile-active { transform: scale(0.95); background: rgba(59, 130, 246, 0.2); }
        .progress-bar { height: 6px; background: #1e293b; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.8s ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ΣΥΝΔΕΣΗ SUPABASE (ΒΑΛΕ ΤΑ ΚΛΕΙΔΙΑ ΣΟΥ) ---
        const SUPABASE_URL = 'https://ovofreerowjofpvyqqre.supabase.co'; 
        const SUPABASE_KEY = 'YOUR_SUPABASE_KEY_HERE'; 
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function App() {
            const [view, setView] = useState('HOME');
            const [mode, setMode] = useState('MARITIME');
            const [loading, setLoading] = useState(false);

            // Mock Data for Manuals
            const fleet = [
                { name: 'NAFTOCEMENT IV', status: 'Repairing', progress: 75, days: 2, color: 'bg-cyan-500' },
                { name: 'BLUE STAR I', status: 'Inbound', progress: 15, days: 12, color: 'bg-blue-500' }
            ];

            const inventory = [
                { item: 'Gas Detector GX-2009', stock: 2, price: '€420', low: true },
                { item: 'Safety Harness Pro', stock: 15, price: '€110', low: false }
            ];

            return (
                <div className="min-h-screen flex flex-col max-w-md mx-auto relative shadow-2xl shadow-blue-500/10">
                    
                    {/* --- GLOBAL SYNC HEADER (Manual 01) --- */}
                    <header className="glass sticky top-0 z-50 p-4 flex justify-between items-center border-b border-blue-500/20">
                        <div onClick={() => setView('HOME')} className="cursor-pointer">
                            <p className="text-[9px] font-black text-blue-500 tracking-[0.3em] uppercase leading-none mb-1">NTG Command</p>
                            <h1 className="font-black text-sm tracking-tighter italic">M. SYKINIOTIS</h1>
                        </div>
                        <div className="text-right">
                            <div className="flex items-center gap-2 justify-end">
                                <span className="text-[8px] font-black text-slate-500 uppercase tracking-widest">Cloud Active</span>
                                <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_#22c55e]"></div>
                            </div>
                            <button onClick={() => setMode(mode === 'MARITIME' ? 'INDUSTRIAL' : 'MARITIME')} className="mt-1 bg-slate-800 border border-slate-700 px-2 py-0.5 rounded text-[8px] font-black text-slate-400">
                                MODE: {mode}
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 p-5 overflow-y-auto">
                        
                        {/* --- HUB VIEW (The 8 Icons) --- */}
                        {view === 'HOME' && (
                            <div className="grid grid-cols-2 gap-4 animate-in fade-in zoom-in duration-300">
                                <button onClick={() => setView('M1')} className="glass p-6 rounded-[2.5rem] flex flex-col items-center gap-2 border-b-4 border-blue-600">
                                    <i className="fa-solid fa-shield-halved text-3xl text-blue-400"></i>
                                    <span className="text-[10px] font-black uppercase tracking-tighter">Safety (M1)</span>
                                </button>
                                <button onClick={() => setView('M2')} className="glass p-6 rounded-[2.5rem] flex flex-col items-center gap-2 border-b-4 border-cyan-500">
                                    <i className="fa-solid fa-ship text-3xl text-cyan-400"></i>
                                    <span className="text-[10px] font-black uppercase tracking-tighter">Repairs (M2)</span>
                                </button>
                                <button onClick={() => setView('M3')} className="glass p-6 rounded-[2.5rem] flex flex-col items-center gap-2 border-b-4 border-red-600">
                                    <i className="fa-solid fa-scale-balanced text-3xl text-red-500"></i>
                                    <span className="text-[10px] font-black uppercase tracking-tighter">Legal (M3)</span>
                                </button>
                                <button onClick={() => setView('M5')} className="glass p-6 rounded-[2.5rem] flex flex-col items-center gap-2 border-b-4 border-emerald-500">
                                    <i className="fa-solid fa-user-clock text-3xl text-emerald-500"></i>
                                    <span className="text-[10px] font-black uppercase tracking-tighter">Workforce (M5)</span>
                                </button>
                                <button onClick={() => setView('M6')} className="glass p-6 rounded-[2.5rem] flex flex-col items-center gap-2 border-b-4 border-purple-600">
                                    <i className="fa-solid fa-chart-line text-3xl text-purple-500"></i>
                                    <span className="text-[10px] font-black uppercase tracking-tighter">CEO Pulse (M6)</span>
                                </button>
                                <button onClick={() => setView('M7')} className="glass p-6 rounded-[2.5rem] flex flex-col items-center gap-2 border-b-4 border-orange-500">
                                    <i className="fa-solid fa-cart-shopping text-3xl text-orange-500"></i>
                                    <span className="text-[10px] font-black uppercase tracking-tighter">Merchant (M7)</span>
                                </button>
                                <button onClick={() => setView('M8')} className="glass p-6 rounded-[2.5rem] flex flex-col items-center gap-2 border-b-4 border-pink-600">
                                    <i className="fa-solid fa-house-chimney-user text-3xl text-pink-500"></i>
                                    <span className="text-[10px] font-black uppercase tracking-tighter">Airbnb (M8)</span>
                                </button>
                                <button onClick={() => setView('M4')} className="glass p-6 rounded-[2.5rem] flex flex-col items-center gap-2 border-b-4 border-slate-500">
                                    <i className="fa-solid fa-microchip text-3xl text-slate-500"></i>
                                    <span className="text-[10px] font-black uppercase tracking-tighter">Tech (M4)</span>
                                </button>
                            </div>
                        )}

                        {/* --- M2: REPAIRS (Manual 02) --- */}
                        {view === 'M2' && (
                            <div className="space-y-4 animate-in slide-in-from-right">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="brand text-cyan-400 text-xs tracking-widest italic uppercase underline decoration-cyan-500/50 underline-offset-8">Repair Controller</h2>
                                    <button onClick={() => setView('HOME')} className="text-[10px] font-black text-slate-500 uppercase">Back</button>
                                </div>
                                <div className="relative mb-6">
                                    <input type="text" placeholder="Search Fleet..." className="w-full bg-slate-900 border border-slate-700 p-4 rounded-2xl text-xs font-bold focus:border-cyan-500 outline-none" />
                                    <i className="fa-solid fa-magnifying-glass absolute right-4 top-4 text-slate-600"></i>
                                </div>
                                {fleet.map(ship => (
                                    <div key={ship.name} className="glass p-5 rounded-3xl border-l-4 border-cyan-500 space-y-3">
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <h3 className="font-black text-sm tracking-tighter uppercase">{ship.name}</h3>
                                                <p className="text-[9px] text-slate-500 font-bold uppercase">{ship.status}</p>
                                            </div>
                                            <span className={`text-[8px] font-black px-2 py-1 rounded ${ship.days < 3 ? 'bg-red-600' : 'bg-slate-800'}`}>{ship.days} DAYS LEFT</span>
                                        </div>
                                        <div className="progress-bar"><div className={`progress-fill ${ship.color}`} style={{width: `${ship.progress}%`}}></div></div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* --- M6: CEO PULSE (Manual 06) --- */}
                        {view === 'M6' && (
                            <div className="space-y-6 animate-in zoom-in">
                                <div className="flex justify-between items-center">
                                    <h2 className="brand text-purple-500 text-xs tracking-widest italic">MASTER PULSE</h2>
                                    <button onClick={() => setView('HOME')} className="text-[10px] font-black text-slate-500 uppercase">Back</button>
                                </div>
                                <div className="glass p-8 rounded-[3rem] bg-purple-900/5 border-purple-500/20 text-center">
                                    <p className="text-[10px] font-black text-emerald-500 uppercase tracking-[0.3em] mb-2">Net Profitability</p>
                                    <h3 className="text-4xl font-black text-white tracking-tighter underline decoration-emerald-500/30">+32.4%</h3>
                                    <div className="grid grid-cols-2 gap-3 mt-8">
                                        <div className="p-3 bg-slate-900 rounded-2xl border border-slate-800"><p className="text-[8px] text-slate-500 font-bold mb-1 uppercase">Fleet Health</p><p className="text-xs font-black">84%</p></div>
                                        <div className="p-3 bg-slate-900 rounded-2xl border border-slate-800"><p className="text-[8px] text-slate-500 font-bold mb-1 uppercase">Burn Rate</p><p className="text-xs font-black">€4.2k/d</p></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- M8: AIRBNB (Manual 08) --- */}
                        {view === 'M8' && (
                            <div className="space-y-4 animate-in slide-in-from-bottom">
                                <div className="flex justify-between items-center">
                                    <h2 className="brand text-pink-500 text-xs tracking-widest italic uppercase">Crew Accommodation</h2>
                                    <button onClick={() => setView('HOME')} className="text-[10px] font-black text-slate-500 uppercase">Back</button>
                                </div>
                                <div className="glass p-5 rounded-[2.5rem] border-l-4 border-pink-500 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 p-4 opacity-10"><i className="fa-solid fa-bed text-5xl"></i></div>
                                    <h3 className="text-sm font-black uppercase mb-1 tracking-tighter">Syros Loft A</h3>
                                    <p className="text-[9px] font-bold text-slate-500 uppercase mb-4 tracking-widest">Ερμούπολη // Active</p>
                                    <div className="flex justify-between items-center border-t border-slate-800 pt-4">
                                        <div className="flex gap-4">
                                            <div className="text-center"><p className="text-[8px] font-black text-slate-500 uppercase leading-none mb-1">Beds</p><p className="text-xs font-black">4</p></div>
                                            <div className="text-center border-l border-slate-800 pl-4"><p className="text-[8px] font-black text-slate-500 uppercase leading-none mb-1">Occ</p><p className="text-xs font-black text-pink-500 tracking-tighter italic italic tracking-tighter italic">3/4</p></div>
                                        </div>
                                        <p className="text-xs font-black text-white italic">€65 / day</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- M1-M3-M4-M5-M7 PLACEHOLDERS --- */}
                        {['M1','M3','M4','M5','M7'].includes(view) && (
                            <div className="flex flex-col items-center justify-center py-20 animate-in fade-in">
                                <i className="fa-solid fa-screwdriver-wrench text-5xl mb-4 text-slate-700"></i>
                                <p className="brand text-[10px] text-slate-500 uppercase italic tracking-widest">Manual {view} Logic Loaded</p>
                                <button onClick={() => setView('HOME')} className="mt-8 bg-slate-800 px-6 py-2 rounded-xl text-[10px] font-black text-slate-300 uppercase">Return to Hub</button>
                            </div>
                        )}

                    </main>

                    {/* --- GLOBAL SMART CAPTURE [🔵] --- */}
                    <div className="fixed bottom-6 left-0 right-0 flex justify-center pointer-events-none z-50">
                        <label className="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(37,99,235,0.4)] border-4 border-slate-950 pointer-events-auto active:scale-90 transition-all cursor-pointer">
                            <i className="fa-solid fa-camera text-2xl text-white"></i>
                            <input type="file" accept="image/*" capture="environment" className="hidden" />
                        </label>
                    </div>

                    <footer className="fixed bottom-2 w-full text-center">
                        <p className="brand text-[7px] text-slate-700 font-black tracking-[0.5em] uppercase">NTG Command • Version 2.5 Operational</p>
                    </footer>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
