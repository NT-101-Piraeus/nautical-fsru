<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M2: Compliance Shield v3.75 (Perfect Shield)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');body{background:#020617;color:white;font-family:'Orbitron',sans-serif;font-style:italic;font-weight:bold;}.glass{background:rgba(15,23,42,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);}</style></head><body><div id="root"></div><script type="text/babel">const { useState, useEffect } = React;const SafetyApp = () => {
    // STATE: ADMIN & WATCHLIST
    const [view, setView] = useState('WATCHLIST'); 
    const [activeVessel, setActiveVessel] = useState(null);
    const [showAdminModal, setShowAdminModal] = useState(false);
    const [pin, setPin] = useState('');
    const [newVessel, setNewVessel] = useState({ name: '', imo: '', shift: '' });
    
    // STATE: INSPECTION MODULE
    const [sunMode, setSunMode] = useState(false);
    const [dailyTasks, setDailyTasks] = useState([]);
    const [photos, setPhotos] = useState([]);
    const [tempArea, setTempArea] = useState('Main Deck');
    const [tempTaskType, setTempTaskType] = useState('Hot Works');

    // 🛠️ ΣΩΣΤΟΣ ΤΡΟΠΟΣ ΦΟΡΤΩΣΗΣ (Lazy Initial State)
    const [vessels, setVessels] = useState(() => {
        const saved = localStorage.getItem('ntg_vessels');
        if (saved) return JSON.parse(saved);
        return [
            { id: 1, name: 'FELIX', imo: '9513191', shift: '07:00 - 11:00', status: 'ACTIVE' },
            { id: 2, name: 'ARIADNI', imo: '9513192', shift: '12:00 - 15:00', status: 'PENDING' }
        ];
    });

    // ΑΥΤΟΜΑΤΟΣ ΣΥΓΧΡΟΝΙΣΜΟΣ LOCAL CACHE
    useEffect(() => {
        localStorage.setItem('ntg_vessels', JSON.stringify(vessels));
    }, [vessels]);

    const handleAddProject = () => {
        if (!newVessel.name || !newVessel.imo) return alert("⚠️ Σφάλμα: Συμπληρώστε Όνομα Πλοίου και IMO!");
        if (pin === '1234') {
            const project = { ...newVessel, id: Date.now(), status: 'PENDING' };
            setVessels([...vessels, project]);
            setShowAdminModal(false); setPin(''); setNewVessel({ name: '', imo: '', shift: '' });
        } else {
            alert("❌ ΛΑΘΟΣ PIN.");
        }
    };

    // ΠΡΟΔΙΑΓΡΑΦΕΣ Π.Δ. 70/90
    const workRequirements = {
        "Hot Works": ["Gas-Free Certificate Checked", "Fire Standby Present", "Fire Blanket in place"],
        "Confined Space": ["O2/LEL Levels Tested", "Standby Person at Entry", "Ventilation OK"],
        "Lifting Ops": ["Gear Certified", "Area Clear", "SWL Verified"]
    };

    const addJobToShift = () => {
        setDailyTasks([...dailyTasks, { id: Date.now(), area: tempArea, type: tempTaskType, verified: false }]);
    };

    const theme = sunMode ? "bg-white text-black" : "bg-slate-950 text-white";
    const card = sunMode ? "bg-slate-100 border-slate-300 shadow-xl" : "glass border-blue-500/20";

    // --- VIEW 1: WATCHLIST (ΜΕ ADD PROJECT) ---
    if (view === 'WATCHLIST') return (
        <div className="min-h-screen p-6 animate-fade bg-slate-950 font-bold italic">
            <div className="flex justify-between items-center mb-10">
                <a href="index.html" className="text-[10px] underline opacity-50 text-slate-400">← HUB</a>
                <span className="text-[9px] text-blue-500 font-black uppercase tracking-widest italic animate-pulse">ΣΕΠΕ SYNC</span>
            </div>

            <h1 className="text-blue-600 text-lg uppercase mb-8 text-center italic tracking-tighter">M2: SAFETY WATCHLIST</h1>
            
            <div className="space-y-4 mb-10">
                {vessels.map(v => (
                    <div key={v.id} onClick={() => { setActiveVessel(v); setView('INSPECTION'); }} className="glass p-5 rounded-[2.5rem] border-l-4 border-slate-700 flex justify-between items-center shadow-xl cursor-pointer active:scale-95 transition-all">
                        <div>
                            <p className="text-sm text-white font-black">{v.name}</p>
                            <p className="text-[9px] text-slate-500 uppercase mt-1">IMO: {v.imo} • SHIFT: {v.shift}</p>
                        </div>
                        <i className="fa-solid fa-chevron-right text-slate-800"></i>
                    </div>
                ))}
            </div>

            <button onClick={() => setShowAdminModal(true)} className="w-full bg-blue-600/10 border-2 border-dashed border-blue-500/40 p-6 rounded-[2.5rem] text-blue-500 font-black uppercase text-[10px] flex items-center justify-center gap-3">
                <i className="fa-solid fa-folder-plus text-xl"></i> Add New Project (Admin)
            </button>

            {/* ADMIN MODAL */}
            {showAdminModal && (
                <div className="fixed inset-0 bg-black/95 backdrop-blur-xl z-50 flex items-center justify-center p-6">
                    <div className="glass w-full p-8 rounded-[3rem] border-blue-500/30 space-y-6">
                        <p className="text-center text-[10px] text-blue-500 uppercase tracking-widest mb-4">Admin Security Access</p>
                        <input type="password" placeholder="PIN" value={pin} onChange={(e)=>setPin(e.target.value)} className="w-full bg-black/50 p-5 rounded-2xl text-center text-2xl tracking-[1rem] outline-none border border-white/10" />
                        {pin === '1234' && (
                            <div className="space-y-4 animate-fade">
                                <input type="text" placeholder="NAME (e.g. FSRU AVALON)" value={newVessel.name} onChange={(e)=>setNewVessel({...newVessel, name: e.target.value.toUpperCase()})} className="w-full bg-slate-900/50 p-4 rounded-xl text-xs outline-none border border-white/5" />
                                <input type="text" placeholder="IMO NUMBER" value={newVessel.imo} onChange={(e)=>setNewVessel({...newVessel, imo: e.target.value})} className="w-full bg-slate-900/50 p-4 rounded-xl text-xs outline-none border border-white/5" />
                                <input type="text" placeholder="SHIFT (e.g. 18:00-22:00)" value={newVessel.shift} onChange={(e)=>setNewVessel({...newVessel, shift: e.target.value})} className="w-full bg-slate-900/50 p-4 rounded-xl text-xs outline-none border border-white/5" />
                                <button onClick={handleAddProject} className="w-full bg-blue-600 p-5 rounded-2xl text-[10px] uppercase font-black italic">Save to Watchlist</button>
                            </div>
                        )}
                        <button onClick={() => {setShowAdminModal(false); setPin('');}} className="w-full text-[9px] text-slate-600 uppercase mt-4">Cancel</button>
                    </div>
                </div>
            )}
        </div>
    );

    // --- VIEW 2: INSPECTION MODULE (Η ΝΟΜΙΚΗ ΘΩΡΑΚΙΣΗ) ---
    return (
        <div className={`min-h-screen p-6 transition-all duration-300 animate-fade ${theme}`}>
            <div className="flex justify-between items-center mb-6 border-b border-blue-500/20 pb-4">
                <button onClick={() => setView('WATCHLIST')} className={`text-[10px] underline opacity-60 ${sunMode?'text-black':'text-blue-400'}`}>← Back to Ships</button>
                <div className="flex items-center gap-4">
                    <span className="text-[11px] uppercase font-black italic tracking-tighter">{activeVessel.name}</span>
                    <button onClick={() => setSunMode(!sunMode)} className={`p-2 rounded-full border ${sunMode?'border-slate-300 bg-slate-200 shadow-md':'border-slate-800 bg-slate-900 shadow-inner'}`}>
                        <i className={`fa-solid ${sunMode?'fa-moon text-blue-900':'fa-sun text-yellow-500'}`}></i>
                    </button>
                </div>
            </div>

            {/* JOBLIST BUILDER */}
            <div className={`${card} p-5 rounded-[2.5rem] mb-6 space-y-4 shadow-2xl`}>
                <p className="text-[8px] uppercase tracking-widest text-slate-500 font-black italic">Add Task to Daily Joblist</p>
                <div className="grid grid-cols-2 gap-2">
                    <select value={tempArea} onChange={(e)=>setTempArea(e.target.value)} className="bg-slate-800/20 p-4 rounded-2xl text-[10px] outline-none border border-white/5 font-black italic text-white">
                        <option>Main Deck</option><option>Engine Room</option><option>Pump Room</option><option>Garage</option>
                    </select>
                    <select value={tempTaskType} onChange={(e)=>setTempTaskType(e.target.value)} className="bg-slate-800/20 p-4 rounded-2xl text-[10px] outline-none border border-white/5 font-black italic text-white">
                        <option>Hot Works</option><option>Confined Space</option><option>Lifting Ops</option>
                    </select>
                </div>
                <button onClick={addJobToShift} className="w-full bg-blue-600/20 border border-blue-600/40 p-4 rounded-2xl text-[9px] uppercase font-black italic shadow-md active:scale-95 transition-all">
                    Add Task to Shift +
                </button>
            </div>

            {/* DAILY JOBLIST DISPLAY (Π.Δ. 70/90) */}
            <div className="space-y-4 mb-28 pr-1 overflow-y-auto max-h-48 italic">
                {dailyTasks.map(task => (
                    <div key={task.id} className={`${card} p-4 rounded-3xl animate-fade`}>
                        <h4 className="text-[11px] uppercase text-blue-500 font-black mb-3">{task.area} / {task.type}</h4>
                        <div className="space-y-2">
                            {workRequirements[task.type]?.map(check => (
                                <label key={check} className="flex items-center gap-3 bg-black/20 p-3 rounded-xl border border-white/5">
                                    <input type="checkbox" className="w-4 h-4 accent-blue-600" />
                                    <span className="text-[9px] uppercase opacity-80 text-white">{check}</span>
                                </label>
                            ))}
                        </div>
                    </div>
                ))}
            </div>

            {/* EVIDENCE LOCK */}
            <div className={`fixed bottom-0 left-0 right-0 p-6 ${sunMode ? 'bg-white shadow-[0_-10px_30px_rgba(0,0,0,0.1)]' : 'bg-slate-950 border-t border-blue-900/20'}`}>
                <div className="flex gap-4">
                    <button onClick={() => setPhotos([...photos, {id: Date.now()}])} 
                            className={`flex-1 p-6 rounded-[2.5rem] flex flex-col items-center gap-2 border-2 transition-all active:scale-95 ${photos.length > 0 ? 'border-emerald-500 bg-emerald-500/10' : 'border-slate-700 border-dashed bg-black/20'}`}>
                        <i className={`fa-solid fa-camera text-2xl ${photos.length > 0 ? 'text-emerald-500' : 'text-slate-600'}`}></i>
                        <span className={`text-[8px] uppercase font-black ${photos.length > 0 ? 'text-emerald-500' : 'text-slate-600'}`}>Capture ({photos.length})</span>
                    </button>
                    
                    <button disabled={photos.length === 0 || dailyTasks.length === 0}
                            className={`flex-1 p-6 rounded-[2.5rem] flex flex-col items-center gap-2 border-2 ${photos.length > 0 && dailyTasks.length > 0 ? 'border-emerald-600 bg-emerald-600 text-white shadow-xl' : 'border-slate-800 opacity-20 grayscale cursor-not-allowed'}`}>
                        <i className="fa-solid fa-signature text-2xl"></i>
                        <span className="text-[8px] uppercase font-black tracking-widest">Sign Log</span>
                    </button>
                </div>
            </div>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<SafetyApp />);</script></body></html>
