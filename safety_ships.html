<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SafeShip Pro | V46 Radar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; touch-action: manipulation; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .active-ok { background: #10b981 !important; box-shadow: 0 0 20px rgba(16, 185, 129, 0.3); }
        .active-block { background: #ef4444 !important; box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); }
        .active-wait { background: #f59e0b !important; }
        .specialty-active { background: #3b82f6 !important; border-color: #60a5fa !important; }
        textarea { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; outline: none; }
        .footer-nav { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.1); }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const _supabase = supabase.createClient("https://omdarjncczohpffunfy.supabase.co", "sb_publishable_V-nfUDy5MxEG4SlXkisFBg_GBlD_4Y9");

        const INITIAL_SHIPS = [{ imo: "9234567", name: "FELIX", port: "Δραπετσώνα" }, { imo: "9345678", name: "RIGEL III", port: "Πέραμα" }];
        const LOCS = ["Deck", "Engine Room", "Garage", "Chimney", "Accommodation"];

        function App() {
            const [view, setView] = useState('FLEET');
            const [activeImo, setActiveImo] = useState(null);
            const [projects, setProjects] = useState(() => JSON.parse(localStorage.getItem('ntg_master_data'))?.ships || INITIAL_SHIPS.map(s => ({ ...s, data: {}, signedToday: false })));

            useEffect(() => { localStorage.setItem('ntg_master_data', JSON.stringify({ ships: projects })); }, [projects]);

            const allTasks = projects.flatMap(p => Object.entries(p.data || {}).flatMap(([loc, d]) => (d.observations || []).filter(o => o.isTask).map(o => ({ ...o, ship: p.name, loc }))));
            const ship = projects.find(s => s.imo === activeImo);

            return (
                <div className="min-h-screen pb-40">
                    {view === 'FLEET' && (
                        <div className="max-w-xl mx-auto p-5 animate-fadeIn">
                            <header className="py-10 flex justify-between items-center"><h1 className="brand text-xs text-red-500 uppercase italic">SafeShip Pro</h1><a href="index.html" className="text-slate-600 text-2xl"><i className="fa-solid fa-house"></i></a></header>
                            <div className="space-y-6">
                                {projects.map(s => (
                                    <div key={s.imo} className={`glass p-8 rounded-[45px] flex justify-between items-center border border-white/5 transition-all ${s.signedToday ? 'border-l-8 border-emerald-500 bg-emerald-500/5' : 'shadow-xl'}`}>
                                        <div onClick={()=>{setActiveImo(s.imo); setView('FORM')}} className="flex-1 cursor-pointer"><h4 className="font-black text-xl uppercase tracking-tighter">{s.name}</h4><p className="text-sm font-bold text-slate-400 mt-2 uppercase">{s.port}</p></div>
                                        <button onClick={()=>setProjects(projects.map(p=>p.imo===s.imo?{...p, signedToday:!p.signedToday}:p))} className={`px-6 py-4 rounded-3xl text-[11px] font-black uppercase shadow-lg ${s.signedToday ? 'bg-emerald-600 text-white' : 'bg-slate-800 text-slate-500'}`}>{s.signedToday ? 'DONE ✓' : 'SIGN'}</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {view === 'FORM' && ship && (
                        <div className="max-w-xl mx-auto p-5 pb-32 animate-fadeIn">
                            <div className="flex justify-between items-center mb-10">
                                <button onClick={()=>setView('FLEET')} className="bg-slate-800 px-6 py-4 rounded-2xl text-[11px] font-black uppercase">← Back</button>
                                <button onClick={async()=>{
                                    const { error } = await _supabase.from('ntg_logbook').insert([{ship_name:ship.name, inspection_data:ship.data}]);
                                    if(!error) { alert("DATA SYNCED SUCCESSFULLY TO SUPABASE"); } else { alert("SYNC ERROR: CHECK CONNECTION"); }
                                }} className="bg-emerald-600 px-6 py-4 rounded-2xl text-[11px] font-black uppercase shadow-2xl">Finalize & Sync</button>
                            </div>
                            <div className="glass p-12 rounded-[60px] border-l-8 border-red-600 text-center mb-12 shadow-2xl"><h2 className="brand text-3xl font-black uppercase tracking-tighter">{ship.name}</h2></div>
                            <div className="space-y-16">
                                {LOCS.map(loc => {
                                    const d = (ship.data && ship.data[loc]) || { observations: [] };
                                    return (
                                        <div key={loc} className="space-y-8">
                                            <div className="flex justify-between items-center px-4"><h4 className="text-2xl font-black uppercase text-red-500 tracking-tighter">{loc}</h4><button onClick={()=>{
                                                const newObs = { id: Date.now(), text: '', status: 'ok', trades: [], isTask: false };
                                                setProjects(projects.map(p=>p.imo===ship.imo?{...p, data:{...p.data,[loc]:{observations:[...(p.data[loc]?.observations||[]), newObs]}}}:p));
                                            }} className="bg-slate-800 px-5 py-3 rounded-2xl text-[11px] font-black border border-white/10 shadow-lg">+ NEW LOG</button></div>
                                            {d.observations.map(o => (
                                                <div key={o.id} className="glass p-8 rounded-[45px] border border-white/5 space-y-8 shadow-2xl relative">
                                                    <div className="grid grid-cols-4 gap-3">{['ok','wait','block','na'].map(st => (
                                                        <button key={st} onClick={()=>{
                                                            setProjects(projects.map(p=>p.imo===ship.imo?{...p, data:{...p.data,[loc]:{observations:p.data[loc].observations.map(x=>x.id===o.id?{...x, status:st}:x)}}}:p));
                                                        }} className={`p-6 rounded-[30px] text-[12px] font-black uppercase shadow-inner transition-all ${o.status===st?`active-${st}`:'bg-slate-800 opacity-30'}`}>{st}</button>
                                                    ))}</div>
                                                    <textarea className="p-6 rounded-[40px] text-lg h-36 leading-relaxed" placeholder="Write findings here..." value={o.text} onChange={(e)=>setProjects(projects.map(p=>p.imo===ship.imo?{...p, data:{...p.data,[loc]:{observations:p.data[loc].observations.map(x=>x.id===o.id?{...x, text:e.target.value}:x)}}}:p))} />
                                                    <div className="flex gap-4">
                                                        <button onClick={()=>setProjects(projects.map(p=>p.imo===ship.imo?{...p, data:{...p.data,[loc]:{observations:p.data[loc].observations.map(x=>x.id===o.id?{...x, isTask:!x.isTask}:x)}}}:p))} className={`flex-1 p-6 rounded-3xl text-[13px] font-black uppercase transition-all shadow-xl ${o.isTask?'bg-red-600 text-white':'bg-slate-800 opacity-40'}`}>IN RADAR</button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {view === 'TASKS' && (
                        <div className="max-w-xl mx-auto p-5 animate-fadeIn">
                            <header className="py-10 border-b border-white/5 mb-10"><h1 className="brand text-2xl font-black text-red-500 uppercase italic">Hazard Radar</h1></header>
                            <div className="space-y-6">
                                {allTasks.length === 0 ? <div className="glass p-24 rounded-[60px] text-center opacity-30 italic font-black text-sm">Radar Clear</div> : 
                                    allTasks.map((t, i) => (
                                        <div key={i} className="glass p-10 rounded-[50px] border-l-8 border-amber-500 mb-6 shadow-2xl">
                                            <p className="text-[10px] font-black text-amber-500 uppercase tracking-widest mb-3">{t.ship} • {t.loc}</p>
                                            <p className="text-xl text-slate-100 font-medium italic leading-relaxed">"{t.text || 'No description provided'}"</p>
                                        </div>
                                    ))
                                }
                            </div>
                        </div>
                    )}

                    <footer className="fixed bottom-0 left-0 right-0 p-8 footer-nav z-50 flex justify-around">
                        <button onClick={()=>setView('FLEET')} className={`flex flex-col items-center gap-3 ${view==='FLEET'||view==='FORM'?'text-red-500':'text-slate-600'}`}><i className="fa-solid fa-ship text-3xl"></i><span className="text-[11px] font-black uppercase">Fleet</span></button>
                        <button onClick={()=>setView('TASKS')} className={`flex flex-col items-center gap-3 ${view==='TASKS'?'text-red-500':'text-slate-600'}`}><div className="relative"><i className="fa-solid fa-triangle-exclamation text-3xl"></i>{allTasks.length > 0 && <span className="absolute -top-3 -right-4 bg-red-600 text-white text-[10px] font-black w-6 h-6 rounded-full flex items-center justify-center border-2 border-[#020617]">{allTasks.length}</span>}</div><span className="text-[11px] font-black uppercase">Radar</span></button>
                    </footer>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script></body></html>
