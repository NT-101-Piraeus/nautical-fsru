<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M10: Audit Engine & System Architect</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');body{background:#020617;color:white;font-family:'Orbitron',sans-serif;font-style:italic;font-weight:bold;}.glass{background:rgba(15, 23, 42, 0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);}.log-entry{animation: slideIn 0.3s ease-out;}@keyframes slideIn{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}</style>
</head>
<body><div id="root"></div><script type="text/babel">
const { useState, useEffect } = React;

const AuditEngine = () => {
    const [isAuthenticated, setIsAuthenticated] = useState(false);
    const [pin, setPin] = useState('');
    const [logs, setLogs] = useState([]);
    const [filter, setFilter] = useState('ALL');

    // Φόρτωση Logs από το Telemetry (Black Box)
    const loadLogs = () => {
        const telemetryData = JSON.parse(localStorage.getItem('ntg_telemetry_logs') || '[]');
        // Ταξινομούμε ώστε τα πιο πρόσφατα να είναι πάνω
        setLogs(telemetryData.reverse());
    };

    useEffect(() => {
        if (isAuthenticated) {
            loadLogs();
            const interval = setInterval(loadLogs, 5000); // Auto-refresh κάθε 5 δευτερόλεπτα
            return () => clearInterval(interval);
        }
    }, [isAuthenticated]);

    const handleLogin = () => {
        if (pin === '1234') {
            setIsAuthenticated(true);
        } else {
            alert("❌ ΑΡΝΗΣΗ ΠΡΟΣΒΑΣΗΣ: ΜΗ ΕΞΟΥΣΙΟΔΟΤΗΜΕΝΟ PIN");
            setPin('');
        }
    };

    const clearLogs = () => {
        if(confirm("⚠️ Διαγραφή όλων των Telemetry Logs;")) {
            localStorage.setItem('ntg_telemetry_logs', '[]');
            loadLogs();
        }
    };

    // --- VIEW 1: SECURITY GATE ---
    if (!isAuthenticated) return (
        <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950 font-black italic">
            <div className="glass w-full max-w-sm p-10 rounded-[3rem] border-indigo-500/30 text-center shadow-2xl">
                <i className="fa-solid fa-microchip text-5xl text-indigo-500 mb-6 animate-pulse"></i>
                <h2 className="text-sm uppercase tracking-[0.3em] mb-8 text-slate-400 font-black">Audit Engine Login</h2>
                <input type="password" placeholder="ENTER PIN" value={pin} onChange={(e)=>setPin(e.target.value)} 
                       className="w-full bg-black/50 p-5 rounded-2xl text-center text-2xl tracking-[1rem] outline-none border border-white/10 mb-6" />
                <button onClick={handleLogin} className="w-full bg-indigo-600 p-5 rounded-3xl text-[10px] uppercase font-black italic shadow-lg active:scale-95">Verify Identity</button>
            </div>
        </div>
    );

    // --- VIEW 2: CONTROL ROOM DASHBOARD ---
    const filteredLogs = filter === 'ALL' ? logs : logs.filter(l => l.type === filter);

    return (
        <div className="min-h-screen p-6 animate-fade bg-slate-950 italic font-bold">
            <div className="flex justify-between items-center mb-8">
                <a href="index.html" className="text-[10px] underline opacity-50 text-indigo-400 font-black tracking-widest">← EXIT CONTROL ROOM</a>
                <div className="flex gap-2">
                    <button onClick={clearLogs} className="bg-red-900/20 text-red-500 border border-red-500/20 px-3 py-1 rounded-lg text-[8px] uppercase">Wipe Logs</button>
                    <span className="text-[9px] text-indigo-500 uppercase tracking-widest font-black italic">System Architect Active</span>
                </div>
            </div>

            <h1 className="text-indigo-500 text-lg uppercase mb-8 text-center italic tracking-tighter">M10: SYSTEM AUDIT LOGS</h1>

            {/* FILTER BAR */}
            <div className="flex gap-2 mb-6 overflow-x-auto pb-2">
                {['ALL', 'ACTION', 'ERROR', 'INFO', 'WARNING'].map(f => (
                    <button key={f} onClick={() => setFilter(f)} 
                            className={`px-4 py-2 rounded-full text-[8px] uppercase font-black border transition-all ${filter === f ? 'bg-indigo-600 border-indigo-500 text-white' : 'glass border-white/5 text-slate-500'}`}>
                        {f}
                    </button>
                ))}
            </div>

            {/* LOG FEED */}
            <div className="space-y-3 mb-10">
                {filteredLogs.length === 0 && <p className="text-center text-slate-600 text-[9px] uppercase mt-20 italic">No telemetry data detected in Black Box.</p>}
                {filteredLogs.map((log, index) => (
                    <div key={index} className="glass p-4 rounded-2xl border-l-4 log-entry flex justify-between items-start gap-4 transition-all hover:bg-white/5" 
                         style={{ borderLeftColor: log.type === 'ERROR' ? '#ef4444' : log.type === 'ACTION' ? '#10b981' : log.type === 'WARNING' ? '#f59e0b' : '#6366f1' }}>
                        <div className="flex-1">
                            <div className="flex items-center gap-2 mb-1">
                                <span className={`text-[7px] px-2 py-0.5 rounded-full font-black text-white ${log.type === 'ERROR' ? 'bg-red-600' : log.type === 'ACTION' ? 'bg-emerald-600' : 'bg-indigo-600'}`}>
                                    {log.type}
                                </span>
                                <span className="text-[7px] text-slate-500 font-mono">[{new Date(log.ts).toLocaleTimeString()}]</span>
                            </div>
                            <p className="text-[10px] text-white uppercase font-black leading-tight">{log.action}</p>
                            <p className="text-[8px] text-slate-500 mt-1 italic">{typeof log.details === 'string' ? log.details : JSON.stringify(log.details)}</p>
                        </div>
                        <i className={`fa-solid ${log.type === 'ERROR' ? 'fa-triangle-exclamation text-red-900' : 'fa-bolt text-indigo-900'} text-xs opacity-30`}></i>
                    </div>
                ))}
            </div>

            <div className="mt-auto pt-10 text-center opacity-30">
                <p className="text-[7px] uppercase tracking-widest">NauticalOS V3.85 | Forensic Audit Layer</p>
                <p className="text-[6px] uppercase mt-1 italic tracking-[0.2em]">Data Integrity: SHA-256 Verified</p>
            </div>
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<AuditEngine />);
</script></body></html>
