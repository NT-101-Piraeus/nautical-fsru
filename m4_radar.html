<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M4: Radar Hunter v1.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');body{background:#020617;color:white;font-family:'Orbitron',sans-serif;font-style:italic;font-weight:bold;}.glass{background:rgba(15,23,42,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);}</style>
</head>
<body><div id="root"></div><script type="text/babel">
const { useState, useEffect } = React;

const RadarApp = () => {
    const [vessels, setVessels] = useState(() => {
        const saved = localStorage.getItem('ntg_M4_radar');
        return saved ? JSON.parse(saved) : [
            { id: 1, name: 'MT FELIX', status: 'IN PORT', area: 'Piraeus', eta: '2026-03-29' },
            { id: 2, name: 'MV ARGO', status: 'EXPECTED', area: 'Perama', eta: '2026-04-05' }
        ];
    });

    const [newVessel, setNewVessel] = useState({ name: '', status: 'EXPECTED', area: 'Piraeus' });

    const addVessel = () => {
        if (!newVessel.name) return;
        const updated = [...vessels, { ...newVessel, id: Date.now() }];
        setVessels(updated);
        localStorage.setItem('ntg_M4_radar', JSON.stringify(updated));
        setNewVessel({ name: '', status: 'EXPECTED', area: 'Piraeus' });
    };

    return (
        <div className="min-h-screen p-6 bg-slate-950 text-white italic">
            {/* HEADER */}
            <div className="flex justify-between items-center mb-8 border-b border-red-500/20 pb-4">
                <div>
                    <span className="text-[10px] text-red-500 font-black uppercase tracking-tighter">M4: Radar Hunter</span>
                    <h1 className="text-xl font-black uppercase tracking-tighter italic">Piraeus Sector Active</h1>
                </div>
                <button onClick={() => window.location.href='index.html'} className="glass p-3 rounded-xl border-white/10"><i className="fa-solid fa-house text-xs"></i></button>
            </div>

            {/* ADD VESSEL FORM */}
            <div className="glass p-6 rounded-[2.5rem] border-white/5 mb-8">
                <p className="text-[8px] uppercase opacity-50 mb-4 tracking-widest">Add New Target</p>
                <div className="space-y-4">
                    <input type="text" placeholder="VESSEL NAME" value={newVessel.name} onChange={(e)=>setNewVessel({...newVessel, name: e.target.value.toUpperCase()})} className="w-full bg-black/50 p-4 rounded-2xl outline-none border border-white/10 text-center" />
                    <div className="grid grid-cols-2 gap-2">
                        <select value={newVessel.status} onChange={(e)=>setNewVessel({...newVessel, status: e.target.value})} className="bg-black/50 p-4 rounded-xl border border-white/10 text-[9px] uppercase">
                            <option value="EXPECTED">Expected</option>
                            <option value="IN PORT">In Port</option>
                            <option value="OPPORTUNITY">Opportunity</option>
                        </select>
                        <select value={newVessel.area} onChange={(e)=>setNewVessel({...newVessel, area: e.target.value})} className="bg-black/50 p-4 rounded-xl border border-white/10 text-[9px] uppercase">
                            <option value="Piraeus">Piraeus</option>
                            <option value="Perama">Perama</option>
                            <option value="Drapetsona">Drapetsona</option>
                        </select>
                    </div>
                    <button onClick={addVessel} className="w-full bg-red-600 p-5 rounded-[2rem] text-[10px] uppercase font-black italic shadow-lg active:scale-95 transition-all">Lock Target</button>
                </div>
            </div>

            {/* TARGET LIST */}
            <div className="space-y-4 pb-20">
                <p className="text-[10px] uppercase font-black opacity-50 italic">Live Radar Feed</p>
                {vessels.map(v => (
                    <div key={v.id} className="glass p-6 rounded-3xl border-red-500/20 flex justify-between items-center relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-1 h-full bg-red-500 opacity-50"></div>
                        <div>
                            <p className="text-xs font-black tracking-tight uppercase">{v.name}</p>
                            <p className="text-[8px] opacity-40 uppercase tracking-widest">{v.area}</p>
                        </div>
                        <div className="text-right">
                            <span className={`text-[8px] px-2 py-1 rounded-full font-black ${v.status==='IN PORT'?'bg-emerald-500/20 text-emerald-500':'bg-blue-500/20 text-blue-500'}`}>{v.status}</span>
                        </div>
                    </div>
                ))}
            </div>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<RadarApp />);
</script></body></html>
