<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SafeShip Manager | Professional V35</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; touch-action: manipulation; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .active-ok { background: #10b981 !important; opacity: 1; }
        .active-wait { background: #f59e0b !important; opacity: 1; }
        .active-block { background: #ef4444 !important; opacity: 1; }
        .specialty-active { background: #3b82f6 !important; border-color: #60a5fa !important; }
        input, textarea { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; outline: none; }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const TRADES = ["Ηλεκτρολόγοι", "Μηχανικοί", "Ελασματουργοί", "Σκαλωσέρ", "Καθαριστές"];
        const SHIP_LOCS = {
            "Tanker": ["Deck", "Engine Room", "Pump Room", "Chimney", "Cargo Tanks", "Accommodation"],
            "Ferry": ["Deck", "Engine Room", "Garage", "Chimney", "Accommodation"],
            "Cargo": ["Deck", "Engine Room", "Holds", "Chimney", "Accommodation"]
        };
        const INITIAL_SHIPS = [
            { id: 1, name: "FELIX", port: "Δραπετσώνα", time: "07:00", type: "Tanker" },
            { id: 2, name: "BADJI MOKHTAR III", port: "ΕΛΕΥΣΙΝΑ", time: "11:00", type: "Ferry" },
            { id: 3, name: "ΑΡΙΑΔΝΗ", port: "ΕΛΕΥΣΙΝΑ", time: "13:00", type: "Ferry" },
            { id: 4, name: "RIGEL III", port: "Πέραμα", time: "15:00", type: "Ferry" }
        ];

        function App() {
            const [view, setView] = useState(() => new URLSearchParams(window.location.search).get('view') || 'DASHBOARD');
            const [activeId, setActiveId] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [projects, setProjects] = useState(() => {
                const saved = JSON.parse(localStorage.getItem('ntg_v35_data'));
                return (saved && saved.ships) ? saved.ships : INITIAL_SHIPS.map(s => ({ ...s, data: {}, signedToday: false }));
            });

            useEffect(() => { 
                localStorage.setItem('ntg_v35_data', JSON.stringify({ ships: projects })); 
                setIsSaving(true); setTimeout(() => setIsSaving(false), 800);
            }, [projects]);

            const addObs = (shipId, loc) => {
                setProjects(projects.map(p => p.id === shipId ? { ...p, data: { ...p.data, [loc]: { observations: [...(p.data[loc]?.observations || []), { id: Date.now(), text: '', isTask: false, status: 'ok', trades: [] }] } } } : p));
            };

            const ship = projects.find(s => s.id === activeId);
            const allTasks = projects.flatMap(p => Object.entries(p.data || {}).flatMap(([loc, d]) => (d.observations || []).filter(o => o.isTask).map(o => ({ ship: p.name, loc, ...o }))));

            return (
                <div className="max-w-xl mx-auto pb-32 animate-fadeIn">
                    <header className="p-6 border-b border-slate-800 flex justify-between items-center sticky top-0 bg-[#020617] z-50">
                        <div className="flex items-center gap-3">
                            {view !== 'DASHBOARD' && <button onClick={()=>setView('DASHBOARD')} className="bg-slate-800 w-10 h-10 rounded-full flex items-center justify-center"><i className="fa-solid fa-arrow-left"></i></button>}
                            <div><h1 className="brand text-xs font-black text-red-500 uppercase">SafeShip Pro</h1>{isSaving && <span className="text-[8px] text-emerald-500 font-bold uppercase ml-2 animate-pulse">● Auto-Save</span>}</div>
                        </div>
                        <button onClick={()=>alert("ΟΛΕΣ ΟΙ ΑΛΛΑΓΕΣ ΚΑΤΟΧΥΡΩΘΗΚΑΝ")} className="bg-emerald-600/20 text-emerald-500 border border-emerald-500/30 px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest">Save All</button>
                    </header>

                    {view === 'DASHBOARD' && (
                        <div className="p-5 space-y-4">
                            <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2 italic">March 2026 Registry</h3>
                            {projects.map(s => (
                                <div key={s.id} className={`glass p-6 rounded-[35px] flex justify-between items-center border border-white/5 ${s.signedToday ? 'border-l-8 border-emerald-500 bg-emerald-500/5' : ''}`}>
                                    <div onClick={()=>{setActiveId(s.id); setView('INSPECTION')}} className="flex-1 cursor-pointer">
                                        <h4 className="font-black text-sm uppercase">{s.name}</h4>
                                        <p className="text-[9px] text-slate-400 font-bold uppercase mt-1">{s.port} • {s.time}</p>
                                    </div>
                                    <button onClick={()=>setProjects(projects.map(p=>p.id===s.id?{...p, signedToday:!p.signedToday}:p))} className={`px-4 py-2.5 rounded-2xl text-[9px] font-black uppercase border border-white/10 ${s.signedToday ? 'bg-emerald-600 text-white' : 'bg-slate-800 text-slate-500'}`}>
                                        {s.signedToday ? 'ΥΠΕΓΡΑΨΑ' : 'ΥΠΟΓΡΑΦΗ'}
                                    </button>
                                </div>
                            ))}
                        </div>
                    )}

                    {view === 'INSPECTION' && ship && (
                        <div className="p-5 space-y-8 animate-fadeIn">
                            <div className="glass p-8 rounded-[40px] border-l-4 border-red-600 text-center mb-8"><h2 className="brand text-2xl font-black uppercase tracking-tighter">{ship.name}</h2><p className="text-[10px] text-slate-400 uppercase mt-1 italic">{ship.port}</p></div>
                            <div className="space-y-12">
                                {SHIP_LOCS[ship.type].map(loc => {
                                    const d = (ship.data && ship.data[loc]) || { observations: [] };
                                    return (
                                        <div key={loc} className="glass p-6 rounded-[40px] border border-white/5 space-y-4">
                                            <div className="flex justify-between items-center"><h4 className="text-[12px] font-black text-red-500 uppercase">{loc}</h4><button onClick={()=>addObs(ship.id, loc)} className="bg-slate-800 px-3 py-1.5 rounded-lg text-[9px] font-black border border-white/10">+ New Log</button></div>
                                            {d.observations.map(o => (
                                                <div key={o.id} className="bg-slate-900/50 p-4 rounded-3xl space-y-4 border border-white/5 relative">
                                                    <button onClick={()=>setProjects(projects.map(p=>p.id===ship.id?{...p,data:{...p.data,[loc]:{observations:p.data[loc].observations.filter(x=>x.id!==o.id)}}}:p))} className="absolute top-4 right-4 text-slate-700 hover:text-red-500"><i className="fa-solid fa-trash-can"></i></button>
                                                    <div className="flex flex-wrap gap-1.5 pr-8">{TRADES.map(t => (
                                                        <button key={t} onClick={()=>{
                                                            const newT = o.trades.includes(t) ? o.trades.filter(x=>x!==t) : [...o.trades, t];
                                                            setProjects(projects.map(p=>p.id===ship.id?{...p, data:{...p.data,[loc]:{observations:p.data[loc].observations.map(x=>x.id===o.id?{...x, trades:newT}:x)}}}:p));
                                                        }} className={`px-2 py-1 rounded-md text-[7px] font-bold ${o.trades.includes(t) ? 'specialty-active' : 'bg-slate-950 text-slate-600'}`}>{t}</button>
                                                    ))}</div>
                                                    <div className="grid grid-cols-4 gap-1.5">{['ok','wait','block','na'].map(st => (
                                                        <button key={st} onClick={()=>{
                                                            setProjects(projects.map(p=>p.id===ship.id?{...p, data:{...p.data,[loc]:{observations:p.data[loc].observations.map(x=>x.id===o.id?{...x, status:st}:x)}}}:p));
                                                        }} className={`p-2 rounded-xl text-[7px] font-black uppercase transition-all ${o.status===st?`active-${st}`:'bg-slate-800 opacity-40'}`}>{st}</button>
                                                    ))}</div>
                                                    <textarea className="p-4 rounded-2xl text-xs h-20" placeholder="Observations..." value={o.text} onChange={(e)=>{
                                                        setProjects(projects.map(p=>p.id===ship.id?{...p, data:{...p.data,[loc]:{observations:p.data[loc].observations.map(x=>x.id===o.id?{...x, text:e.target.value}:x)}}}:p));
                                                    }} />
                                                    <div className="flex gap-2">
                                                        <button className="flex-1 bg-slate-900 p-3 rounded-xl border border-white/10 text-[9px] font-black uppercase"><i className="fa-solid fa-camera text-red-500 mr-2"></i> Photo</button>
                                                        <button onClick={()=>{
                                                            setProjects(projects.map(p=>p.id===ship.id?{...p, data:{...p.data,[loc]:{observations:p.data[loc].observations.map(x=>x.id===o.id?{...x, isTask:!x.isTask}:x)}}}:p));
                                                        }} className={`flex-1 p-3 rounded-xl text-[9px] font-black uppercase ${o.isTask ? 'bg-red-600 text-white' : 'bg-slate-800 text-slate-500'}`}>{o.isTask ? '✓ IN TASKS' : 'SEND TO TASKS'}</button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {view === 'TASKS' && (
                        <div className="p-6 space-y-6 animate-fadeIn">
                            <h2 className="brand text-xl uppercase italic mb-8 tracking-tighter text-red-500">Hazard Task Registry</h2>
                            {allTasks.length === 0 ? <div className="glass p-20 rounded-[50px] text-center opacity-30 italic font-black text-xs">Fleet Secure. No active tasks.</div> : 
                                allTasks.map((t, i) => (
                                    <div key={i} className="glass p-6 rounded-[35px] border-l-4 border-amber-500">
                                        <p className="text-[8px] font-black text-amber-500 uppercase">{t.ship} • {t.loc}</p>
                                        <p className="text-[13px] text-slate-200 mt-2 leading-relaxed">{t.text || 'No description'}</p>
                                    </div>
                                ))
                            }
                        </div>
                    )}

                    <footer className="fixed bottom-0 left-0 right-0 p-6 glass border-t border-slate-800 flex justify-around bg-[#020617] z-50">
                        <button onClick={()=>setView('DASHBOARD')} className={`flex flex-col items-center gap-1 ${view==='DASHBOARD'?'text-red-500':'text-slate-600'}`}><i className="fa-solid fa-anchor"></i><span className="text-[8px] font-bold">FLEET</span></button>
                        <button onClick={()=>setView('TASKS')} className={`flex flex-col items-center gap-1 ${view==='TASKS'?'text-red-500':'text-slate-600'}`}><i className="fa-solid fa-list-check"></i><span className="text-[8px] font-bold uppercase">Tasks ({allTasks.length})</span></button>
                        <a href="index.html" className="flex flex-col items-center gap-1 text-slate-600"><i className="fa-solid fa-house-user"></i><span className="text-[8px] font-bold">HOME</span></a>
                    </footer>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script></body></html>
