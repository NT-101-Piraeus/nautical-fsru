<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SafeShip Pro | V39 Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; touch-action: manipulation; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .active-ok { background: #10b981 !important; opacity: 1; }
        .active-wait { background: #f59e0b !important; opacity: 1; }
        .active-block { background: #ef4444 !important; opacity: 1; }
        .specialty-active { background: #3b82f6 !important; border-color: #60a5fa !important; }
        input, textarea { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; outline: none; }
        .chip { background: #3b82f61a; border: 1px solid #3b82f64d; color: #60a5fa; font-size: 8px; padding: 4px 8px; border-radius: 6px; cursor: pointer; }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const _supabase = supabase.createClient("https://omdarjncczohpffunfy.supabase.co", "sb_publishable_V-nfUDy5MxEG4SlXkisFBg_GBlD_4Y9");

        const TRADES = ["Ηλεκτρολόγοι", "Μηχανικοί", "Ελασματουργοί", "Σκαλωσέρ", "Καθαριστές"];
        const SUGGESTIONS = {"ΣΚΑΛΩΣΙΕΣ": ["Προστατευτικές μπάρες", "Σωστή έδραση", "Δίχτυ προστασίας"], "ΘΕΡΜΕΣ": ["Πυροσβεστήρας 2μ", "Fire Watch παρών"]};
        const SHIP_LOCS = ["Deck", "Engine Room", "Pump Room", "Chimney", "Cargo Tanks", "Accommodation"];
        const SHIPS = [
            { id: 1, name: "FELIX", port: "Δραπετσώνα", time: "07:00", type: "Tanker" },
            { id: 2, name: "BADJI MOKHTAR III", port: "ΕΛΕΥΣΙΝΑ", time: "11:00", type: "Ferry" },
            { id: 3, name: "ΑΡΙΑΔΝΗ", port: "ΕΛΕΥΣΙΝΑ", time: "13:00", type: "Ferry" },
            { id: 4, name: "RIGEL III", port: "Πέραμα", time: "15:00", type: "Ferry" }
        ];

        function App() {
            const [view, setView] = useState('DASHBOARD');
            const [activeId, setActiveId] = useState(null);
            const [projects, setProjects] = useState(() => JSON.parse(localStorage.getItem('ntg_v39_data')) || SHIPS.map(s => ({ ...s, data: {}, signedToday: false })));

            useEffect(() => { localStorage.setItem('ntg_v39_data', JSON.stringify({ ships: projects })); }, [projects]);

            const updateObs = (shipId, loc, obsId, field, val) => {
                setProjects(projects.map(p => p.id === shipId ? { ...p, data: { ...p.data, [loc]: { observations: p.data[loc].observations.map(o => o.id === obsId ? { ...o, [field]: val } : o) } } } : p));
            };

            const ship = projects.find(s => s.id === activeId);
            const allTasks = projects.flatMap(p => Object.entries(p.data || {}).flatMap(([loc, d]) => (d.observations || []).filter(o => o.isTask).map(o => ({ ship: p.name, loc, ...o }))));

            if (view === 'DASHBOARD') return (
                <div className="max-w-xl mx-auto p-5 pb-32 animate-fadeIn">
                    <header className="py-6 flex justify-between items-center sticky top-0 bg-[#020617] z-50 border-b border-white/5 mb-6">
                        <h1 className="brand text-xs font-black text-red-500 uppercase">SafeShip Manager</h1>
                        <a href="index.html" className="text-slate-600"><i className="fa-solid fa-house"></i></a>
                    </header>
                    <div className="space-y-4">
                        {projects.map(s => (
                            <div key={s.id} onClick={()=>{setActiveId(s.id); setView('INSPECTION')}} className={`glass p-6 rounded-[35px] flex justify-between items-center border border-white/5 ${s.signedToday ? 'border-l-8 border-emerald-500 bg-emerald-500/5' : ''}`}>
                                <div><h4 className="font-black text-sm uppercase">{s.name}</h4><p className="text-[9px] text-slate-400 font-bold uppercase mt-1">{s.port} • {s.time}</p></div>
                                <i className={`fa-solid ${s.signedToday ? 'fa-circle-check text-emerald-500' : 'fa-chevron-right text-slate-800'}`}></i>
                            </div>
                        ))}
                    </div>
                </div>
            );

            if (view === 'INSPECTION' && ship) return (
                <div className="max-w-xl mx-auto p-5 pb-32 animate-fadeIn">
                    <div className="flex justify-between items-center mb-8">
                        <button onClick={()=>setView('DASHBOARD')} className="text-slate-500 text-[10px] font-black uppercase">← Back</button>
                        <div className="flex gap-2">
                             <button onClick={async()=>await _supabase.from('ntg_logbook').insert([{ship_name:ship.name, port:ship.port, inspection_data:ship.data, status:'Stored'}])} className="bg-emerald-600 px-4 py-2 rounded-xl text-[9px] font-black uppercase">Cloud Push</button>
                             <button className="bg-blue-600 px-4 py-2 rounded-xl text-[9px] font-black uppercase">PDF</button>
                        </div>
                    </div>
                    <div className="glass p-8 rounded-[40px] border-l-4 border-red-600 text-center mb-10"><h2 className="brand text-2xl font-black uppercase">{ship.name}</h2></div>
                    <div className="space-y-12">
                        {SHIP_LOCS.map(loc => {
                            const d = (ship.data && ship.data[loc]) || { observations: [] };
                            return (
                                <div key={loc} className="glass p-6 rounded-[40px] border border-white/5 space-y-4">
                                    <div className="flex justify-between items-center"><h4 className="text-[12px] font-black uppercase text-red-500">{loc}</h4><button onClick={()=>{setProjects(projects.map(p=>p.id===ship.id?{...p, data:{...p.data,[loc]:{observations:[...(p.data[loc]?.observations||[]), {id:Date.now(), text:'', isTask:false, status:'ok', trades:[]}]}}}:p))}} className="bg-slate-800 px-3 py-1.5 rounded-lg text-[9px] font-black">+ New</button></div>
                                    {d.observations.map(o => (
                                        <div key={o.id} className="glass p-6 rounded-[35px] border border-white/5 space-y-4 relative">
                                            <div className="flex flex-wrap gap-1.5">{TRADES.map(t => (
                                                <button key={t} onClick={()=>{const newT=o.trades.includes(t)?o.trades.filter(x=>x!==t):[...o.trades,t]; updateObs(ship.id,loc,o.id,'trades',newT)}} className={`px-2 py-1 rounded-md text-[7px] font-bold ${o.trades.includes(t)?'specialty-active':'bg-slate-950 text-slate-600'}`}>{t}</button>
                                            ))}</div>
                                            <div className="grid grid-cols-4 gap-1.5">{['ok','wait','block','na'].map(st => (
                                                <button key={st} onClick={()=>updateObs(ship.id,loc,o.id,'status',st)} className={`p-2.5 rounded-xl text-[7px] font-black uppercase ${o.status===st?`active-${st}`:'bg-slate-800 opacity-40'}`}>{st}</button>
                                            ))}</div>
                                            <textarea className="p-4 rounded-2xl text-xs h-24" value={o.text} onChange={(e)=>updateObs(ship.id,loc,o.id,'text',e.target.value)} />
                                            <div className="flex flex-wrap gap-1.5">{Object.entries(SUGGESTIONS).map(([k,v])=>o.text.toUpperCase().includes(k)&&v.map(s=><span key={s} onClick={()=>updateObs(ship.id,loc,o.id,'text',o.text+'\n- '+s)} className="chip">💡 {s}</span>))}</div>
                                            <div className="flex gap-2">
                                                <button onClick={()=>document.getElementById('c').click()} className="flex-1 bg-slate-900 p-3 rounded-xl border border-white/10 text-[9px] font-black uppercase"><i className="fa-solid fa-camera text-red-500 mr-2"></i> Photo</button>
                                                <input type="file" id="c" capture="camera" className="hidden" />
                                                <button onClick={()=>updateObs(ship.id,loc,o.id,'isTask',!o.isTask)} className={`flex-1 p-3 rounded-xl text-[9px] font-black uppercase ${o.isTask?'bg-red-600':'bg-slate-800'}`}>Task</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            );
                        })}
                    </div>
                    <button onClick={()=>{setProjects(projects.map(p=>p.id===ship.id?{...p, signedToday:!p.signedToday}:p)); setView('DASHBOARD')}} className={`w-full p-6 rounded-[35px] font-black uppercase text-xs shadow-xl mt-10 ${ship.signedToday?'bg-emerald-600':'bg-red-600'}`}>{ship.signedToday?'VERIFIED':'SIGN-OFF'}</button>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script></body></html>
