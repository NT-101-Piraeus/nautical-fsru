<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M2: Supreme Auditor v3.86</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #020617; color: white; font-family: 'Orbitron', sans-serif; font-style: italic; font-weight: bold; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .matrix-blink { animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body><div id="root"></div><script type="text/babel">
const { useState, useEffect } = React;

const SupremeAuditor = () => {
    const [isLocked, setIsLocked] = useState(true);
    const [pin, setPin] = useState('');
    const [selectedDiv, setSelectedDiv] = useState('M2'); // Default target
    const [logs, setLogs] = useState([]);

    const divisions = ['M1', 'M2', 'M3', 'M4', 'M5', 'M6', 'M7', 'M8', 'M9', 'M10', 'M11', 'M12', 'M13'];

    const fetchLogs = () => {
        const vaultKey = `ntg_${selectedDiv}_logs`;
        const data = JSON.parse(localStorage.getItem(vaultKey) || '[]');
        setLogs(data.reverse()); // Τα τελευταία πάνω
    };

    useEffect(() => { if (!isLocked) fetchLogs(); }, [isLocked, selectedDiv]);

    const handleLogin = () => {
        if (pin === '1234') { setIsLocked(false); } 
        else { alert("ACCESS DENIED - UNKNOWN BIOMETRICS"); setPin(''); }
    };

    if (isLocked) return (
        <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950 font-black">
            <div className="glass w-full max-w-sm p-10 rounded-[3rem] border-indigo-500/30 text-center shadow-2xl">
                <i className="fa-solid fa-user-shield text-5xl text-indigo-500 mb-8"></i>
                <h2 className="text-[10px] uppercase tracking-[0.3em] mb-8 text-slate-400 font-black italic">M10 Security Protocol</h2>
                <input type="password" placeholder="ADMIN PIN" value={pin} onChange={(e)=>setPin(e.target.value)} 
                       className="w-full bg-black/50 p-6 rounded-2xl text-center text-3xl tracking-[1.2rem] outline-none border border-white/10 mb-8" />
                <button onClick={handleLogin} className="w-full bg-indigo-600 p-6 rounded-3xl text-[10px] uppercase font-black italic shadow-indigo-900/40 shadow-xl active:scale-95 transition-all">Establish Secure Uplink</button>
            </div>
        </div>
    );

    return (
        <div className="min-h-screen p-6 animate-fade bg-slate-950 italic font-bold">
            {/* HEADER */}
            <div className="flex justify-between items-center mb-8 border-b border-white/5 pb-4">
                <a href="index.html" className="text-[10px] underline text-indigo-400 font-black italic tracking-widest uppercase">← HUB EXIT</a>
                <div className="text-right">
                    <span className="text-[8px] text-indigo-500 uppercase block tracking-tighter">System Architect Ready</span>
                    <span className="text-[10px] text-white uppercase font-black">DIRECTOR LEVEL 5</span>
                </div>
            </div>

            {/* DIVISION SELECTOR GRID */}
            <div className="grid grid-cols-5 gap-2 mb-10">
                {divisions.map(d => (
                    <button key={d} onClick={() => setSelectedDiv(d)} 
                            className={`p-3 rounded-xl text-[8px] border transition-all ${selectedDiv === d ? 'bg-indigo-600 border-indigo-400 text-white shadow-lg' : 'glass border-white/5 text-slate-600'}`}>
                        {d}
                    </button>
                ))}
            </div>

            <div className="flex justify-between items-end mb-6 px-2">
                <div>
                    <h2 className="text-xl text-white font-black italic tracking-tighter uppercase">{selectedDiv} VAULT FEED</h2>
                    <p className="text-[8px] text-slate-500 uppercase italic">Reading ntg_{selectedDiv}_logs...</p>
                </div>
                <button onClick={() => {localStorage.setItem(`ntg_${selectedDiv}_logs`, '[]'); fetchLogs();}} className="text-[8px] text-red-600 font-black uppercase underline decoration-red-900">Purge Vault</button>
            </div>

            {/* MATRIX LOG FEED */}
            <div className="space-y-4 mb-20">
                {logs.length === 0 ? (
                    <div className="text-center py-20 opacity-20">
                        <i className="fa-solid fa-ghost text-4xl mb-4"></i>
                        <p className="text-[10px] uppercase font-black tracking-widest">Vault is empty. No telemetry detected.</p>
                    </div>
                ) : (
                    logs.map((log, i) => (
                        <div key={i} className={`glass p-5 rounded-3xl border-l-4 animate-fade shadow-xl ${log.type === 'ERROR' ? 'border-red-600 bg-red-900/10 matrix-blink' : log.type === 'ACTION' ? 'border-emerald-600 bg-emerald-900/5' : 'border-indigo-600 bg-indigo-900/5'}`}>
                            <div className="flex justify-between text-[7px] mb-2 font-mono opacity-50 uppercase tracking-widest">
                                <span>{log.type} // {selectedDiv}</span>
                                <span>{new Date(log.ts).toLocaleTimeString()} // {new Date(log.ts).toLocaleDateString('en-GB')}</span>
                            </div>
                            <p className={`text-[11px] font-black uppercase italic ${log.type === 'ERROR' ? 'text-red-500' : log.type === 'ACTION' ? 'text-emerald-400' : 'text-indigo-300'}`}>
                                {log.action}
                            </p>
                            <p className="text-[9px] text-slate-400 mt-2 font-mono border-t border-white/5 pt-2 italic">
                                > {JSON.stringify(log.details)}
                            </p>
                        </div>
                    ))
                )}
            </div>

            <div className="fixed bottom-0 left-0 right-0 p-4 bg-slate-950/80 backdrop-blur-md border-t border-white/5 text-center">
                <p className="text-[7px] text-slate-600 uppercase tracking-[0.5em] italic">Forensic Integrity Guaranteed // Nautical OS 2026</p>
            </div>
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<SupremeAuditor />);
</script></body></html>
