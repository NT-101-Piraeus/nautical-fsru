<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M2: Safety Watch v3.55</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');body{background:#020617;color:white;font-family:'Orbitron',sans-serif;font-style:italic;font-weight:bold;}.glass{background:rgba(15,23,42,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);}</style>
</head>
<body><div id="root"></div><script type="text/babel">
const SafetyAction = () => {
    const [sun, setSun] = React.useState(false);
    const [hasEvidence, setHasEvidence] = React.useState(false);
    const [joblist, setJoblist] = React.useState([]);
    const [area, setArea] = React.useState('Main Deck');
    const [task, setTask] = React.useState('Hot Works');

    const addJob = () => {
        const newJob = { id: Date.now(), area, task, time: new Date().toLocaleTimeString() };
        setJoblist([...joblist, newJob]);
    };

    const theme = sun ? "bg-white text-black" : "bg-slate-950 text-white";
    const card = sun ? "bg-slate-100 border-slate-300 shadow-md" : "glass border-blue-500/20";

    return (
        <div className={`min-h-screen p-6 transition-all duration-300 ${theme}`}>
            <div className="flex justify-between items-center mb-8 pt-4">
                <a href="index.html" className={`text-[10px] underline opacity-50 ${sun?'text-black':'text-blue-400'}`}>← HUB</a>
                <button onClick={() => setSun(!sun)} className="p-3 glass rounded-full border border-blue-500/20">
                    <i className={`fa-solid ${sun?'fa-moon':'fa-sun text-yellow-500'}`}></i>
                </button>
            </div>

            <h1 className="text-blue-600 text-lg uppercase mb-10 text-center italic tracking-tighter font-black">M2: COMPLIANCE SHIELD</h1>

            {/* JOBLIST BUILDER */}
            <div className={`${card} p-6 rounded-[2.5rem] mb-6 space-y-4`}>
                <div className="grid grid-cols-2 gap-3">
                    <select value={area} onChange={(e)=>setArea(e.target.value)} className="bg-black/20 p-3 rounded-xl text-[10px] outline-none border border-blue-500/10">
                        <option>Main Deck</option><option>Engine Room</option><option>Garage</option><option>Tank Top</option>
                    </select>
                    <select value={task} onChange={(e)=>setTask(e.target.value)} className="bg-black/20 p-3 rounded-xl text-[10px] outline-none border border-blue-500/10">
                        <option>Hot Works</option><option>Confined Space</option><option>Scaffolding</option><option>Lifting</option>
                    </select>
                </div>
                <button onClick={addJob} className="w-full bg-blue-600/20 border border-blue-600/30 p-3 rounded-xl text-[8px] uppercase font-black italic">Add Task to Shift +</button>
            </div>

            {/* LIVE FEED */}
            <div className="space-y-3 mb-8">
                {joblist.map(j => (
                    <div key={j.id} className={`${card} p-4 rounded-2xl flex justify-between items-center border-l-4 border-blue-500 shadow-lg`}>
                        <div><p className="text-[10px] font-black uppercase">{j.task}</p><p className="text-[7px] text-slate-500 italic uppercase">{j.area} | {j.time}</p></div>
                        <i className="fa-solid fa-circle-check text-blue-500 opacity-30"></i>
                    </div>
                ))}
            </div>

            {/* EVIDENCE & SIGNATURE */}
            <div className="mt-auto pt-10">
                <div className="flex gap-4 mb-6">
                    <button onClick={() => setHasEvidence(true)} className={`flex-1 p-5 rounded-3xl flex flex-col items-center gap-2 border-2 border-dashed ${hasEvidence ? 'border-emerald-500 bg-emerald-500/10' : 'border-slate-700'}`}>
                        <i className={`fa-solid fa-camera text-xl ${hasEvidence ? 'text-emerald-500' : 'text-slate-600'}`}></i>
                        <span className="text-[7px] uppercase tracking-widest">Smart Capture</span>
                    </button>
                    <button disabled={!hasEvidence} className={`flex-1 p-5 rounded-3xl flex flex-col items-center gap-2 border-2 ${hasEvidence ? 'border-blue-600 bg-blue-600/10' : 'border-slate-800 opacity-30 grayscale'}`}>
                        <i className="fa-solid fa-pen-nib text-xl text-blue-500"></i>
                        <span className="text-[7px] uppercase tracking-widest">Sign Log (P.D. 70/90)</span>
                    </button>
                </div>
                {!hasEvidence && <p className="text-[7px] text-red-500 text-center uppercase animate-pulse">Evidence Required to Unlock Signature</p>}
            </div>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<SafetyAction />);
</script></body></html>
