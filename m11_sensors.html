<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M11: Sensor Hub | NauticalOS</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #020617; color: white; font-family: 'Orbitron', sans-serif; font-style: italic; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gauge-ring { width: 120px; height: 120px; border-radius: 50%; border: 8px solid #1e293b; border-top-color: #06b6d4; display: flex; align-items: center; justify-content: center; position: relative; }
        .danger-blink { animation: danger 0.8s infinite alternate; }
        @keyframes danger { from { background: rgba(239, 68, 68, 0.1); border-color: #ef4444; } to { background: rgba(239, 68, 68, 0.4); border-color: transparent; } }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const SensorHub = () => {
            const [temp, setTemp] = useState(24.5);
            const [o2, setO2] = useState(20.9);
            const [isDanger, setIsDanger] = useState(false);

            useEffect(() => {
                const interval = setInterval(() => {
                    // Προσομοίωση αλλαγής αισθητήρων
                    const newTemp = (24 + Math.random() * 2).toFixed(1);
                    setTemp(newTemp);
                    if (newTemp > 45 || o2 < 20.5) setIsDanger(true);
                    else setIsDanger(false);
                }, 2000);
                return () => clearInterval(interval);
            }, [o2]);

            return (
                <div className={`min-h-screen p-6 transition-colors duration-500 ${isDanger ? 'bg-red-950/50' : 'bg-slate-950'}`}>
                    <header className="flex justify-between items-center mb-10 glass p-6 rounded-[2.5rem] border-l-4 border-cyan-500">
                        <div>
                            <h1 className="text-sm font-black uppercase text-cyan-500 tracking-tighter">M11: Sensor Hub</h1>
                            <p className="text-[7px] opacity-40 font-bold uppercase tracking-widest italic">Hardware Telemetry Layer</p>
                        </div>
                        <i className="fa-solid fa-microchip text-2xl text-cyan-900/50"></i>
                    </header>

                    <div className="grid grid-cols-1 gap-6">
                        {/* Temperature Gauge */}
                        <div className={`glass p-8 rounded-[3rem] flex flex-col items-center gap-4 ${temp > 40 ? 'border-2 border-red-500 danger-blink' : ''}`}>
                            <div className="gauge-ring border-t-orange-500">
                                <span className="text-2xl font-black">{temp}°C</span>
                            </div>
                            <p className="text-[9px] font-black uppercase tracking-widest opacity-40">Ambient Temperature</p>
                        </div>

                        {/* Oxygen Level */}
                        <div className="glass p-8 rounded-[3rem] flex flex-col items-center gap-4">
                            <div className="gauge-ring border-t-cyan-500">
                                <span className="text-2xl font-black">{o2}%</span>
                            </div>
                            <p className="text-[9px] font-black uppercase tracking-widest opacity-40">Oxygen Concentration (O2)</p>
                        </div>

                        {/* Quick Action Button */}
                        <button onClick={() => setO2(19.8)} className="h-16 glass rounded-2xl flex items-center justify-center gap-3 border border-white/5 active:scale-95">
                            <i className="fa-solid fa-triangle-exclamation text-yellow-500"></i>
                            <span className="text-[10px] font-black uppercase">Simulate Gas Alarm</span>
                        </button>
                    </div>
                    
                    <footer className="fixed bottom-6 left-0 w-full text-center">
                        <p className="text-[7px] opacity-20 uppercase font-black tracking-[0.5em]">Isolated Hardware Feed • V2.1</p>
                    </footer>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<SensorHub />);
    </script></body></html>
