<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M10: Forensic Auditor | NauticalOS</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #020617; color: white; font-family: 'Orbitron', sans-serif; font-style: italic; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .log-terminal { background: #000; border: 1px solid #1e293b; font-family: monospace; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const AuditorDashboard = () => {
            const [logs, setLogs] = useState([]);
            const [academyStatus, setAcademyStatus] = useState(false);

            useEffect(() => {
                const syncData = () => {
                    const systemLogs = JSON.parse(localStorage.getItem('ntg_M10_logs') || '[]');
                    const m8Ready = localStorage.getItem('ntg_M8_ready') === 'true';
                    setLogs(systemLogs.reverse()); // Τα τελευταία νέα πάνω-πάνω
                    setAcademyStatus(m8Ready);
                };
                syncData();
                const interval = setInterval(syncData, 2000);
                return () => clearInterval(interval);
            }, []);

            const triggerEmergencyLockdown = () => {
                if(confirm("ACTIVATE GLOBAL LOCKDOWN? ALL DIVISIONS WILL BE DISABLED.")) {
                    localStorage.setItem('ntg_M8_ready', 'false');
                    localStorage.setItem('ntg_M10_logs', JSON.stringify([{
                        ts: new Date().toLocaleTimeString(),
                        event: "GLOBAL EMERGENCY LOCKDOWN ACTIVATED",
                        division: "M10_AUDITOR"
                    }, ...logs]));
                }
            };

            return (
                <div className="min-h-screen p-6 bg-slate-950">
                    <header className="glass p-6 rounded-[2.5rem] mb-8 border-l-4 border-red-600 flex justify-between items-center">
                        <div>
                            <h1 className="text-red-500 font-black uppercase text-lg tracking-tighter">M10: Forensic Auditor</h1>
                            <p className="text-[8px] font-black opacity-50 uppercase tracking-[0.3em]">Integrity Hub V6.0</p>
                        </div>
                        <a href="index.html" className="p-4 glass rounded-2xl"><i className="fa-solid fa-house"></i></a>
                    </header>

                    {/* System Integrity Status */}
                    <div className="grid grid-cols-1 gap-4 mb-8 text-center">
                        <div className={`glass p-6 rounded-[2.5rem] border ${academyStatus ? 'border-emerald-500 text-emerald-500' : 'border-red-500 text-red-500'}`}>
                            <p className="text-[10px] font-black uppercase opacity-60 mb-1">Academy Clearance Status</p>
                            <h2 className="text-2xl font-black">{academyStatus ? "AUTHORIZED" : "LOCKED"}</h2>
                        </div>
                    </div>

                    {/* Forensic Telemetry Feed */}
                    <div className="glass p-6 rounded-[3rem] border-l-4 border-blue-500 mb-8 overflow-hidden">
                        <h4 className="text-[10px] font-black uppercase text-blue-500 mb-4 tracking-widest italic">
                            <i className="fa-solid fa-microchip mr-2"></i> Forensic Telemetry Feed
                        </h4>
                        <div className="log-terminal h-64 overflow-y-auto p-4 rounded-2xl text-[9px] space-y-2">
                            {logs.length > 0 ? logs.map((log, i) => (
                                <div key={i} className="border-b border-white/5 pb-1 opacity-80">
                                    <span className="text-blue-500">[{log.ts}]</span> <span className="text-white uppercase font-bold">{log.division}:</span> {log.event}
                                </div>
                            )) : <p className="opacity-30 italic">Awaiting telemetry pulses...</p>}
                        </div>
                    </div>

                    {/* Emergency Controls */}
                    <button onClick={triggerEmergencyLockdown} className="h-20 w-full bg-red-600/10 border-2 border-red-600 text-red-500 rounded-[2rem] font-black uppercase italic tracking-widest active:scale-95 transition-all">
                        <i className="fa-solid fa-skull-crossbones mr-2"></i> Activate Emergency Kill-Switch
                    </button>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<AuditorDashboard />);
    </script>
</body>
</html>
