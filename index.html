<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTG COMMAND | PRO V56</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; margin-bottom: 90px; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .nav-item { font-size: 9px; font-weight: 800; color: #475569; transition: 0.3s; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: #3b82f6; }
        select { background: #0f172a; border: 1px solid #1e293b; border-radius: 12px; padding: 10px; color: white; width: 100%; outline: none; margin-bottom: 10px; }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const SB_URL = "https://omdarjncczohpfzrqqhr.supabase.co";
        const SB_KEY = "sb_publishable_V-nfUDy5MxEG4SlXkisFBg_GBlD_4Y9";
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        function App() {
            const [view, setView] = useState('capture');
            const [logs, setLogs] = useState([]);
            const [audit, setAudit] = useState([]);
            const [uploading, setUploading] = useState(false);
            const [meta, setMeta] = useState({ project: 'NAFTOCEMENT IV', area: 'Deck', risk: 'Low' });

            useEffect(() => { fetchData(); }, [view]);

            const fetchData = async () => {
                const { data: lData } = await supabase.from('ntg_logbook').select('*').order('created_at', { ascending: false });
                setLogs(lData || []);
                const { data: aData } = await supabase.from('user_audit_logs').select('*').order('created_at', { ascending: false });
                setAudit(aData || []);
            };

            const handleCapture = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setUploading(true);
                const filePath = `${meta.project}/${meta.area}/${meta.risk}_${Date.now()}.jpg`;

                try {
                    await supabase.storage.from('ship-photos').upload(filePath, file);
                    await supabase.from('ntg_logbook').insert({ ship: meta.project, status: meta.risk, issue: `Inspection: ${meta.area}`, photo_url: filePath });
                    await supabase.from('user_audit_logs').insert({ user_id: 'CAPTAIN', action_type: 'CAPTURE', description: `New Photo for ${meta.project} at ${meta.area}` });
                    alert('✅ Καταχωρήθηκε!');
                    fetchData();
                } catch (err) { alert('❌ Σφάλμα'); }
                finally { setUploading(false); }
            };

            return (
                <div className="p-4 max-w-lg mx-auto">
                    <header className="flex justify-between items-center py-6">
                        <div>
                            <h1 className="brand text-blue-500 text-xl italic leading-none">NTG COMMAND</h1>
                            <p className="text-[9px] font-bold text-slate-500 tracking-[0.2em] uppercase italic">Admin: M. Sykiniotis</p>
                        </div>
                    </header>

                    {/* --- 1. CAPTURE --- */}
                    {view === 'capture' && (
                        <div className="space-y-4 glass p-6 rounded-[30px] border-t border-blue-500/30">
                            <select onChange={(e) => setMeta({...meta, project: e.target.value})}>
                                <option>NAFTOCEMENT IV</option>
                                <option>FSRU ALEXANDROUPOLI</option>
                            </select>
                            <select onChange={(e) => setMeta({...meta, area: e.target.value})}>
                                <option>Deck</option><option>Engine Room</option><option>Pump Room</option>
                            </select>
                            <div className="flex gap-2 mb-4">
                                {['Low', 'Medium', 'High'].map(r => (
                                    <button key={r} onClick={() => setMeta({...meta, risk: r})} className={`flex-1 py-2 rounded-xl text-[10px] font-bold border ${meta.risk === r ? 'bg-blue-600 border-blue-400' : 'bg-slate-900 border-slate-700'}`}>{r}</button>
                                ))}
                            </div>
                            <label className="w-full h-24 bg-blue-600 rounded-2xl flex flex-col items-center justify-center cursor-pointer active:scale-95 transition-all">
                                <i className={`fa-solid ${uploading ? 'fa-spinner fa-spin' : 'fa-camera'} text-2xl`}></i>
                                <span className="text-[10px] font-black uppercase mt-2">{uploading ? 'Uploading...' : 'Take Photo'}</span>
                                <input type="file" accept="image/*" capture="environment" className="hidden" onChange={handleCapture} />
                            </label>
                        </div>
                    )}

                    {/* --- 2. SAFETY (HIGH RISK ONLY) --- */}
                    {view === 'safety' && (
                        <div className="space-y-3">
                            <h2 className="brand text-[10px] text-red-500 uppercase italic mb-4">Safety Tech Alerts</h2>
                            {logs.filter(l => l.status === 'High').map(log => (
                                <div key={log.id} className="glass p-4 rounded-xl border-l-4 border-red-500 flex gap-3">
                                    <div className="w-12 h-12 bg-slate-800 rounded overflow-hidden"><img src={`${SB_URL}/storage/v1/object/public/ship-photos/${log.photo_url}`} className="w-full h-full object-cover" /></div>
                                    <div><div className="text-[10px] font-black">{log.ship}</div><div className="text-xs">{log.issue}</div></div>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* --- 3. FLEET LOG (MANAGER) --- */}
                    {view === 'logbook' && (
                        <div className="space-y-2">
                            <h2 className="brand text-[10px] text-slate-500 uppercase mb-4">Fleet Manager Overview</h2>
                            {logs.map(log => (
                                <div key={log.id} className="glass p-3 rounded-xl flex justify-between items-center">
                                    <div><div className="text-[10px] font-bold text-blue-400 uppercase">{log.ship}</div><div className="text-xs">{log.issue}</div></div>
                                    <div className={`text-[8px] font-black px-2 py-1 rounded ${log.status === 'High' ? 'bg-red-900' : 'bg-green-900'}`}>{log.status}</div>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* --- 4. LEGAL (AUDIT TRAIL) --- */}
                    {view === 'legal' && (
                        <div className="glass p-4 rounded-xl max-h-[60vh] overflow-y-auto font-mono text-[9px]">
                            <h2 className="brand text-slate-500 mb-4 italic">Immutable Audit Trail</h2>
                            {audit.map(a => (
                                <div key={a.id} className="border-b border-slate-800 py-1">
                                    <span className="text-blue-500">[{new Date(a.created_at).toLocaleTimeString()}]</span> {a.action_type}: {a.description}
                                </div>
                            ))}
                        </div>
                    )}

                    <nav className="fixed bottom-0 left-0 right-0 glass h-20 flex justify-around items-center border-t border-slate-800 px-2 z-50">
                        <button onClick={() => setView('capture')} className={`nav-item ${view === 'capture' ? 'active' : ''}`}><i className="fa-solid fa-camera text-xl mb-1"></i><span>Capture</span></button>
                        <button onClick={() => setView('safety')} className={`nav-item ${view === 'safety' ? 'active' : ''}`}><i className="fa-solid fa-hard-hat text-xl mb-1"></i><span>Safety</span></button>
                        <button onClick={() => setView('logbook')} className={`nav-item ${view === 'logbook' ? 'active' : ''}`}><i className="fa-solid fa-ship text-xl mb-1"></i><span>Fleet</span></button>
                        <button onClick={() => setView('legal')} className={`nav-item ${view === 'legal' ? 'active' : ''}`}><i className="fa-solid fa-gavel text-xl mb-1"></i><span>Legal</span></button>
                    </nav>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script></body></html>
