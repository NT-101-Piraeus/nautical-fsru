<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTG | SAFETY SHIPS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; }
        .brand { font-family: 'Orbitron', sans-serif; color: #ef4444; }
        .card { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .glow-red { box-shadow: 0 0 20px rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); }
        .btn-active { background: #ef4444 !important; color: white !important; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
    </style></head><body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function SafetyShips() {
            const [project, setProject] = useState(() => JSON.parse(localStorage.getItem('ntg_safety_active')) || {
                shipName: '',
                startDate: new Date().toISOString().split('T')[0],
                diary: '',
                checks: { gasFree: false, hotWorks: false, fireWatch: false, ppe: false, ventilation: false, lighting: false }
            });

            // Auto-save στο LocalStorage (Offline Persistence)
            useEffect(() => {
                localStorage.setItem('ntg_safety_active', JSON.stringify(project));
            }, [project]);

            const toggleCheck = (id) => {
                setProject({ ...project, checks: { ...project.checks, [id]: !project.checks[id] } });
            };

            return (
                <div className="max-w-xl mx-auto p-5 pb-32">
                    {/* Header */}
                    <header className="flex justify-between items-center py-6 border-b border-slate-800 mb-8">
                        <div>
                            <h1 className="brand text-sm tracking-tighter uppercase italic">Safety Ships</h1>
                            <p className="text-[8px] text-slate-500 font-bold uppercase tracking-[0.3em]">Compliance Π.Δ. 70/90</p>
                        </div>
                        <a href="index.html" className="text-slate-500 hover:text-white transition-colors"><i className="fa-solid fa-house-chimney"></i></a>
                    </header>

                    {/* Ship Details */}
                    <div className="card p-6 rounded-[35px] mb-6 glow-red">
                        <div className="space-y-4">
                            <div>
                                <label className="text-[9px] font-black text-slate-500 uppercase tracking-widest block mb-1">Όνομα Πλοίου / Project ID</label>
                                <input 
                                    className="w-full bg-transparent border-b border-slate-700 p-2 text-xl font-bold outline-none focus:border-red-500 uppercase transition-all"
                                    placeholder="e.g. MT FELIX"
                                    value={project.shipName}
                                    onChange={(e) => setProject({...project, shipName: e.target.value})}
                                />
                            </div>
                            <div className="flex justify-between items-center pt-2">
                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Έναρξη Εργασιών:</span>
                                <input type="date" className="bg-slate-800 text-[10px] p-2 rounded-lg outline-none font-bold" value={project.startDate} onChange={(e)=>setProject({...project, startDate: e.target.value})} />
                            </div>
                        </div>
                    </div>

                    {/* PD 70/90 Quick Checks */}
                    <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] mb-4 ml-2 italic">Essential Checklists</h3>
                    <div className="grid grid-cols-2 gap-3 mb-8">
                        <CheckBtn active={project.checks.gasFree} label="Gas Free" icon="fa-wind" onClick={()=>toggleCheck('gasFree')} />
                        <CheckBtn active={project.checks.hotWorks} label="Hot Works" icon="fa-fire" onClick={()=>toggleCheck('hotWorks')} />
                        <CheckBtn active={project.checks.fireWatch} label="Fire Watch" icon="fa-extinguisher" onClick={()=>toggleCheck('fireWatch')} />
                        <CheckBtn active={project.checks.ppe} label="PPE Audit" icon="fa-hard-hat" onClick={()=>toggleCheck('ppe')} />
                        <CheckBtn active={project.checks.ventilation} label="Ventilation" icon="fa-fan" onClick={()=>toggleCheck('ventilation')} />
                        <CheckBtn active={project.checks.lighting} label="Lighting" icon="fa-lightbulb" onClick={()=>toggleCheck('lighting')} />
                    </div>

                    {/* Daily Diary */}
                    <div className="card p-6 rounded-[35px] mb-6">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="text-[10px] font-black text-white uppercase tracking-widest leading-none">Ημερολόγιο Μέτρων Ασφαλείας</h3>
                            <i className="fa-solid fa-pen-nib text-red-500 opacity-50 text-xs"></i>
                        </div>
                        <textarea 
                            className="w-full bg-slate-900/50 border border-slate-800 rounded-2xl p-4 text-sm h-48 outline-none focus:ring-1 ring-red-500 transition-all placeholder:text-slate-700"
                            placeholder="Καταγράψτε παρατηρήσεις, ελλείψεις, διορθωτικές κινήσεις ή συμβάντα..."
                            value={project.diary}
                            onChange={(e)=>setProject({...project, diary: e.target.value})}
                        />
                    </div>

                    {/* Evidence & Export */}
                    <div class="grid grid-cols-1 gap-3">
                        <button className="w-full bg-slate-800 p-5 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] flex justify-between items-center active:scale-95 transition-all" onClick={() => document.getElementById('hazardCam').click()}>
                            <span>Capture Hazard Evidence</span>
                            <i className="fa-solid fa-camera text-red-500"></i>
                        </button>
                        <input type="file" id="hazardCam" accept="image/*" capture="camera" className="hidden" />

                        <button className="w-full bg-red-600 p-5 rounded-2xl font-black text-xs uppercase tracking-[0.3em] shadow-xl shadow-red-900/20 active:scale-95 transition-all" onClick={() => alert("Report Locked & Saved Locally. Ready for export.")}>
                            Submit Daily Report
                        </button>
                    </div>

                    <footer className="mt-12 text-center opacity-30">
                        <p className="text-[7px] font-black uppercase tracking-[0.5em]">Nautical Technology Group • Maritime Compliance Division</p>
                    </footer>
                </div>
            );
        }

        function CheckBtn({ active, label, icon, onClick }) {
            return (
                <div 
                    onClick={onClick}
                    className={`p-5 rounded-2xl border flex flex-col items-center gap-2 transition-all cursor-pointer ${active ? 'btn-active border-red-500' : 'bg-slate-900 border-slate-800 text-slate-500'}`}
                >
                    <i className={`fa-solid ${icon} ${active ? 'text-white' : 'text-slate-700'} text-lg`}></i>
                    <span className="text-[9px] font-black uppercase tracking-widest">{label}</span>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SafetyShips />);
    </script></body></html>
