<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nautical Tech | Fleet Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: #1a2b3c; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; }
        .hidden { display: none; }
        .sync-alert { background: #ffcc00; padding: 10px; text-align: center; font-weight: bold; border-radius: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="loginSection" class="login-screen">
        <div class="card">
            <h2>Nautical Tech V7.0</h2>
            <input type="password" id="passInput" placeholder="Κωδικός Πρόσβασης" style="padding: 10px; width: 80%;"><br><br>
            <button onclick="checkLogin()" style="background: #004d99; color: white; padding: 10px 25px; border: none; border-radius: 5px; cursor: pointer;">Είσοδος</button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <div id="offlineBanner" class="sync-alert hidden">⚠️ Εκκρεμεί συγχρονισμός έργων (Offline Mode)</div>
        <h1>Τεχνικός Ασφαλείας Πλοίων (Π.Δ. 70/90)</h1>
        
        <div class="card" style="text-align: left;">
            <label>Όνομα Πλοίου:</label><br>
            <input type="text" id="vesselName" style="width: 100%; padding: 8px; margin-bottom: 15px;"><br>
            
            <label>Ημερολόγιο & Παρατηρήσεις:</label><br>
            <textarea id="journal" style="width: 100%; height: 100px; padding: 8px;"></textarea><br><br>
            
            <label>Φωτογραφία Έργου:</label><br>
            <input type="file" id="photoFile" accept="image/*"><br><br>
            
            <button onclick="saveProject()" style="background: #28a745; color: white; padding: 15px; width: 100%; border: none; font-weight: bold;">ΚΑΤΑΧΩΡΗΣΗ ΣΤΟ REPORT</button>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('URL_ΣΟΥ', 'ANON_KEY_ΣΟΥ');

        function checkLogin() {
            if(document.getElementById('passInput').value === 'NT2026') {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
            } else { alert('Λάθος Κωδικός!'); }
        }

        async function saveProject() {
            const data = {
                vessel: document.getElementById('vesselName').value,
                journal: document.getElementById('journal').value,
                timestamp: new Date().toISOString()
            };
            
            if (!navigator.onLine) {
                const pending = JSON.parse(localStorage.getItem('offline_projects') || '[]');
                pending.push(data);
                localStorage.setItem('offline_projects', JSON.stringify(pending));
                document.getElementById('offlineBanner').classList.remove('hidden');
                alert("Αποθηκεύτηκε τοπικά!");
            } else {
                // Logic για upload στο 'project-photos' bucket
                alert("Συγχρονισμός με Supabase...");
            }
        }

        window.addEventListener('online', () => {
            document.getElementById('offlineBanner').classList.add('hidden');
            // Αυτόματος συγχρονισμός εδώ
        });
    </script>
</body>
</html>
