<script type="text/babel">
    const { useState } = React;

    function MainHub() {
        const [activeApp, setActiveApp] = useState('home');

        // Ορισμός των "Εφαρμογών" σου
        const apps = [
            { id: 'safety', name: 'Τεχνικός Ασφαλείας', icon: 'fa-user-shield', color: 'bg-emerald-600', group: 'MARINE' },
            { id: 'utm', name: 'UTL / UTM Hull', icon: 'fa-ruler-combined', color: 'bg-blue-600', group: 'MARINE' },
            { id: 'load_test', name: 'Load Testing', icon: 'fa-weight-hanging', color: 'bg-cyan-600', group: 'MARINE' },
            { id: 'legal', name: 'Νομικές Υποθέσεις', icon: 'fa-gavel', color: 'bg-red-800', group: 'LEGAL' },
            { id: 'intel', name: 'Ship & Yard Intel', icon: 'fa-tower-observation', color: 'bg-slate-800', group: 'INTEL' },
            { id: 'airbnb', name: 'Airbnb Manager', icon: 'fa-bed', color: 'bg-pink-500', group: 'BUSINESS' },
            { id: 'competitors', name: 'Competition Watch', icon: 'fa-eye', color: 'bg-orange-600', group: 'INTEL' }
        ];

        if (activeApp === 'home') {
            return (
                <div className="p-4 max-w-lg mx-auto">
                    <header className="mb-8 text-center">
                        <h1 className="text-3xl font-black text-slate-900">X-INTEL HUB</h1>
                        <p className="text-slate-500 text-xs font-bold uppercase tracking-widest">Lainas Group Command Center</p>
                    </header>

                    <div className="space-y-6">
                        {['MARINE', 'LEGAL', 'INTEL', 'BUSINESS'].map(group => (
                            <div key={group}>
                                <h3 className="text-[10px] font-black text-slate-400 mb-2 border-b border-slate-200 pb-1">{group}</h3>
                                <div className="grid grid-cols-2 gap-3">
                                    {apps.filter(a => a.group === group).map(app => (
                                        <button 
                                            key={app.id}
                                            onClick={() => setActiveApp(app.id)}
                                            className={`${app.color} p-4 rounded-2xl text-white shadow-lg active:scale-95 transition-all flex flex-col items-center justify-center h-28`}
                                        >
                                            <i className={`fa-solid ${app.icon} text-2xl mb-2`}></i>
                                            <span className="text-[10px] font-bold uppercase text-center">{app.name}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // Εδώ είναι η λογική για το τι δείχνει κάθε App
        return (
            <div className="min-h-screen bg-white">
                <header className="bg-slate-900 p-4 text-white flex justify-between items-center">
                    <span className="font-bold text-xs uppercase">{apps.find(a => a.id === activeApp).name}</span>
                    <button onClick={() => setActiveApp('home')} className="text-xs bg-white/20 px-3 py-1 rounded-full">ΚΛΕΙΣΙΜΟ</button>
                </header>
                
                <div className="p-6">
                    {activeApp === 'legal' && <LegalModule />}
                    {activeApp === 'intel' && <IntelModule />}
                    {activeApp === 'utm' && <UTMModule />}
                    {/* Τα υπόλοιπα modules προστίθενται εδώ */}
                </div>
            </div>
        );
    }

    // Παράδειγμα Module για Νομικά
    function LegalModule() {
        return (
            <div className="space-y-4">
                <div className="p-4 bg-red-50 border-l-4 border-red-800 rounded-r-xl">
                    <h4 className="font-bold text-red-900">Υπόθεση Τερμέ</h4>
                    <p className="text-xs text-red-700">Τελευταία ενημέρωση από δικηγόρο: "Αναμονή για κατάθεση υπομνήματος".</p>
                </div>
                <div className="p-4 bg-slate-50 border-l-4 border-slate-800 rounded-r-xl">
                    <h4 className="font-bold text-slate-800">Σαμσούντα</h4>
                    <p className="text-xs text-slate-600">Status: Active</p>
                </div>
            </div>
        );
    }

    // Παράδειγμα Module για Intel (Ships & Yards)
    function IntelModule() {
        return (
            <div className="space-y-4">
                <div className="p-4 bg-blue-50 border rounded-xl">
                    <h4 className="font-bold">🚢 NAFTOCEMENT IV</h4>
                    <p className="text-xs text-blue-800">Εντοπίστηκε: Πέραμα (Ζώνη)</p>
                    <span className="text-[10px] bg-blue-200 px-2 py-1 rounded mt-2 inline-block">LIVE TRACKING</span>
                </div>
                <div className="p-4 bg-orange-50 border rounded-xl">
                    <h4 className="font-bold">🏭 Ναυπηγεία Τουρκίας</h4>
                    <p className="text-xs text-orange-800">Αναφορές για αυξημένη κίνηση σε Bulk Carriers.</p>
                </div>
            </div>
        );
    }

    function UTMModule() { return <div>UTM Reports & Hull Gauging Logic...</div>; }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MainHub />);
</script>
