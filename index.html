<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTG HUB | V51 LEGAL INTEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; overflow-x: hidden; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        #cy { width: 100%; height: 500px; background: rgba(0,0,0,0.3); border-radius: 40px; }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        function App() {
            const [view, setView] = useState('HUB'); // HUB, LEGAL
            const [isAuth, setIsAuth] = useState(() => sessionStorage.getItem('ntg_auth') === 'true');

            useEffect(() => {
                if (view === 'LEGAL') {
                    const cy = cytoscape({
                        container: document.getElementById('cy'),
                        elements: [
                            // Nodes: Persons
                            { data: { id: 'ez', label: 'Erkan Zorlu', type: 'PE' } },
                            { data: { id: 'tk', label: 'Tuğrul Karaca', type: 'PE' } },
                            { data: { id: 'ho', label: 'Hasan Öztürk', type: 'PE' } },
                            // Nodes: Banks NL
                            { data: { id: 'bnk', label: 'Dutch Banks (NL)', type: 'BK' } },
                            // Nodes: Companies Liberia
                            { data: { id: 'cap', label: 'Capital Shipping (LIB)', type: 'CO' } },
                            { data: { id: 'bar', label: 'Barker Financial (LIB)', type: 'CO' } },
                            // Edges: Connections
                            { data: { source: 'ez', target: 'bnk', label: 'Transfer' } },
                            { data: { source: 'tk', target: 'bnk', label: 'Signatory' } },
                            { data: { source: 'ho', target: 'bnk', label: 'Link' } },
                            { data: { source: 'bnk', target: 'cap', label: 'Capital Flow' } },
                            { data: { source: 'bnk', target: 'bar', label: 'Capital Flow' } }
                        ],
                        style: [
                            { selector: 'node', style: { 'label': 'data(label)', 'color': '#fff', 'background-color': '#1e293b', 'font-size': '10px', 'text-valign': 'center' } },
                            { selector: 'node[type="PE"]', style: { 'background-color': '#ef4444', 'width': 50, 'height': 50 } },
                            { selector: 'node[type="BK"]', style: { 'background-color': '#3b82f6', 'shape': 'rectangle' } },
                            { selector: 'node[type="CO"]', style: { 'background-color': '#10b981', 'shape': 'diamond' } },
                            { selector: 'edge', style: { 'width': 2, 'line-color': '#334155', 'target-arrow-shape': 'triangle', 'label': 'data(label)', 'font-size': '8px', 'color': '#94a3b8', 'curve-style': 'bezier' } }
                        ],
                        layout: { name: 'cose', padding: 50 }
                    });
                }
            }, [view]);

            if (!isAuth) return (
                <div className="h-screen flex items-center justify-center bg-[#020617]">
                    <form onSubmit={(e)=>{e.preventDefault(); if(e.target.p.value==='NT2026'){sessionStorage.setItem('ntg_auth','true');setIsAuth(true)}}} className="glass p-10 rounded-[40px] text-center w-full max-w-xs border border-blue-500/20 shadow-2xl">
                        <h1 className="brand text-blue-500 text-2xl mb-8 italic">NTG HUB</h1>
                        <input name="p" type="password" autoFocus className="w-full bg-slate-900 p-5 rounded-3xl mb-4 text-center text-white text-2xl" placeholder="••••" />
                        <button className="w-full bg-blue-600 py-5 rounded-3xl font-black text-xs uppercase">Identify</button>
                    </form>
                </div>
            );

            if (view === 'LEGAL') return (
                <div className="max-w-xl mx-auto p-5 py-10 animate-fadeIn">
                    <header className="flex justify-between items-center mb-8">
                        <button onClick={()=>setView('HUB')} className="bg-slate-800 px-6 py-3 rounded-2xl text-[10px] font-black uppercase">← Hub</button>
                        <h1 className="brand text-red-500 text-xl italic uppercase">Legal Intel</h1>
                    </header>
                    <div id="cy" className="glass mb-8 shadow-2xl border border-red-500/10"></div>
                    <div className="grid grid-cols-1 gap-4">
                        <div className="glass p-6 rounded-[35px] border-l-4 border-red-600 flex justify-between items-center">
                            <div><p className="text-[9px] text-red-500 font-black uppercase tracking-widest italic">Live Asset Tracker</p><h4 className="font-black text-sm uppercase mt-1">NAFTOCEMENT IV</h4></div>
                            <span className="bg-red-600/20 text-red-500 px-3 py-1 rounded-full text-[9px] font-black animate-pulse">WATCHING</span>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="max-w-xl mx-auto p-5 py-20 animate-fadeIn">
                    <header className="text-center mb-16"><h1 className="brand text-blue-500 text-3xl font-black italic uppercase">NTG HUB</h1></header>
                    <div className="grid grid-cols-1 gap-6">
                        <a href="safety_ships.html" className="glass p-10 rounded-[50px] flex items-center gap-8 border border-white/5 active:scale-95 transition-all shadow-2xl">
                            <div className="w-16 h-16 rounded-2xl bg-red-600/20 flex items-center justify-center text-red-500 text-3xl"><i className="fa-solid fa-user-shield"></i></div>
                            <div><h2 className="brand text-sm text-white uppercase italic">Safety Officer</h2><p className="text-[10px] text-slate-500 font-bold uppercase mt-1">Audit Engine</p></div>
                        </a>
                        <button onClick={()=>{if(prompt("LEGAL ACCESS")==="2026") setView('LEGAL')}} className="glass p-10 rounded-[50px] flex items-center gap-8 border border-red-500/20 active:scale-95 transition-all shadow-2xl">
                            <div className="w-16 h-16 rounded-2xl bg-red-600/10 flex items-center justify-center text-red-500 text-3xl"><i className="fa-solid fa-scale-balanced"></i></div>
                            <div><h2 className="brand text-sm text-red-500 uppercase italic">Legal Dept</h2><p className="text-[10px] text-slate-500 font-bold uppercase mt-1">Asset Recovery</p></div>
                        </button>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script></body></html>
