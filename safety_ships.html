<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NTG | SAFESHIP MANAGER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; touch-action: manipulation; }
        .brand { font-family: 'Orbitron', sans-serif; color: #ef4444; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .safe-btn { transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
        .safe-btn:active { transform: scale(0.92); filter: brightness(1.2); }
        .status-checked { background: #059669 !important; border-color: #10b981 !important; }
        .status-pending { background: #1e293b !important; border-color: #334155 !important; }
        .status-blocked { background: #b91c1c !important; border-color: #ef4444 !important; }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- DATA STRUCTURE: LOCATIONS ---
        const LOCATIONS = [
            { id: 'deck', label: 'Κατάστρωμα (Deck)', sub: 'Main Deck, Forecastle, Aft' },
            { id: 'engine', label: 'Μηχανοστάσιο (Engine Room)', sub: 'Main Engine, Generators, Steering' },
            { id: 'tanks', label: 'Δεξαμενές (Tanks)', sub: 'Ballast, Fuel, Sludge' },
            { id: 'pumps', label: 'Αντλιοστάσιο (Pump Room)', sub: 'Cargo Pumps, Lines' },
            { id: 'accom', label: 'Ενδιαίτηση (Accommodation)', sub: 'Bridge, Galley, Cabins' },
            { id: 'hull', label: 'Εξωτερικά (Hull/Dock)', sub: 'Propeller, Rudder, Scaffolding' }
        ];

        function SafeShipApp() {
            const [view, setView] = useState('dashboard'); // dashboard, project, checklist
            const [projects, setProjects] = useState(() => JSON.parse(localStorage.getItem('safeship_data')) || []);
            const [activeId, setActiveId] = useState(null);

            useEffect(() => {
                localStorage.setItem('safeship_data', JSON.stringify(projects));
            }, [projects]);

            const activeP = projects.find(p => p.id === activeId);

            const createProject = () => {
                const name = prompt("Όνομα Πλοίου / IMO:");
                if (!name) return;
                const newP = {
                    id: Date.now(),
                    name: name.toUpperCase(),
                    gasFreeExpiry: '',
                    checks: {}, // { locationId: { status: 'pending', note: '', photo: null } }
                    risks: []
                };
                setProjects([newP, ...projects]);
                setActiveId(newP.id);
                setView('project');
            };

            const updateCheck = (locId, status) => {
                const updated = projects.map(p => {
                    if (p.id === activeId) {
                        const current = p.checks[locId] || {};
                        return { ...p, checks: { ...p.checks, [locId]: { ...current, status } } };
                    }
                    return p;
                });
                setProjects(updated);
            };

            const updateNote = (locId, note) => {
                const updated = projects.map(p => {
                    if (p.id === activeId) {
                        const current = p.checks[locId] || {};
                        return { ...p, checks: { ...p.checks, [locId]: { ...current, note } } };
                    }
                    return p;
                });
                setProjects(updated);
            };

            if (view === 'dashboard') return (
                <div className="p-6 max-w-xl mx-auto">
                    <header className="flex justify-between items-center mb-10">
                        <h1 className="brand text-lg font-black italic tracking-tighter">SafeShip Manager</h1>
                        <a href="index.html" className="text-slate-600"><i className="fa-solid fa-house-user"></i></a>
                    </header>
                    <button onClick={createProject} className="w-full bg-red-600 p-6 rounded-[35px] font-black text-xs uppercase tracking-widest shadow-xl mb-8 safe-btn">
                        + New Ship Inspection
                    </button>
                    <div className="space-y-4">
                        <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] ml-2">Active Projects</h3>
                        {projects.map(p => (
                            <div key={p.id} onClick={() => { setActiveId(p.id); setView('project'); }} className="glass p-6 rounded-[35px] flex justify-between items-center safe-btn">
                                <div>
                                    <h4 className="font-bold text-white uppercase">{p.name}</h4>
                                    <p className="text-[9px] text-slate-500 font-bold uppercase mt-1">Status: Operational</p>
                                </div>
                                <i className="fa-solid fa-chevron-right text-slate-800"></i>
                            </div>
                        ))}
                    </div>
                </div>
            );

            if (view === 'project') return (
                <div className="p-6 max-w-xl mx-auto animate-fadeIn">
                    <button onClick={() => setView('dashboard')} className="text-slate-500 text-[10px] font-black uppercase mb-6 flex items-center gap-2">
                        <i className="fa-solid fa-arrow-left"></i> Dashboard
                    </button>
                    <div className="glass p-8 rounded-[40px] border-l-4 border-l-red-600 mb-8">
                        <h2 className="brand text-2xl font-black uppercase tracking-tighter">{activeP.name}</h2>
                        <div className="mt-4 flex items-center gap-3">
                            <span className="text-[9px] font-black bg-emerald-500/20 text-emerald-500 px-3 py-1 rounded-full uppercase">Compliance OK</span>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 gap-4">
                        <button onClick={() => setView('checklist')} className="glass p-8 rounded-[40px] flex justify-between items-center safe-btn border border-white/5">
                            <div className="text-left">
                                <h3 className="brand text-sm text-white uppercase italic">Location Checklist</h3>
                                <p className="text-[9px] text-slate-500 font-bold uppercase mt-1">Site Tour Walkthrough</p>
                            </div>
                            <i className="fa-solid fa-route text-red-500 text-xl"></i>
                        </button>

                        <button className="glass p-8 rounded-[40px] flex justify-between items-center safe-btn opacity-40">
                            <div className="text-left">
                                <h3 className="brand text-sm text-white uppercase italic">Risk Log</h3>
                                <p className="text-[9px] text-slate-500 font-bold uppercase mt-1">Hazard Tracking</p>
                            </div>
                            <i className="fa-solid fa-triangle-exclamation text-amber-500 text-xl"></i>
                        </button>
                        
                        <button className="w-full bg-red-600 p-6 rounded-[35px] font-black text-xs uppercase tracking-widest mt-4 safe-btn">
                            Generate Daily PDF
                        </button>
                    </div>
                </div>
            );

            if (view === 'checklist') return (
                <div className="p-6 max-w-xl mx-auto animate-fadeIn">
                    <div className="flex justify-between items-center mb-8">
                        <button onClick={() => setView('project')} className="text-slate-500 text-[10px] font-black uppercase">← Back</button>
                        <h2 className="brand text-[10px] uppercase text-red-500 tracking-widest">Site Tour: {activeP.name}</h2>
                    </div>

                    <div className="space-y-6">
                        {LOCATIONS.map(loc => {
                            const data = activeP.checks[loc.id] || { status: 'pending', note: '' };
                            return (
                                <div key={loc.id} className="glass p-6 rounded-[40px] border border-white/5">
                                    <div className="mb-4">
                                        <h4 className="font-black text-xs uppercase text-white">{loc.label}</h4>
                                        <p className="text-[9px] text-slate-500 font-bold uppercase">{loc.sub}</p>
                                    </div>
                                    
                                    {/* STATUS TOGGLE - BIG BUTTONS FOR ONE HAND */}
                                    <div className="grid grid-cols-3 gap-2 mb-4">
                                        <StatusBtn active={data.status==='ok'} label="OK" color="bg-emerald-600" onClick={()=>updateCheck(loc.id, 'ok')} />
                                        <StatusBtn active={data.status==='pending'} label="Wait" color="bg-slate-700" onClick={()=>updateCheck(loc.id, 'pending')} />
                                        <StatusBtn active={data.status==='blocked'} label="Block" color="bg-red-700" onClick={()=>updateCheck(loc.id, 'blocked')} />
                                    </div>

                                    <textarea 
                                        className="w-full bg-slate-900/50 border border-slate-800 rounded-2xl p-4 text-[11px] h-20 outline-none focus:ring-1 ring-red-500 text-slate-300"
                                        placeholder="Παρατηρήσεις (π.χ. Locked, No access)..."
                                        value={data.note}
                                        onChange={(e) => updateNote(loc.id, e.target.value)}
                                    />
                                    
                                    <div className="mt-3 flex gap-2">
                                        <button className="flex-1 bg-slate-800 p-3 rounded-xl text-[9px] font-black uppercase tracking-widest safe-btn">
                                            <i className="fa-solid fa-camera mr-2"></i> Photo
                                        </button>
                                        <button className="flex-1 bg-slate-800 p-3 rounded-xl text-[9px] font-black uppercase tracking-widest safe-btn">
                                            <i className="fa-solid fa-microphone mr-2"></i> Voice
                                        </button>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                    
                    <button onClick={() => setView('project')} className="w-full bg-emerald-600 p-6 rounded-[35px] font-black text-xs uppercase tracking-widest mt-10 safe-btn shadow-xl shadow-emerald-900/20">
                        Save Checklist Draft
                    </button>
                </div>
            );
        }

        function StatusBtn({ active, label, color, onClick }) {
            return (
                <button onClick={onClick} className={`p-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all ${active ? color : 'bg-slate-800 opacity-40'} safe-btn`}>
                    {label}
                </button>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SafeShipApp />);
    </script></body></html>
