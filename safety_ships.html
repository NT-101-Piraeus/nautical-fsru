<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTG | SAFETY OFFICER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; }
        .brand { font-family: 'Orbitron', sans-serif; color: #ef4444; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const CATS = [
            "Προπαρασκευαστικές & Καθαρισμοί",
            "Θερμές Εργασίες (Hot Works)",
            "Ελασματουργικές / Σωληνουργικές",
            "Μηχανολογικές Εργασίες",
            "Επιφανειακή Επεξεργασία",
            "Ηλεκτρολογικές Εργασίες",
            "Βοηθητικές Εργασίες"
        ];

        function SafetyApp() {
            const [view, setView] = useState('list');
            const [projects, setProjects] = useState(() => JSON.parse(localStorage.getItem('ntg_safety_v2')) || []);
            const [activeId, setActiveId] = useState(null);

            // Sync με LocalStorage
            useEffect(() => {
                localStorage.setItem('ntg_safety_v2', JSON.stringify(projects));
            }, [projects]);

            const activeP = projects.find(p => p.id === activeId);

            const createP = (e) => {
                e.preventDefault();
                const newP = {
                    id: Date.now(),
                    ship: e.target.ship.value.toUpperCase(),
                    start: e.target.start.value,
                    selectedCats: [],
                    diary: ''
                };
                setProjects([newP, ...projects]);
                setActiveId(newP.id);
                setView('project');
            };

            const toggleCat = (catName) => {
                const updated = projects.map(p => {
                    if (p.id === activeId) {
                        const hasCat = p.selectedCats.includes(catName);
                        return {
                            ...p,
                            selectedCats: hasCat 
                                ? p.selectedCats.filter(c => c !== catName)
                                : [...p.selectedCats, catName]
                        };
                    }
                    return p;
                });
                setProjects(updated);
            };

            const updateDiary = (text) => {
                setProjects(projects.map(p => p.id === activeId ? {...p, diary: text} : p));
            };

            return (
                <div className="max-w-xl mx-auto p-4 pb-24">
                    <header className="flex justify-between items-center py-6 border-b border-slate-800 mb-6">
                        <h1 className="brand text-sm uppercase italic">Safety Ships</h1>
                        <a href="index.html" className="text-slate-500"><i className="fa-solid fa-house"></i></a>
                    </header>

                    {view === 'list' && (
                        <div className="space-y-4">
                            <button onClick={() => setView('new')} className="w-full bg-red-600 p-5 rounded-[30px] font-bold text-xs uppercase shadow-xl">+ Νέο Έργο</button>
                            {projects.map(p => (
                                <div key={p.id} onClick={() => { setActiveId(p.id); setView('project'); }} className="glass p-6 rounded-[35px] flex justify-between items-center">
                                    <div>
                                        <h3 className="font-bold text-white uppercase">{p.ship}</h3>
                                        <p className="text-[10px] text-slate-500 uppercase">{p.start}</p>
                                    </div>
                                    <i className="fa-solid fa-chevron-right text-slate-700"></i>
                                </div>
                            ))}
                        </div>
                    )}

                    {view === 'new' && (
                        <form onSubmit={createP} className="space-y-6">
                            <input name="ship" required className="w-full bg-slate-900 border border-slate-800 p-5 rounded-3xl outline-none uppercase font-bold" placeholder="Όνομα Πλοίου" />
                            <input name="start" type="date" required className="w-full bg-slate-900 border border-slate-800 p-5 rounded-3xl outline-none" />
                            <button className="w-full bg-red-600 p-5 rounded-3xl font-bold uppercase">Έναρξη</button>
                        </form>
                    )}

                    {view === 'project' && activeP && (
                        <div className="space-y-6">
                            <button onClick={() => setView('list')} className="text-slate-500 text-xs uppercase font-bold">← Επιστροφή</button>
                            <div className="bg-red-600/10 border border-red-500/20 p-6 rounded-[40px]">
                                <h2 className="brand text-xl uppercase tracking-tighter">{activeP.ship}</h2>
                                <p className="text-[10px] text-red-500 font-bold uppercase mt-1">Supervision Active</p>
                            </div>

                            <div className="space-y-3">
                                <h3 className="text-[10px] font-black text-slate-500 uppercase ml-2 tracking-widest">Κατηγορίες Εργασιών</h3>
                                {CATS.map((cat, idx) => (
                                    <div 
                                        key={idx} 
                                        onClick={() => toggleCat(cat)}
                                        className={`glass p-5 rounded-[30px] flex justify-between items-center transition-all cursor-pointer ${activeP.selectedCats.includes(cat) ? 'border-red-500 bg-red-500/10' : ''}`}
                                    >
                                        <span className={`text-xs font-bold ${activeP.selectedCats.includes(cat) ? 'text-white' : 'text-slate-400'}`}>{cat}</span>
                                        <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center ${activeP.selectedCats.includes(cat) ? 'bg-red-500 border-red-500' : 'border-slate-700'}`}>
                                            {activeP.selectedCats.includes(cat) && <i className="fa-solid fa-check text-[10px] text-white"></i>}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="glass p-6 rounded-[35px]">
                                <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Ημερολόγιο Μέτρων</h3>
                                <textarea 
                                    className="w-full bg-transparent border-none outline-none text-sm h-48 text-slate-300" 
                                    placeholder="Γράψτε εδώ τις παρατηρήσεις σας..."
                                    value={activeP.diary}
                                    onChange={(e) => updateDiary(e.target.value)}
                                />
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SafetyApp />);
    </script></body></html>
