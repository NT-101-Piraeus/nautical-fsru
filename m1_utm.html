<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M1: UTM Gauging</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');body{background:#020617;color:white;font-family:'Orbitron',sans-serif;font-style:italic;font-weight:bold;}.glass{background:rgba(15,23,42,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);}</style>
</head>
<body><div id="root"></div><script type="text/babel">
const UTMApp=()=>{
    const [measurements, setMeasurements] = React.useState(JSON.parse(localStorage.getItem('ntg_utm_storage')) || []);
    const [point, setPoint] = React.useState('');
    const [val, setVal] = React.useState('');

    const addEntry = () => {
        if(!point || !val) return;
        const newEntry = { id: Date.now(), point, val, date: new Date().toLocaleDateString() };
        const updated = [newEntry, ...measurements];
        setMeasurements(updated);
        localStorage.setItem('ntg_utm_storage', JSON.stringify(updated));
        setPoint(''); setVal('');
    };

    return(
        <div className="min-h-screen p-6 animate-fade">
            <div className="flex justify-between items-center mb-10">
                <a href="index.html" className="text-[10px] underline opacity-50 text-slate-400 font-black tracking-widest">← BACK TO HUB</a>
                <i className="fa-solid fa-layer-group text-slate-500"></i>
            </div>
            
            <h1 className="text-slate-400 text-lg uppercase mb-8 text-center italic tracking-tighter">M1: UTM MEASUREMENTS</h1>
            
            <div className="glass p-6 rounded-[2.5rem] border-slate-500/20 mb-8 shadow-2xl">
                <div className="space-y-4">
                    <input type="text" placeholder="POINT LOCATION (e.g. FR 45)" value={point} onChange={(e)=>setPoint(e.target.value)}
                           className="w-full bg-black/50 p-4 rounded-2xl border border-slate-800 text-xs text-white outline-none focus:border-slate-500" />
                    <div className="flex gap-3">
                        <input type="number" placeholder="MM" value={val} onChange={(e)=>setVal(e.target.value)}
                               className="flex-1 bg-black/50 p-4 rounded-2xl border border-slate-800 text-2xl text-white outline-none focus:border-slate-500 text-center" />
                        <button onClick={addEntry} className="bg-slate-700 px-6 rounded-2xl active:scale-95 transition-all"><i className="fa-solid fa-plus"></i></button>
                    </div>
                </div>
            </div>

            <div className="space-y-3">
                <p className="text-[8px] uppercase text-slate-500 tracking-[0.2em] ml-2">Historical Logs</p>
                {measurements.map(m => (
                    <div key={m.id} className="glass p-4 rounded-2xl flex justify-between items-center border border-white/5 opacity-80">
                        <span className="text-[10px] uppercase font-black">{m.point}</span>
                        <span className="text-lg font-black text-slate-400 font-mono">{m.val} <small className="text-[8px]">mm</small></span>
                    </div>
                ))}
            </div>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<UTMApp/>);
</script></body></html>
