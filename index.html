<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NTG COMMAND | V56 CEO PULSE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; -webkit-tap-highlight-color: transparent; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .pulse-card { transition: all 0.3s; border-top: 2px solid transparent; }
        .money-text { font-family: 'Orbitron', sans-serif; color: #10b981; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [view, setView] = useState('HOME');
            const [showFinances, setShowFinances] = useState(false);

            return (
                <div className="min-h-screen pb-20">
                    {/* --- HEADER --- */}
                    <header className="glass sticky top-0 z-50 p-4 flex justify-between items-center border-b border-purple-500/20">
                        <div onClick={() => setView('HOME')} className="cursor-pointer">
                            <p className="text-[9px] font-black text-purple-500 tracking-[0.3em]">NTG CEO MASTER PULSE</p>
                            <h1 className="font-bold text-sm uppercase italic">COMMAND CENTER</h1>
                        </div>
                        <i className="fa-solid fa-crown text-purple-500 animate-bounce"></i>
                    </header>

                    <main className="p-4">
                        {/* --- HOME HUB --- */}
                        {view === 'HOME' && (
                            <div className="grid grid-cols-2 gap-4 animate-in fade-in duration-300">
                                <button onClick={() => setView('M1')} className="glass p-6 rounded-[2rem] flex flex-col items-center gap-2 opacity-40">
                                    <i className="fa-solid fa-shield-halved text-2xl"></i>
                                    <span className="text-[10px] font-black uppercase tracking-tighter">Safety</span>
                                </button>
                                <button onClick={() => setView('M2')} className="glass p-6 rounded-[2rem] flex flex-col items-center gap-2 opacity-40">
                                    <i className="fa-solid fa-ship text-2xl"></i>
                                    <span className="text-[10px] font-black uppercase tracking-tighter">Repairs</span>
                                </button>
                                <button onClick={() => setView('M6')} className="glass p-8 rounded-[2.5rem] flex flex-col items-center gap-3 col-span-2 border-t-4 border-purple-600 shadow-[0_0_30px_rgba(168,85,247,0.15)] pulse-card">
                                    <i className="fa-solid fa-chart-line text-4xl text-purple-500"></i>
                                    <span className="text-xs font-black uppercase tracking-[0.2em]">CEO Master Pulse</span>
                                </button>
                            </div>
                        )}

                        {/* --- MANUAL 06: CEO DASHBOARD --- */}
                        {view === 'M6' && (
                            <div className="space-y-6 animate-in zoom-in duration-300">
                                <div className="flex justify-between items-center px-2">
                                    <h2 className="brand text-purple-500 text-xs italic underline underline-offset-8 uppercase tracking-widest">Global Overview</h2>
                                    <button onClick={() => setView('HOME')} className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Close</button>
                                </div>

                                {/* Fleet Health Stats */}
                                <div className="grid grid-cols-3 gap-3">
                                    <div className="glass p-4 rounded-2xl flex flex-col items-center border-b-2 border-emerald-500">
                                        <span className="text-[18px] font-black text-emerald-500 tracking-tighter">12</span>
                                        <span className="text-[8px] font-black text-slate-500 uppercase">Active</span>
                                    </div>
                                    <div className="glass p-4 rounded-2xl flex flex-col items-center border-b-2 border-red-500">
                                        <span className="text-[18px] font-black text-red-500 tracking-tighter">3</span>
                                        <span className="text-[8px] font-black text-slate-500 uppercase">Alerts</span>
                                    </div>
                                    <div className="glass p-4 rounded-2xl flex flex-col items-center border-b-2 border-blue-500">
                                        <span className="text-[18px] font-black text-blue-500 tracking-tighter">84%</span>
                                        <span className="text-[8px] font-black text-slate-500 uppercase">Health</span>
                                    </div>
                                </div>

                                {/* Financial Pulse */}
                                <div className="glass p-6 rounded-[2.5rem] bg-purple-950/5 border-purple-500/20">
                                    <div className="flex justify-between items-center mb-4">
                                        <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Financial Pulse</p>
                                        <button onClick={() => setShowFinances(!showFinances)} className="text-[10px] font-black text-purple-500">
                                            {showFinances ? 'HIDE' : 'SHOW PIN'}
                                        </button>
                                    </div>
                                    <div className={`space-y-4 transition-all ${showFinances ? 'blur-0' : 'blur-md'}`}>
                                        <div className="flex justify-between items-end">
                                            <div>
                                                <p className="text-[8px] font-black text-emerald-500 uppercase">Total Profitability</p>
                                                <h3 className="money-text text-2xl">+32.4%</h3>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-[8px] font-black text-red-500 uppercase">Burn Rate</p>
                                                <h3 className="text-sm font-black text-red-400">€4.2K / DAY</h3>
                                            </div>
                                        </div>
                                        <div className="h-1 bg-slate-800 rounded-full overflow-hidden">
                                            <div className="h-full bg-emerald-500" style={{width: '72%'}}></div>
                                        </div>
                                    </div>
                                </div>

                                {/* Risk Intelligence List */}
                                <div className="space-y-3">
                                    <p className="text-[10px] font-black text-slate-500 uppercase ml-2 tracking-widest">Executive Risk Alerts</p>
                                    <div className="glass p-4 rounded-3xl flex items-center gap-4 border-l-4 border-red-600">
                                        <i className="fa-solid fa-triangle-exclamation text-red-600"></i>
                                        <div>
                                            <p className="text-[10px] font-black text-red-500">LEGAL: NAFTOCEMENT VIETNAM</p>
                                            <p className="text-xs font-bold text-slate-300 tracking-tighter">High probability of court action in 48h.</p>
                                        </div>
                                    </div>
                                    <div className="glass p-4 rounded-3xl flex items-center gap-4 border-l-4 border-orange-500 opacity-80">
                                        <i className="fa-solid fa-clock-rotate-left text-orange-500"></i>
                                        <div>
                                            <p className="text-[10px] font-black text-orange-500">DELAY: TERME YARD 1</p>
                                            <p className="text-xs font-bold text-slate-300 tracking-tighter">Welding team behind schedule (-15%).</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Navigation Mini-Status */}
                    <div className="fixed bottom-4 w-full text-center">
                        <p className="text-[7px] text-slate-700 font-black tracking-[0.5em] uppercase">
                            Executive Authority Active • NTG Command
                        </p>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
