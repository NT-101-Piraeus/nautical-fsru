<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NTG | SAFESHIP MANAGER V17.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; touch-action: manipulation; }
        .brand { font-family: 'Orbitron', sans-serif; color: #ef4444; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .safe-card { border-radius: 35px; border: 1px solid rgba(255,255,255,0.03); transition: all 0.2s; }
        .safe-btn:active { transform: scale(0.95); }
        .tab-active { border-bottom: 2px solid #ef4444; color: #ef4444; }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const SUPABASE_URL = "https://omdarjncczohpffwunfy.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_V-nfUDy5MxEG4SlXkisFBg_GBlD_4Y9"; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const PD_MEASURES = {
            "Θερμές Εργασίες": ["Πυροσβεστήρας στα 2μ", "Fire Watch παρών", "Απομάκρυνση εύφλεκτων", "Κάλυψη με πυρίμαχα"],
            "Καθαρισμοί": ["Gas-Free σε ισχύ", "Αντιεκρηκτικός φωτισμός", "Εξαερισμός On"],
            "Σκαλωσιές": ["Πιστοποιητικό ανέγερσης", "Προστατευτικές μπάρες", "Σωστή έδραση"]
        };

        function SafeShipApp() {
            const [view, setView] = useState('dashboard'); // dashboard, project, tasks
            const [projects, setProjects] = useState([]);
            const [attendance, setAttendance] = useState({ in: '--:--', out: '--:--' });
            const [loading, setLoading] = useState(true);

            useEffect(() => { 
                fetchData(); 
                const savedTime = localStorage.getItem('ntg_attendance');
                if (savedTime) setAttendance(JSON.parse(savedTime));
            }, []);

            async function fetchData() {
                const { data } = await _supabase.from('ntg_projects').select('*').order('created_at', { ascending: false });
                if (data) setProjects(data);
                setLoading(false);
            }

            const clockIn = () => {
                const now = new Date().toLocaleTimeString('el-GR', { hour: '2-digit', minute: '2-digit' });
                const newAtt = { ...attendance, in: now };
                setAttendance(newAtt);
                localStorage.setItem('ntg_attendance', JSON.stringify(newAtt));
            };

            const clockOut = () => {
                const now = new Date().toLocaleTimeString('el-GR', { hour: '2-digit', minute: '2-digit' });
                const newAtt = { ...attendance, out: now };
                setAttendance(newAtt);
                localStorage.setItem('ntg_attendance', JSON.stringify(newAtt));
            };

            if (loading) return <div className="h-screen flex items-center justify-center brand animate-pulse uppercase">Booting Command Center...</div>;

            return (
                <div className="max-w-xl mx-auto p-5 pb-32">
                    {/* TOP STATUS BAR */}
                    <header className="flex justify-between items-center py-6 mb-4 border-b border-slate-800">
                        <div>
                            <h1 className="brand text-sm font-black italic tracking-tighter uppercase">SafeShip Manager</h1>
                            <p className="text-[8px] text-slate-500 font-bold uppercase tracking-[0.4em]">NTG Tactical Unit</p>
                        </div>
                        <a href="index.html" className="text-slate-600 text-xl"><i className="fa-solid fa-house-user"></i></a>
                    </header>

                    {view === 'dashboard' && (
                        <div className="space-y-6 animate-fadeIn">
                            {/* ATTENDANCE CARD */}
                            <div className="glass p-6 rounded-[35px] border-l-4 border-red-600 flex justify-between items-center">
                                <div>
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Ωράριο Παρουσίας</h3>
                                    <div className="flex gap-4">
                                        <div><p className="text-[8px] uppercase text-slate-500">In</p><p className="font-bold text-lg">{attendance.in}</p></div>
                                        <div><p className="text-[8px] uppercase text-slate-500">Out</p><p className="font-bold text-lg">{attendance.out}</p></div>
                                    </div>
                                </div>
                                <div className="flex flex-col gap-2">
                                    <button onClick={clockIn} className="bg-emerald-600 px-4 py-2 rounded-xl text-[9px] font-black uppercase safe-btn">Check In</button>
                                    <button onClick={clockOut} className="bg-red-700 px-4 py-2 rounded-xl text-[9px] font-black uppercase safe-btn">Check Out</button>
                                </div>
                            </div>

                            {/* DAILY PROJECTS TABLE */}
                            <div className="glass p-6 rounded-[40px]">
                                <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                                    <i className="fa-solid fa-anchor text-blue-500"></i> Έργα της Ημέρας
                                </h3>
                                <div className="space-y-3">
                                    {projects.length === 0 ? <p className="text-center text-[10px] py-10 opacity-20 uppercase italic">No active deployments</p> : 
                                    projects.map(p => (
                                        <div key={p.id} className="bg-slate-900/50 p-4 rounded-2xl flex justify-between items-center border border-white/5 active:scale-95 transition-all cursor-pointer" onClick={() => alert("Άνοιγμα Project Log...")}>
                                            <div>
                                                <h4 className="font-bold text-xs text-white uppercase">{p.name}</h4>
                                                <p className="text-[8px] text-slate-500 uppercase mt-0.5">Location: Πέραμα / G1</p>
                                            </div>
                                            <span className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* GLOBAL TASKS BUTTON */}
                            <button onClick={() => setView('tasks')} className="w-full bg-red-600 p-8 rounded-[40px] flex justify-between items-center shadow-2xl shadow-red-900/30 safe-btn">
                                <div className="text-left">
                                    <h3 className="brand text-lg text-white font-black italic leading-none uppercase">Open Tasks</h3>
                                    <p className="text-[9px] text-white/60 font-bold uppercase mt-1">Hazardous Issues Across Fleet</p>
                                </div>
                                <div className="bg-white/10 w-12 h-12 rounded-full flex items-center justify-center border border-white/20">
                                    <i className="fa-solid fa-triangle-exclamation text-xl text-white"></i>
                                </div>
                            </button>
                        </div>
                    )}

                    {view === 'tasks' && (
                        <div className="animate-fadeIn space-y-6">
                            <button onClick={() => setView('dashboard')} className="text-slate-500 text-[10px] font-black uppercase">← Επιστροφή στο Dashboard</button>
                            <h2 className="brand text-xl uppercase italic">Global Task Registry</h2>
                            <div className="glass p-10 rounded-[40px] text-center opacity-30">
                                <i className="fa-solid fa-clipboard-check text-4xl mb-4"></i>
                                <p className="text-[10px] font-black uppercase tracking-widest leading-relaxed">Όλα τα θέματα έχουν διευθετηθεί.<br/>Fleet status: SECURE.</p>
                            </div>
                        </div>
                    )}

                    {/* FOOTER NAV (Fixed) */}
                    <footer className="fixed bottom-0 left-0 right-0 p-6 glass border-t border-slate-800 flex justify-around">
                        <NavBtn active={view==='dashboard'} icon="fa-chart-pie" label="Status" onClick={()=>setView('dashboard')} />
                        <NavBtn active={false} icon="fa-plus-circle" label="New Ship" onClick={() => alert("Άνοιγμα Φόρμας...")} />
                        <NavBtn active={view==='tasks'} icon="fa-list-check" label="Tasks" onClick={()=>setView('tasks')} />
                    </footer>
                </div>
            );
        }

        function NavBtn({ active, icon, label, onClick }) {
            return (
                <button onClick={onClick} className={`flex flex-col items-center gap-1 ${active ? 'text-red-500' : 'text-slate-600'}`}>
                    <i className={`fa-solid ${icon} text-lg`}></i>
                    <span className="text-[8px] font-black uppercase tracking-tighter">{label}</span>
                </button>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SafeShipApp />);
    </script></body></html>
