<script type="text/babel">
const { useState, useEffect } = React;

const MainHub = () => {
    const [isLocked, setIsLocked] = useState(true);
    const [pin, setPin] = useState('');
    const MASTER_PIN = "1234";

    // Ελέγχουμε αν υπάρχει ήδη ενεργή συνεδρία στην προσωρινή μνήμη
    useEffect(() => {
        const auth = sessionStorage.getItem('ntg_global_auth');
        if (auth === 'true') setIsLocked(false);
    }, []);

    const unlock = () => {
        if (pin === MASTER_PIN) {
            setIsLocked(false);
            sessionStorage.setItem('ntg_global_auth', 'true');
        } else {
            alert("ACCESS DENIED: WRONG PIN");
            setPin('');
        }
    };

    if (isLocked) {
        return (
            <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center p-6 italic">
                <div className="glass p-10 rounded-[3rem] border-orange-500/20 text-center shadow-2xl">
                    <i className="fa-solid fa-lock text-4xl text-orange-500 mb-6 animate-pulse"></i>
                    <h1 className="text-xl font-black uppercase tracking-tighter mb-8">NauticalOS Locked</h1>
                    <input 
                        type="password" 
                        value={pin} 
                        onChange={(e) => setPin(e.target.value)}
                        placeholder="ENTER MASTER PIN"
                        className="bg-black/50 border border-white/10 p-5 rounded-2xl text-center text-2xl font-black mb-6 w-full outline-none focus:border-orange-500 transition-all"
                    />
                    <button 
                        onClick={unlock}
                        className="w-full bg-orange-600 p-5 rounded-2xl font-black uppercase text-[10px] tracking-widest active:scale-95 transition-all"
                    >
                        Authorize Access
                    </button>
                </div>
            </div>
        );
    }

    return (
        /* ΕΔΩ ΜΠΑΙΝΕΙ ΟΛΟ ΤΟ GRID ΜΕ ΤΑ 15 DIVISIONS ΠΟΥ ΦΤΙΑΞΑΜΕ */
        <div className="p-6">
            <h1 className="text-2xl font-black uppercase italic">Command Hub Active</h1>
            {/* ... Το Grid των Divisions ... */}
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<MainHub />);
</script>
