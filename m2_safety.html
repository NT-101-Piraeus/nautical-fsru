<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M2: Compliance Shield v3.60 (Hot Fix)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');body{background:#020617;color:white;font-family:'Orbitron',sans-serif;font-style:italic;font-weight:bold;}.glass{background:rgba(15,23,42,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);}</style></head><body><div id="root"></div><script type="text/babel">const SafetyApp = () => {
    const [sunMode, setSunMode] = React.useState(false);
    const [activeVessel, setActiveVessel] = React.useState(null); // ΚΛΕΙΔΙ: Εδώ θα αποθηκεύεται το πλοίο
    const [dailyTasks, setDailyTasks] = React.useState([]);
    const [photos, setPhotos] = React.useState([]);
    const [tempArea, setTempArea] = React.useState('Main Deck');
    const [tempTaskType, setTempTaskType] = React.useState('Hot Works');

    // ΔΕΔΟΜΕΝΑ ΣΕΠΕ (Από image_15.png)
    const sepeVessels = [
        { id: 1, name: 'FELIX', imo: '9513191', shift: '07:00 - 11:00', status: 'ACTIVE' },
        { id: 2, name: 'ARIADNI', imo: '9513192', shift: '12:00 - 15:00', status: 'PENDING' },
        { id: 3, name: 'NAFTOCEMENT IV', imo: '9513193', shift: '16:00 - 18:00', status: 'PENDING' },
        { id: 4, name: 'RIGEL III', imo: '9513194', shift: 'DOCKING', status: 'WAITING' }
    ];

    // ΠΡΟΔΙΑΓΡΑΦΕΣ Π.Δ. 70/90
    const workRequirements = {
        "Hot Works": ["Gas-Free Certificate Checked", "Fire Standby Present", "Fire Blanket in place"],
        "Confined Space": ["O2/LEL Levels Tested", "Standby Person at Entry", "Ventilation OK"],
        "Lifting Ops": ["Gear Certified", "Area Clear", "SWL Verified"]
    };

    const addJobToShift = () => {
        const newTask = { id: Date.now(), area: tempArea, type: tempTaskType, verified: false };
        setDailyTasks([...dailyTasks, newTask]);
    };

    const theme = sunMode ? "bg-white text-black" : "bg-slate-950 text-white";
    const card = sunMode ? "bg-slate-100 border-slate-300 shadow-xl" : "glass border-blue-500/20";

    // --- VIEW 1: ΣΕΠΕ WATCHLIST (Αυτό που βλέπεις τώρα, image_15.png) ---
    if (!activeVessel) return (
        <div className={`min-h-screen p-6 animate-fade bg-slate-950 font-bold italic`}>
            <div className="flex justify-between items-center mb-10">
                <a href="index.html" className="text-[10px] underline opacity-50 text-slate-400">← HUB</a>
                <span className="text-[9px] text-emerald-500 font-black uppercase tracking-widest italic animate-pulse">ΣΕΠΕ SYNC</span>
            </div>
            <h1 className="text-slate-400 text-lg uppercase mb-8 text-center italic tracking-tighter">M2: SAFETY WATCHLIST</h1>
            <div className="space-y-4">
                {sepeVessels.map(v => (
                    <div key={v.id} 
                         onClick={() => setActiveVessel(v)} // ΔΙΟΡΘΩΣΗ: Τώρα το κλικ δουλεύει!
                         className="glass p-5 rounded-[2.5rem] border-l-4 border-slate-700 flex justify-between items-center shadow-xl cursor-pointer hover:border-blue-500 transition-all active:scale-95 group">
                        <div>
                            <p className="text-sm text-white font-black group-hover:text-blue-400 transition-colors">{v.name}</p>
                            <p className="text-[9px] text-slate-500 uppercase mt-1">IMO: {v.imo} • SHIFT: {v.shift}</p>
                        </div>
                        <div className="text-right flex items-center gap-3">
                            <span className={`text-[8px] px-3 py-1 rounded-full border italic font-black ${v.status === 'ACTIVE' ? 'bg-emerald-900/30 text-emerald-500 border-emerald-500/20' : 'bg-slate-800 text-slate-500 border-slate-700'}`}>{v.status}</span>
                            <i className="fa-solid fa-chevron-right text-slate-700 group-hover:text-blue-500"></i>
                        </div>
                    </div>
                ))}
            </div>
            <p className="text-[7px] text-slate-600 text-center mt-12 uppercase tracking-widest italic font-black">Nautical Technology OS • Compliance Engine</p>
        </div>
    );

    // --- VIEW 2: INSPECTION MODULE (Όταν πατάς ένα πλοίο) ---
    return (
        <div className={`min-h-screen p-6 transition-all duration-300 animate-fade ${theme}`}>
            <div className="flex justify-between items-center mb-6 border-b border-blue-500/20 pb-4">
                <button onClick={() => setActiveVessel(null)} className={`text-[10px] underline opacity-60 ${sunMode?'text-black':'text-blue-400'}`}>← Ships</button>
                <div className="flex items-center gap-4">
                    <span className="text-[11px] uppercase font-black italic tracking-tighter">{activeVessel.name}</span>
                    <button onClick={() => setSunMode(!sunMode)} className={`p-2 rounded-full border ${sunMode?'border-slate-300 bg-slate-200 shadow-md':'border-slate-800 bg-slate-900 shadow-inner'}`}>
                        <i className={`fa-solid ${sunMode?'fa-moon text-blue-900':'fa-sun text-yellow-500'}`}></i>
                    </button>
                </div>
            </div>

            {/* JOBLIST BUILDER */}
            <div className={`${card} p-5 rounded-[2.5rem] mb-6 space-y-4 shadow-2xl`}>
                <p className="text-[8px] uppercase tracking-widest text-slate-500 font-black italic">1. Add Task to Daily Joblist / Προσθήκη Εργασίας</p>
                <div className="grid grid-cols-2 gap-2">
                    <select value={tempArea} onChange={(e)=>setTempArea(e.target.value)} className="bg-slate-800/20 p-4 rounded-2xl text-[10px] outline-none border border-white/5 font-black italic text-white">
                        <option>Main Deck</option><option>Engine Room</option><option>Pump Room</option><option>Garage</option>
                    </select>
                    <select value={tempTaskType} onChange={(e)=>setTempTaskType(e.target.value)} className="bg-slate-800/20 p-4 rounded-2xl text-[10px] outline-none border border-white/5 font-black italic text-white">
                        <option>Hot Works</option><option>Confined Space</option><option>Lifting Ops</option>
                    </select>
                </div>
                <button onClick={addJobToShift} className="w-full bg-blue-600/20 border border-blue-600/40 p-4 rounded-2xl text-[9px] uppercase font-black italic shadow-md active:scale-95 transition-all">
                    Add Task to Shift +
                </button>
            </div>

            {/* DAILY JOBLIST DISPLAY (Π.Δ. 70/90) */}
            <div className="space-y-4 mb-28 pr-1 overflow-y-auto max-h-48 italic">
                {dailyTasks.map(task => (
                    <div key={task.id} className={`${card} p-4 rounded-3xl animate-fade`}>
                        <h4 className="text-[11px] uppercase text-blue-500 font-black mb-3">{task.area} / {task.type}</h4>
                        <div className="space-y-2">
                            {workRequirements[task.type]?.map(check => (
                                <label key={check} className="flex items-center gap-3 bg-black/20 p-3 rounded-xl border border-white/5">
                                    <input type="checkbox" className="w-4 h-4 accent-blue-600" />
                                    <span className="text-[9px] uppercase opacity-80 text-white">{check}</span>
                                </label>
                            ))}
                        </div>
                    </div>
                ))}
            </div>

            {/* ACTION BAR (EVIDENCE LOCK) */}
            <div className={`fixed bottom-0 left-0 right-0 p-6 ${sunMode ? 'bg-white shadow-[0_-10px_30px_rgba(0,0,0,0.1)]' : 'bg-slate-950 border-t border-blue-900/20'}`}>
                <div className="flex gap-4">
                    <button onClick={() => setPhotos([...photos, {id: Date.now()}])} 
                            className={`flex-1 p-6 rounded-[2.5rem] flex flex-col items-center gap-2 border-2 transition-all active:scale-95 ${photos.length > 0 ? 'border-emerald-500 bg-emerald-500/10' : 'border-slate-700 border-dashed bg-black/20'}`}>
                        <i className={`fa-solid fa-camera text-2xl ${photos.length > 0 ? 'text-emerald-500' : 'text-slate-600'}`}></i>
                        <span className={`text-[8px] uppercase font-black ${photos.length > 0 ? 'text-emerald-500' : 'text-slate-600'}`}>Capture Evidence ({photos.length})</span>
                    </button>
                    
                    <button disabled={photos.length === 0 || dailyTasks.length === 0}
                            className={`flex-1 p-6 rounded-[2.5rem] flex flex-col items-center gap-2 border-2 ${photos.length > 0 && dailyTasks.length > 0 ? 'border-emerald-600 bg-emerald-600 text-white shadow-xl' : 'border-slate-800 opacity-20 grayscale cursor-not-allowed'}`}>
                        <i className="fa-solid fa-signature text-2xl"></i>
                        <span className="text-[8px] uppercase font-black tracking-widest tracking-widest">Sign Log</span>
                    </button>
                </div>
            </div>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<SafetyApp />);</script></body></html>
