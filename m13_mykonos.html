<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M13: Mykonos Estate Cloud</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background-color: #020617; color: white; margin: 0; font-family: 'Orbitron', sans-serif; font-style: italic; font-weight: bold; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .brand { letter-spacing: 0.1em; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- SUPABASE CONFIG ---
        const SUPABASE_URL = 'https://omdarjncczohpzfrqqhr.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_V-nfUDy5MxEG4SlXkisFBg_GBlD_4Y9';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const MykonosApp = () => {
            const [properties, setProperties] = useState([]);
            const [loading, setLoading] = useState(true);
            const role = localStorage.getItem('ntg_role');

            useEffect(() => {
                if (role !== 'DIRECTOR') {
                    alert("UNAUTHORIZED ACCESS - DIRECTORS ONLY");
                    window.location.href = 'index.html';
                    return;
                }
                fetchData();
            }, []);

            const fetchData = async () => {
                const { data, error } = await supabaseClient
                    .from('mykonos_estate')
                    .select('*');
                if (!error) setProperties(data || []);
                setLoading(false);
            };

            const totalRevenue = properties.reduce((acc, curr) => acc + (curr.monthly_revenue || 0), 0);

            return (
                <div className="min-h-screen p-6 animate-fade bg-slate-950">
                    <div className="flex justify-between items-center mb-10">
                        <a href="index.html" className="text-[10px] uppercase underline opacity-60 font-black text-blue-300 tracking-widest">← HUB</a>
                        <div className="flex items-center gap-2">
                            <i className="fa-solid fa-crown text-yellow-500 text-xs animate-pulse"></i>
                            <span className="text-[9px] text-blue-300 font-black uppercase tracking-[0.2em]">Director Level</span>
                        </div>
                    </div>
                    
                    <h1 className="brand text-blue-300 text-lg uppercase mb-10 italic tracking-tighter text-center">M13: LIVE IN MYKONOS</h1>
                    
                    <div className="space-y-6">
                        {loading ? (
                            <div className="text-center p-10 opacity-50 uppercase text-[10px] animate-pulse">Accessing Secure Vault...</div>
                        ) : properties.map(prop => (
                            <div key={prop.id} className="glass p-6 rounded-[2.5rem] border-blue-400/20 shadow-xl">
                                <div className="flex justify-between items-start mb-6">
                                    <div>
                                        <h3 className="text-xs font-black uppercase text-white tracking-widest">{prop.property_name}</h3>
                                        <p className="text-[8px] text-blue-400 mt-2 uppercase font-black italic tracking-widest leading-loose">
                                            AMA: {prop.ama_number} <br/>
                                            <span className="text-slate-500 italic uppercase">STATUS: {prop.status}</span>
                                        </p>
                                    </div>
                                    <div className={`w-3 h-3 rounded-full ${prop.status === 'BOOKED' ? 'bg-emerald-500 animate-pulse' : 'bg-slate-700'}`}></div>
                                </div>
                                
                                <div className="flex justify-between items-end border-t border-white/5 pt-4">
                                    <span className="text-[8px] text-slate-500 uppercase italic">Monthly Yield</span>
                                    <span className="text-lg font-black text-white font-mono">€ {prop.monthly_revenue?.toLocaleString()}</span>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="mt-12 p-8 glass rounded-[3rem] border border-blue-500/20 bg-blue-600/5 text-center shadow-2xl">
                        <p className="text-[10px] uppercase font-black italic text-slate-500 tracking-[0.3em] mb-4">Total Fleet Revenue</p>
                        <span className="text-4xl font-black text-blue-300 font-mono tracking-tighter italic">
                            € {totalRevenue.toLocaleString()}
                        </span>
                    </div>

                    <p className="text-[7px] text-slate-600 text-center mt-12 uppercase italic tracking-[0.2em]">Estate Management Engine v3.35</p>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MykonosApp />);
    </script>
</body>
</html>
