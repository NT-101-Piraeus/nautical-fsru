<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M2: Compliance Shield v3.95 (Supreme Shield)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');body{background:#020617;color:white;font-family:'Orbitron',sans-serif;font-style:italic;font-weight:bold;}.glass{background:rgba(15,23,42,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);}</style></head><body><div id="root"></div><script type="text/babel">const { useState, useEffect } = React;

// --- TELEMETRY SENSOR (BLACK BOX) ---
const Telemetry = {
    log: (type, action, details) => {
        try {
            const logs = JSON.parse(localStorage.getItem('ntg_M2_logs') || '[]');
            logs.push({ ts: new Date().toISOString(), type, action, details });
            localStorage.setItem('ntg_M2_logs', JSON.stringify(logs.slice(-50)));
        } catch (e) { console.error("Telemetry failure", e); }
    }
};

const SafetyApp = () => {
    // STATE: ADMIN & WATCHLIST
    const [view, setView] = useState('WATCHLIST'); 
    const [activeVessel, setActiveVessel] = useState(null);
    const [showAdminModal, setShowAdminModal] = useState(false);
    const [isEditing, setIsEditing] = useState(false);
    const [pin, setPin] = useState('');
    const [vesselForm, setVesselForm] = useState({ name: '', imo: '', shift: '', prevNames: [] });
    
    // STATE: INSPECTION MODULE (Η Νομική Θωράκιση)
    const [sunMode, setSunMode] = useState(false);
    const [dailyTasks, setDailyTasks] = useState([]);
    const [photos, setPhotos] = useState([]);
    const [tempArea, setTempArea] = useState('Main Deck');
    const [tempTaskType, setTempTaskType] = useState('Hot Works');

    // 🛠️ CENTRAL VESSEL DB (ntg_global_vessels)
    const [vessels, setVessels] = useState(() => {
        const saved = localStorage.getItem('ntg_global_vessels');
        if (saved) return JSON.parse(saved);
        return [
            { id: 1, name: 'FELIX', imo: '9513191', shift: '07:00 - 11:00', prevNames: [] },
            { id: 2, name: 'ARIADNI', imo: '9513192', shift: '12:00 - 15:00', prevNames: [] }
        ];
    });

    useEffect(() => { localStorage.setItem('ntg_global_vessels', JSON.stringify(vessels)); }, [vessels]);
    useEffect(() => { Telemetry.log('INFO', 'APP_OPEN', 'M2 Supreme Shield Loaded'); }, []);

    // --- ADMIN ACTIONS (Add/Edit/Delete) ---
    const handleSaveVessel = () => {
        if (!vesselForm.name || !vesselForm.imo) return alert("⚠️ Συμπληρώστε Όνομα και IMO!");
        if (pin !== '1234') { Telemetry.log('WARNING', 'INVALID_PIN_ATTEMPT', 'Failed Admin Access'); return alert("❌ ΛΑΘΟΣ PIN."); }
        
        if (isEditing) {
            // Λογική Αλλαγής Ονόματος (The 3-Folder Logic)
            const oldVessel = vessels.find(v => v.id === vesselForm.id);
            let updatedPrevNames = [...(vesselForm.prevNames || [])];
            if (oldVessel.name !== vesselForm.name) {
                updatedPrevNames.push(oldVessel.name);
                Telemetry.log('INFO', 'NAME_CHANGE', `From ${oldVessel.name} to ${vesselForm.name}`);
            }
            setVessels(vessels.map(v => v.id === vesselForm.id ? {...vesselForm, prevNames: updatedPrevNames} : v));
        } else {
            const project = { ...vesselForm, id: Date.now(), prevNames: [] };
            setVessels([...vessels, project]);
            Telemetry.log('ACTION', 'PROJECT_ADDED', project.name);
        }
        closeModal();
    };

    const handleDelete = (id) => {
        if (confirm("⚠️ ΟΡΙΣΤΙΚΗ ΔΙΑΓΡΑΦΗ PROJECT;")) {
            setVessels(vessels.filter(v => v.id !== id));
            Telemetry.log('WARNING', 'PROJECT_DELETED', `Project ID: ${id}`);
        }
    };

    const closeModal = () => {
        setShowAdminModal(false); setIsEditing(false); setPin('');
        setVesselForm({ name: '', imo: '', shift: '', prevNames: [] });
    };

    // --- P.D. 70/90 REQUIREMENTS ---
    const workRequirements = {
        "Hot Works": ["Gas-Free Certificate Checked", "Fire Standby Present", "Fire Blanket in place"],
        "Confined Space": ["O2/LEL Levels Tested", "Standby Person at Entry", "Ventilation OK"],
        "Lifting Ops": ["Gear Certified", "Area Clear", "SWL Verified"]
    };

    const addJobToShift = () => {
        setDailyTasks([...dailyTasks, { id: Date.now(), area: tempArea, type: tempTaskType, verified: false }]);
        Telemetry.log('ACTION', 'TASK_ADDED', `${tempArea} - ${tempTaskType}`);
    };

    const handlePhotoCapture = () => {
        setPhotos([...photos, {id: Date.now()}]);
        Telemetry.log('ACTION', 'PHOTO_CAPTURED', `Vessel: ${activeVessel.name}`);
    };

    const handleSignLog = () => {
        Telemetry.log('ACTION', 'LOG_SIGNED', `Vessel: ${activeVessel.name}, Tasks: ${dailyTasks.length}`);
        alert("Log Signed and Secured via P.D. 70/90 Protocols.");
        setView('WATCHLIST');
    };

    const theme = sunMode ? "bg-white text-black" : "bg-slate-950 text-white";
    const card = sunMode ? "bg-slate-100 border-slate-300 shadow-xl" : "glass border-blue-500/20";

    // ==========================================
    // VIEW 1: WATCHLIST (Η Κεντρική Οθόνη)
    // ==========================================
    if (view === 'WATCHLIST') return (
        <div className="min-h-screen p-6 animate-fade bg-slate-950 font-bold italic">
            <div className="flex justify-between items-center mb-10">
                <a href="index.html" className="text-[10px] underline opacity-50 text-slate-400">← HUB</a>
                <span className="text-[9px] text-blue-500 font-black uppercase tracking-widest italic animate-pulse">GLOBAL DB SYNC</span>
            </div>

            <h1 className="text-blue-600 text-lg uppercase mb-8 text-center italic tracking-tighter">M2: SAFETY WATCHLIST</h1>
            
            <div className="space-y-4 mb-10">
                {vessels.map(v => (
                    <div key={v.id} className="glass p-5 rounded-[2.5rem] border-l-4 border-slate-700 flex justify-between items-center shadow-xl">
                        <div onClick={() => { setActiveVessel(v); setView('INSPECTION'); Telemetry.log('INFO', 'VESSEL_OPENED', v.name); }} className="flex-1 cursor-pointer group">
                            <p className="text-sm text-white font-black group-hover:text-blue-400 transition-colors">
                                {v.name} 
                                {v.prevNames && v.prevNames.length > 0 && <span className="text-[7px] text-orange-500 opacity-80 ml-2 tracking-widest">(+HISTORY)</span>}
                            </p>
                            <p className="text-[9px] text-slate-500 uppercase mt-1">IMO: {v.imo} • SHIFT: {v.shift}</p>
                        </div>
                        <div className="flex gap-4 opacity-50 hover:opacity-100 transition-opacity">
                            <button onClick={() => { setVesselForm(v); setIsEditing(true); setShowAdminModal(true); }} className="text-blue-400 text-xs p-2"><i className="fa-solid fa-pen-to-square"></i></button>
                            <button onClick={() => handleDelete(v.id)} className="text-red-500 text-xs p-2"><i className="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                ))}
            </div>

            <button onClick={() => setShowAdminModal(true)} className="w-full bg-blue-600/10 border-2 border-dashed border-blue-500/40 p-6 rounded-[2.5rem] text-blue-500 font-black uppercase text-[10px] flex items-center justify-center gap-3 active:scale-95 transition-all">
                <i className="fa-solid fa-folder-plus text-xl"></i> Add New Project (Admin)
            </button>

            {/* ADMIN MODAL (PIN LOCK) */}
            {showAdminModal && (
                <div className="fixed inset-0 bg-black/95 backdrop-blur-xl z-50 flex items-center justify-center p-6">
                    <div className="glass w-full p-8 rounded-[3rem] border-blue-500/30 space-y-4">
                        <p className="text-center text-[10px] text-blue-500 uppercase tracking-widest mb-4">{isEditing ? 'Admin Edit Mode' : 'Admin Security Access'}</p>
                        <input type="password" placeholder="PIN" value={pin} onChange={(e)=>setPin(e.target.value)} className="w-full bg-black/50 p-4 rounded-2xl text-center text-xl tracking-[1rem] outline-none border border-white/10" />
                        
                        {pin === '1234' && (
                            <div className="space-y-4 animate-fade">
                                <input type="text" placeholder="VESSEL NAME" value={vesselForm.name} onChange={(e)=>setVesselForm({...vesselForm, name: e.target.value.toUpperCase()})} className="w-full bg-slate-900/50 p-4 rounded-xl text-xs outline-none border border-white/5" />
                                <input type="text" placeholder="IMO NUMBER" value={vesselForm.imo} onChange={(e)=>setVesselForm({...vesselForm, imo: e.target.value})} className="w-full bg-slate-900/50 p-4 rounded-xl text-xs outline-none border border-white/5" />
                                <input type="text" placeholder="SHIFT (e.g. 07:00-11:00)" value={vesselForm.shift} onChange={(e)=>setVesselForm({...vesselForm, shift: e.target.value})} className="w-full bg-slate-900/50 p-4 rounded-xl text-xs outline-none border border-white/5" />
                                <button onClick={handleSaveVessel} className="w-full bg-blue-600 p-5 rounded-2xl text-[10px] uppercase font-black italic">{isEditing ? 'Update Project' : 'Save Project'}</button>
                            </div>
                        )}
                        <button onClick={closeModal} className="w-full text-[9px] text-slate-600 uppercase mt-4">Cancel</button>
                    </div>
                </div>
            )}
        </div>
    );

    // ==========================================
    // VIEW 2: INSPECTION MODULE (Η Νομική Θωράκιση)
    // ==========================================
    return (
        <div className={`min-h-screen p-6 transition-all duration-300 animate-fade ${theme}`}>
            <div className="flex justify-between items-center mb-6 border-b border-blue-500/20 pb-4">
                <button onClick={() => setView('WATCHLIST')} className={`text-[10px] underline opacity-60 ${sunMode?'text-black':'text-blue-400'}`}>← Back to Ships</button>
                <div className="flex items-center gap-4">
                    <span className="text-[11px] uppercase font-black italic tracking-tighter">{activeVessel.name}</span>
                    <button onClick={() => setSunMode(!sunMode)} className={`p-2 rounded-full border ${sunMode?'border-slate-300 bg-slate-200 shadow-md':'border-slate-800 bg-slate-900 shadow-inner'}`}>
                        <i className={`fa-solid ${sunMode?'fa-moon text-blue-900':'fa-sun text-yellow-500'}`}></i>
                    </button>
                </div>
            </div>

            {/* VISUAL INDICATOR ΓΙΑ ΤΟΥΣ 3 ΦΑΚΕΛΟΥΣ (History) */}
            {activeVessel.prevNames && activeVessel.prevNames.length > 0 && (
                <div className="flex gap-2 mb-6">
                    <div className="flex-1 glass p-2 rounded-xl text-center border-orange-500/20"><p className="text-[6px] text-slate-500 uppercase">Legacy</p><p className="text-[8px] text-orange-400">{activeVessel.prevNames[0]}</p></div>
                    <div className="flex-1 glass p-2 rounded-xl text-center border-emerald-500/20"><p className="text-[6px] text-slate-500 uppercase">Current</p><p className="text-[8px] text-emerald-400">{activeVessel.name}</p></div>
                    <div className="flex-1 glass p-2 rounded-xl text-center border-blue-500/50"><p className="text-[6px] text-blue-500 uppercase">Master</p><p className="text-[8px] text-blue-400">All Logs Sync</p></div>
                </div>
            )}

            {/* JOBLIST BUILDER */}
            <div className={`${card} p-5 rounded-[2.5rem] mb-6 space-y-4 shadow-2xl`}>
                <p className="text-[8px] uppercase tracking-widest text-slate-500 font-black italic">Add Task to Daily Joblist</p>
                <div className="grid grid-cols-2 gap-2">
                    <select value={tempArea} onChange={(e)=>setTempArea(e.target.value)} className={`bg-slate-800/20 p-4 rounded-2xl text-[10px] outline-none font-black italic ${sunMode?'text-black':'text-white border-white/5'}`}>
                        <option>Main Deck</option><option>Engine Room</option><option>Pump Room</option><option>Garage</option>
                    </select>
                    <select value={tempTaskType} onChange={(e)=>setTempTaskType(e.target.value)} className={`bg-slate-800/20 p-4 rounded-2xl text-[10px] outline-none font-black italic ${sunMode?'text-black':'text-white border-white/5'}`}>
                        <option>Hot Works</option><option>Confined Space</option><option>Lifting Ops</option>
                    </select>
                </div>
                <button onClick={addJobToShift} className="w-full bg-blue-600/20 border border-blue-600/40 p-4 rounded-2xl text-[9px] uppercase font-black italic shadow-md active:scale-95 transition-all text-blue-400">
                    Add Task to Shift +
                </button>
            </div>

            {/* DAILY JOBLIST DISPLAY (Π.Δ. 70/90) */}
            <div className="space-y-4 mb-28 pr-1 overflow-y-auto max-h-48 italic">
                {dailyTasks.map(task => (
                    <div key={task.id} className={`${card} p-4 rounded-3xl animate-fade`}>
                        <h4 className="text-[11px] uppercase text-blue-500 font-black mb-3">{task.area} / {task.type}</h4>
                        <div className="space-y-2">
                            {workRequirements[task.type]?.map(check => (
                                <label key={check} className="flex items-center gap-3 bg-black/10 p-3 rounded-xl border border-white/5">
                                    <input type="checkbox" className="w-4 h-4 accent-blue-600" />
                                    <span className={`text-[9px] uppercase font-bold ${sunMode?'text-black':'text-white opacity-80'}`}>{check}</span>
                                </label>
                            ))}
                        </div>
                    </div>
                ))}
            </div>

            {/* EVIDENCE LOCK */}
            <div className={`fixed bottom-0 left-0 right-0 p-6 ${sunMode ? 'bg-white shadow-[0_-10px_30px_rgba(0,0,0,0.1)]' : 'bg-slate-950 border-t border-blue-900/20'}`}>
                <div className="flex gap-4">
                    <button onClick={handlePhotoCapture} 
                            className={`flex-1 p-6 rounded-[2.5rem] flex flex-col items-center gap-2 border-2 transition-all active:scale-95 ${photos.length > 0 ? 'border-emerald-500 bg-emerald-500/10' : 'border-slate-700 border-dashed bg-black/20'}`}>
                        <i className={`fa-solid fa-camera text-2xl ${photos.length > 0 ? 'text-emerald-500' : 'text-slate-600'}`}></i>
                        <span className={`text-[8px] uppercase font-black ${photos.length > 0 ? 'text-emerald-500' : 'text-slate-600'}`}>Capture ({photos.length})</span>
                    </button>
                    
                    <button disabled={photos.length === 0 || dailyTasks.length === 0}
                            onClick={handleSignLog}
                            className={`flex-1 p-6 rounded-[2.5rem] flex flex-col items-center gap-2 border-2 ${photos.length > 0 && dailyTasks.length > 0 ? 'border-blue-600 bg-blue-600 text-white shadow-xl' : 'border-slate-800 opacity-20 grayscale cursor-not-allowed'}`}>
                        <i className="fa-solid fa-signature text-2xl"></i>
                        <span className="text-[8px] uppercase font-black tracking-widest">Sign Log</span>
                    </button>
                </div>
            </div>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<SafetyApp />);</script></body></html>
