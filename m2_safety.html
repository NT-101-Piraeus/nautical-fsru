<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M2: Compliance Shield v5.60 (Operational Baseline)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #020617; color: white; font-family: 'Orbitron', sans-serif; font-style: italic; font-weight: bold; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .sun-mode { background: white !important; color: black !important; }
        .sun-mode .glass { background: #f8fafc !important; border: 1px solid #cbd5e1 !important; color: black !important; }
        .fat-finger-button { height: 80px; font-weight: 900; text-transform: uppercase; border-radius: 1.5rem; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .fat-finger-button:active { transform: scale(0.95); }
        .matrix-blink { animation: matrix-alert 1.5s infinite; }
        @keyframes matrix-alert { 0%, 100% { border-color: #ef4444; } 50% { border-color: #450a0a; } }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const Telemetry = {
            log: (type, action, details) => {
                const logs = JSON.parse(localStorage.getItem('ntg_M2_logs') || '[]');
                logs.push({ ts: new Date().toISOString(), type, action, details });
                localStorage.setItem('ntg_M2_logs', JSON.stringify(logs.slice(-50)));
            }
        };

        const SafetyApp = () => {
            const [view, setView] = useState('WATCHLIST');
            const [activeVessel, setActiveVessel] = useState(null);
            const [sunMode, setSunMode] = useState(false);
            
            // INSPECTION STATE
            const [dailyTasks, setDailyTasks] = useState([]);
            const [photos, setPhotos] = useState([]);
            const [gasMeasurements, setGasMeasurements] = useState({ o2: '', lel: '' });

            // [V5.60] OPERATIONAL DATA INJECTION (ΣΕΠΕ MAR/APR 2026)
            const [vessels, setVessels] = useState(() => {
                const radarData = JSON.parse(localStorage.getItem('ntg_M4_radar') || '[]');
                const sepeBaseline = [
                    { id: 'SEPE-01', name: 'FELIX', imo: '9464182', shift: '07:00-11:00', type: 'LNG_CONV' },
                    { id: 'SEPE-02', name: 'BADJI MOKHTAR III', imo: '9827889', shift: '11:00-13:00', type: 'LNG_CONV' },
                    { id: 'SEPE-03', name: 'ΑΡΙΑΔΝΗ', imo: '9135262', shift: '13:00-15:00', type: 'STANDARD' },
                    { id: 'SEPE-04', name: 'RIGEL III', imo: '7807744', shift: '15:00-17:00', type: 'STANDARD' }
                ];
                return radarData.length > 0 ? [...radarData, ...sepeBaseline] : sepeBaseline;
            });

            // HARD EVIDENCE LOCK (Min 2 Photos per V5.60)
            const canSignLog = () => {
                const hasPhotos = photos.length >= 2;
                const hasTasks = dailyTasks.length > 0;
                return hasPhotos && hasTasks;
            };

            const isLNGMode = activeVessel?.type === 'LNG_CONV' || activeVessel?.name === 'FELIX' || activeVessel?.name === 'BADJI MOKHTAR III';

            if (view === 'WATCHLIST') return (
                <div className={`min-h-screen p-6 ${sunMode ? 'sun-mode' : 'bg-slate-950'}`}>
                    <div className="flex justify-between items-center mb-10">
                        <h1 className="text-blue-600 text-lg uppercase font-black">M2: Compliance Shield</h1>
                        <button onClick={() => setSunMode(!sunMode)} className="p-4 glass rounded-2xl">
                            <i className={`fa-solid ${sunMode ? 'fa-moon text-blue-900' : 'fa-sun text-orange-500'}`}></i>
                        </button>
                    </div>

                    <div className="space-y-4 mb-10">
                        <p className="text-[10px] uppercase opacity-40 ml-4 italic">Daily Fleet Schedule (SEPE Verified)</p>
                        {vessels.map(v => (
                            <div key={v.id} onClick={() => { setActiveVessel(v); setView('INSPECTION'); }} className="glass p-6 rounded-[2.5rem] border-l-4 border-blue-600 flex justify-between items-center active:scale-95 transition-all">
                                <div>
                                    <p className="text-sm uppercase font-black tracking-tighter">{v.name}</p>
                                    <p className="text-[9px] opacity-50 uppercase">Shift: {v.shift} | IMO: {v.imo}</p>
                                </div>
                                <i className="fa-solid fa-chevron-right opacity-30 text-xs"></i>
                            </div>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className={`min-h-screen p-6 ${sunMode ? 'sun-mode' : 'bg-slate-950'}`}>
                    <button onClick={() => setView('WATCHLIST')} className="text-[10px] underline text-blue-500 mb-6 uppercase">← Back</button>
                    <h2 className="text-2xl font-black uppercase text-center mb-8 italic">{activeVessel.name}</h2>

                    {/* LNG EDITION CONTROLS  */}
                    {isLNGMode && (
                        <div className="glass p-6 rounded-[2.5rem] mb-6 space-y-4 border-orange-500/30">
                            <p className="text-[10px] uppercase text-orange-500 font-black">LNG Edition: Required Gas Levels</p>
                            <div className="grid grid-cols-2 gap-4">
                                <div className="text-center">
                                    <p className="text-[9px] opacity-50 mb-1">O2 %</p>
                                    <input type="number" placeholder="20.9" value={gasMeasurements.o2} onChange={(e)=>setGasMeasurements({...gasMeasurements, o2: e.target.value})} className="w-full bg-black/20 p-4 rounded-xl text-center outline-none border border-white/5" />
                                </div>
                                <div className="text-center">
                                    <p className="text-[9px] opacity-50 mb-1">LEL %</p>
                                    <input type="number" placeholder="0" value={gasMeasurements.lel} onChange={(e)=>setGasMeasurements({...gasMeasurements, lel: e.target.value})} className="w-full bg-black/20 p-4 rounded-xl text-center outline-none border border-white/5" />
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="glass p-6 rounded-[2.5rem] mb-6 space-y-4">
                        <button onClick={()=>{setDailyTasks([...dailyTasks, {id:Date.now(), type:'Hot Works'}]);}} className="fat-finger-button w-full bg-blue-600/10 border border-blue-600/30 text-[10px]">Add Compliance Task +</button>
                    </div>

                    <div className="space-y-4 mb-40">
                        {dailyTasks.map(task => (
                            <div key={task.id} className="glass p-5 rounded-3xl border-l-4 border-emerald-500">
                                <h4 className="text-[11px] uppercase font-black">P.D. 70/1990 Task Active</h4>
                                <label className="flex items-center gap-3 mt-3 opacity-70"><input type="checkbox" className="w-4 h-4" /><span className="text-[9px] uppercase">Safety Equipment Verified</span></label>
                            </div>
                        ))}
                    </div>

                    {/* FIXED EVIDENCE BAR [cite: 89, 125] */}
                    <div className="fixed bottom-0 left-0 right-0 p-6 glass backdrop-blur-xl border-t border-white/5 space-y-4">
                        <button onClick={()=>{setPhotos([...photos, Date.now()]);}} className="fat-finger-button w-full bg-slate-800 border border-slate-700">
                            <i className="fa-solid fa-camera text-xl"></i>
                            Capture Evidence ({photos.length}/2)
                        </button>
                        <button disabled={!canSignLog()} onClick={()=>{alert("Log Signed."); setView('WATCHLIST');}} 
                                className={`fat-finger-button w-full ${!canSignLog() ? 'bg-slate-900 opacity-20' : 'bg-emerald-600 matrix-blink shadow-lg shadow-emerald-900/40'}`}>
                            <i className="fa-solid fa-signature"></i>
                            {canSignLog() ? "Confirm Sign Log" : "Locked: Need 2 Photos"}
                        </button>
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<SafetyApp />);
    </script></body></html>
