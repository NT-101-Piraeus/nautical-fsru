<script type="text/babel">
    const CommercialDashboard = () => {
        const [feed, setFeed] = useState([]);
        const [metrics, setMetrics] = useState({ pipeline: 0, weighted: 0, rate: 0 });

        useEffect(() => {
            const data = JSON.parse(localStorage.getItem('ntg_M14_feed') || '[]');
            setFeed(data);
            
            // Strategic Math Engine [cite: 22]
            const pending = data.filter(j => j.status === 'PENDING');
            const won = data.filter(j => j.status === 'WON');
            const lost = data.filter(j => j.status === 'LOST');
            
            const rawPipeline = pending.reduce((sum, j) => sum + j.value, 0);
            const convRate = (won.length + lost.length) > 0 ? (won.length / (won.length + lost.length)) : 0.45; // 45% default
            
            setMetrics({
                pipeline: rawPipeline,
                weighted: rawPipeline * convRate, // The "Real" Money
                rate: (convRate * 100).toFixed(0)
            });
        }, []);

        return (
            <div className="p-6">
                <div className="grid grid-cols-2 gap-4 mb-8">
                    <div className="glass p-6 rounded-[2rem] border-l-4 border-orange-500">
                        <p className="text-[8px] opacity-50 uppercase">Weighted Forecast ({metrics.rate}%)</p>
                        <h2 className="text-2xl font-black text-orange-500">€{metrics.weighted.toLocaleString()}</h2>
                    </div>
                    <div className="glass p-6 rounded-[2rem] border-l-4 border-emerald-500">
                        <p className="text-[8px] opacity-50 uppercase">Raw Pipeline</p>
                        <h2 className="text-2xl font-black text-emerald-500">€{metrics.pipeline.toLocaleString()}</h2>
                    </div>
                </div>
                {/* List of Pending Leads from Radar follows... */}
            </div>
        );
    };
</script>
