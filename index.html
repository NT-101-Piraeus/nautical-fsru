<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NauticalOS Hub</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');body{background:#020617;color:white;font-family:'Orbitron',sans-serif;font-style:italic;font-weight:bold;}.glass{background:rgba(15,23,42,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);}</style>
</head>
<body><div id="root"></div><script type="text/babel">
const Hub=()=>{
    const [auth,setAuth]=React.useState(localStorage.getItem('ntg_auth')==='true');
    const [pin,setPin]=React.useState('');

    const login=(e)=>{
        e.preventDefault();
        if(pin==='1234'||pin==='0612'){localStorage.setItem('ntg_auth','true');setAuth(true);}
        else{alert("WRONG PIN");setPin('');}
    };

    const apps=[
        {id:'m1',name:'UTM',icon:'fa-layer-group',color:'border-slate-500',url:'m1_utm.html'},
        {id:'m2',name:'SAFETY',icon:'fa-shield-halved',color:'border-blue-600',url:'m2_safety.html'},
        {id:'m3',name:'LOAD TEST',icon:'fa-weight-hanging',color:'border-orange-600',url:'m3_loadtest.html'},
        {id:'m8',name:'ACADEMY',icon:'fa-graduation-cap',color:'border-emerald-600',url:'m8_academy.html'},
        {id:'m5',name:'WAR ROOM',icon:'fa-gavel',color:'border-red-600',url:'m5_terme.html'},
        {id:'m13',name:'MYKONOS',icon:'fa-house-chimney',color:'border-blue-300',url:'m13_mykonos.html'},
        {id:'m4',name:'RADAR',icon:'fa-radar',color:'border-cyan-600',url:'m4_radar.html'},
        {id:'m7',name:'STARTUP',icon:'fa-rocket',color:'border-yellow-500',url:'m7_startup.html'}
    ];

    if(!auth) return(
        <div className="h-screen flex items-center justify-center p-6 bg-slate-950 font-bold italic">
            <form onSubmit={login} className="glass p-10 rounded-[3.5rem] w-full max-w-sm text-center shadow-2xl border border-slate-800">
                <h1 className="text-blue-500 mb-8 uppercase italic font-black">COMMAND HUB</h1>
                <input type="password" value={pin} onChange={(e)=>setPin(e.target.value)} className="w-full bg-slate-900 border border-slate-700 p-5 rounded-2xl text-center text-3xl mb-6 text-white outline-none" placeholder="PIN" maxLength="4" autoFocus />
                <button type="submit" className="w-full bg-blue-600 p-5 rounded-2xl uppercase font-black">Unlock</button>
            </form>
        </div>
    );

    return(
        <div className="min-h-screen p-4 max-w-lg mx-auto animate-fade">
            <div className="flex justify-between items-center px-4 pt-6 mb-10">
                <p className="text-sm uppercase tracking-tighter text-blue-400 font-black">M. SYKINIOTIS</p>
                <button onClick={()=>{localStorage.removeItem('ntg_auth');setAuth(false)}} className="text-[9px] text-red-500 uppercase underline">Logout</button>
            </div>
            <div className="grid grid-cols-2 gap-3">
                {apps.map(app=>(
                    <a key={app.id} href={app.url} className={`glass p-6 rounded-[2.5rem] border-b-4 ${app.color} flex flex-col items-center gap-3 active:scale-95 transition-all`}>
                        <i className={`fa-solid ${app.icon} text-2xl`}></i>
                        <span className="text-[8px] font-black uppercase text-center">{app.name}</span>
                    </a>
                ))}
            </div>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<Hub/>);
</script></body></html>
