<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NauticalOS V5.5 | Supreme Command</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #020617; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .sun-mode { background: #ffffff !important; color: #000000 !important; }
        .sun-mode .glass { background: #f8fafc !important; border: 1px solid #cbd5e1 !important; color: #000000 !important; }
        .fat-finger-button { height: 80px; font-weight: 900; text-transform: uppercase; transition: all 0.2s; }
        .fat-finger-button:active { transform: scale(0.95); }
        .division-card { transition: all 0.3s ease; border-left: 4px solid transparent; }
        .division-card:hover { border-left-color: #f97316; background: rgba(255,255,255,0.03); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const MainHub = () => {
            const [isLocked, setIsLocked] = useState(true);
            const [sunMode, setSunMode] = useState(false);
            const [pin, setPin] = useState('');
            const [showCouncil, setShowCouncil] = useState(false);

            // Auth Logic [Art. 2]
            const handleAuth = () => {
                if (pin === "1234") {
                    sessionStorage.setItem('ntg_global_auth', 'true');
                    setIsLocked(false);
                } else {
                    alert("ACCESS DENIED: WRONG PIN");
                    setPin('');
                }
            };

            if (isLocked && sessionStorage.getItem('ntg_global_auth') !== 'true') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-950 p-6">
                        <div className="glass p-10 rounded-[3rem] text-center w-full max-w-sm">
                            <i className="fa-solid fa-lock text-4xl text-orange-500 mb-6"></i>
                            <h1 className="text-xl font-black uppercase mb-8 italic">NauticalOS Locked</h1>
                            <input 
                                type="password" value={pin} onChange={(e) => setPin(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && handleAuth()}
                                className="w-full bg-black/40 border border-white/10 p-5 rounded-2xl text-center text-2xl font-black mb-6"
                                placeholder="PIN"
                            />
                            <button onClick={handleAuth} className="w-full bg-orange-600 p-5 rounded-2xl font-black uppercase text-xs">Authorize Bridge</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className={`min-h-screen p-6 transition-colors ${sunMode ? 'sun-mode' : ''}`}>
                    {/* Header with EASY COUNCIL SUMMON */}
                    <header className="flex justify-between items-center mb-10 glass p-6 rounded-[2.5rem]">
                        <div className="flex items-center gap-4">
                            <button onClick={() => setShowCouncil(true)} className="p-4 bg-orange-600 rounded-2xl animate-pulse">
                                <i className="fa-solid fa-users-gear text-white"></i>
                            </button>
                            <div>
                                <h1 className="text-2xl font-black uppercase italic tracking-tighter">Command Hub V5.5</h1>
                                <p className="text-[10px] font-bold text-orange-500 uppercase tracking-widest">Global Fleet Control</p>
                            </div>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={() => setSunMode(!sunMode)} className="p-4 glass rounded-2xl"><i className="fa-solid fa-sun"></i></button>
                            <button onClick={() => {sessionStorage.clear(); window.location.reload();}} className="p-4 glass rounded-2xl text-red-500"><i className="fa-solid fa-power-off"></i></button>
                        </div>
                    </header>

                    {/* Full Division Grid [M1 - M15] */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 max-w-7xl mx-auto">
                        <DivCard id="M1" name="UTM Analysis" icon="fa-arrows-left-right" status="Active" />
                        <DivCard id="M2" name="Safety Watch" icon="fa-shield-heart" status="Active" />
                        <DivCard id="M3" name="Load Test Pro" icon="fa-weight-hanging" status="Active" />
                        <DivCard id="M4" name="Radar Hunter" icon="fa-tower-observation" status="Active" />
                        <DivCard id="M5" name="War Room" icon="fa-gavel" status="Active" />
                        <DivCard id="M6" name="CEO Office" icon="fa-briefcase" status="Standby" />
                        <DivCard id="M8" name="Academy" icon="fa-book-open" status="Active" />
                        <DivCard id="M9" name="Operation GEM" icon="fa-file-pdf" status="Critical" />
                        <DivCard id="M10" name="Supreme Auditor" icon="fa-eye" status="Active" />
                        <DivCard id="M12" name="Staff Scout" icon="fa-user-secret" status="Working" />
                        <DivCard id="M14" name="Commercial" icon="fa-chart-line" status="Active" />
                        <DivCard id="M15" name="Hub Config" icon="fa-gear" status="Locked" />
                    </div>

                    {/* COUNCIL MODAL */}
                    {showCouncil && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-xl z-50 p-10 flex items-center justify-center">
                            <div className="glass p-12 rounded-[4rem] max-w-2xl w-full border-orange-500/50">
                                <h2 className="text-4xl font-black uppercase italic mb-8 text-orange-500">Gem Council Summoned</h2>
                                <div className="space-y-4 mb-10 text-sm font-bold opacity-80 uppercase tracking-wider">
                                    <p className="border-b border-white/10 pb-2">M2: Evidence Lock Protocol verified [cite: 111]</p>
                                    <p className="border-b border-white/10 pb-2">M3: Lost Quote feed linked to M14 [cite: 82]</p>
                                    <p className="border-b border-white/10 pb-2">M5: SHA-256 Forensic Hash Active [cite: 27]</p>
                                    <p className="border-b border-white/10 pb-2">M10: Silent Logging engaged [cite: 70]</p>
                                </div>
                                <button onClick={() => setShowCouncil(false)} className="fat-finger-button w-full bg-orange-600 rounded-3xl">Return to Bridge</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const DivCard = ({ id, name, icon, status }) => (
            <div className="division-card glass p-6 rounded-[2rem] relative group cursor-pointer">
                <div className="flex justify-between items-start mb-4">
                    <span className="text-[10px] font-black bg-white/5 px-2 py-1 rounded italic opacity-50">{id}</span>
                    <StatusDot status={status} />
                </div>
                <i className={`fa-solid ${icon} text-2xl mb-2 opacity-80 group-hover:text-orange-500 transition-colors`}></i>
                <h3 className="font-black uppercase italic text-sm">{name}</h3>
                <p className="text-[8px] font-bold uppercase opacity-40 mt-1 tracking-widest">{status}</p>
            </div>
        );

        const StatusDot = ({ status }) => {
            const colors = { Active: "bg-emerald-500", Issue: "bg-red-500", Critical: "bg-red-600 animate-pulse", Standby: "bg-blue-500", Working: "bg-amber-500", Locked: "bg-slate-600" };
            return <div className={`w-2 h-2 rounded-full ${colors[status] || "bg-slate-500"}`}></div>;
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<MainHub />);
    </script>
</body>
</html>
