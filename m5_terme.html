<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M5: Dynamic War Room v1.1</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background:#020617; color:white; font-family:'Orbitron',sans-serif; font-style:italic; font-weight:bold; }
        .glass { background:rgba(15,23,42,0.8); backdrop-filter:blur(15px); border:1px solid rgba(255,255,255,0.05); }
        .target-active { border-left: 4px solid #ef4444; background: rgba(239, 68, 68, 0.05); }
    </style>
</head>
<body><div id="root"></div><script type="text/babel">
const { useState } = React;

const WarRoom = () => {
    const [selectedTarget, setSelectedTarget] = useState('Emir Öztürk');
    const [isGenerating, setIsGenerating] = useState(false);

    const targets = {
        'Emir Öztürk': { id: 'TR-9921', activity: 'NACE 49.32', risk: 'HIGH', status: 'WATCHLIST' },
        'Erkan Zorlu': { id: 'TR-8842', activity: 'Ship Repair & Asset Management', risk: 'CRITICAL', status: 'LITIGATION' },
        'Alasund Fisheries': { id: 'NO-1120', activity: 'Offshore Logistics', risk: 'MEDIUM', status: 'ASSET TRACING' }
    };

    const generateForensicDossier = () => {
        setIsGenerating(true);
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const timestamp = new Date().toISOString();
        const targetData = targets[selectedTarget];
        
        // Content for Hashing
        const rawContent = `TARGET: ${selectedTarget} | ID: ${targetData.id} | CODE: ${targetData.activity} | TIME: ${timestamp}`;
        const sha256Hash = CryptoJS.SHA256(rawContent).toString();

        // PDF Structure
        doc.setFillColor(2, 6, 23);
        doc.rect(0, 0, 210, 297, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(10);
        doc.text("NAUTICAL TECHNOLOGY - LEGAL DIVISION M5", 10, 10);
        doc.text(`PROTOCOL: SILENT SIEGE | CONFIDENTIAL`, 10, 15);
        
        doc.setFontSize(22);
        doc.text("FORENSIC DOSSIER", 10, 40);
        
        doc.setFontSize(12);
        doc.setTextColor(239, 68, 68);
        doc.text(`SUBJECT: ${selectedTarget.toUpperCase()}`, 10, 60);
        doc.setTextColor(255, 255, 255);
        doc.text(`TARGET ID: ${targetData.id}`, 10, 70);
        doc.text(`ACTIVITY CODE: ${targetData.activity}`, 10, 80);
        doc.text(`RISK LEVEL: ${targetData.risk}`, 10, 90);
        doc.text(`TIMESTAMP: ${timestamp}`, 10, 100);

        doc.setFontSize(8);
        doc.setTextColor(100, 100, 100);
        doc.text(`SHA-256 AUTHENTICATION HASH:`, 10, 270);
        doc.text(sha256Hash, 10, 275);
        
        doc.save(`DOSSIER_${selectedTarget.replace(' ', '_')}_${Date.now()}.pdf`);
        setIsGenerating(false);
    };

    return (
        <div className="min-h-screen p-6 bg-slate-950 text-white italic">
            {/* HEADER */}
            <div className="flex justify-between items-center mb-10 border-b border-red-500/30 pb-6">
                <div>
                    <span className="text-[10px] text-red-500 uppercase tracking-[0.3em]">M5: Dynamic War Room</span>
                    <h1 className="text-2xl font-black uppercase tracking-tighter">Silent Siege Protocol</h1>
                </div>
                <button onClick={() => window.location.href='index.html'} className="glass p-4 rounded-2xl border-white/10 hover:bg-white/5 transition-all">
                    <i className="fa-solid fa-house-chimney text-xs"></i>
                </button>
            </div>

            {/* TARGET SELECTION PANEL */}
            <div className="glass p-8 rounded-[3rem] border-red-500/20 mb-8 relative overflow-hidden">
                <div className="absolute top-0 right-0 p-4 opacity-10">
                    <i className="fa-solid fa-gavel text-6xl"></i>
                </div>
                <p className="text-[9px] uppercase tracking-widest opacity-50 mb-6">Target Dossier Generator</p>
                
                <div className="space-y-6">
                    <select 
                        value={selectedTarget} 
                        onChange={(e) => setSelectedTarget(e.target.value)}
                        className="w-full bg-black/50 p-6 rounded-3xl border border-white/10 text-xl font-black uppercase outline-none focus:border-red-500 transition-all"
                    >
                        {Object.keys(targets).map(t => <option key={t} value={t}>{t}</option>)}
                    </select>

                    <div className="grid grid-cols-2 gap-4">
                        <div className="bg-white/5 p-4 rounded-2xl border border-white/5">
                            <p className="text-[7px] opacity-40 uppercase">Target ID</p>
                            <p className="text-xs uppercase">{targets[selectedTarget].id}</p>
                        </div>
                        <div className="bg-white/5 p-4 rounded-2xl border border-white/5">
                            <p className="text-[7px] opacity-40 uppercase">Activity</p>
                            <p className="text-xs uppercase text-red-400">{targets[selectedTarget].activity}</p>
                        </div>
                    </div>

                    <button 
                        onClick={generateForensicDossier}
                        disabled={isGenerating}
                        className="w-full bg-red-600 hover:bg-red-500 p-8 rounded-[2.5rem] text-[11px] uppercase font-black italic shadow-2xl shadow-red-950/50 transition-all active:scale-95 flex items-center justify-center gap-3"
                    >
                        {isGenerating ? <i className="fa-solid fa-circle-notch animate-spin"></i> : <i className="fa-solid fa-file-export"></i>}
                        Export Forensic Dossier (.PDF)
                    </button>
                </div>
            </div>

            {/* LIVE ROSTER (M5 LOGIC) */}
            <div className="space-y-4 pb-20">
                <p className="text-[10px] uppercase font-black opacity-40 ml-4 tracking-widest">Active Watchlist Intelligence</p>
                {Object.entries(targets).map(([name, data]) => (
                    <div key={name} className={`glass p-6 rounded-3xl border-white/5 flex justify-between items-center ${selectedTarget === name ? 'target-active' : ''}`}>
                        <div>
                            <p className="text-xs font-black uppercase tracking-tight">{name}</p>
                            <p className="text-[8px] opacity-40 uppercase">{data.status}</p>
                        </div>
                        <div className="text-right">
                            <p className="text-[8px] text-red-500 font-black uppercase tracking-tighter">Risk Level</p>
                            <p className="text-xs font-black">{data.risk}</p>
                        </div>
                    </div>
                ))}
            </div>

            <div className="fixed bottom-6 left-0 right-0 text-center">
                <p className="text-[7px] opacity-20 tracking-[0.5rem] uppercase">SHA-256 Forensic Integrity Active</p>
            </div>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<WarRoom />);
</script></body></html>
