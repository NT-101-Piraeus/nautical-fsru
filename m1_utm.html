<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M1: Safety Watchlist</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');body{background:#020617;color:white;font-family:'Orbitron',sans-serif;font-style:italic;font-weight:bold;}.glass{background:rgba(15,23,42,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);}</style>
</head>
<body><div id="root"></div><script type="text/babel">
const Watchlist = () => {
    const vessels = [
        { id: 1, name: 'FELIX', imo: '9513191', time: '07:00 - 11:00', status: 'ACTIVE', ref: 'Ref: 8823/2026' },
        { id: 2, name: 'ARIADNI', imo: '9513192', time: '12:00 - 15:00', status: 'PENDING', ref: 'Ref: 8824/2026' },
        { id: 3, name: 'NAFTOCEMENT IV', imo: '9513193', time: '16:00 - 18:00', status: 'PENDING', ref: 'Ref: 8825/2026' },
        { id: 4, name: 'RIGEL III', imo: '9513194', time: 'N/A', status: 'DOCKING', ref: 'Ref: 8826/2026' }
    ];

    return (
        <div className="min-h-screen p-6 animate-fade bg-slate-950 font-bold italic">
            <div className="flex justify-between items-center mb-10">
                <a href="index.html" className="text-[10px] underline opacity-50 text-slate-400">← BACK TO HUB</a>
                <span className="text-[9px] text-emerald-500 font-black uppercase tracking-widest italic">ΣΕΠΕ SYNC ACTIVE</span>
            </div>
            <h1 className="text-slate-400 text-lg uppercase mb-8 text-center italic tracking-tighter">M1: SAFETY WATCHLIST</h1>
            <div className="space-y-4">
                {vessels.map(v => (
                    <div key={v.id} className="glass p-5 rounded-[2.5rem] border-l-4 border-slate-500 flex justify-between items-center shadow-xl">
                        <div>
                            <p className="text-sm text-white font-black">{v.name}</p>
                            <p className="text-[9px] text-slate-500 uppercase mt-1">{v.time}</p>
                            <p className="text-[7px] text-blue-500 mt-1 italic tracking-widest">{v.ref}</p>
                        </div>
                        <div className="text-right">
                            {v.status === 'ACTIVE' ? 
                                <span className="bg-emerald-900/30 text-emerald-500 text-[8px] px-3 py-1 rounded-full border border-emerald-500/20 italic animate-pulse font-black">ACTIVE</span> :
                                <span className="bg-slate-800 text-slate-500 text-[8px] px-3 py-1 rounded-full border border-slate-700 italic font-black">{v.status}</span>
                            }
                        </div>
                    </div>
                ))}
            </div>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<Watchlist />);
</script></body></html>
