<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SafeShip Pro V36 | Tactical Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; touch-action: manipulation; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .active-ok { background: #10b981 !important; opacity: 1; }
        .active-wait { background: #f59e0b !important; opacity: 1; }
        .active-block { background: #ef4444 !important; opacity: 1; }
        .specialty-active { background: #3b82f6 !important; border-color: #60a5fa !important; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        input, textarea { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; outline: none; }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const _supabase = supabase.createClient("https://omdarjncczohpffunfy.supabase.co", "sb_publishable_V-nfUDy5MxEG4SlXkisFBg_GBlD_4Y9");

        const TRADES = ["Ηλεκτρολόγοι", "Μηχανικοί", "Ελασματουργοί", "Σωληνουργοί", "Καθαριστές"];
        const INITIAL_SHIPS = [
            { id: 1, name: "FELIX", port: "Δραπετσώνα", time: "07:00", type: "Tanker" },
            { id: 2, name: "BADJI MOKHTAR III", port: "ΕΛΕΥΣΙΝΑ", time: "11:00", type: "Ferry" },
            { id: 3, name: "ΑΡΙΑΔΝΗ", port: "ΕΛΕΥΣΙΝΑ", time: "13:00", type: "Ferry" },
            { id: 4, name: "RIGEL III", port: "Πέραμα", time: "15:00", type: "Ferry" }
        ];

        function App() {
            const [view, setView] = useState('DASHBOARD');
            const [activeId, setActiveId] = useState(null);
            const [syncStatus, setSyncStatus] = useState('synced'); // synced, local, syncing
            const [projects, setProjects] = useState(() => JSON.parse(localStorage.getItem('ntg_v36_data')) || INITIAL_SHIPS.map(s => ({ ...s, data: {}, signedToday: false })));

            useEffect(() => { 
                localStorage.setItem('ntg_v36_data', JSON.stringify({ ships: projects }));
                if (syncStatus === 'synced') setSyncStatus('local');
            }, [projects]);

            const ship = projects.find(s => s.id === activeId);
            const allTasks = projects.flatMap(p => Object.entries(p.data || {}).flatMap(([loc, d]) => (d.observations || []).filter(o => o.status === 'block' || o.status === 'wait').map(o => ({ ship: p.name, loc, ...o }))));

            const saveToCloud = async (ship) => {
                setSyncStatus('syncing');
                const { error } = await _supabase.from('ntg_logbook').insert([{ ship_name: ship.name, port: ship.port, inspection_data: ship.data, status: 'Completed' }]);
                if (!error) { setSyncStatus('synced'); alert("ΣΥΣΤΗΜΑ: LOGBOOK ΣΥΓΧΡΟΝΙΣΤΗΚΕ ΜΕ ΕΠΙΤΥΧΙΑ"); }
            };

            const getLocs = (type) => type === "Tanker" ? ["Deck", "Engine Room", "Pump Room", "Chimney", "Cargo Tanks", "Accommodation"] : ["Deck", "Engine Room", "Garage", "Chimney", "Accommodation"];

            if (view === 'DASHBOARD') return (
                <div className="max-w-xl mx-auto p-5 pb-32 animate-fadeIn">
                    <header className="py-8 flex justify-between items-center border-b border-white/5 mb-8">
                        <div className="flex items-center gap-3">
                            <h1 className="brand text-sm font-black text-red-500 uppercase">SafeShip Pro</h1>
                            <i className={`fa-solid fa-cloud ${syncStatus === 'synced' ? 'text-emerald-500' : 'text-amber-500'}`}></i>
                        </div>
                        <a href="index.html" className="bg-slate-800 w-12 h-12 rounded-2xl flex items-center justify-center text-xl"><i className="fa-solid fa-house"></i></a>
                    </header>
                    <div className="space-y-6">
                        {projects.map(s => (
                            <div key={s.id} className={`glass p-8 rounded-[50px] flex justify-between items-center transition-all ${s.signedToday ? 'border-l-8 border-emerald-500 bg-emerald-500/5' : 'border border-white/5 shadow-xl'}`}>
                                <div onClick={()=>{setActiveId(s.id); setView('INSPECTION')}} className="flex-1 cursor-pointer">
                                    <h4 className="font-black text-xl uppercase tracking-tighter">{s.name}</h4>
                                    <p className="text-sm font-bold text-slate-400 mt-2 uppercase italic tracking-widest">{s.port} • {s.time}</p>
                                </div>
                                <button onClick={()=>setProjects(projects.map(p=>p.id===s.id?{...p, signedToday:!p.signedToday}:p))} className={`px-6 py-4 rounded-3xl text-[11px] font-black uppercase shadow-lg ${s.signedToday ? 'bg-emerald-600 text-white' : 'bg-slate-800 text-slate-500'}`}>
                                    {s.signedToday ? 'DONE ✓' : 'SIGN'}
                                </button>
                            </div>
                        ))}
                    </div>
                </div>
            );

            if (view === 'INSPECTION' && ship) return (
                <div className="max-w-xl mx-auto p-5 pb-32 animate-fadeIn">
                    <div className="flex justify-between items-center mb-8">
                        <button onClick={()=>setView('DASHBOARD')} className="bg-slate-800 px-6 py-3 rounded-2xl text-[11px] font-black uppercase">← Fleet</button>
                        <button onClick={()=>saveToCloud(ship)} className="bg-emerald-600 px-6 py-3 rounded-2xl text-[11px] font-black uppercase shadow-xl">Finalize & Sync</button>
                    </div>
                    <div className="glass p-10 rounded-[60px] border-l-8 border-red-600 text-center mb-12 shadow-2xl">
                        <h2 className="brand text-3xl font-black uppercase tracking-tighter">{ship.name}</h2>
                        <p className="text-sm font-bold text-slate-400 mt-2 uppercase tracking-[0.3em]">{ship.port}</p>
                    </div>
                    <div className="space-y-16">
                        {getLocs(ship.type).map(loc => {
                            const d = (ship.data && ship.data[loc]) || { observations: [] };
                            return (
                                <div key={loc} className="space-y-8">
                                    <div className="flex justify-between items-center px-4"><h4 className="text-2xl font-black uppercase text-red-500 tracking-tighter">{loc}</h4><button onClick={()=>{
                                        const newObs = { id: Date.now(), text: '', status: 'ok', trades: [] };
                                        setProjects(projects.map(p=>p.id===ship.id?{...p, data:{...p.data,[loc]:{observations:[...(p.data[loc]?.observations||[]), newObs]}}}:p));
                                    }} className="bg-slate-800 px-5 py-2.5 rounded-2xl text-[11px] font-black border border-white/10">+ NEW LOG</button></div>
                                    {d.observations.map(o => (
                                        <div key={o.id} className="glass p-8 rounded-[50px] border border-white/5 space-y-8 shadow-2xl">
                                            <div className="flex flex-wrap gap-3">{TRADES.map(t => (
                                                <button key={t} onClick={()=>{
                                                    const newT = o.trades.includes(t) ? o.trades.filter(x=>x!==t) : [...o.trades, t];
                                                    setProjects(projects.map(p=>p.id===ship.id?{...p, data:{...p.data,[loc]:{observations:p.data[loc].observations.map(x=>x.id===o.id?{...x, trades:newT}:x)}}}:p));
                                                }} className={`px-4 py-2.5 rounded-2xl text-[11px] font-black border border-white/5 ${o.trades.includes(t) ? 'specialty-active' : 'bg-slate-950 text-slate-600'}`}>{t}</button>
                                            ))}</div>
                                            <div className="grid grid-cols-4 gap-2">{['ok','wait','block','na'].map(st => (
                                                <button key={st} onClick={()=>{
                                                    setProjects(projects.map(p=>p.id===ship.id?{...p, data:{...p.data,[loc]:{observations:p.data[loc].observations.map(x=>x.id===o.id?{...x, status:st}:x)}}}:p));
                                                }} className={`p-4 rounded-2xl text-[11px] font-black uppercase transition-all ${o.status===st?`active-${st}`:'bg-slate-800 opacity-30'}`}>{st}</button>
                                            ))}</div>
                                            <textarea className="p-6 rounded-[40px] text-lg h-32 leading-relaxed" placeholder="Write observation details..." value={o.text} onChange={(e)=>{
                                                setProjects(projects.map(p=>p.id===ship.id?{...p, data:{...p.data,[loc]:{observations:p.data[loc].observations.map(x=>x.id===o.id?{...x, text:e.target.value}:x)}}}:p));
                                            }} />
                                            <div className="flex gap-4">
                                                <button onClick={()=>document.getElementById(`c-${o.id}`).click()} className="flex-1 bg-slate-900 p-5 rounded-3xl border border-white/10 text-[14px] font-black uppercase flex items-center justify-center gap-3"><i className="fa-solid fa-camera text-red-500 text-2xl"></i> PHOTO</button>
                                                <input type="file" id={`c-${o.id}`} capture="camera" className="hidden" />
                                                <button onClick={()=>{setProjects(projects.map(p=>p.id===ship.id?{...p, data:{...p.data,[loc]:{observations:p.data[loc].observations.filter(x=>x.id!==o.id)}}}:p))}} className="bg-slate-800 p-5 rounded-3xl text-slate-600"><i className="fa-solid fa-trash"></i></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );

            if (view === 'TASKS') return (
                <div className="max-w-xl mx-auto p-5 pb-32 animate-fadeIn">
                    <button onClick={()=>setView('DASHBOARD')} className="bg-slate-800 px-6 py-3 rounded-2xl text-[11px] font-black uppercase mb-10">← Dashboard</button>
                    <h2 className="brand text-2xl uppercase italic mb-8 text-red-500">Hazard Registry</h2>
                    {allTasks.length === 0 ? <div className="glass p-20 rounded-[60px] text-center opacity-30 font-black">Fleet Clear</div> : 
                        allTasks.map((t, i) => (
                            <div key={i} className="glass p-8 rounded-[40px] border-l-8 border-amber-500 mb-6 shadow-xl">
                                <p className="text-[10px] font-black text-amber-500 uppercase tracking-widest">{t.ship} • {t.loc}</p>
                                <p className="text-lg text-slate-200 mt-3 font-medium italic">"{t.text}"</p>
                            </div>
                        ))
                    }
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script></body></html>
