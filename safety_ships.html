<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SafeShip Pro V23 | Tactical Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; touch-action: manipulation; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .btn-status { transition: all 0.2s; border: 1px solid rgba(255,255,255,0.05); opacity: 0.4; }
        .btn-status.active-ok { background: #10b981 !important; opacity: 1; border-color: #34d399; }
        .btn-status.active-wait { background: #f59e0b !important; opacity: 1; border-color: #fbbf24; }
        .btn-status.active-block { background: #ef4444 !important; opacity: 1; border-color: #f87171; }
        .btn-status.active-na { background: #64748b !important; opacity: 1; border-color: #94a3b8; }
        textarea { background: #0f172a !important; border: 1px solid #1e293b !important; color: #cbd5e1 !important; outline: none; }
        textarea:focus { border-color: #ef4444 !important; }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const SEPE_DATA = {
            "FELIX": { time: "07:00", duration: "4" },
            "BADJI MOKHTAR III": { time: "11:00", duration: "2" },
            "ΑΡΙΑΔΝΗ": { time: "13:00", duration: "2" },
            "RIGEL III": { time: "15:00", duration: "2" }
        };

        const SHIP_LOCS = {
            "Tanker": ["Κατάστρωμα", "Μηχανοστάσιο", "Αντλιοστάσιο", "Δεξαμενές Φορτίου", "Ενδιαίτηση"],
            "Ferry": ["Κατάστρωμα", "Μηχανοστάσιο", "Garage", "Ενδιαίτηση", "Χώροι Επιβατών"],
            "Cargo": ["Κατάστρωμα", "Μηχανοστάσιο", "Κύτη Φορτίου (Holds)", "Ενδιαίτηση"]
        };

        function App() {
            const [isAuth, setIsAuth] = useState(() => sessionStorage.getItem('ntg_auth') === 'true');
            const [view, setView] = useState('dashboard');
            const [projects, setProjects] = useState(() => JSON.parse(localStorage.getItem('ntg_v23_projects')) || []);
            const [activeId, setActiveId] = useState(null);
            const [checkIn, setCheckIn] = useState(() => localStorage.getItem('ntg_checkin') || '--:--');

            useEffect(() => { localStorage.setItem('ntg_v23_projects', JSON.stringify(projects)); }, [projects]);

            const login = (e) => { e.preventDefault(); if(e.target.pass.value === 'NT2026') { sessionStorage.setItem('ntg_auth', 'true'); setIsAuth(true); } };

            const createP = (e) => {
                e.preventDefault();
                const name = e.target.shipName.value.toUpperCase();
                const type = e.target.shipType.value;
                const port = e.target.port.value.toUpperCase();
                const sepe = SEPE_DATA[Object.keys(SEPE_DATA).find(k => name.includes(k))] || { time: "08:00", duration: "2" };
                const newShip = { id: Date.now(), name, type, port, startTime: sepe.time, duration: sepe.duration, locs: SHIP_LOCS[type], signed: false, data: {} };
                setProjects([newShip, ...projects]); setActiveId(newShip.id); setView('daily');
            };

            const updateData = (loc, field, val) => {
                setProjects(projects.map(p => {
                    if (p.id === activeId) {
                        const updatedData = { ...p.data, [loc]: { ...p.data[loc], [field]: val } };
                        return { ...p, data: updatedData };
                    }
                    return p;
                }));
            };

            if (!isAuth) return (
                <div className="h-screen flex items-center justify-center p-6 bg-slate-950">
                    <form onSubmit={login} className="glass p-10 rounded-[40px] w-full max-w-sm text-center">
                        <h1 className="brand text-red-500 text-xl mb-8 uppercase">SafeShip Access</h1>
                        <input name="pass" type="password" className="w-full bg-slate-900 p-5 rounded-3xl mb-4 text-center text-white outline-none" placeholder="ΚΩΔΙΚΟΣ" />
                        <button className="w-full bg-red-600 p-5 rounded-3xl font-black uppercase text-xs">Enter Command Center</button>
                    </form>
                </div>
            );

            const p = projects.find(x => x.id === activeId);

            return (
                <div className="max-w-xl mx-auto p-5 pb-32">
                    <header className="flex justify-between items-center py-6 mb-4 border-b border-slate-800">
                        <h1 className="brand text-xs font-black text-red-500 uppercase">SafeShip Manager</h1>
                        <p className="text-xl font-bold">04:33 μ.μ.</p>
                    </header>

                    {view === 'dashboard' && (
                        <div className="space-y-6 animate-fadeIn">
                            <div className="glass p-6 rounded-[35px] border-l-4 border-emerald-500 flex justify-between items-center">
                                <div><p className="text-[8px] text-slate-500 font-black uppercase mb-1">Attendance In</p><p className="text-3xl font-black">{checkIn}</p></div>
                                <button onClick={() => {const t=new Date().toLocaleTimeString('el-GR',{hour:'2-digit',minute:'2-digit'}); setCheckIn(t); localStorage.setItem('ntg_checkin', t)}} className="bg-emerald-600 px-6 py-4 rounded-2xl text-xs font-black uppercase shadow-lg">Check-In</button>
                            </div>
                            <button onClick={() => setView('new')} className="w-full bg-red-600 p-6 rounded-[35px] font-black text-xs uppercase shadow-2xl">+ New Inspection</button>
                            <div className="space-y-4">
                                {projects.map(item => (
                                    <div key={item.id} onClick={() => { setActiveId(item.id); setView('daily'); }} className={`glass p-6 rounded-[35px] flex justify-between items-center ${item.signed ? 'border-l-8 border-emerald-500' : 'border border-white/5'}`}>
                                        <div>
                                            <h4 className="font-bold text-sm uppercase">{item.name}</h4>
                                            <p className="text-[9px] text-slate-400 font-bold uppercase mt-1 italic">{item.port} • {item.startTime} ({item.duration}h)</p>
                                        </div>
                                        <i className={`fa-solid ${item.signed ? 'fa-circle-check text-emerald-500' : 'fa-chevron-right text-slate-700'}`}></i>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {view === 'new' && (
                        <form onSubmit={createP} className="space-y-6 animate-fadeIn">
                            <button onClick={() => setView('dashboard')} className="text-slate-500 text-[10px] font-black uppercase">← Dashboard</button>
                            <h2 className="brand text-lg uppercase italic mb-4">Register Vessel</h2>
                            <input name="shipName" required className="w-full bg-slate-900 p-6 rounded-[30px] font-bold text-xl uppercase" placeholder="Όνομα Πλοίου / IMO" />
                            <input name="port" required className="w-full bg-slate-900 p-6 rounded-[30px] font-bold text-sm uppercase" placeholder="Λιμάνι / Τοποθεσία" />
                            <select name="shipType" className="w-full bg-slate-900 p-6 rounded-[30px] font-bold text-sm text-slate-400">
                                <option value="Tanker">Δεξαμενόπλοιο</option>
                                <option value="Ferry">Επιβατηγό / Ro-Ro</option>
                                <option value="Cargo">Φορτηγό / Cargo</option>
                            </select>
                            <button type="submit" className="w-full bg-red-600 p-6 rounded-[30px] font-black uppercase text-xs shadow-2xl">Create Project</button>
                        </form>
                    )}

                    {view === 'daily' && p && (
                        <div className="animate-fadeIn space-y-8">
                            <div className="flex justify-between items-center"><button onClick={() => setView('dashboard')} className="text-slate-500 text-[10px] font-black uppercase">← Fleet</button></div>
                            <div className="glass p-8 rounded-[40px] border-l-4 border-red-600 text-center">
                                <h2 className="brand text-2xl font-black uppercase">{p.name}</h2>
                                <p className="text-[10px] text-slate-400 font-bold uppercase mt-1 italic">{p.port} • Ωράριο: {p.startTime} ({p.duration}h)</p>
                            </div>
                            <div className="space-y-10">
                                {p.locs.map(loc => {
                                    const d = p.data[loc] || { status: '', note: '' };
                                    return (
                                        <div key={loc} className="glass p-6 rounded-[40px] border border-white/5">
                                            <h4 className="text-[11px] font-black uppercase text-slate-400 mb-4">{loc}</h4>
                                            <div className="grid grid-cols-4 gap-2 mb-4">
                                                <button onClick={() => updateData(loc, 'status', 'ok')} className={`p-3 rounded-xl text-[8px] font-black btn-status ${d.status === 'ok' ? 'active-ok' : 'bg-slate-800'}`}>OK</button>
                                                <button onClick={() => updateData(loc, 'status', 'wait')} className={`p-3 rounded-xl text-[8px] font-black btn-status ${d.status === 'wait' ? 'active-wait' : 'bg-slate-800'}`}>WAIT</button>
                                                <button onClick={() => updateData(loc, 'status', 'block')} className={`p-3 rounded-xl text-[8px] font-black btn-status ${d.status === 'block' ? 'active-block' : 'bg-slate-800'}`}>BLOCK</button>
                                                <button onClick={() => updateData(loc, 'status', 'na')} className={`p-3 rounded-xl text-[8px] font-black btn-status ${d.status === 'na' ? 'active-na' : 'bg-slate-800'}`}>N/A</button>
                                            </div>
                                            <textarea className="w-full p-4 rounded-2xl text-[12px] h-24 mb-4" placeholder="Σημειώσεις..." value={d.note} onChange={(e) => updateData(loc, 'note', e.target.value)}></textarea>
                                            <button onClick={() => document.getElementById('cam').click()} className="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl text-[9px] font-black uppercase flex items-center justify-center gap-2"><i className="fa-solid fa-camera text-red-500"></i> Add Photo Evidence</button>
                                            <input type="file" id="cam" accept="image/*" capture="camera" className="hidden" />
                                        </div>
                                    );
                                })}
                            </div>
                            <button onClick={() => { setProjects(projects.map(x => x.id === activeId ? {...x, signed: true} : x)); setView('dashboard'); }} className="w-full bg-emerald-600 p-6 rounded-[35px] font-black uppercase text-xs shadow-xl">Sign-Off Today</button>
                        </div>
                    )}

                    <footer className="fixed bottom-0 left-0 right-0 p-6 glass border-t border-slate-800 flex justify-around">
                        <button onClick={() => setView('dashboard')} className="text-red-500"><i className="fa-solid fa-calendar-day text-lg"></i></button>
                        <a href="index.html" className="text-slate-600"><i className="fa-solid fa-house-user text-lg"></i></a>
                    </footer>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script></body></html>
