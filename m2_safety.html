<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M2: Safety Sync Hub | NauticalOS Central</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #020617; color: white; font-family: 'Orbitron', sans-serif; font-style: italic; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const SafetySyncHub = () => {
            const [syncStatus, setSyncStatus] = useState('CONNECTING');
            const [recentVisits, setRecentVisits] = useState([]);

            useEffect(() => {
                // Προσομοίωση σύνδεσης με τη Database (Supabase)
                setTimeout(() => {
                    setSyncStatus('LIVE_STREAMING');
                    // Εδώ στο μέλλον θα τραβάμε τα πραγματικά δεδομένα από το νέο App
                    const mockData = JSON.parse(localStorage.getItem('ntg_M2_logs') || '[]');
                    setRecentVisits(mockData.filter(l => l.action === 'SHIFT_SIGNED'));
                }, 1500);
            }, []);

            return (
                <div className="min-h-screen p-6">
                    <header className="flex justify-between items-center mb-10 glass p-6 rounded-[2.5rem] border-l-4 border-blue-500">
                        <div>
                            <h1 className="text-sm font-black uppercase text-blue-500 tracking-tighter">M2: Safety Sync Hub</h1>
                            <p className="text-[7px] opacity-40 font-bold uppercase tracking-widest italic text-blue-300">Central Monitoring Station</p>
                        </div>
                        <div className="flex items-center gap-2">
                            <span className={`w-2 h-2 rounded-full ${syncStatus === 'LIVE_STREAMING' ? 'bg-emerald-500 status-pulse' : 'bg-red-500'}`}></span>
                            <span className="text-[8px] font-black uppercase opacity-60">{syncStatus}</span>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 gap-6">
                        {/* Summary Card */}
                        <div className="glass p-8 rounded-[3rem] border-l-4 border-emerald-500">
                            <h3 className="text-[10px] font-black uppercase text-emerald-500 mb-4 italic tracking-widest">Σύνοψη Σήμερα (V2 App Feed)</h3>
                            <div className="flex justify-between items-center">
                                <div>
                                    <p className="text-3xl font-black italic">{recentVisits.length}</p>
                                    <p className="text-[8px] opacity-40 uppercase font-black tracking-tighter">Ολοκληρωμένα Πλοία</p>
                                </div>
                                <i className="fa-solid fa-ship text-3xl opacity-10"></i>
                            </div>
                        </div>

                        {/* Visit Log Feed */}
                        <div className="glass p-6 rounded-[2.5rem]">
                            <h4 className="text-[10px] font-black uppercase mb-6 opacity-40 italic">Πρόσφατες Επισκέψεις</h4>
                            <div className="space-y-4">
                                {recentVisits.length > 0 ? recentVisits.map((visit, i) => (
                                    <div key={i} className="flex justify-between items-center border-b border-white/5 pb-3">
                                        <div>
                                            <p className="text-[11px] font-black uppercase italic">{visit.details.split('.')[0]}</p>
                                            <p className="text-[8px] opacity-40">{new Date(visit.ts).toLocaleTimeString()}</p>
                                        </div>
                                        <span className="text-[7px] bg-emerald-500/20 text-emerald-500 px-2 py-1 rounded font-black uppercase tracking-widest">Verified</span>
                                    </div>
                                )) : (
                                    <p className="text-[9px] italic opacity-30 text-center py-10 uppercase font-black">Αναμονή για δεδομένα από το Safety V2...</p>
                                )}
                            </div>
                        </div>

                        {/* Commercial Redirect */}
                        <a href="m14_commercial.html" className="h-16 glass rounded-2xl flex items-center justify-center gap-3 border-2 border-dashed border-blue-500/30 active:scale-95">
                            <i className="fa-solid fa-file-invoice-dollar text-blue-500"></i>
                            <span className="text-[10px] font-black uppercase italic">Μεταφορά στη Λίστα Πελατών (M14)</span>
                        </a>
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<SafetySyncHub />);
    </script></body></html>
