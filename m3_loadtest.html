<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M3: Load Test Certifier v3.51</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');body{background:#020617;color:white;font-family:'Orbitron',sans-serif;font-style:italic;font-weight:bold;}.glass{background:rgba(15,23,42,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);}</style>
</head>
<body><div id="root"></div><script type="text/babel">
const LoadTest=()=>{
    const [vessel, setVessel] = React.useState('FELIX');
    const [swl, setSwl] = React.useState('');
    const [mode, setMode] = React.useState('CARGO'); // CARGO or MOORING
    
    // ILO 152 MATH ENGINE [cite: 81-84]
    const proof = swl ? (parseFloat(swl) <= 20 ? swl * 1.25 : parseFloat(swl) + 5) : 0;

    return(
        <div className="min-h-screen p-6 animate-fade bg-slate-950">
            <div className="flex justify-between mb-8"><a href="index.html" className="text-[10px] underline opacity-50 text-orange-500">← BACK TO HUB</a></div>
            <h1 className="text-orange-500 text-lg mb-8 text-center uppercase tracking-tighter italic">M3: LOAD TESTING</h1>
            
            <div className="glass p-6 rounded-[2.5rem] border-orange-500/20 shadow-2xl space-y-6">
                <div>
                    <label className="text-[8px] uppercase text-slate-500 block mb-2 italic">Select Vessel [cite: 50, 57]</label>
                    <select value={vessel} onChange={(e)=>setVessel(e.target.value)} className="w-full bg-black/40 p-4 rounded-xl border border-slate-800 text-xs">
                        <option>FELIX</option><option>ARIADNI</option><option>NAFTOCEMENT IV</option><option>RIGEL III</option>
                    </select>
                </div>

                <div className="flex gap-2">
                    <button onClick={()=>setMode('CARGO')} className={`flex-1 p-3 rounded-xl text-[8px] border ${mode==='CARGO'?'border-orange-500 bg-orange-500/10':'border-slate-800'}`}>CARGO GEAR [cite: 74]</button>
                    <button onClick={()=>setMode('MOORING')} className={`flex-1 p-3 rounded-xl text-[8px] border ${mode==='MOORING'?'border-orange-500 bg-orange-500/10':'border-slate-800'}`}>MOORING [cite: 76]</button>
                </div>

                <div>
                    <label className="text-[8px] uppercase text-slate-500 block mb-2 italic">SWL Input (Tons) [cite: 83]</label>
                    <input type="number" value={swl} onChange={(e)=>setSwl(e.target.value)} className="w-full bg-black/40 p-5 rounded-2xl text-center text-3xl font-black text-white outline-none border border-slate-800" placeholder="0.0" />
                </div>

                <div className="text-center pt-4 border-t border-white/5">
                    <p className="text-[9px] uppercase text-slate-400 mb-1">Target Proof Load [cite: 84]</p>
                    <p className="text-5xl text-orange-500 font-black tracking-tighter">{proof.toFixed(2)}<span className="text-xs ml-1">T</span></p>
                </div>

                <button className="w-full bg-orange-600 p-5 rounded-3xl text-[10px] uppercase font-black italic shadow-lg active:scale-95 transition-all">
                    Generate CERT 11 PDF [cite: 91, 94, 95]
                </button>
            </div>
            
            <div className="mt-8 p-4 border-l-2 border-orange-900 opacity-40 italic">
                <p className="text-[7px] uppercase tracking-widest">Compliance: ILO 152 / MEG4 [cite: 81, 85]</p>
                <p className="text-[7px] uppercase mt-1 italic font-normal">Local Cache Active [cite: 101]</p>
            </div>
        </div>
    );
};
try { ReactDOM.createRoot(document.getElementById('root')).render(<LoadTest/>); } 
catch(e) { document.body.innerHTML = '<div style="color:red;padding:20px;font-family:monospace">Critical Error: '+e.message+'</div>'; }
</script></body></html>
