<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NTG COMMAND | MASTER HUB V4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; -webkit-tap-highlight-color: transparent; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .pin-input { letter-spacing: 1.2rem; text-align: center; font-size: 1.8rem; border: 2px solid #3b82f6; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [isLocked, setIsLocked] = useState(true);
            const [view, setView] = useState('HOME'); 
            const [selectedShip, setSelectedShip] = useState(null);
            const [selectedZone, setSelectedZone] = useState(null);

            // [cite: 3, 5, 9, 14, 19, 24] - ΣΕΠΕ ΑΠΡΙΛΙΟΣ 2026
            const sepeData = [
                { name: 'FELIX', imo: '9464182', port: 'DRAPETSONA', end: '2026-04-05' },
                { name: 'BADJI MOKHTAR III', imo: '9827889', port: 'ELEFSINA', end: '2026-04-30' },
                { name: 'ARIADNI', imo: '9135262', port: 'PIRAEUS', end: '2026-03-28' },
                { name: 'RIGEL III', imo: '7807744', port: 'PERAMA', end: '2026-04-15' }
            ];

            // 
            const techZones = ["Engine Room", "Main Deck", "Pump Room", "Bridge", "Accommodation"];

            const handleUnlock = (val) => {
                if (val === '1234') setIsLocked(false); // 
            };

            if (isLocked) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-950">
                        <i className="fa-solid fa-lock text-5xl text-blue-500 mb-8"></i>
                        <h2 className="brand text-xs mb-6 tracking-widest uppercase">System Encrypted</h2>
                        <input 
                            type="password" 
                            maxLength="4"
                            placeholder="PIN"
                            onChange={(e) => handleUnlock(e.target.value)}
                            className="w-48 bg-slate-900 p-4 rounded-3xl pin-input outline-none shadow-lg shadow-blue-500/20"
                        />
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-24 max-w-md mx-auto relative overflow-hidden">
                    {/* [cite: 36] SYNC BAR */}
                    <header className="glass sticky top-0 z-50 p-4 flex justify-between items-center border-b border-blue-500/30">
                        <div onClick={() => setView('HOME')} className="cursor-pointer">
                            <p className="text-[10px] font-black text-blue-500 tracking-[0.2em] mb-1 uppercase leading-none">NTG COMMAND HUB</p>
                            <h1 className="font-bold text-sm tracking-tighter uppercase italic">M. SYKINIOTIS</h1>
                        </div>
                        <button onClick={() => setIsLocked(true)}><i className="fa-solid fa-shield-halved text-slate-500"></i></button>
                    </header>

                    <main className="p-4">
                        {/*  THE TACTICAL TILES */}
                        {view === 'HOME' && (
                            <div className="grid grid-cols-2 gap-4 animate-in fade-in duration-500">
                                <button onClick={() => setView('M1_HUB')} className="glass p-8 rounded-[2.5rem] flex flex-col items-center gap-3 border-b-2 border-blue-500">
                                    <i className="fa-solid fa-shield text-4xl text-blue-400"></i>
                                    <span className="text-[10px] font-black uppercase">Safety (M1)</span>
                                </button>
                                <button onClick={() => setView('M2_LIST')} className="glass p-8 rounded-[2.5rem] flex flex-col items-center gap-3 border-b-2 border-cyan-500">
                                    <i className="fa-solid fa-ship text-4xl text-cyan-400"></i>
                                    <span className="text-[10px] font-black uppercase tracking-tighter">Repairs (M2)</span>
                                </button>
                                <button className="glass p-8 rounded-[2.5rem] flex flex-col items-center gap-3 opacity-40">
                                    <i className="fa-solid fa-scale-balanced text-4xl"></i>
                                    <span className="text-[10px] font-black uppercase">Legal (M3)</span>
                                </button>
                                <button className="glass p-8 rounded-[2.5rem] flex flex-col items-center gap-3 opacity-40">
                                    <i className="fa-solid fa-user-clock text-4xl"></i>
                                    <span className="text-[10px] font-black uppercase">Staff (M5)</span>
                                </button>
                            </div>
                        )}

                        {/* [cite: 43, 46, 61] M1 SAFETY TACTICAL */}
                        {view === 'M1_HUB' && (
                            <div className="space-y-6 animate-in slide-in-from-right">
                                <div className="flex justify-between items-center">
                                    <h2 className="brand text-blue-400 text-xs italic tracking-widest">SAFETY TACTICAL</h2>
                                    <button onClick={() => setView('HOME')} className="text-[10px] font-black text-slate-500 uppercase">Back</button>
                                </div>
                                
                                {/* [cite: 46] Hazard Radar Feed */}
                                <div className="glass p-4 rounded-3xl border-2 border-red-600 animate-pulse flex items-center gap-4">
                                    <i className="fa-solid fa-radiation text-2xl text-red-600"></i>
                                    <div>
                                        <p className="text-[10px] font-black text-red-500 uppercase">Hazard Radar: Live</p>
                                        <p className="text-xs font-black uppercase italic italic tracking-tighter italic">2 "BLOCK" entries active</p>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={() => setView('M1_INSPECTION')} className="glass p-6 rounded-3xl flex flex-col items-center gap-2 border-b-2 border-blue-500"><i className="fa-solid fa-rocket text-blue-400"></i><span className="text-[9px] font-black uppercase">Inspection</span></button>
                                    <button className="glass p-6 rounded-3xl flex flex-col items-center gap-2 border-b-2 border-orange-500"><i className="fa-solid fa-book text-emerald-500"></i><span className="text-[9px] font-black uppercase tracking-tighter italic italic tracking-tighter italic">Logbook</span></button>
                                    <button className="glass p-6 rounded-3xl flex flex-col items-center gap-2 border-b-2 border-purple-500"><i className="fa-solid fa-file-pdf text-purple-500"></i><span className="text-[9px] font-black uppercase">Reports</span></button>
                                    <button className="glass p-6 rounded-3xl flex flex-col items-center gap-2 border-b-2 border-yellow-500"><i className="fa-solid fa-wallet text-yellow-500"></i><span className="text-[9px] font-black uppercase">Wallet</span></button>
                                </div>

                                {/* [cite: 61] IoT Alert */}
                                <div className="glass p-4 rounded-3xl flex justify-between items-center border border-yellow-600/30">
                                    <p className="text-[9px] font-black text-yellow-500 uppercase"><i className="fa-solid fa-bolt mr-2"></i>IoT: Gas Detector GD-04</p>
                                    <span className="text-[8px] font-black bg-yellow-900/50 px-2 py-0.5 rounded text-yellow-400 italic">CALIBRATION REQ</span>
                                </div>
                            </div>
                        )}

                        {/*  M1 ZONE SELECTION */}
                        {view === 'M1_INSPECTION' && (
                            <div className="space-y-4 animate-in zoom-in">
                                <div className="flex justify-between items-center px-2">
                                    <h2 className="brand text-blue-400 text-xs italic tracking-widest uppercase">Select Zone</h2>
                                    <button onClick={() => setView('M1_HUB')} className="text-[10px] font-black text-slate-500 uppercase">Back</button>
                                </div>
                                <div className="space-y-2">
                                    {techZones.map(z => (
                                        <button key={z} className="w-full glass p-5 rounded-2xl text-left flex justify-between items-center active:scale-95 transition-all">
                                            <span className="text-sm font-black tracking-tighter uppercase">{z}</span>
                                            <i className="fa-solid fa-chevron-right text-slate-700"></i>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* [cite: 79] M2 REPAIR WATCHLIST */}
                        {view === 'M2_LIST' && (
                            <div className="space-y-4 animate-in slide-in-from-bottom">
                                <div className="flex justify-between items-center px-2 mb-4">
                                    <h2 className="brand text-cyan-400 text-xs italic uppercase">Repairs Watchlist</h2>
                                    <button onClick={() => setView('HOME')} className="text-[10px] font-black text-slate-500 uppercase">Back</button>
                                </div>
                                {sepeData.map(ship => (
                                    <div key={ship.name} className="glass p-5 rounded-3xl border-l-4 border-cyan-500 flex justify-between items-center">
                                        <div>
                                            <h3 className="font-black text-sm tracking-tighter uppercase">{ship.name}</h3>
                                            <p className="text-[9px] text-slate-500 font-bold uppercase tracking-widest">{ship.port} // IMO: {ship.imo}</p>
                                        </div>
                                        <div className="text-right">
                                            <span className="text-[8px] font-black bg-slate-800 px-2 py-1 rounded text-slate-400">2026-04</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/*  SMART CAPTURE [🔵] */}
                    <div className="fixed bottom-6 left-0 right-0 flex justify-center pointer-events-none z-50">
                        <label className="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center shadow-[0_0_35px_rgba(37,99,235,0.4)] border-4 border-slate-950 pointer-events-auto active:scale-90 transition-all cursor-pointer">
                            <i className="fa-solid fa-camera text-2xl text-white"></i>
                            <input type="file" accept="image/*" capture="environment" className="hidden" />
                        </label>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
