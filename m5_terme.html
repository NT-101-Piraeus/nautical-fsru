<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M5: War Room V6.5 - EVIDENCE MATRIX</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #020617; color: white; font-family: 'Orbitron', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .node { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; z-index: 10; position: absolute; transform: translate(-50%, -50%); }
        .node:hover { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 20px currentColor; }
        .svg-lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .line-link { stroke: rgba(255, 255, 255, 0.2); stroke-width: 2; cursor: pointer; pointer-events: stroke; transition: all 0.3s; }
        .line-link:hover { stroke: #f97316; stroke-width: 4; filter: drop-shadow(0 0 5px #f97316); }
        .status-red { border-color: #ef4444; color: #ef4444; box-shadow: inset 0 0 10px rgba(239, 68, 68, 0.2); }
        .status-yellow { border-color: #eab308; color: #eab308; box-shadow: inset 0 0 10px rgba(234, 179, 8, 0.2); }
        .status-green { border-color: #22c55e; color: #22c55e; box-shadow: inset 0 0 10px rgba(34, 197, 94, 0.2); }
        .fat-finger { height: 60px; font-weight: 900; text-transform: uppercase; border-radius: 1rem; transition: all 0.2s; }
        .fat-finger:active { transform: scale(0.95); }
        .timeline-line { position: absolute; left: 20px; top: 0; bottom: 0; width: 2px; background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const WarRoomSpider = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [pin, setPin] = useState("");
            const [activeTab, setActiveTab] = useState('SPIDER'); // SPIDER | MATRIX
            const [activeEvidence, setActiveEvidence] = useState(null);

            // Matrix States
            const [scandalLink, setScandalLink] = useState('');
            const [scandalCategory, setScandalCategory] = useState('Financial Misconduct');
            const [scandalLogs, setScandalLogs] = useState([]);

            useEffect(() => {
                if (sessionStorage.getItem('ntg_global_auth') === 'true') setIsAuthenticated(true);
            }, []);

            const verifyPin = () => {
                if (pin === "1234") { sessionStorage.setItem('ntg_global_auth', 'true'); setIsAuthenticated(true); } 
                else { alert("LOCKDOWN V6.5: ACCESS DENIED"); setPin(""); }
            };

            const addScandalLog = () => {
                if (!scandalLink) return;
                setScandalLogs([...scandalLogs, { url: scandalLink, category: scandalCategory, id: Date.now() }]);
                setScandalLink('');
            };

            const generateBreachSummary = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.setFontSize(16);
                doc.setTextColor(220, 38, 38);
                doc.text("BREACH SUMMARY: 2008-2015", 105, 20, { align: "center" });
                doc.setFontSize(10);
                doc.setTextColor(0, 0, 0);
                doc.text("PREPARED FOR: YURDAER LEGAL TEAM", 20, 40);
                doc.text("GENERATED BY: M10 SUPREME AUDITOR (V6.5)", 20, 50);
                doc.text("CONFIDENTIAL & PRIVILEGED", 20, 60);
                doc.save("Breach_Summary_Yurdaer.pdf");
                alert("Breach Summary generated for Yurdaer.");
            };

            // V6.4 SPIDER WEB DATA
            const nodes = [
                { id: 'terme', label: 'Terme Tersanesi', type: 'CENTER', status: 'red', x: 50, y: 50, icon: 'fa-ship' },
                { id: 'zorlu', label: 'Erkan Zorlu', type: 'Mastermind', status: 'red', x: 20, y: 20, icon: 'fa-user-tie' },
                { id: 'karaca', label: 'Tuğrul Karaca', type: 'Signatory', status: 'red', x: 80, y: 20, icon: 'fa-file-signature' },
                { id: 'hasan', label: 'Hasan Öztürk', type: 'Emir Owner', status: 'yellow', x: 80, y: 80, icon: 'fa-user-secret' },
                { id: 'emir', label: 'Emir Denizcilik', type: 'Vessel Proxy', status: 'yellow', x: 50, y: 85, icon: 'fa-anchor' },
                { id: 'barker', label: 'Barker Financial', type: 'Dutch Shell', status: 'green', x: 20, y: 80, icon: 'fa-building-columns' }
            ];

            const links = [
                { source: 'zorlu', target: 'terme', evidence: 'UBO Concealment. Commands all Terme operations.' },
                { source: 'karaca', target: 'terme', evidence: 'Official Signatory. Signed the fraudulent NTG contracts.' },
                { source: 'hasan', target: 'emir', evidence: 'Strawman Owner. Registered as sole shareholder.' },
                { source: 'emir', target: 'terme', evidence: 'Shared Registry Address. Emir operates from within Terme.' },
                { source: 'terme', target: 'barker', evidence: 'Payment Receipt for $11M. Illicit fund transfer.' }
            ];

            // V6.5 BREACH VESSELS (2008-2015)
            const breachVessels = [
                { name: 'GHOST HULL 1', imo: '9876543', owner: 'Emir Denizcilik', year: 2011, status: 'Financial Misconduct' },
                { name: 'PROXY STAR', imo: '9988776', owner: 'Capital Shipping', year: 2013, status: 'Operational Fraud' }
            ];

            if (!isAuthenticated) return (
                <div className="min-h-screen flex items-center justify-center p-6">
                    <div className="glass p-10 rounded-[3rem] w-full max-w-sm text-center border-red-500/30">
                        <i className="fa-solid fa-fingerprint text-5xl text-red-500 mb-6 animate-pulse"></i>
                        <h2 className="text-sm font-black uppercase mb-8 tracking-widest text-red-500">M5 Lockdown V6.5</h2>
                        <input type="password" value={pin} onChange={(e) => setPin(e.target.value)} className="w-full bg-black/50 border border-white/10 p-6 rounded-2xl text-center text-4xl tracking-[1rem] outline-none text-red-500 mb-6 font-black" autoFocus />
                        <button onClick={verifyPin} className="fat-finger w-full bg-red-900/50 border border-red-500 text-red-500 hover:bg-red-600 hover:text-white transition-all">Authenticate</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen relative overflow-hidden bg-slate-950 p-6 flex flex-col">
                    {/* Header & Tabs */}
                    <header className="relative z-20 glass p-6 rounded-[2rem] mb-6 border border-red-900/50">
                        <div className="flex justify-between items-center mb-6">
                            <div className="flex items-center gap-4">
                                <i className="fa-solid fa-scale-balanced text-3xl text-red-500"></i>
                                <div>
                                    <h1 className="text-lg font-black uppercase italic tracking-tighter">M5: Legal Operations</h1>
                                    <p className="text-[8px] text-red-500 uppercase tracking-[0.4em] font-bold">V6.5 Active</p>
                                </div>
                            </div>
                            <a href="index.html" className="p-4 glass rounded-xl hover:text-orange-500 transition-colors"><i className="fa-solid fa-house"></i></a>
                        </div>
                        <div className="flex gap-4">
                            <button onClick={() => setActiveTab('SPIDER')} className={`flex-1 py-3 rounded-xl font-black text-xs uppercase transition-all ${activeTab === 'SPIDER' ? 'bg-red-600 text-white' : 'bg-black/40 text-slate-400'}`}>Spider Web</button>
                            <button onClick={() => setActiveTab('MATRIX')} className={`flex-1 py-3 rounded-xl font-black text-xs uppercase transition-all ${activeTab === 'MATRIX' ? 'bg-orange-600 text-white' : 'bg-black/40 text-slate-400'}`}>Evidence Matrix</button>
                        </div>
                    </header>

                    {/* TAB: SPIDER WEB */}
                    {activeTab === 'SPIDER' && (
                        <div className="relative flex-grow glass rounded-[3rem] border border-slate-800 overflow-hidden min-h-[500px]">
                            <svg className="svg-lines">
                                {links.map((link, i) => {
                                    const sourceNode = nodes.find(n => n.id === link.source);
                                    const targetNode = nodes.find(n => n.id === link.target);
                                    return <line key={i} x1={`${sourceNode.x}%`} y1={`${sourceNode.y}%`} x2={`${targetNode.x}%`} y2={`${targetNode.y}%`} className="line-link" onClick={() => setActiveEvidence(link.evidence)} />
                                })}
                            </svg>
                            {nodes.map(node => (
                                <div key={node.id} className={`node glass rounded-full flex flex-col items-center justify-center border-2 status-${node.status} ${node.type === 'CENTER' ? 'w-24 h-24 bg-slate-900/90' : 'w-20 h-20 bg-slate-900/60'}`} style={{ left: `${node.x}%`, top: `${node.y}%` }} onClick={() => setActiveEvidence(`${node.label}: ${node.type}`)}>
                                    <i className={`fa-solid ${node.icon} ${node.type === 'CENTER' ? 'text-2xl mb-1' : 'text-lg mb-1'}`}></i>
                                    <span className="text-[8px] font-black uppercase tracking-tighter text-center leading-tight px-1">{node.label}</span>
                                </div>
                            ))}
                            {activeEvidence && (
                                <div className="absolute bottom-6 left-6 right-6 z-30 glass p-6 rounded-[2rem] border-l-4 border-red-500 animate-fade-in shadow-2xl flex justify-between">
                                    <p className="text-sm italic font-bold">{activeEvidence}</p>
                                    <button onClick={() => setActiveEvidence(null)} className="text-red-500"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                            )}
                        </div>
                    )}

                    {/* TAB: EVIDENCE MATRIX */}
                    {activeTab === 'MATRIX' && (
                        <div className="flex-grow space-y-6 overflow-y-auto pb-20 no-scrollbar">
                            
                            {/* 1. Scandal Log */}
                            <div className="glass p-6 rounded-[2rem] border border-orange-500/30">
                                <h3 className="text-xs font-black uppercase text-orange-500 mb-4"><i className="fa-solid fa-link"></i> Scandal Log (Turkish Press)</h3>
                                <div className="flex flex-col md:flex-row gap-3 mb-4">
                                    <input type="text" value={scandalLink} onChange={e=>setScandalLink(e.target.value)} placeholder="Paste Article URL..." className="flex-grow bg-black/40 p-4 rounded-xl outline-none text-xs border border-white/5" />
                                    <select value={scandalCategory} onChange={e=>setScandalCategory(e.target.value)} className="bg-black/40 p-4 rounded-xl outline-none text-xs border border-white/5 text-orange-400">
                                        <option>Financial Misconduct</option>
                                        <option>Operational Fraud</option>
                                    </select>
                                    <button onClick={addScandalLog} className="bg-orange-600 px-6 py-4 rounded-xl font-black text-xs uppercase">Log</button>
                                </div>
                                <div className="space-y-2">
                                    {scandalLogs.map(log => (
                                        <div key={log.id} className="bg-white/5 p-3 rounded-lg text-[10px] flex justify-between items-center">
                                            <span className="truncate w-1/2 opacity-60">{log.url}</span>
                                            <span className="text-orange-400 font-bold uppercase">{log.category}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* 2. Breach Timeline (2008-2015) & ID Cards */}
                            <div className="glass p-6 rounded-[2rem] relative border border-white/10">
                                <h3 className="text-xs font-black uppercase text-white mb-6"><i className="fa-solid fa-timeline"></i> Breach Timeline (2008-2015)</h3>
                                <div className="relative pl-10 space-y-6">
                                    <div className="timeline-line"></div>
                                    {breachVessels.sort((a,b) => a.year - b.year).map((v, i) => (
                                        <div key={i} className="relative glass p-5 rounded-2xl border-l-4 border-red-600">
                                            <div className="absolute left-[-45px] top-5 w-4 h-4 rounded-full bg-red-600 border-4 border-slate-900"></div>
                                            <div className="flex justify-between items-start">
                                                <div>
                                                    <span className="text-red-500 font-black text-lg">{v.year}</span>
                                                    <h4 className="text-sm font-black uppercase mt-1">{v.name} <span className="opacity-50 text-[10px] ml-2">IMO: {v.imo}</span></h4>
                                                    <p className="text-[10px] text-slate-400 mt-2 uppercase">Owner: <span className="text-white">{v.owner}</span></p>
                                                </div>
                                                <span className="text-[9px] bg-red-900/40 text-red-400 px-2 py-1 rounded font-bold uppercase">{v.status}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* 4. Export Tool */}
                            <button onClick={generateBreachSummary} className="fat-finger w-full bg-red-600 shadow-xl shadow-red-900/30 text-white flex items-center justify-center gap-3">
                                <i className="fa-solid fa-file-pdf text-xl"></i> Generate Breach Summary
                            </button>

                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<WarRoomSpider />);
    </script>
</body>
</html>
