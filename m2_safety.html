<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M2: Compliance Shield v3.80 (Perfect Shield + Telemetry)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');body{background:#020617;color:white;font-family:'Orbitron',sans-serif;font-style:italic;font-weight:bold;}.glass{background:rgba(15,23,42,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);}</style>
</head>
<body><div id="root"></div><script type="text/babel">
const { useState, useEffect } = React;

// --- TELEMETRY SENSOR (BLACK BOX) ---
const Telemetry = {
    log: (type, action, details) => {
        try {
            const logs = JSON.parse(localStorage.getItem('ntg_telemetry_logs') || '[]');
            logs.push({ ts: new Date().toISOString(), type, action, details });
            localStorage.setItem('ntg_telemetry_logs', JSON.stringify(logs.slice(-50)));
        } catch (e) { console.error("Telemetry failure", e); }
    }
};
window.onerror = (m, u, l) => Telemetry.log('ERROR', 'CRASH', { m, l });

const SafetyApp = () => {
    const [view, setView] = useState('WATCHLIST'); 
    const [activeVessel, setActiveVessel] = useState(null);
    const [showAdminModal, setShowAdminModal] = useState(false);
    const [pin, setPin] = useState('');
    const [newVessel, setNewVessel] = useState({ name: '', imo: '', shift: '' });
    const [sunMode, setSunMode] = useState(false);
    const [dailyTasks, setDailyTasks] = useState([]);
    const [photos, setPhotos] = useState([]);
    const [tempArea, setTempArea] = useState('Main Deck');
    const [tempTaskType, setTempTaskType] = useState('Hot Works');

    const [vessels, setVessels] = useState(() => {
        const saved = localStorage.getItem('ntg_vessels');
        if (saved) return JSON.parse(saved);
        return [
            { id: 1, name: 'FELIX', imo: '9513191', shift: '07:00 - 11:00', status: 'ACTIVE' },
            { id: 2, name: 'ARIADNI', imo: '9513192', shift: '12:00 - 15:00', status: 'PENDING' }
        ];
    });

    useEffect(() => { localStorage.setItem('ntg_vessels', JSON.stringify(vessels)); }, [vessels]);
    useEffect(() => { Telemetry.log('INFO', 'APP_OPEN', 'M2 V3.80 Loaded'); }, []);

    const handleAddProject = () => {
        if (!newVessel.name || !newVessel.imo) return alert("⚠️ Συμπληρώστε Όνομα και IMO!");
        if (pin === '1234') {
            const project = { ...newVessel, id: Date.now(), status: 'PENDING' };
            setVessels([...vessels, project]);
            Telemetry.log('ACTION', 'PROJECT_ADDED', project.name);
            setShowAdminModal(false); setPin(''); setNewVessel({ name: '', imo: '', shift: '' });
        } else {
            Telemetry.log('WARNING', 'INVALID_PIN', 'Admin Login Failed');
            alert("❌ ΛΑΘΟΣ PIN.");
        }
    };

    const workRequirements = {
        "Hot Works": ["Gas-Free Certificate Checked", "Fire Standby Present", "Fire Blanket in place"],
        "Confined Space": ["O2/LEL Levels Tested", "Standby Person at Entry", "Ventilation OK"],
        "Lifting Ops": ["Gear Certified", "Area Clear", "SWL Verified"]
    };

    const addJobToShift = () => {
        setDailyTasks([...dailyTasks, { id: Date.now(), area: tempArea, type: tempTaskType, verified: false }]);
        Telemetry.log('ACTION', 'TASK_ADDED', `${tempArea}-${tempTaskType}`);
    };

    const theme = sunMode ? "bg-white text-black" : "bg-slate-950 text-white";
    const card = sunMode ? "bg-slate-100 border-slate-300 shadow-xl" : "glass border-blue-500/20";

    if (view === 'WATCHLIST') return (
        <div className="min-h-screen p-6 animate-fade bg-slate-950 font-bold italic">
            <div className="flex justify-between items-center mb-10">
                <a href="index.html" className="text-[10px] underline opacity-50 text-slate-400 font-black">← HUB</a>
                <span className="text-[9px] text-emerald-500 font-black uppercase tracking-widest italic animate-pulse">ΣΕΠΕ SYNC</span>
            </div>
            <h1 className="text-blue-600 text-lg uppercase mb-8 text-center italic tracking-tighter">M2: SAFETY WATCHLIST</h1>
            <div className="space-y-4 mb-10">
                {vessels.map(v => (
                    <div key={v.id} onClick={() => { setActiveVessel(v); setView('INSPECTION'); Telemetry.log('INFO', 'VESSEL_OPEN', v.name); }} className="glass p-5 rounded-[2.5rem] border-l-4 border-slate-700 flex justify-between items-center shadow-xl cursor-pointer active:scale-95 transition-all">
                        <div><p className="text-sm text-white font-black">{v.name}</p><p className="text-[9px] text-slate-500 uppercase mt-1">IMO: {v.imo} • SHIFT: {v.shift}</p></div>
                        <i className="fa-solid fa-chevron-right text-slate-800"></i>
                    </div>
                ))}
            </div>
            <button onClick={() => setShowAdminModal(true)} className="w-full bg-blue-600/10 border-2 border-dashed border-blue-500/40 p-6 rounded-[2.5rem] text-blue-500 font-black uppercase text-[10px] flex items-center justify-center gap-3 active:scale-95 transition-all">
                <i className="fa-solid fa-folder-plus text-xl"></i> Add New Project (Admin)
            </button>
            {showAdminModal && (
                <div className="fixed inset-0 bg-black/95 backdrop-blur-xl z-50 flex items-center justify-center p-6">
                    <div className="glass w-full p-8 rounded-[3rem] border-blue-500/30 space-y-6">
                        <input type="password" placeholder="PIN" value={pin} onChange={(e)=>setPin(e.target.value)} className="w-full bg-black/50 p-5 rounded-2xl text-center text-2xl tracking-[1rem] outline-none border border-white/10" />
                        {pin === '1234' && (
                            <div className="space-y-4 animate-fade">
                                <input type="text" placeholder="VESSEL NAME" value={newVessel.name} onChange={(e)=>setNewVessel({...newVessel, name: e.target.value.toUpperCase()})} className="w-full bg-slate-900/50 p-4 rounded-xl text-xs outline-none border border-white/5" />
                                <input type="text" placeholder="IMO" value={newVessel.imo} onChange={(e)=>setNewVessel({...newVessel, imo: e.target.value})} className="w-full bg-slate-900/50 p-4 rounded-xl text-xs outline-none border border-white/5" />
                                <input type="text" placeholder="SHIFT" value={newVessel.shift} onChange={(e)=>setNewVessel({...newVessel, shift: e.target.value})} className="w-full bg-slate-900/50 p-4 rounded-xl text-xs outline-none border border-white/5" />
                                <button onClick={handleAddProject} className="w-full bg-blue-600 p-5 rounded-2xl text-[10px] uppercase font-black italic">Save Project</button>
                            </div>
                        )}
                        <button onClick={() => setShowAdminModal(false)} className="w-full text-[9px] text-slate-600 uppercase mt-4">Cancel</button>
                    </div>
                </div>
            )}
        </div>
    );

    return (
        <div className={`min-h-screen p-6 transition-all duration-300 animate-fade ${theme}`}>
            <div className="flex justify-between items-center mb-6 border-b border-blue-500/20 pb-4">
                <button onClick={() => setView('WATCHLIST')} className={`text-[10px] underline opacity-60 ${sunMode?'text-black':'text-blue-400'}`}>← Back</button>
                <div className="flex items-center gap-4">
                    <span className="text-[11px] uppercase font-black italic">{activeVessel.name}</span>
                    <button onClick={() => setSunMode(!sunMode)} className="p-2 glass rounded-full border border-blue-500/10">
                        <i className={`fa-solid ${sunMode?'fa-moon':'fa-sun text-yellow-500'}`}></i>
                    </button>
                </div>
            </div>

            <div className={`${card} p-5 rounded-[2.5rem] mb-6 space-y-4`}>
                <div className="grid grid-cols-2 gap-2">
                    <select value={tempArea} onChange={(e)=>setTempArea(e.target.value)} className="bg-slate-800/20 p-4 rounded-2xl text-[10px] outline-none text-white"><option>Main Deck</option><option>Engine Room</option></select>
                    <select value={tempTaskType} onChange={(e)=>setTempTaskType(e.target.value)} className="bg-slate-800/20 p-4 rounded-2xl text-[10px] outline-none text-white"><option>Hot Works</option><option>Confined Space</option></select>
                </div>
                <button onClick={addJobToShift} className="w-full bg-blue-600/20 border border-blue-600/40 p-4 rounded-2xl text-[9px] uppercase font-black italic">Add Task +</button>
            </div>

            <div className="space-y-4 mb-28 italic">
                {dailyTasks.map(task => (
                    <div key={task.id} className={`${card} p-4 rounded-3xl animate-fade`}>
                        <h4 className="text-[11px] uppercase text-blue-500 font-black mb-3">{task.area} / {task.type}</h4>
                        <div className="space-y-2">
                            {workRequirements[task.type]?.map(check => (
                                <label key={check} className="flex items-center gap-3 bg-black/20 p-3 rounded-xl border border-white/5">
                                    <input type="checkbox" className="w-4 h-4 accent-blue-600" />
                                    <span className="text-[9px] uppercase opacity-80">{check}</span>
                                </label>
                            ))}
                        </div>
                    </div>
                ))}
            </div>

            <div className={`fixed bottom-0 left-0 right-0 p-6 ${sunMode ? 'bg-white shadow-xl' : 'bg-slate-950 border-t border-blue-900/20'}`}>
                <div className="flex gap-4">
                    <button onClick={() => {setPhotos([...photos, {id:Date.now()}]); Telemetry.log('ACTION','PHOTO','Evidence Taken');}} className={`flex-1 p-6 rounded-[2.5rem] flex flex-col items-center gap-2 border-2 ${photos.length > 0 ? 'border-emerald-500 bg-emerald-500/10 text-emerald-500' : 'border-slate-700 border-dashed bg-black/20 text-slate-600'}`}>
                        <i className="fa-solid fa-camera text-2xl"></i>
                        <span className="text-[8px] uppercase font-black italic">Capture ({photos.length})</span>
                    </button>
                    <button disabled={photos.length === 0 || dailyTasks.length === 0} onClick={() => {Telemetry.log('ACTION','SIGN','Log Secured'); setView('WATCHLIST');}} className={`flex-1 p-6 rounded-[2.5rem] flex flex-col items-center gap-2 border-2 ${photos.length > 0 && dailyTasks.length > 0 ? 'border-blue-600 bg-blue-600 text-white' : 'border-slate-800 opacity-20 grayscale cursor-not-allowed'}`}>
                        <i className="fa-solid fa-signature text-2xl"></i>
                        <span className="text-[8px] uppercase font-black italic">Sign Log</span>
                    </button>
                </div>
            </div>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<SafetyApp />);
</script></body></html>
