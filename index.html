<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTG HUB | V50 MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        #cy { width: 100%; height: 400px; background: rgba(0,0,0,0.3); border-radius: 30px; }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        function App() {
            const [isAuth, setIsAuth] = useState(() => sessionStorage.getItem('ntg_auth') === 'true');
            const [view, setView] = useState('HUB'); // HUB, LEGAL, MANAGER
            const [taskCount, setTaskCount] = useState(0);

            useEffect(() => {
                const saved = JSON.parse(localStorage.getItem('ntg_master_data'));
                if (saved && saved.ships) {
                    const count = saved.ships.flatMap(s => Object.values(s.data || {})).flatMap(d => d.observations || []).filter(o => o.isTask).length;
                    setTaskCount(count);
                }
                if (view === 'LEGAL') {
                    const cy = cytoscape({
                        container: document.getElementById('cy'),
                        elements: [
                            { data: { id: 'term', label: 'TERME TERŞANESI', type: 'CO' } },
                            { data: { id: 'zorlu', label: 'Zorlu Family', type: 'PE' } },
                            { data: { id: 'nafto', label: 'NAFTOCEMENT IV', type: 'VS' } },
                            { data: { source: 'zorlu', target: 'term' } },
                            { data: { source: 'term', target: 'nafto' } }
                        ],
                        style: [{ selector: 'node', style: { 'label': 'data(label)', 'color': '#fff', 'background-color': '#3b82f6', 'font-size': '10px' } }],
                        layout: { name: 'cose' }
                    });
                }
            }, [isAuth, view]);

            if (!isAuth) return (
                <div className="h-screen flex items-center justify-center p-6 bg-[#020617]">
                    <form onSubmit={(e)=>{e.preventDefault(); if(e.target.p.value==='NT2026'){sessionStorage.setItem('ntg_auth','true');setIsAuth(true)}}} className="glass p-10 rounded-[40px] w-full max-w-sm text-center border border-blue-500/20">
                        <h1 className="brand text-blue-500 text-2xl mb-8 uppercase italic">NTG HUB</h1>
                        <input name="p" type="password" autoFocus className="w-full bg-slate-900 border border-slate-800 p-5 rounded-3xl mb-4 text-center text-white text-2xl" placeholder="••••" />
                        <button className="w-full bg-blue-600 py-5 rounded-3xl font-black text-xs uppercase">Identify</button>
                    </form>
                </div>
            );

            if (view === 'LEGAL') return (
                <div className="max-w-xl mx-auto p-5 py-10 animate-fadeIn">
                    <button onClick={()=>setView('HUB')} className="bg-slate-800 px-6 py-3 rounded-2xl text-[10px] font-black uppercase mb-8">← Back</button>
                    <h2 className="brand text-xl text-red-500 uppercase italic mb-8">Legal Entity Map</h2>
                    <div id="cy" className="glass mb-8"></div>
                    <div className="glass p-8 rounded-[40px] border-l-4 border-blue-500">
                        <h4 className="font-black text-sm uppercase">Intel: Naftotrade vs Terme</h4>
                        <p className="text-xs text-slate-500 mt-2 italic">Monitoring IMO 7355349 (Vietnam Area)...</p>
                    </div>
                </div>
            );

            if (view === 'MANAGER') return (
                <div className="max-w-xl mx-auto p-5 py-10 animate-fadeIn text-center">
                    <button onClick={()=>setView('HUB')} className="bg-slate-800 px-6 py-3 rounded-2xl text-[10px] font-black uppercase mb-8">← Back</button>
                    <h2 className="brand text-xl text-blue-400 uppercase italic mb-10">Manager Activity Log</h2>
                    <div className="glass p-20 rounded-[50px] opacity-30 italic font-black uppercase text-xs">Waiting for Real-time Stream...</div>
                </div>
            );

            return (
                <div className="max-w-xl mx-auto p-5 py-10 animate-fadeIn">
                    <header className="flex justify-between items-center mb-12">
                        <h1 className="brand text-blue-500 text-2xl font-black italic uppercase">NTG HUB</h1>
                        <button onClick={()=>{sessionStorage.clear(); window.location.reload();}} className="text-red-500 text-xl"><i className="fa-solid fa-power-off"></i></button>
                    </header>

                    <div className="space-y-6">
                        <a href="safety_ships.html?view=TASKS" className="glass p-6 rounded-[35px] border-l-4 border-red-600 flex justify-between items-center bg-red-600/5 shadow-lg">
                            <div><h3 className="brand text-[10px] text-red-500 uppercase italic">Hazardous Findings</h3><p className="text-3xl font-black mt-1">{taskCount} <span className="text-xs text-slate-500">TASKS</span></p></div>
                            <i className="fa-solid fa-triangle-exclamation text-red-500 text-2xl animate-pulse"></i>
                        </a>

                        <div className="glass p-6 rounded-[35px] border border-white/5">
                            <h3 className="brand text-[10px] text-blue-400 uppercase italic mb-4">Fleet Schedule</h3>
                            <div className="space-y-4 uppercase font-bold text-[11px]">{[
                                {n:"FELIX", p:"Δραπετσώνα", t:"07:00"}, {n:"RIGEL III", p:"Πέραμα", t:"15:00"}
                            ].map((s,i)=>(<div key={i} className="flex justify-between border-b border-white/5 pb-2"><span>{s.n}</span><span className="text-slate-500">{s.p} • {s.t}</span></div>))}</div>
                        </div>

                        <a href="safety_ships.html" className="glass p-10 rounded-[50px] flex items-center gap-8 border border-white/5 active:scale-95 transition-all">
                            <div className="w-16 h-16 rounded-2xl bg-red-600/20 flex items-center justify-center text-red-500 text-3xl"><i className="fa-solid fa-user-shield"></i></div>
                            <div><h2 className="brand text-sm text-white uppercase italic">Safety Officer</h2><p className="text-[10px] text-slate-500 font-bold uppercase mt-1">Inspection Engine</p></div>
                        </a>

                        <div onClick={()=>{if(prompt("MANAGER PIN")==="1234") setView('MANAGER')}} className="glass p-10 rounded-[50px] flex items-center gap-8 border border-white/5 cursor-pointer">
                            <div className="w-16 h-16 rounded-2xl bg-blue-600/20 flex items-center justify-center text-blue-400 text-3xl"><i className="fa-solid fa-tower-observation"></i></div>
                            <div><h2 className="brand text-sm text-white uppercase italic">Manager Log</h2><p className="text-[10px] text-slate-500 font-bold uppercase mt-1">Activity Stream</p></div>
                        </div>

                        <div onClick={()=>{if(prompt("LEGAL PIN")==="2026") setView('LEGAL')}} className="glass p-10 rounded-[50px] flex items-center gap-8 border border-red-500/20 cursor-pointer">
                            <div className="w-16 h-16 rounded-2xl bg-red-600/10 flex items-center justify-center text-red-500 text-3xl"><i className="fa-solid fa-scale-balanced"></i></div>
                            <div><h2 className="brand text-sm text-white uppercase italic text-red-500">Legal Dept</h2><p className="text-[10px] text-slate-500 font-bold uppercase mt-1">Asset Recovery</p></div>
                        </div>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script></body></html>
