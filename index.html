<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTG COMMAND | TACTICAL SUITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; overflow-x: hidden; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .tile { transition: all 0.2s; border-top: 1px solid rgba(255,255,255,0.1); }
        .tile:active { scale: 0.95; background: rgba(59, 130, 246, 0.2); }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [mode, setMode] = useState('MARITIME');

            return (
                <div className="min-h-screen pb-24">
                    {/* --- MANUAL 01: SYNC BAR --- */}
                    <header className="glass sticky top-0 z-50 p-4 flex justify-between items-center border-b border-blue-500/30">
                        <div className="flex flex-col">
                            <span className="text-[10px] font-black text-blue-500 uppercase tracking-widest leading-none">User ID</span>
                            <span className="font-bold text-sm tracking-tighter">M. SYKINIOTIS</span>
                        </div>
                        <div className="flex flex-col items-end">
                            <div className="flex items-center gap-2">
                                <span className="text-[9px] font-bold text-slate-400">CLOUD STATUS</span>
                                <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_#22c55e]"></div>
                            </div>
                            <button onClick={() => setMode(mode === 'MARITIME' ? 'INDUSTRIAL' : 'MARITIME')} className="mt-1 bg-slate-800 px-3 py-1 rounded-full text-[9px] font-black border border-slate-700">
                                MODE: {mode}
                            </button>
                        </div>
                    </header>

                    {/* --- MANUAL 01: TACTICAL TILES --- */}
                    <main className="p-4 grid grid-cols-2 gap-4 mt-4">
                        <button className="tile glass p-6 rounded-[2rem] flex flex-col items-center gap-3">
                            <i className="fa-solid fa-rocket text-3xl text-blue-500"></i>
                            <span className="text-[10px] font-black uppercase tracking-widest text-center">Inspection Engine</span>
                        </button>
                        <button className="tile glass p-6 rounded-[2rem] flex flex-col items-center gap-3">
                            <i className="fa-solid fa-radiation text-3xl text-orange-500"></i>
                            <span className="text-[10px] font-black uppercase tracking-widest text-center">Hazard Radar</span>
                        </button>
                        <button className="tile glass p-6 rounded-[2rem] flex flex-col items-center gap-3">
                            <i className="fa-solid fa-book text-3xl text-emerald-500"></i>
                            <span className="text-[10px] font-black uppercase tracking-widest text-center">Digital Logbook</span>
                        </button>
                        <button className="tile glass p-6 rounded-[2rem] flex flex-col items-center gap-3">
                            <i className="fa-solid fa-file-invoice text-3xl text-purple-500"></i>
                            <span className="text-[10px] font-black uppercase tracking-widest text-center">Executive Reports</span>
                        </button>
                        <button className="tile glass p-6 rounded-[2rem] flex flex-col items-center gap-3 col-span-2">
                            <i className="fa-solid fa-wallet text-3xl text-yellow-500"></i>
                            <span className="text-[10px] font-black uppercase tracking-widest">Project Wallet & Profit Margin</span>
                        </button>
                    </main>

                    {/* --- MANUAL 01: SMART CAPTURE [🔵] --- */}
                    <div className="fixed bottom-6 left-0 right-0 flex justify-center z-50">
                        <label className="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center shadow-[0_0_25px_rgba(37,99,235,0.5)] active:scale-90 transition-all cursor-pointer border-4 border-slate-900">
                            <i className="fa-solid fa-camera text-2xl text-white"></i>
                            <input type="file" accept="image/*" capture="environment" className="hidden" />
                        </label>
                    </div>

                    {/* NAVIGATION TEXTS */}
                    <div className="fixed bottom-2 w-full text-center">
                        <span className="brand text-[9px] text-slate-600 uppercase tracking-widest italic">NTG COMMAND V56 PRO</span>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script></body></html>
