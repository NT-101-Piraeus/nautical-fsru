<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M5: Operation Panic Room</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background-color: #020617; color: white; font-family: 'Orbitron', sans-serif; font-style: italic; font-weight: bold; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        const TermeApp = () => {
            const targets = [
                { name: "EMIR ÖZTÜRK", nip: "5262587598", status: "WATCHING", location: "POLAND/KRS" },
                { name: "ERKAN ZORLU", nip: "ALASUND", status: "WATCHING", location: "ICELAND" }
            ];

            return (
                <div className="min-h-screen p-6 animate-fade">
                    <div className="flex justify-between items-center mb-8">
                        <a href="index.html" className="text-[10px] uppercase underline opacity-60 font-black tracking-widest text-red-500">← EXIT PANIC ROOM</a>
                        <div className="h-2 w-2 rounded-full bg-red-600 animate-pulse shadow-[0_0_10px_red]"></div>
                    </div>
                    
                    <h1 className="brand text-red-600 text-lg uppercase mb-8 italic tracking-tighter text-center">M5: TERME INTELLIGENCE</h1>
                    
                    <div className="space-y-4">
                        {targets.map(t => (
                            <div key={t.name} className="glass p-5 rounded-3xl border border-red-500/20">
                                <div className="flex justify-between mb-4">
                                    <h3 className="text-xs font-black uppercase text-white">{t.name}</h3>
                                    <span className="text-[7px] bg-red-900/30 text-red-500 px-2 py-1 rounded-full uppercase italic border border-red-900/50">{t.status}</span>
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <div className="bg-black/40 p-3 rounded-xl">
                                        <p className="text-[7px] text-slate-500 uppercase">Registry/NIP</p>
                                        <p className="text-[9px] font-black">{t.nip}</p>
                                    </div>
                                    <div className="bg-black/40 p-3 rounded-xl">
                                        <p className="text-[7px] text-slate-500 uppercase">Region</p>
                                        <p className="text-[9px] font-black">{t.location}</p>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="mt-10 p-5 rounded-3xl border-2 border-dashed border-red-900/30 text-center">
                        <i className="fa-solid fa-radar text-red-600 mb-2 animate-spin-slow"></i>
                        <p className="text-[8px] text-slate-500 uppercase font-black italic tracking-widest">Dork Scrapers: Operational (12h cycle)</p>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TermeApp />);
    </script>
</body>
</html>
