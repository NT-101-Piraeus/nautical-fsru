<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M2: Compliance Shield v3.86</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');body{background:#020617;color:white;font-family:'Orbitron',sans-serif;font-style:italic;font-weight:bold;}.glass{background:rgba(15,23,42,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);}</style>
</head>
<body><div id="root"></div><script type="text/babel">
const { useState, useEffect } = React;

// --- DEDICATED M2 AUDITOR ---
const Telemetry = {
    log: (type, action, details) => {
        try {
            const logs = JSON.parse(localStorage.getItem('ntg_M2_logs') || '[]');
            logs.push({ ts: new Date().toISOString(), type, action, details });
            localStorage.setItem('ntg_M2_logs', JSON.stringify(logs.slice(-50)));
        } catch (e) { console.error("Telemetry fail", e); }
    }
};

const SafetyApp = () => {
    const [view, setView] = useState('WATCHLIST'); 
    const [activeVessel, setActiveVessel] = useState(null);
    const [showAdminModal, setShowAdminModal] = useState(false);
    const [pin, setPin] = useState('');
    const [newVessel, setNewVessel] = useState({ name: '', imo: '', shift: '' });
    const [sunMode, setSunMode] = useState(false);
    const [dailyTasks, setDailyTasks] = useState([]);
    const [photos, setPhotos] = useState([]);
    const [tempArea, setTempArea] = useState('Main Deck');
    const [tempTaskType, setTempTaskType] = useState('Hot Works');

    const [vessels, setVessels] = useState(() => {
        const saved = localStorage.getItem('ntg_vessels');
        return saved ? JSON.parse(saved) : [{ id: 1, name: 'FELIX', imo: '9513191', shift: '07:00-11:00', status: 'ACTIVE' }];
    });

    useEffect(() => { localStorage.setItem('ntg_vessels', JSON.stringify(vessels)); }, [vessels]);
    useEffect(() => { Telemetry.log('INFO', 'BOOT', 'M2 System Online'); }, []);

    const workRequirements = {
        "Hot Works": ["Gas-Free Cert", "Fire Standby", "Fire Blanket"],
        "Confined Space": ["O2/LEL Tested", "Standby Person", "Ventilation"],
        "Lifting Ops": ["Gear Certified", "Area Clear", "SWL Verified"]
    };

    const handleSign = () => {
        Telemetry.log('ACTION', 'LOG_SIGNED', activeVessel.name);
        alert("Log Signed & Secured.");
        setView('WATCHLIST');
    };

    if (view === 'WATCHLIST') return (
        <div className="min-h-screen p-6 bg-slate-950 font-bold italic animate-fade">
            <div className="flex justify-between items-center mb-10"><a href="index.html" className="text-[10px] underline text-blue-500">← HUB</a><span className="text-[9px] text-blue-500 animate-pulse uppercase">Auditor Active</span></div>
            <h1 className="text-blue-600 text-lg uppercase mb-10 text-center tracking-tighter">M2: SAFETY WATCHLIST</h1>
            <div className="space-y-4 mb-10">
                {vessels.map(v => (
                    <div key={v.id} onClick={() => { setActiveVessel(v); setView('INSPECTION'); Telemetry.log('INFO', 'VESSEL_SELECT', v.name); }} className="glass p-5 rounded-[2.5rem] border-l-4 border-slate-700 flex justify-between items-center shadow-xl active:scale-95 transition-all">
                        <p className="text-sm uppercase">{v.name}</p>
                        <i className="fa-solid fa-chevron-right text-slate-800"></i>
                    </div>
                ))}
            </div>
            <button onClick={() => setShowAdminModal(true)} className="w-full bg-blue-600/10 border-2 border-dashed border-blue-500/40 p-6 rounded-[2.5rem] text-blue-500 font-black uppercase text-[10px]">Add Project (Admin)</button>
            
            {showAdminModal && (
                <div className="fixed inset-0 bg-black/95 backdrop-blur-xl z-50 flex items-center justify-center p-6">
                    <div className="glass w-full p-8 rounded-[3rem] border-blue-500/30">
                        <input type="password" placeholder="PIN" value={pin} onChange={(e)=>setPin(e.target.value)} className="w-full bg-black/50 p-5 rounded-2xl text-center text-2xl tracking-[1rem] outline-none border border-white/10 mb-6" />
                        {pin === '1234' && (
                            <div className="space-y-4 animate-fade">
                                <input type="text" placeholder="NAME" value={newVessel.name} onChange={(e)=>setNewVessel({...newVessel, name: e.target.value.toUpperCase()})} className="w-full bg-slate-900/50 p-4 rounded-xl text-xs outline-none border border-white/5" />
                                <input type="text" placeholder="IMO" value={newVessel.imo} onChange={(e)=>setNewVessel({...newVessel, imo: e.target.value})} className="w-full bg-slate-900/50 p-4 rounded-xl text-xs outline-none border border-white/5" />
                                <button onClick={() => { setVessels([...vessels, {...newVessel, id:Date.now()}]); setShowAdminModal(false); Telemetry.log('ACTION', 'PROJECT_ADDED', newVessel.name); }} className="w-full bg-blue-600 p-5 rounded-2xl text-[10px] uppercase">Save Project</button>
                            </div>
                        )}
                        <button onClick={()=>setShowAdminModal(false)} className="w-full text-[9px] text-slate-600 uppercase mt-4">Cancel</button>
                    </div>
                </div>
            )}
        </div>
    );

    return (
        <div className={`min-h-screen p-6 animate-fade ${sunMode?'bg-white text-black':'bg-slate-950 text-white'}`}>
            <div className="flex justify-between items-center mb-6">
                <button onClick={()=>setView('WATCHLIST')} className="text-[10px] underline text-blue-500">← Back</button>
                <span className="text-[11px] uppercase">{activeVessel.name}</span>
                <button onClick={()=>setSunMode(!sunMode)} className="p-2 glass rounded-full border border-blue-500/20"><i className={`fa-solid ${sunMode?'fa-moon':'fa-sun text-yellow-500'}`}></i></button>
            </div>
            
            <div className={`p-5 rounded-[2.5rem] mb-6 space-y-4 ${sunMode?'bg-slate-100':'glass border-blue-500/20'}`}>
                <div className="grid grid-cols-2 gap-2">
                    <select value={tempArea} onChange={(e)=>setTempArea(e.target.value)} className="bg-slate-800/20 p-4 rounded-2xl text-[10px] text-white italic"><option>Main Deck</option><option>Engine Room</option></select>
                    <select value={tempTaskType} onChange={(e)=>setTempTaskType(e.target.value)} className="bg-slate-800/20 p-4 rounded-2xl text-[10px] text-white italic"><option>Hot Works</option><option>Confined Space</option></select>
                </div>
                <button onClick={()=>{setDailyTasks([...dailyTasks, {id:Date.now(), area:tempArea, type:tempTaskType}]); Telemetry.log('ACTION', 'TASK_ADD', tempTaskType);}} className="w-full bg-blue-600/20 border border-blue-600/40 p-4 rounded-2xl text-[9px] uppercase font-black italic">Add Task +</button>
            </div>

            <div className="space-y-4 mb-28">
                {dailyTasks.map(task => (
                    <div key={task.id} className={`p-4 rounded-3xl border border-blue-500/10 ${sunMode?'bg-white':'bg-black/20'}`}>
                        <h4 className="text-[11px] uppercase text-blue-500 font-black mb-3">{task.area} / {task.type}</h4>
                        {workRequirements[task.type]?.map(check => (
                            <label key={check} className="flex items-center gap-3 p-2">
                                <input type="checkbox" className="w-4 h-4 accent-blue-600" />
                                <span className="text-[9px] uppercase opacity-80">{check}</span>
                            </label>
                        ))}
                    </div>
                ))}
            </div>

            <div className="fixed bottom-0 left-0 right-0 p-6 flex gap-4 bg-inherit">
                <button onClick={()=>{setPhotos([...photos, 1]); Telemetry.log('ACTION', 'PHOTO', activeVessel.name);}} className="flex-1 p-6 rounded-[2.5rem] border-2 border-slate-700 bg-black/20 flex flex-col items-center"><i className="fa-solid fa-camera text-2xl mb-1"></i><span className="text-[8px] uppercase">Capture ({photos.length})</span></button>
                <button disabled={photos.length===0} onClick={handleSign} className={`flex-1 p-6 rounded-[2.5rem] border-2 ${photos.length>0?'bg-blue-600 border-blue-400':'opacity-20 border-slate-800'} flex flex-col items-center`}><i className="fa-solid fa-signature text-2xl mb-1"></i><span className="text-[8px] uppercase">Sign Log</span></button>
            </div>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<SafetyApp />);
</script></body></html>
