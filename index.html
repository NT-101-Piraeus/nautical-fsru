<!DOCTYPE html><html lang="el"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTG COMMAND | V52.1 MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; overflow-x: hidden; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        #cy { width: 100%; height: 400px; background: rgba(0,0,0,0.4); border-radius: 40px; }
        .animate-bounce-slow { animation: bounce 3s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(-5%); } 50% { transform: translateY(0); } }
    </style></head><body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const _supabase = supabase.createClient("https://omdarjncczohpffunfy.supabase.co", "sb_publishable_V-nfUDy5MxEG4SlXkisFBg_GBlD_4Y9");

        function App() {
            const [view, setView] = useState('HUB'); // HUB, LEGAL_MENU, LEGAL_ASSET, LEGAL_CORP, MANAGER
            const [isAuth, setIsAuth] = useState(() => sessionStorage.getItem('ntg_auth') === 'true');
            const [masterData, setMasterData] = useState({ ships: [] });
            const [taskCount, setTaskCount] = useState(0);

            useEffect(() => {
                const saved = JSON.parse(localStorage.getItem('ntg_master_data'));
                if (saved && saved.ships) {
                    setMasterData(saved);
                    const count = saved.ships.flatMap(s => Object.values(s.data || {})).flatMap(d => d.observations || []).filter(o => o.isTask).length;
                    setTaskCount(count);
                }

                if (view === 'LEGAL_CORP') {
                    const cy = cytoscape({
                        container: document.getElementById('cy'),
                        elements: [
                            { data: { id: 'ez', label: 'Erkan Zorlu', type: 'PE' } },
                            { data: { id: 'tk', label: 'Tuğrul Karaca', type: 'PE' } },
                            { data: { id: 'ho', label: 'Hasan Öztürk', type: 'PE' } },
                            { data: { id: 'bnk', label: 'NL Banks', type: 'BK' } },
                            { data: { id: 'lib', label: 'Liberia Entities', type: 'CO' } },
                            { data: { source: 'ez', target: 'bnk' } }, { data: { source: 'tk', target: 'bnk' } },
                            { data: { source: 'ho', target: 'bnk' } }, { data: { source: 'bnk', target: 'lib' } }
                        ],
                        style: [
                            { selector: 'node', style: { 'label': 'data(label)', 'color': '#fff', 'background-color': '#3b82f6', 'font-size': '10px', 'text-valign': 'center' } },
                            { selector: 'node[type="PE"]', style: { 'background-color': '#ef4444' } },
                            { selector: 'edge', style: { 'width': 2, 'line-color': '#334155', 'target-arrow-shape': 'triangle' } }
                        ], layout: { name: 'cose' }
                    });
                }
            }, [isAuth, view]);

            const anyShipDone = masterData.ships.some(s => s.signedToday);

            if (!isAuth) return (
                <div className="h-screen flex items-center justify-center bg-[#020617] p-6">
                    <form onSubmit={(e)=>{e.preventDefault(); if(e.target.p.value==='NT2026'){sessionStorage.setItem('ntg_auth','true');setIsAuth(true)}}} className="glass p-12 rounded-[50px] text-center w-full max-w-sm border border-blue-500/20 shadow-2xl">
                        <h1 className="brand text-blue-500 text-3xl mb-10 italic uppercase">Identify</h1>
                        <input name="p" type="password" autoFocus className="w-full bg-slate-900 p-6 rounded-3xl mb-6 text-center text-white text-3xl font-bold outline-none" placeholder="••••" />
                        <button className="w-full bg-blue-600 py-6 rounded-3xl font-black text-xs uppercase tracking-widest">Verify Authority</button>
                    </form>
                </div>
            );

            // LEGAL SUB-MENU
            if (view === 'LEGAL_MENU') return (
                <div className="max-w-xl mx-auto p-5 py-12 animate-fadeIn text-center">
                    <button onClick={()=>setView('HUB')} className="bg-slate-800 px-6 py-3 rounded-2xl text-[10px] font-black uppercase mb-12">← Back to Hub</button>
                    <h2 className="brand text-red-500 text-2xl uppercase italic mb-10 tracking-widest">Legal Division</h2>
                    <div className="space-y-6">
                        <div onClick={()=>setView('LEGAL_ASSET')} className="glass p-10 rounded-[50px] border-l-8 border-red-600 cursor-pointer active:scale-95 transition-all text-left flex justify-between items-center">
                            <div><h3 className="brand text-lg text-white uppercase italic">Asset Tracking</h3><p className="text-[10px] text-slate-500 uppercase mt-2">NAFTOCEMENT IV (IMO 7355349)</p></div>
                            <i className="fa-solid fa-satellite-dish text-red-600 text-2xl"></i>
                        </div>
                        <div onClick={()=>setView('LEGAL_CORP')} className="glass p-10 rounded-[50px] border-l-8 border-blue-600 cursor-pointer active:scale-95 transition-all text-left flex justify-between items-center">
                            <div><h3 className="brand text-lg text-white uppercase italic">Corporate Dispute</h3><p className="text-[10px] text-slate-500 uppercase mt-2">Terme Case Entities</p></div>
                            <i className="fa-solid fa-network-wired text-blue-600 text-2xl"></i>
                        </div>
                    </div>
                </div>
            );

            if (view === 'LEGAL_ASSET') return (
                <div className="max-w-xl mx-auto p-5 py-12 animate-fadeIn">
                    <button onClick={()=>setView('LEGAL_MENU')} className="bg-slate-800 px-6 py-3 rounded-2xl text-[10px] font-black uppercase mb-10">← Legal Menu</button>
                    <div className="glass p-10 rounded-[50px] border border-red-500/20 shadow-2xl space-y-8">
                        <h2 className="brand text-xl text-white uppercase">Naftocement IV Intel</h2>
                        <div className="space-y-4">
                            <div className="flex justify-between border-b border-white/5 pb-2"><span className="text-[10px] text-slate-500 uppercase font-black">Hunter Status</span><span className="text-[10px] text-red-500 font-black animate-pulse">WATCHING (HAI PHONG)</span></div>
                            <div className="flex justify-between border-b border-white/5 pb-2"><span className="text-[10px] text-slate-500 uppercase font-black">AIS Signal</span><span className="text-[10px] text-emerald-400 font-black">ACTIVE</span></div>
                            <div className="flex justify-between border-b border-white/5 pb-2"><span className="text-[10px] text-slate-500 uppercase font-black">Entity Watch</span><span className="text-[10px] text-blue-400 font-black">Ballycor Carriers SA</span></div>
                        </div>
                        <button onClick={()=>alert("Scraping Port Logs...")} className="w-full bg-slate-800 py-4 rounded-3xl text-[10px] font-black uppercase border border-red-600/30">Manual Infiltration Trigger</button>
                    </div>
                </div>
            );

            if (view === 'LEGAL_CORP') return (
                <div className="max-w-xl mx-auto p-5 py-12 animate-fadeIn">
                    <button onClick={()=>setView('LEGAL_MENU')} className="bg-slate-800 px-6 py-3 rounded-2xl text-[10px] font-black uppercase mb-8">← Legal Menu</button>
                    <h2 className="brand text-xl text-blue-500 uppercase italic mb-8">Entity Relations: Terme</h2>
                    <div id="cy" className="glass mb-8 shadow-2xl border border-blue-500/20"></div>
                </div>
            );

            if (view === 'MANAGER') return (
                <div className="max-w-xl mx-auto p-5 py-12 animate-fadeIn text-center">
                    <button onClick={()=>setView('HUB')} className="bg-slate-800 px-6 py-3 rounded-2xl text-[10px] font-black uppercase mb-12">← Hub</button>
                    <h2 className="brand text-2xl text-blue-400 uppercase italic mb-10">Manager Activity Log</h2>
                    <div className="glass p-24 rounded-[60px] opacity-20 italic font-black text-xs uppercase tracking-widest italic">Awaiting Hunter Agent Feed...</div>
                </div>
            );

            return (
                <div className="max-w-xl mx-auto p-5 py-12 animate-fadeIn">
                    <header className="flex justify-between items-center mb-12">
                        <h1 className="brand text-blue-500 text-2xl font-black italic uppercase">NTG HUB</h1>
                        <button onClick={()=>{localStorage.clear(); sessionStorage.clear(); window.location.reload();}} className="bg-red-600/10 text-red-500 p-4 rounded-2xl border border-red-500/20"><i className="fa-solid fa-power-off"></i></button>
                    </header>

                    <div className="space-y-6">
                        {/* UNLOCKABLE PDF BUTTON */}
                        {anyShipDone && (
                            <button onClick={()=>alert("Generating PDF with V45 Logic...")} className="w-full bg-gradient-to-r from-emerald-600 to-teal-600 p-8 rounded-[40px] flex items-center justify-between border-2 border-white shadow-2xl animate-bounce-slow">
                                <div className="text-left"><h3 className="brand text-[10px] text-white uppercase italic">Audit Signed Off</h3><p className="text-sm font-black text-white">GENERATE EXECUTIVE REPORT</p></div>
                                <i className="fa-solid fa-file-pdf text-3xl text-white"></i>
                            </button>
                        )}

                        {/* HAZARD RADAR LINK */}
                        <a href="safety_ships.html?view=TASKS" className="glass p-6 rounded-[35px] border-l-4 border-red-600 flex justify-between items-center bg-red-600/5 shadow-lg">
                            <div><h3 className="brand text-[10px] text-red-500 uppercase italic">Hazard Radar</h3><p className="text-3xl font-black mt-1 text-white">{taskCount} <span className="text-xs text-slate-500 font-black">FINDINGS</span></p></div>
                            <i className="fa-solid fa-tower-broadcast text-red-500 text-2xl animate-pulse"></i>
                        </a>

                        {/* SCHEDULE WITH TIMES */}
                        <div className="glass p-6 rounded-[35px] border border-white/5 shadow-xl">
                            <h3 className="brand text-[10px] text-blue-400 uppercase italic mb-6">Today's Fleet Schedule</h3>
                            <div className="space-y-4 uppercase font-bold text-[11px]">{[
                                {n:"FELIX", p:"Δραπετσώνα", t:"07:00"}, {n:"RIGEL III", p:"Πέραμα", t:"15:00"},
                                {n:"BADJI MOKHTAR III", p:"ΕΛΕΥΣΙΝΑ", t:"11:00"}, {n:"ΑΡΙΑΔΝΗ", p:"ΕΛΕΥΣΙΝΑ", t:"13:00"}
                            ].map((s,i)=>(<div key={i} className="flex justify-between border-b border-white/5 pb-2"><span>{s.n}</span><span className="text-slate-500">{s.p} • {s.t}</span></div>))}</div>
                        </div>

                        {/* MODULES NAVIGATION */}
                        <div className="grid grid-cols-1 gap-4">
                            <a href="safety_ships.html" className="glass p-10 rounded-[50px] flex items-center gap-8 border border-white/5 active:scale-95 transition-all shadow-2xl">
                                <div className="w-16 h-16 rounded-2xl bg-red-600/20 flex items-center justify-center text-red-500 text-3xl shadow-inner"><i className="fa-solid fa-user-shield"></i></div>
                                <div><h2 className="brand text-sm text-white uppercase italic leading-none">Safety Officer</h2><p className="text-[10px] text-slate-500 font-bold uppercase mt-2">Professional Audit Engine</p></div>
                            </a>
                            <div onClick={()=>{if(prompt("LEGAL PIN")==="2026") setView('LEGAL_MENU')}} className="glass p-10 rounded-[50px] flex items-center gap-8 border border-red-500/20 cursor-pointer active:scale-95 transition-all shadow-2xl">
                                <div className="w-16 h-16 rounded-2xl bg-red-600/10 flex items-center justify-center text-red-500 text-3xl shadow-inner"><i className="fa-solid fa-scale-balanced"></i></div>
                                <div><h2 className="brand text-sm text-red-500 uppercase italic leading-none">Legal Dept</h2><p className="text-[10px] text-slate-500 font-bold uppercase mt-2 tracking-tighter">Two-Factor Intel Access</p></div>
                            </div>
                            <div onClick={()=>{if(prompt("MANAGER PIN")==="1234") setView('MANAGER')}} className="glass p-10 rounded-[50px] flex items-center gap-8 border border-blue-500/20 cursor-pointer shadow-xl">
                                <div className="w-16 h-16 rounded-2xl bg-blue-600/20 flex items-center justify-center text-blue-400 text-3xl shadow-inner"><i className="fa-solid fa-tower-observation"></i></div>
                                <div><h2 className="brand text-sm text-white uppercase italic leading-none">Manager Log</h2><p className="text-[10px] text-slate-400 font-bold uppercase mt-2 text-blue-400 italic">Live Activity Stream</p></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script></body></html>
