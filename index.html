<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NTG COMMAND | SAFETY TACTICAL ACTIVATED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .tile-active { transform: scale(0.95); background: rgba(59, 130, 246, 0.2); }
        .progress-fill { height: 100%; transition: width 0.8s ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- SUPABASE CONNECT (ΒΑΛΕ ΤΑ ΚΛΕΙΔΙΑ ΣΟΥ) ---
        const SUPABASE_URL = 'https://ovofreerowjofpvyqqre.supabase.co'; 
        const SUPABASE_KEY = 'YOUR_SUPABASE_KEY_HERE'; 
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function App() {
            const [view, setView] = useState('HOME');
            const [mode, setMode] = useState('MARITIME');

            // --- NAVIGATION ---
            const manuals = [
                { id: 'M1', title: 'SAFETY', icon: 'fa-shield-halved', color: 'text-blue-400' },
                { id: 'M2', title: 'REPAIRS', icon: 'fa-ship', color: 'text-cyan-400' },
                { id: 'M3', title: 'LEGAL', icon: 'fa-scale-balanced', color: 'text-red-500' },
                { id: 'M5', title: 'WORKFORCE', icon: 'fa-user-clock', color: 'text-emerald-400' },
                { id: 'M6', title: 'CEO PULSE', icon: 'fa-chart-line', color: 'text-purple-500' },
                { id: 'M7', title: 'X-MERCHANT', icon: 'fa-cart-shopping', color: 'text-orange-500' },
                { id: 'M8', title: 'AIRBNB', icon: 'fa-house-chimney-user', color: 'text-pink-500' },
                { id: 'M4', title: 'TECH CORE', icon: 'fa-microchip', color: 'text-slate-500' }
            ];

            return (
                <div className="min-h-screen flex flex-col max-w-md mx-auto relative shadow-2xl shadow-blue-500/10">
                    
                    {/* --- GLOBAL SYNC HEADER (Manual 01 - Section 1A) --- */}
                    <header className="glass sticky top-0 z-50 p-4 flex justify-between items-center border-b border-blue-500/20">
                        <div onClick={() => setView('HOME')} className="cursor-pointer">
                            <p className="text-[9px] font-black text-blue-500 tracking-[0.3em] uppercase leading-none mb-1">NTG Command</p>
                            <h1 className="font-black text-sm tracking-tighter italic">M. SYKINIOTIS</h1>
                        </div>
                        <div className="text-right">
                            <div className="flex items-center gap-2 justify-end">
                                <span className="text-[8px] font-black text-slate-500 uppercase tracking-widest">Cloud Active</span>
                                <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_#22c55e]"></div>
                            </div>
                            <button onClick={() => setMode(mode === 'MARITIME' ? 'INDUSTRIAL' : 'MARITIME')} className="mt-1 bg-slate-800 border border-slate-700 px-2 py-0.5 rounded text-[8px] font-black text-slate-400 uppercase">
                                Mode: {mode}
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 p-5 overflow-y-auto">
                        
                        {/* --- HUB VIEW (The 8 Icons) --- */}
                        {view === 'HOME' && (
                            <div className="grid grid-cols-2 gap-4 animate-in fade-in zoom-in duration-300">
                                {manuals.map(m => (
                                    <button key={m.id} onClick={() => setView(m.id)} className="glass p-6 rounded-[2.5rem] flex flex-col items-center gap-2 border-b-2 border-transparent active:border-white/20">
                                        <i className={`fa-solid ${m.icon} text-3xl ${m.color}`}></i>
                                        <span className="text-[10px] font-black uppercase tracking-tighter">{m.title}</span>
                                    </button>
                                ))}
                            </div>
                        )}

                        {/* --- M1: SAFETY TACTICAL SUITE (Manual 01) --- */}
                        {view === 'M1' && (
                            <div className="space-y-5 animate-in slide-in-from-bottom">
                                <div className="flex justify-between items-center">
                                    <h2 className="brand text-blue-400 text-xs tracking-widest italic uppercase underline decoration-blue-500/50 underline-offset-8">Safety Tactical Suite</h2>
                                    <button onClick={() => setView('HOME')} className="text-[10px] font-black text-slate-500 uppercase">Hub</button>
                                </div>

                                {/* Hazard Radar (Manual 01 - Section 1B) */}
                                <div className="glass p-4 rounded-3xl border-2 border-red-600 animate-pulse flex items-center gap-4 shadow-[0_0_15px_rgba(220,38,38,0.3)]">
                                    <div className="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center text-white text-xl">
                                        <i className="fa-solid fa-triangle-exclamation"></i>
                                    </div>
                                    <div>
                                        <p className="text-[9px] font-black text-red-500 uppercase tracking-widest leading-none mb-1">Block: Hot Works No Permit</p>
                                        <p className="text-xs font-black uppercase tracking-tighter italic italic tracking-tighter">Naftocement IV // Engine Room</p>
                                        <p className="text-[8px] text-slate-500 mt-1 font-bold">14:20 • {mode}</p>
                                    </div>
                                </div>

                                {/* Tactical Tiles (Manual 01 - Section 1B) */}
                                <div className="grid grid-cols-2 gap-3">
                                    <button className="glass p-5 rounded-3xl flex flex-col items-center text-center gap-3 active:scale-95 transition-all">
                                        <i className="fa-solid fa-rocket text-2xl text-blue-500"></i>
                                        <span className="text-[9px] font-black uppercase tracking-tighter">Inspection Engine</span>
                                    </button>
                                    <button className="glass p-5 rounded-3xl flex flex-col items-center text-center gap-3 active:scale-95 transition-all opacity-60">
                                        <i className="fa-solid fa-book text-2xl text-emerald-500"></i>
                                        <span className="text-[9px] font-black uppercase tracking-tighter">Digital Logbook</span>
                                    </button>
                                    <button className="glass p-5 rounded-3xl flex flex-col items-center text-center gap-3 active:scale-95 transition-all opacity-60">
                                        <i className="fa-solid fa-file-invoice text-2xl text-purple-500"></i>
                                        <span className="text-[9px] font-black uppercase tracking-tighter">Executive Reports</span>
                                    </button>
                                    <button className="glass p-5 rounded-3xl flex flex-col items-center text-center gap-3 active:scale-95 transition-all opacity-60">
                                        <i className="fa-solid fa-wallet text-2xl text-yellow-500"></i>
                                        <span className="text-[9px] font-black uppercase tracking-tighter">Project Wallet</span>
                                    </button>
                                </div>

                                {/* IoT Tracking & Sidbar (Manual 01 - Section 2 & 4) */}
                                <div className="glass p-5 rounded-3xl space-y-3">
                                    <div className="flex justify-between items-center">
                                        <div className="flex items-center gap-2">
                                            <i className="fa-solid fa-bolt text-xs text-yellow-500"></i>
                                            <span className="text-[9px] font-black text-slate-300 uppercase italic tracking-widest">IoTsensor Network</span>
                                        </div>
                                        <span className="text-[8px] font-bold text-slate-500">3 Devices Online</span>
                                    </div>
                                    
                                    <div className="p-3 bg-slate-900 rounded-xl border border-slate-800 flex justify-between items-center border-orange-500/50 border-dashed">
                                        <p className="text-[9px] font-black text-orange-500 uppercase tracking-widest">Gas Detector GD-01</p>
                                        <div className="flex items-center gap-1.5 bg-orange-950 border border-orange-700 px-2 py-0.5 rounded text-orange-400">
                                            <i className="fa-solid fa-screwdriver-wrench text-[8px]"></i>
                                            <span className="text-[8px] font-black uppercase">Needs Calibration</span>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        )}

                        {/* --- OTHERS (Preserved) --- */}
                        {['M2','M3','M4','M5','M6','M7','M8'].includes(view) && (
                            <div className="flex flex-col items-center justify-center py-20 animate-in fade-in">
                                <i className="fa-solid fa-screwdriver-wrench text-5xl mb-4 text-slate-700"></i>
                                <p className="brand text-[10px] text-slate-500 uppercase italic tracking-widest">Manual {view} Under Construction</p>
                                <button onClick={() => setView('HOME')} className="mt-8 bg-slate-800 px-6 py-2 rounded-xl text-[10px] font-black text-slate-300 uppercase">Return to Hub</button>
                            </div>
                        )}

                    </main>

                    {/* --- GLOBAL SMART CAPTURE [🔵] (Manual 01) --- */}
                    <div className="fixed bottom-6 left-0 right-0 flex justify-center pointer-events-none z-50">
                        <label className="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(37,99,235,0.4)] border-4 border-slate-950 pointer-events-auto active:scale-90 transition-all cursor-pointer">
                            <i className="fa-solid fa-camera text-2xl text-white"></i>
                            <input type="file" accept="image/*" capture="environment" className="hidden" />
                        </label>
                    </div>

                    <footer className="fixed bottom-2 w-full text-center">
                        <p className="brand text-[7px] text-slate-700 font-black tracking-[0.5em] uppercase">NTG Command • Version 3.0 Safety Activated</p>
                    </footer>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
