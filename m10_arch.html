<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M10: Supreme Audit Engine</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');body{background:#020617;color:white;font-family:'Orbitron',sans-serif;font-style:italic;font-weight:bold;}.glass{background:rgba(15,23,42,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);}</style>
</head>
<body><div id="root"></div><script type="text/babel">
const { useState, useEffect } = React;

const SupremeAudit = () => {
    const [isAuthenticated, setIsAuthenticated] = useState(false);
    const [pin, setPin] = useState('');
    const [selectedDiv, setSelectedDiv] = useState('M2'); // Default στο Safety
    const [logs, setLogs] = useState([]);

    const divisions = [
        { id: 'M1', name: 'UTM' }, { id: 'M2', name: 'SAFETY' }, { id: 'M3', name: 'LOAD TEST' },
        { id: 'M4', name: 'RADAR' }, { id: 'M5', name: 'WAR ROOM' }, { id: 'M6', name: 'CEO PULSE' },
        { id: 'M7', name: 'STARTUP' }, { id: 'M8', name: 'ACADEMY' }, { id: 'M9', name: 'OPERATION' },
        { id: 'M10', name: 'ARCHITECT' }, { id: 'M11', name: 'SENSORS' }, { id: 'M12', name: 'STAFF' }, { id: 'M13', name: 'MYKONOS' }
    ];

    const loadLogs = () => {
        const key = `ntg_${selectedDiv}_logs`;
        const data = JSON.parse(localStorage.getItem(key) || '[]');
        setLogs(data.reverse());
    };

    useEffect(() => { if (isAuthenticated) loadLogs(); }, [isAuthenticated, selectedDiv]);

    if (!isAuthenticated) return (
        <div className="min-h-screen flex items-center justify-center bg-slate-950 p-6 font-black italic">
            <div className="glass w-full max-w-sm p-10 rounded-[3rem] border-indigo-500/30 text-center">
                <i className="fa-solid fa-shield-halved text-4xl text-indigo-500 mb-6"></i>
                <input type="password" placeholder="PIN" value={pin} onChange={(e)=>setPin(e.target.value)} className="w-full bg-black/50 p-5 rounded-2xl text-center text-2xl tracking-[1rem] outline-none border border-white/10 mb-6" />
                <button onClick={() => pin === '1234' ? setIsAuthenticated(true) : alert("Wrong PIN")} className="w-full bg-indigo-600 p-5 rounded-3xl text-[10px] uppercase font-black italic">Verify Admin Access</button>
            </div>
        </div>
    );

    return (
        <div className="min-h-screen p-6 bg-slate-950 font-bold italic">
            <div className="flex justify-between items-center mb-8">
                <a href="index.html" className="text-[10px] underline opacity-50 text-indigo-400">← HUB</a>
                <span className="text-[9px] text-indigo-600 font-black uppercase tracking-widest italic animate-pulse tracking-widest">Distributed Audit Active</span>
            </div>

            <h1 className="text-indigo-500 text-lg uppercase mb-8 text-center italic tracking-tighter">M10: SUPREME AUDITOR</h1>

            {/* SELECTOR GRID */}
            <div className="grid grid-cols-4 gap-2 mb-8 overflow-x-auto">
                {divisions.map(d => (
                    <button key={d.id} onClick={() => setSelectedDiv(d.id)} className={`p-2 rounded-xl text-[7px] border transition-all ${selectedDiv === d.id ? 'bg-indigo-600 border-indigo-400 text-white' : 'glass border-white/5 text-slate-500'}`}>
                        {d.id}
                    </button>
                ))}
            </div>

            <div className="mb-4 flex justify-between items-center px-2">
                <p className="text-[10px] text-white uppercase italic font-black underline decoration-indigo-500">Logs for {selectedDiv}</p>
                <button onClick={() => {localStorage.setItem(`ntg_${selectedDiv}_logs`, '[]'); loadLogs();}} className="text-[7px] text-red-500 uppercase">Clear {selectedDiv}</button>
            </div>

            {/* LOG FEED */}
            <div className="space-y-3">
                {logs.length === 0 ? <p className="text-center text-slate-700 text-[8px] mt-10">NO LOGS DETECTED FOR {selectedDiv}</p> : 
                    logs.map((log, i) => (
                        <div key={i} className={`glass p-4 rounded-2xl border-l-4 ${log.type === 'ERROR' ? 'border-red-600' : 'border-emerald-600'} animate-fade`}>
                            <div className="flex justify-between text-[7px] mb-1 opacity-50">
                                <span>{log.type}</span>
                                <span>{new Date(log.ts).toLocaleTimeString()}</span>
                            </div>
                            <p className="text-[9px] text-white uppercase">{log.action}</p>
                            <p className="text-[8px] text-slate-500 mt-1 italic">{JSON.stringify(log.details)}</p>
                        </div>
                    ))
                }
            </div>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<SupremeAudit />);
</script></body></html>
